 floats (e.g. `'3.14'`).\n- Operators: `+`, `-`, `*`, `/`\n- Parentheses: `(`, `)`\n- Whitespace is ignored.\n- Raise `ValueError` for unexpected characters.\n\nExample:\n```python\ntokenize('3 + 4.5 * (2 - 1)')\n# [('NUM','3'),('OP','+'),('NUM','4.5'),('OP','*'),\n#  ('PAREN','('),('NUM','2'),('OP','-'),('NUM','1'),('PAREN',')')]\n```","starter":"def tokenize(expr):\n    tokens = []\n    i = 0\n    while i < len(expr):\n        ch = expr[i]\n        # TODO: handle whitespace, numbers, operators, parens\n        i += 1  # keep this moving forward!\n    return tokens","hint":"Use a while loop with index `i`. When you see a digit or `.`, keep advancing `i` while the character is still part of a number, then append one `NUM` token.","tests":["tokens = tokenize('1 + 2')\nassert tokens == [('NUM','1'),('OP','+'),('NUM','2')]","tokens = tokenize('3.14 * (2 + 1)')\nassert tokens == [('NUM','3.14'),('OP','*'),('PAREN','('),('NUM','2'),('OP','+'),('NUM','1'),('PAREN',')')]","tokens = tokenize('  10 / 5  ')\nassert tokens == [('NUM','10'),('OP','/'),('NUM','5')]","try:\n    tokenize('1 @ 2')\n    assert False\nexcept ValueError:\n    pass","tokens = tokenize('100')\nassert tokens == [('NUM','100')]"],"solution":"def tokenize(expr):\n    tokens = []\n    i = 0\n    while i < len(expr):\n        ch = expr[i]\n        if ch.isspace():\n            i += 1\n        elif ch.isdigit() or ch == '.':\n            j = i\n            while j < len(expr) and (expr[j].isdigit() or expr[j] == '.'):\n                j += 1\n            tokens.append(('NUM', expr[i:j]))\n            i = j\n        elif ch in '+-*/':\n            tokens.append(('OP', ch))\n            i += 1\n        elif ch in '()':\n            tokens.append(('PAREN', ch))\n            i += 1\n        else:\n            raise ValueError(f'Unexpected character {ch!r} at position {i}')\n    return tokens\n","expert":"import re\n\ndef tokenize(expr):\n    TOKEN_RE = re.compile(r'\\s*(?:(\\d+\\.?\\d*|\\.\\d+)|([+\\-*/])|([()]))\\s*')\n    tokens = []\n    pos = 0\n    while pos < len(expr):\n        if expr[pos].isspace():\n            pos += 1\n            continue\n        m = TOKEN_RE.match(expr, pos)\n        if not m:\n            raise ValueError(f'Unexpected character {expr[pos]!r} at position {pos}')\n        num, op, paren = m.group(1), m.group(2), m.group(3)\n        if num is not None:\n            tokens.append(('NUM', num))\n        elif op is not None:\n            tokens.append(('OP', op))\n        else:\n            tokens.append(('PAREN', paren))\n        pos = m.end()\n    return tokens\n","explanation":"The solution uses a manual index loop with character-by-character checks, which is transparent and easy to extend. The expert version compiles a single regex with alternation groups for each token type and uses `re.match` at a sliding position \u2014 a classic lexer idiom that scales better when token types multiply, since adding a new token type only requires extending the regex."},{"day":329,"title":"Query String Parser","topic":"mini-parsers","difficulty":4,"minutes":15,"prompt":"Write a function `parse_qs(query_string)` that parses a URL query string into a dict where each key maps to a **list** of values (matching the behaviour of `urllib.parse.parse_qs` but implemented from scratch). Keys and values must be percent-decoded.\n\nRules:\n- Parameters are separated by `&`.\n- Key and value are separated by `=`. If no `=`, the value list is `['']`.\n- If a key appears multiple times, its list grows.\n- Empty string input returns `{}`.\n\nExample:\n```python\nparse_qs('a=1&b=2&a=3')\n# {'a': ['1', '3'], 'b': ['2']}\nparse_qs('hello%20world=foo%21')\n# {'hello world': ['foo!']}\n```\n\nDo NOT use `urllib.parse.parse_qs` or `urllib.parse.parse_qsl`.","starter":"def parse_qs(query_string):\n    # TODO\n    pass\n\ndef _percent_decode(s):\n    # TODO: decode %XX sequences\n    pass\n","hint":"Split on `&`, then split each part on `=` (max 1 split). For percent-decoding, find `%` characters and convert the following two hex digits with `int(hex, 16)`.","tests":["result = parse_qs('a=1&b=2&a=3')\nassert result == {'a': ['1', '3'], 'b': ['2']}","result = parse_qs('hello%20world=foo%21')\nassert result == {'hello world': ['foo!']}","result = parse_qs('')\nassert result == {}","result = parse_qs('key')\nassert result == {'key': ['']}","result = parse_qs('x=1&x=2&x=3')\nassert result['x'] == ['1', '2', '3']"],"solution":"def _percent_decode(s):\n    result = []\n    i = 0\n    s = s.replace('+', ' ')\n    while i < len(s):\n        if s[i] == '%' and i + 2 < len(s):\n            try:\n                result.append(chr(int(s[i+1:i+3], 16)))\n                i += 3\n            except ValueError:\n                result.append(s[i])\n                i += 1\n        else:\n            result.append(s[i])\n            i += 1\n    return ''.join(result)\n\ndef parse_qs(query_string):\n    if not query_string:\n        return {}\n    result = {}\n    for part in query_string.split('&'):\n        if '=' in part:\n            k, v = part.split('=', 1)\n        else:\n            k, v = part, ''\n        k = _percent_decode(k)\n        v = _percent_decode(v)\n        result.setdefault(k, []).append(v)\n    return result\n","expert":"import re\n\n_HEX_RE = re.compile(r'%([0-9A-Fa-f]{2})')\n\ndef _percent_decode(s):\n    s = s.replace('+', ' ')\n    return _HEX_RE.sub(lambda m: chr(int(m.group(1), 16)), s)\n\ndef parse_qs(query_string):\n    if not query_string:\n        return {}\n    result = {}\n    for part in query_string.split('&'):\n        k, _, v = part.partition('=')\n        result.setdefault(_percent_decode(k), []).append(_percent_decode(v))\n    return result\n","explanation":"The solution uses a manual index-walking decoder and `str.split('=', 1)`. The expert replaces the decoder with a regex substitution \u2014 `re.sub` with a callable replacement is idiomatic for pattern-based string transforms. It also uses `str.partition` instead of `split('=', 1)`: `partition` always returns exactly three parts, eliminating the need to check for the presence of `=` at all (when no `=` is present, the third part is just an empty string)."},{"day":330,"title":"Simple Event System","topic":"event systems","difficulty":4,"minutes":15,"prompt":"Implement a class `EventEmitter` with the following API:\n- `on(event, handler)` \u2014 register `handler` (callable) for `event` (string). Returns `self` for chaining.\n- `off(event, handler)` \u2014 remove `handler` from `event`. No-op if not registered.\n- `emit(event, *args, **kwargs)` \u2014 call all handlers for `event` with given args. Handlers are called in registration order.\n- `once(event, handler)` \u2014 register a handler that fires only once then removes itself.\n\nExample:\n```python\nemitter = EventEmitter()\nresults = []\nemitter.on('data', lambda x: results.append(x))\nemitter.emit('data', 42)\nemitter.emit('data', 99)\n# results == [42, 99]\n```","starter":"class EventEmitter:\n    def __init__(self):\n        self._handlers = {}\n\n    def on(self, event, handler):\n        # TODO\n        pass\n\n    def off(self, event, handler):\n        # TODO\n        pass\n\n    def emit(self, event, *args, **kwargs):\n        # TODO\n        pass\n\n    def once(self, event, handler):\n        # TODO\n        pass\n","hint":"For `once`, wrap `handler` in a closure that calls `self.off(event, wrapper)` before calling the original handler. Store handlers in a list per event.","tests":["ee = EventEmitter()\nlog = []\nee.on('x', lambda v: log.append(v))\nee.emit('x', 1)\nee.emit('x', 2)\nassert log == [1, 2]","ee = EventEmitter()\nlog = []\nh = lambda v: log.append(v)\nee.on('x', h)\nee.off('x', h)\nee.emit('x', 1)\nassert log == []","ee = EventEmitter()\nlog = []\nee.once('x', lambda v: log.append(v))\nee.emit('x', 'a')\nee.emit('x', 'b')\nassert log == ['a']","ee = EventEmitter()\nresult = ee.on('x', lambda: None)\nassert result is ee","ee = EventEmitter()\nlog = []\nee.on('a', lambda: log.append('a1'))\nee.on('a', lambda: log.append('a2'))\nee.emit('a')\nassert log == ['a1', 'a2']"],"solution":"class EventEmitter:\n    def __init__(self):\n        self._handlers = {}\n\n    def on(self, event, handler):\n        self._handlers.setdefault(event, []).append(handler)\n        return self\n\n    def off(self, event, handler):\n        handlers = self._handlers.get(event, [])\n        if handler in handlers:\n            handlers.remove(handler)\n\n    def emit(self, event, *args, **kwargs):\n        for handler in list(self._handlers.get(event, [])):\n            handler(*args, **kwargs)\n\n    def once(self, event, handler):\n        def wrapper(*args, **kwargs):\n            self.off(event, wrapper)\n            handler(*args, **kwargs)\n        self.on(event, wrapper)\n        return self\n","expert":"from collections import defaultdict\n\nclass EventEmitter:\n    def __init__(self):\n        self._handlers = defaultdict(list)\n\n    def on(self, event, handler):\n        self._handlers[event].append(handler)\n        return self\n\n    def off(self, event, handler):\n        try:\n            self._handlers[event].remove(handler)\n        except ValueError:\n            pass\n\n    def emit(self, event, *args, **kwargs):\n        for handler in self._handlers[event].copy():\n            handler(*args, **kwargs)\n\n    def once(self, event, handler):\n        def wrapper(*args, **kwargs):\n            self.off(event, wrapper)\n            handler(*args, **kwargs)\n        wrapper._once_original = handler\n        return self.on(event, wrapper)\n\n    def listener_count(self, event):\n        return len(self._handlers[event])\n","explanation":"The solution iterates over a copy (`list(...)`) of handlers during `emit` so that handlers added or removed during emission don't cause iteration errors. The expert stores a reference to the original function on the wrapper (`wrapper._once_original`), enabling an `off(event, original_fn)` that can also remove `once`-registered handlers \u2014 a feature Node.js's EventEmitter provides. Using `defaultdict` removes the `setdefault` boilerplate."},{"day":331,"title":"Fluent Interface Builder","topic":"API design","difficulty":4,"minutes":15,"prompt":"Implement a `QueryBuilder` class with a fluent interface for building SQL-like SELECT queries as strings.\n\nMethods (all return `self`):\n- `select(*columns)` \u2014 columns to select (default `*`)\n- `from_table(table)` \u2014 set the table name\n- `where(condition)` \u2014 add a WHERE condition (AND-joined if called multiple times)\n- `order_by(column, direction='ASC')` \u2014 set ORDER BY\n- `limit(n)` \u2014 set LIMIT\n- `build()` \u2014 return the query string (does NOT return self)\n\nExample:\n```python\nqb = (QueryBuilder()\n      .select('name', 'age')\n      .from_table('users')\n      .where('age > 18')\n      .order_by('age')\n      .limit(10)\n      .build())\n# 'SELECT name, age FROM users WHERE age > 18 ORDER BY age ASC LIMIT 10'\n```","starter":"class QueryBuilder:\n    def __init__(self):\n        self._columns = ['*']\n        self._table = None\n        self._conditions = []\n        self._order = None\n        self._limit = None\n\n    def select(self, *columns):\n        # TODO\n        pass\n\n    def from_table(self, table):\n        # TODO\n        pass\n\n    def where(self, condition):\n        # TODO\n        pass\n\n    def order_by(self, column, direction='ASC'):\n        # TODO\n        pass\n\n    def limit(self, n):\n        # TODO\n        pass\n\n    def build(self):\n        # TODO\n        pass\n","hint":"Each method sets the appropriate instance variable and returns `self`. In `build`, join the pieces with spaces and skip optional clauses when not set.","tests":["q = QueryBuilder().from_table('t').build()\nassert q == 'SELECT * FROM t'","q = QueryBuilder().select('a','b').from_table('t').build()\nassert q == 'SELECT a, b FROM t'","q = QueryBuilder().from_table('users').where('age>18').where('active=1').build()\nassert 'WHERE age>18 AND active=1' in q","q = QueryBuilder().from_table('t').order_by('name','DESC').limit(5).build()\nassert q == 'SELECT * FROM t ORDER BY name DESC LIMIT 5'","q = (QueryBuilder().select('id').from_table('orders').where('total>100').order_by('id').limit(10).build())\nassert q == 'SELECT id FROM orders WHERE total>100 ORDER BY id ASC LIMIT 10'"],"solution":"class QueryBuilder:\n    def __init__(self):\n        self._columns = ['*']\n        self._table = None\n        self._conditions = []\n        self._order = None\n        self._limit = None\n\n    def select(self, *columns):\n        self._columns = list(columns)\n        return self\n\n    def from_table(self, table):\n        self._table = table\n        return self\n\n    def where(self, condition):\n        self._conditions.append(condition)\n        return self\n\n    def order_by(self, column, direction='ASC'):\n        self._order = (column, direction)\n        return self\n\n    def limit(self, n):\n        self._limit = n\n        return self\n\n    def build(self):\n        cols = ', '.join(self._columns)\n        parts = ['SELECT ' + cols + ' FROM ' + str(self._table)]\n        if self._conditions:\n            parts.append('WHERE ' + ' AND '.join(self._conditions))\n        if self._order:\n            parts.append('ORDER BY ' + self._order[0] + ' ' + self._order[1])\n        if self._limit is not None:\n            parts.append('LIMIT ' + str(self._limit))\n        return ' '.join(parts)\n","expert":"from copy import copy\n\nclass QueryBuilder:\n    def __init__(self):\n        self._columns = ['*']\n        self._table = None\n        self._conditions = []\n        self._order = None\n        self._limit = None\n\n    def _clone(self):\n        c = copy(self)\n        c._columns = list(self._columns)\n        c._conditions = list(self._conditions)\n        return c\n\n    def select(self, *columns):\n        c = self._clone(); c._columns = list(columns); return c\n\n    def from_table(self, table):\n        c = self._clone(); c._table = table; return c\n\n    def where(self, condition):\n        c = self._clone(); c._conditions.append(condition); return c\n\n    def order_by(self, column, direction='ASC'):\n        c = self._clone(); c._order = (column, direction); return c\n\n    def limit(self, n):\n        c = self._clone(); c._limit = n; return c\n\n    def build(self):\n        cols = ', '.join(self._columns)\n        parts = ['SELECT ' + cols + ' FROM ' + str(self._table)]\n        if self._conditions:\n            parts.append('WHERE ' + ' AND '.join(self._conditions))\n        if self._order:\n            parts.append('ORDER BY ' + self._order[0] + ' ' + self._order[1])\n        if self._limit is not None:\n            parts.append('LIMIT ' + str(self._limit))\n        return ' '.join(parts)\n","explanation":"The solution mutates `self` and returns `self` \u2014 simple and common. The expert makes the builder **immutable**: each method clones `self` before modifying it and returns the clone. This lets you reuse a partially-built query as a base without side effects (`base = qb.from_table('t'); q1 = base.where('a'); q2 = base.where('b')` yields independent queries). This is the pattern used by SQLAlchemy's Core query API."},{"day":332,"title":"__init_subclass__ Hook","topic":"metaprogramming","difficulty":5,"minutes":15,"prompt":"Use `__init_subclass__` to implement a serializable class hierarchy. The base class `Serializable` should:\n1. Keep a registry `Serializable._registry` mapping `type_name -> class`.\n2. Every subclass receives a class attribute `type_name` (defaults to the class name, but subclasses can override by passing `type_name='...'` as a keyword argument to the class definition).\n3. Provide a classmethod `Serializable.from_dict(d)` that reads `d['type']` and instantiates the right subclass by calling `cls(**{k:v for k,v in d.items() if k!='type'})`.\n4. Provide an instance method `to_dict()` that returns `{'type': self.type_name, **self.__dict__}`.\n\nExample:\n```python\nclass Dog(Serializable, type_name='dog'):\n    def __init__(self, name):\n        self.name = name\n\nd = Dog('Rex')\nassert d.to_dict() == {'type': 'dog', 'name': 'Rex'}\nassert isinstance(Serializable.from_dict({'type': 'dog', 'name': 'Rex'}), Dog)\n```","starter":"class Serializable:\n    _registry = {}\n\n    def __init_subclass__(cls, type_name=None, **kwargs):\n        super().__init_subclass__(**kwargs)\n        # TODO: register cls\n        pass\n\n    @classmethod\n    def from_dict(cls, d):\n        # TODO\n        pass\n\n    def to_dict(self):\n        # TODO\n        pass\n","hint":"`__init_subclass__` receives keyword args from the class definition line. Set `cls.type_name = type_name or cls.__name__` and store in `_registry`.","tests":["class Cat(Serializable):\n    def __init__(self, color):\n        self.color = color\nc = Cat('black')\nassert c.to_dict() == {'type': 'Cat', 'color': 'black'}","class Bird(Serializable, type_name='birdie'):\n    def __init__(self, species):\n        self.species = species\nb = Bird('eagle')\nassert b.to_dict()['type'] == 'birdie'\nassert isinstance(Serializable.from_dict({'type':'birdie','species':'parrot'}), Bird)","class Fish(Serializable):\n    def __init__(self, size):\n        self.size = size\nassert 'Fish' in Serializable._registry","class Ant(Serializable, type_name='ant'):\n    def __init__(self, colony):\n        self.colony = colony\ndata = {'type':'ant','colony':'alpha'}\nant = Serializable.from_dict(data)\nassert ant.colony == 'alpha'"],"solution":"class Serializable:\n    _registry = {}\n\n    def __init_subclass__(cls, type_name=None, **kwargs):\n        super().__init_subclass__(**kwargs)\n        cls.type_name = type_name if type_name is not None else cls.__name__\n        Serializable._registry[cls.type_name] = cls\n\n    @classmethod\n    def from_dict(cls, d):\n        d = dict(d)\n        type_key = d.pop('type')\n        klass = cls._registry[type_key]\n        return klass(**d)\n\n    def to_dict(self):\n        return {'type': self.type_name, **self.__dict__}\n","expert":"class Serializable:\n    _registry = {}\n\n    def __init_subclass__(cls, type_name=None, **kwargs):\n        super().__init_subclass__(**kwargs)\n        cls.type_name = type_name if type_name is not None else cls.__name__\n        if cls.type_name in Serializable._registry:\n            existing = Serializable._registry[cls.type_name]\n            if existing is not cls:\n                raise ValueError(f'Duplicate type_name {cls.type_name!r}: already registered by {existing}')\n        Serializable._registry[cls.type_name] = cls\n\n    @classmethod\n    def from_dict(cls, d):\n        d = dict(d)\n        type_key = d.pop('type', None)\n        if type_key is None:\n            raise ValueError('Missing \"type\" key in dict')\n        try:\n            klass = cls._registry[type_key]\n        except KeyError:\n            raise ValueError(f'Unknown type {type_key!r}') from None\n        return klass(**d)\n\n    def to_dict(self):\n        return {'type': self.type_name, **self.__dict__}\n","explanation":"`__init_subclass__` is the modern alternative to metaclasses for hooks that run on subclass creation \u2014 it's simpler, composes cleanly with cooperative multiple inheritance via `super()`, and needs no `metaclass=` syntax. The expert adds duplicate-name detection (fail fast at class-definition time rather than silently overwriting the registry) and better error messages in `from_dict` \u2014 defensive programming that prevents hard-to-debug runtime failures."},{"day":333,"title":"Defensive Copying","topic":"defensive copying","difficulty":4,"minutes":15,"prompt":"Implement a class `ImmutablePoint` and a class `FrozenList` that demonstrate defensive copying:\n\n1. `ImmutablePoint(x, y)` \u2014 stores two numeric values. Exposes `x` and `y` as read-only properties. Supports `==` comparison. Raises `AttributeError` on any attempt to set `x` or `y` after construction.\n\n2. `FrozenList(items)` \u2014 wraps a list. Its constructor makes a defensive copy so external mutations don't affect it. Supports `len()`, indexing (`[]`), iteration, and `__eq__` with other `FrozenList`s or plain lists. Raises `TypeError` on any attempt to mutate via `[]`.\n\nExample:\n```python\nsrc = [1, 2, 3]\nfl = FrozenList(src)\nsrc.append(4)\nassert len(fl) == 3  # not affected\n```","starter":"class ImmutablePoint:\n    def __init__(self, x, y):\n        # TODO: store privately\n        pass\n\n    # TODO: x and y properties\n\n    def __eq__(self, other):\n        pass\n\nclass FrozenList:\n    def __init__(self, items):\n        # TODO: defensive copy\n        pass\n\n    # TODO: len, getitem, iter, eq, no setitem\n","hint":"Store values with names like `_x` in `__init__`, then define `x` as a `@property` with no setter. For `FrozenList`, use `list(items)` to copy, and define `__setitem__` to raise `TypeError`.","tests":["p = ImmutablePoint(3, 4)\nassert p.x == 3 and p.y == 4\ntry:\n    p.x = 10\n    assert False\nexcept AttributeError:\n    pass","p1 = ImmutablePoint(1, 2)\np2 = ImmutablePoint(1, 2)\np3 = ImmutablePoint(1, 3)\nassert p1 == p2\nassert p1 != p3","src = [1, 2, 3]\nfl = FrozenList(src)\nsrc.append(99)\nassert len(fl) == 3 and list(fl) == [1, 2, 3]","fl = FrozenList([10, 20, 30])\nassert fl[1] == 20\nassert list(fl) == [10, 20, 30]\ntry:\n    fl[0] = 99\n    assert False\nexcept TypeError:\n    pass","fl1 = FrozenList([1,2,3])\nassert fl1 == [1,2,3]\nfl2 = FrozenList([1,2,3])\nassert fl1 == fl2"],"solution":"class ImmutablePoint:\n    def __init__(self, x, y):\n        self._x = x\n        self._y = y\n\n    @property\n    def x(self):\n        return self._x\n\n    @property\n    def y(self):\n        return self._y\n\n    def __eq__(self, other):\n        if isinstance(other, ImmutablePoint):\n            return self._x == other._x and self._y == other._y\n        return NotImplemented\n\n    def __repr__(self):\n        return f'ImmutablePoint({self._x}, {self._y})'\n\n\nclass FrozenList:\n    def __init__(self, items):\n        self._data = list(items)  # defensive copy\n\n    def __len__(self):\n        return len(self._data)\n\n    def __getitem__(self, index):\n        return self._data[index]\n\n    def __iter__(self):\n        return iter(self._data)\n\n    def __setitem__(self, index, value):\n        raise TypeError('FrozenList does not support item assignment')\n\n    def __eq__(self, other):\n        if isinstance(other, FrozenList):\n            return self._data == other._data\n        if isinstance(other, list):\n            return self._data == other\n        return NotImplemented\n\n    def __repr__(self):\n        return f'FrozenList({self._data!r})'\n","expert":"class ImmutablePoint:\n    __slots__ = ('_x', '_y')\n\n    def __init__(self, x, y):\n        object.__setattr__(self, '_x', x)\n        object.__setattr__(self, '_y', y)\n\n    @property\n    def x(self): return self._x\n\n    @property\n    def y(self): return self._y\n\n    def __setattr__(self, name, value):\n        raise AttributeError(f'{type(self).__name__} is immutable')\n\n    def __eq__(self, other):\n        if isinstance(other, ImmutablePoint):\n            return self._x == other._x and self._y == other._y\n        return NotImplemented\n\n    def __hash__(self):\n        return hash((self._x, self._y))\n\n    def __repr__(self):\n        return f'ImmutablePoint({self._x}, {self._y})'\n\n\nfrom collections.abc import Sequence\n\nclass FrozenList(Sequence):\n    def __init__(self, items):\n        self._data = tuple(items)  # tuples are inherently immutable\n\n    def __getitem__(self, index):\n        return self._data[index]\n\n    def __len__(self):\n        return len(self._data)\n\n    def __eq__(self, other):\n        if isinstance(other, (FrozenList, tuple)):\n            return self._data == tuple(other)\n        if isinstance(other, list):\n            return list(self._data) == other\n        return NotImplemented\n\n    def __hash__(self):\n        return hash(self._data)\n\n    def __repr__(self):\n        return f'FrozenList({list(self._data)!r})'\n","explanation":"The solution uses properties to block external writes and copies the input list at construction time. The expert uses `__slots__` + overriding `__setattr__` for a harder immutability guarantee (no `__dict__` to bypass), and stores data as a `tuple` (which is inherently immutable and hashable) instead of a list. Inheriting from `collections.abc.Sequence` gives `__contains__`, `index`, `count`, and `reversed` for free from just `__getitem__` and `__len__`."},{"day":334,"title":"Generator Pipeline","topic":"generator-based pipelines","difficulty":4,"minutes":15,"prompt":"Build a pipeline of generator functions that process a stream of records:\n\n1. `read_records(data)` \u2014 generator that yields each item from `data` (a list).\n2. `filter_records(records, predicate)` \u2014 generator that yields only items where `predicate(item)` is `True`.\n3. `transform_records(records, func)` \u2014 generator that applies `func` to each item and yields the result.\n4. `pipeline(data, steps)` \u2014 takes `data` and a list of `(function, *args)` step tuples, threads them together, and returns a generator of final results. Each step is called as `step_fn(current_gen, *args)`.\n\nExample:\n```python\nresults = list(pipeline(\n    [1, 2, 3, 4, 5, 6],\n    [(filter_records, lambda x: x % 2 == 0),\n     (transform_records, lambda x: x * 10)]\n))\n# [20, 40, 60]\n```","starter":"def read_records(data):\n    # TODO\n    pass\n\ndef filter_records(records, predicate):\n    # TODO\n    pass\n\ndef transform_records(records, func):\n    # TODO\n    pass\n\ndef pipeline(data, steps):\n    # TODO\n    pass\n","hint":"Start `pipeline` by calling `read_records(data)`, then for each step tuple `(fn, *args)` call `fn(current_gen, *args)` and reassign to `current_gen`.","tests":["result = list(pipeline([1,2,3,4,5], [(filter_records, lambda x: x>3)]))\nassert result == [4, 5]","result = list(pipeline([1,2,3], [(transform_records, lambda x: x*2)]))\nassert result == [2, 4, 6]","result = list(pipeline(\n    [1,2,3,4,5,6],\n    [(filter_records, lambda x: x%2==0),(transform_records, lambda x: x*10)]\n))\nassert result == [20, 40, 60]","result = list(pipeline([], [(filter_records, lambda x: True)]))\nassert result == []","it = pipeline([1,2,3], [(transform_records, lambda x: x+1)])\nassert next(it) == 2"],"solution":"def read_records(data):\n    yield from data\n\ndef filter_records(records, predicate):\n    for item in records:\n        if predicate(item):\n            yield item\n\ndef transform_records(records, func):\n    for item in records:\n        yield func(item)\n\ndef pipeline(data, steps):\n    gen = read_records(data)\n    for step in steps:\n        fn, *args = step\n        gen = fn(gen, *args)\n    return gen\n","expert":"def read_records(data):\n    yield from data\n\ndef filter_records(records, predicate):\n    return (item for item in records if predicate(item))\n\ndef transform_records(records, func):\n    return (func(item) for item in records)\n\ndef pipeline(data, steps):\n    import functools\n    def apply(gen, step):\n        fn, *args = step\n        return fn(gen, *args)\n    return functools.reduce(apply, steps, read_records(data))\n","explanation":"The solution builds the pipeline imperatively by reassigning `gen` in a loop. The expert replaces `for` loops in filter/transform with generator expressions (more concise, same laziness) and uses `functools.reduce` to fold the steps over the initial generator \u2014 a functional style that mirrors how Unix pipes compose: the output of each stage feeds the next, and nothing is evaluated until the consumer pulls."},{"day":335,"title":"Keyword-Only API Design","topic":"API design","difficulty":4,"minutes":15,"prompt":"Design a `create_user` function and a `UserConfig` class that enforce best-practice API design using keyword-only arguments and defaults.\n\n`create_user(*, username, email, role='viewer', active=True, max_sessions=5)` \u2014 all arguments are keyword-only. Returns a `UserConfig` object.\n\n`UserConfig` must:\n- Be constructable only via `create_user` (no direct `UserConfig(...)` from outside \u2014 use a sentinel token).\n- Expose `username`, `email`, `role`, `active`, `max_sessions` as read-only properties.\n- Have a `__repr__` like `UserConfig(username='alice', role='viewer')`.\n- Have `to_dict()` returning all fields as a dict.\n\nRaise `ValueError` if `username` is empty or `email` does not contain `@`.","starter":"_SENTINEL = object()\n\nclass UserConfig:\n    def __init__(self, _token, username, email, role, active, max_sessions):\n        if _token is not _SENTINEL:\n            raise TypeError('Use create_user() to construct UserConfig')\n        # TODO: store fields\n        pass\n\n    # TODO: properties and methods\n\ndef create_user(*, username, email, role='viewer', active=True, max_sessions=5):\n    # TODO: validate and return UserConfig\n    pass\n","hint":"Pass `_SENTINEL` as the first positional arg from `create_user`. Properties only need getters. For `__repr__`, use an f-string.","tests":["u = create_user(username='alice', email='alice@example.com')\nassert u.username == 'alice'\nassert u.role == 'viewer'\nassert u.active == True","u = create_user(username='bob', email='bob@b.com', role='admin', max_sessions=10)\nassert u.role == 'admin' and u.max_sessions == 10","try:\n    create_user(username='', email='a@b.com')\n    assert False\nexcept ValueError:\n    pass\ntry:\n    create_user(username='alice', email='notanemail')\n    assert False\nexcept ValueError:\n    pass","try:\n    UserConfig(None, 'x','x@x.com','viewer',True,5)\n    assert False\nexcept TypeError:\n    pass","u = create_user(username='alice', email='a@b.com')\nd = u.to_dict()\nassert d['username'] == 'alice' and 'email' in d"],"solution":"_SENTINEL = object()\n\nclass UserConfig:\n    def __init__(self, _token, username, email, role, active, max_sessions):\n        if _token is not _SENTINEL:\n            raise TypeError('Use create_user() to construct UserConfig')\n        self._username = username\n        self._email = email\n        self._role = role\n        self._active = active\n        self._max_sessions = max_sessions\n\n    @property\n    def username(self): return self._username\n    @property\n    def email(self): return self._email\n    @property\n    def role(self): return self._role\n    @property\n    def active(self): return self._active\n    @property\n    def max_sessions(self): return self._max_sessions\n\n    def to_dict(self):\n        return {'username': self._username, 'email': self._email,\n                'role': self._role, 'active': self._active,\n                'max_sessions': self._max_sessions}\n\n    def __repr__(self):\n        return f'UserConfig(username={self._username!r}, role={self._role!r})'\n\n\ndef create_user(*, username, email, role='viewer', active=True, max_sessions=5):\n    if not username:\n        raise ValueError('username cannot be empty')\n    if '@' not in email:\n        raise ValueError('email must contain @')\n    return UserConfig(_SENTINEL, username, email, role, active, max_sessions)\n","expert":"from dataclasses import dataclass, field\n\n_SENTINEL = object()\n\n@dataclass(frozen=True)\nclass UserConfig:\n    _token: object = field(repr=False, compare=False)\n    username: str = field()\n    email: str = field()\n    role: str = 'viewer'\n    active: bool = True\n    max_sessions: int = 5\n\n    def __post_init__(self):\n        if self._token is not _SENTINEL:\n            raise TypeError('Use create_user() to construct UserConfig')\n\n    def to_dict(self):\n        return {'username': self.username, 'email': self.email,\n                'role': self.role, 'active': self.active,\n                'max_sessions': self.max_sessions}\n\n    def __repr__(self):\n        return f'UserConfig(username={self.username!r}, role={self.role!r})'\n\n\ndef create_user(*, username, email, role='viewer', active=True, max_sessions=5):\n    if not username:\n        raise ValueError('username cannot be empty')\n    if '@' not in email:\n        raise ValueError('email must contain @')\n    return UserConfig(_SENTINEL, username, email, role, active, max_sessions)\n","explanation":"Keyword-only arguments (forced by `*` in the signature) prevent accidental positional mismatches, which is critical for functions with many parameters of the same type. The sentinel token pattern is a lightweight way to make a class 'factory-only' without a full private constructor. The expert uses a `frozen=True` dataclass, which gives immutability and `__eq__`/`__hash__` for free, while `field(repr=False)` hides the internal sentinel from the default repr."},{"day":336,"title":"Refactor: God Function","topic":"refactoring","difficulty":4,"minutes":15,"prompt":"The following smelly function does too many things at once. Refactor it into clean, single-responsibility functions.\n\nSmelly code:\n```python\ndef process(data):\n    if not isinstance(data, list): raise TypeError('need list')\n    for item in data:\n        if not isinstance(item, dict): raise TypeError('items must be dicts')\n        if 'name' not in item or 'score' not in item: raise ValueError('missing keys')\n    result = []\n    for item in data:\n        name = item['name'].strip().lower()\n        score = float(item['score'])\n        result.append({'name': name, 'score': score})\n    result = [r for r in result if r['score'] >= 0]\n    result = sorted(result, key=lambda r: r['score'], reverse=True)\n    return result\n```\n\nRefactor into: `validate(data)`, `normalize(data)`, `filter_valid(data)`, `sort_records(data)`, and a `process(data)` that composes them. Each function takes and returns a list of dicts. `validate` raises on bad input and returns `None`. All functions must be defined.","starter":"def validate(data):\n    pass\n\ndef normalize(data):\n    pass\n\ndef filter_valid(data):\n    pass\n\ndef sort_records(data):\n    pass\n\ndef process(data):\n    pass\n","hint":"Each helper does exactly one step. `process` calls them in sequence. `validate` has side-effects only (raises or returns None).","tests":["result = process([{'name': ' Alice ', 'score': '95'}, {'name': 'Bob', 'score': '80'}])\nassert result == [{'name': 'alice', 'score': 95.0}, {'name': 'bob', 'score': 80.0}]","result = process([{'name': 'X', 'score': '-5'}, {'name': 'Y', 'score': '10'}])\nassert len(result) == 1 and result[0]['name'] == 'y'","try:\n    process('notalist')\n    assert False\nexcept TypeError:\n    pass","try:\n    process([{'name': 'A'}])\n    assert False\nexcept ValueError:\n    pass","result = process([{'name':'c','score':'3'},{'name':'a','score':'10'},{'name':'b','score':'7'}])\nassert [r['name'] for r in result] == ['a','b','c']"],"solution":"def validate(data):\n    if not isinstance(data, list):\n        raise TypeError('need list')\n    for item in data:\n        if not isinstance(item, dict):\n            raise TypeError('items must be dicts')\n        if 'name' not in item or 'score' not in item:\n            raise ValueError('missing keys')\n\ndef normalize(data):\n    return [{'name': item['name'].strip().lower(), 'score': float(item['score'])} for item in data]\n\ndef filter_valid(data):\n    return [r for r in data if r['score'] >= 0]\n\ndef sort_records(data):\n    return sorted(data, key=lambda r: r['score'], reverse=True)\n\ndef process(data):\n    validate(data)\n    data = normalize(data)\n    data = filter_valid(data)\n    data = sort_records(data)\n    return data\n","expert":"def validate(data):\n    if not isinstance(data, list):\n        raise TypeError('need list')\n    for item in data:\n        if not isinstance(item, dict):\n            raise TypeError('items must be dicts')\n        if 'name' not in item or 'score' not in item:\n            raise ValueError('missing keys')\n\ndef normalize(data):\n    return [{'name': item['name'].strip().lower(), 'score': float(item['score'])} for item in data]\n\ndef filter_valid(data):\n    return [r for r in data if r['score'] >= 0]\n\ndef sort_records(data):\n    return sorted(data, key=lambda r: r['score'], reverse=True)\n\ndef process(data):\n    import functools\n    validate(data)\n    steps = [normalize, filter_valid, sort_records]\n    return functools.reduce(lambda acc, fn: fn(acc), steps, data)\n","explanation":"Splitting a 'god function' into single-responsibility helpers makes each piece independently testable and replaceable. The solution chains them with explicit assignment, which is clear. The expert uses `functools.reduce` to express the composition as a pipeline \u2014 the same data-transformation pattern as Unix pipes or functional languages. This makes adding, removing, or reordering steps as easy as editing a list."},{"day":337,"title":"Metaclass with Attribute Validation","topic":"metaprogramming","difficulty":5,"minutes":15,"prompt":"Create a metaclass `StrictMeta` that enforces that every class using it must declare a `schema` class variable: a dict mapping attribute name -> type. The metaclass should:\n1. Raise `TypeError` at class definition time if `schema` is missing (except for the base class itself).\n2. Override `__call__` so that when an instance is created, every key in `schema` must be passed as a keyword argument with a value of the correct type, otherwise raise `TypeError`.\n\nProvide a base class `StrictModel(metaclass=StrictMeta)` that itself has no `schema` requirement.\n\nExample:\n```python\nclass Point(StrictModel):\n    schema = {'x': float, 'y': float}\n\np = Point(x=1.0, y=2.0)  # OK\np = Point(x='bad', y=2.0)  # raises TypeError\nclass Bad(StrictModel): pass  # raises TypeError at class creation\n```","starter":"class StrictMeta(type):\n    def __new__(mcs, name, bases, namespace):\n        cls = super().__new__(mcs, name, bases, namespace)\n        # TODO: enforce schema present for subclasses\n        return cls\n\n    def __call__(cls, **kwargs):\n        # TODO: validate kwargs against schema\n        pass\n\nclass StrictModel(metaclass=StrictMeta):\n    pass\n","hint":"In `__new__`, check `if bases` (non-empty means it's a subclass) and verify `'schema' in namespace`. In `__call__`, iterate `cls.schema.items()` and check `isinstance(kwargs[key], typ)`.","tests":["class Item(StrictModel):\n    schema = {'name': str, 'price': float}\nit = Item(name='book', price=9.99)\nassert it.name == 'book' and it.price == 9.99","class Item(StrictModel):\n    schema = {'name': str, 'price': float}\ntry:\n    Item(name=123, price=9.99)\n    assert False\nexcept TypeError:\n    pass","try:\n    class NoSchema(StrictModel):\n        pass\n    assert False\nexcept TypeError:\n    pass","class Val(StrictModel):\n    schema = {'n': int}\nv = Val(n=42)\nassert v.n == 42","class Empty(StrictModel):\n    schema = {}\ne = Empty()\nassert isinstance(e, Empty)"],"solution":"class StrictMeta(type):\n    def __new__(mcs, name, bases, namespace):\n        cls = super().__new__(mcs, name, bases, namespace)\n        if bases and 'schema' not in namespace:\n            raise TypeError(f'Class {name} must define a schema dict')\n        return cls\n\n    def __call__(cls, **kwargs):\n        schema = getattr(cls, 'schema', {})\n        for key, typ in schema.items():\n            if key not in kwargs:\n                raise TypeError(f'Missing required argument: {key!r}')\n            if not isinstance(kwargs[key], typ):\n                raise TypeError(f'{key!r} must be {typ.__name__}, got {type(kwargs[key]).__name__}')\n        instance = cls.__new__(cls)\n        for key, val in kwargs.items():\n            setattr(instance, key, val)\n        return instance\n\nclass StrictModel(metaclass=StrictMeta):\n    pass\n","expert":"class StrictMeta(type):\n    def __new__(mcs, name, bases, namespace):\n        cls = super().__new__(mcs, name, bases, namespace)\n        is_root = not any(isinstance(b, StrictMeta) for b in bases)\n        if not is_root and 'schema' not in namespace:\n            raise TypeError(f'Class {name} must define a schema dict')\n        return cls\n\n    def __call__(cls, **kwargs):\n        schema = getattr(cls, 'schema', {})\n        extra = set(kwargs) - set(schema)\n        if extra:\n            raise TypeError(f'Unexpected arguments: {extra}')\n        for key, typ in schema.items():\n            if key not in kwargs:\n                raise TypeError(f'Missing required argument: {key!r}')\n            if not isinstance(kwargs[key], typ):\n                raise TypeError(\n                    f'{key!r} must be of type {typ.__name__!r}, '\n                    f'got {type(kwargs[key]).__name__!r}'\n                )\n        instance = cls.__new__(cls)\n        instance.__dict__.update(kwargs)\n        return instance\n\nclass StrictModel(metaclass=StrictMeta):\n    pass\n","explanation":"The metaclass intercepts class creation (`__new__`) and instance creation (`__call__`), giving you framework-level validation without touching user code. The solution checks `if bases` to skip the root; the expert checks whether any base already uses `StrictMeta`, which is more robust when you have intermediate abstract base classes. Using `instance.__dict__.update(kwargs)` is faster than repeated `setattr` calls and avoids triggering any descriptor logic."},{"day":338,"title":"Chunked Generator","topic":"generator-based pipelines","difficulty":4,"minutes":15,"prompt":"Write a generator function `chunked(iterable, size)` that yields successive non-overlapping chunks of `size` items as lists. The last chunk may be smaller if the iterable doesn't divide evenly.\n\nAlso write `sliding_window(iterable, size)` that yields overlapping windows of `size` items as tuples.\n\nExample:\n```python\nlist(chunked(range(7), 3))     # [[0,1,2],[3,4,5],[6]]\nlist(sliding_window(range(5), 3))  # [(0,1,2),(1,2,3),(2,3,4)]\n```\n\nBoth must work on any iterable (not just sequences), must be lazy generators, and must handle `size=1` and empty iterables.","starter":"def chunked(iterable, size):\n    # TODO\n    pass\n\ndef sliding_window(iterable, size):\n    # TODO\n    pass\n","hint":"For `chunked`, use `iter()` and repeatedly call `list(islice(it, size))`. For `sliding_window`, use `collections.deque(maxlen=size)` to keep a rolling window.","tests":["assert list(chunked(range(7), 3)) == [[0,1,2],[3,4,5],[6]]","assert list(chunked([], 3)) == []","assert list(chunked(range(3), 1)) == [[0],[1],[2]]","assert list(sliding_window(range(5), 3)) == [(0,1,2),(1,2,3),(2,3,4)]","assert list(sliding_window(range(3), 3)) == [(0,1,2)]\nassert list(sliding_window(range(2), 3)) == []"],"solution":"from itertools import islice\nfrom collections import deque\n\ndef chunked(iterable, size):\n    it = iter(iterable)\n    while True:\n        chunk = list(islice(it, size))\n        if not chunk:\n            break\n        yield chunk\n\ndef sliding_window(iterable, size):\n    it = iter(iterable)\n    window = deque(islice(it, size), maxlen=size)\n    if len(window) == size:\n        yield tuple(window)\n    for item in it:\n        window.append(item)\n        yield tuple(window)\n","expert":"from itertools import islice\nfrom collections import deque\n\ndef chunked(iterable, size):\n    it = iter(iterable)\n    for first in it:\n        rest = islice(it, size - 1)\n        yield [first, *rest]\n\ndef sliding_window(iterable, size):\n    it = iter(iterable)\n    window = deque(islice(it, size - 1), maxlen=size)\n    for item in it:\n        window.append(item)\n        if len(window) == size:\n            yield tuple(window)\n","explanation":"Both functions work on arbitrary iterables by using `iter()` and `islice` from `itertools` \u2014 never indexing, never consuming more than needed. The expert `chunked` uses a clever trick: iterate normally with `for first in it` to detect exhaustion naturally, then consume `size-1` more items with `islice` on the same shared iterator. This avoids the explicit `while True / break` pattern and is essentially how `more-itertools`'s `chunked` is implemented."},{"day":339,"title":"Plugin Registry with Hooks","topic":"plugin registries","difficulty":5,"minutes":15,"prompt":"Build a `PluginRegistry` that manages plugins with lifecycle hooks.\n\n`PluginRegistry` methods:\n- `register(name, plugin_cls)` \u2014 register a plugin class by name. Raises `ValueError` if name already registered.\n- `get(name)` \u2014 return the plugin class.\n- `create(name, *args, **kwargs)` \u2014 instantiate the plugin, calling its `setup()` method if it exists. Return the instance.\n- `list_plugins()` \u2014 return sorted list of registered names.\n- `unregister(name)` \u2014 remove a plugin. No-op if not found.\n\nAlso provide a `plugin(name)` decorator that calls `registry.register(name, cls)` and returns `cls`.\n\nAll using a module-level `registry = PluginRegistry()` instance.\n\nExample:\n```python\n@plugin('greeter')\nclass GreeterPlugin:\n    def setup(self):\n        self.ready = True\n\ninstance = registry.create('greeter')\nassert instance.ready\n```","starter":"class PluginRegistry:\n    def __init__(self):\n        self._plugins = {}\n\n    def register(self, name, plugin_cls):\n        pass\n\n    def get(self, name):\n        pass\n\n    def create(self, name, *args, **kwargs):\n        pass\n\n    def list_plugins(self):\n        pass\n\n    def unregister(self, name):\n        pass\n\nregistry = PluginRegistry()\n\ndef plugin(name):\n    def decorator(cls):\n        registry.register(name, cls)\n        return cls\n    return decorator\n","hint":"In `create`, call `instance.setup()` only if `hasattr(instance, 'setup')` and `callable(instance.setup)`.","tests":["@plugin('p1')\nclass P1:\n    def setup(self):\n        self.initialized = True\ninstance = registry.create('p1')\nassert instance.initialized","@plugin('p2')\nclass P2:\n    pass\ninstance = registry.create('p2')\nassert isinstance(instance, P2)","try:\n    @plugin('p1')\n    class Dup:\n        pass\n    assert False\nexcept ValueError:\n    pass","assert 'p1' in registry.list_plugins()\nassert registry.list_plugins() == sorted(registry.list_plugins())","registry.unregister('p2')\nassert 'p2' not in registry.list_plugins()"],"solution":"class PluginRegistry:\n    def __init__(self):\n        self._plugins = {}\n\n    def register(self, name, plugin_cls):\n        if name in self._plugins:\n            raise ValueError(f'Plugin {name!r} already registered')\n        self._plugins[name] = plugin_cls\n\n    def get(self, name):\n        return self._plugins[name]\n\n    def create(self, name, *args, **kwargs):\n        plugin_cls = self._plugins[name]\n        instance = plugin_cls(*args, **kwargs)\n        if hasattr(instance, 'setup') and callable(instance.setup):\n            instance.setup()\n        return instance\n\n    def list_plugins(self):\n        return sorted(self._plugins.keys())\n\n    def unregister(self, name):\n        self._plugins.pop(name, None)\n\nregistry = PluginRegistry()\n\ndef plugin(name):\n    def decorator(cls):\n        registry.register(name, cls)\n        return cls\n    return decorator\n","expert":"class PluginRegistry:\n    def __init__(self):\n        self._plugins = {}\n\n    def register(self, name, plugin_cls):\n        if name in self._plugins:\n            raise ValueError(f'Plugin {name!r} is already registered (existing: {self._plugins[name].__name__})')\n        self._plugins[name] = plugin_cls\n        return plugin_cls\n\n    def get(self, name):\n        try:\n            return self._plugins[name]\n        except KeyError:\n            raise KeyError(f'No plugin registered with name {name!r}') from None\n\n    def create(self, name, *args, **kwargs):\n        plugin_cls = self.get(name)\n        instance = plugin_cls(*args, **kwargs)\n        setup = getattr(instance, 'setup', None)\n        if callable(setup):\n            setup()\n        return instance\n\n    def list_plugins(self):\n        return sorted(self._plugins)\n\n    def unregister(self, name):\n        self._plugins.pop(name, None)\n\n    def __contains__(self, name):\n        return name in self._plugins\n\n    def __len__(self):\n        return len(self._plugins)\n\nregistry = PluginRegistry()\n\ndef plugin(name):\n    def decorator(cls):\n        registry.register(name, cls)\n        return cls\n    return decorator\n","explanation":"The registry pattern (a dict mapping string names to classes) separates plugin discovery from plugin usage, enabling dependency injection and late binding. The expert version re-raises `KeyError` with a cleaner message using `from None` (which suppresses the original traceback context), adds `__contains__` and `__len__` to make the registry behave like a proper container, and uses `getattr(instance, 'setup', None)` for a more Pythonic attribute-check idiom."},{"day":340,"title":"Refactor: Tangled State","topic":"refactoring","difficulty":4,"minutes":15,"prompt":"The following class has tangled state (mixing concerns, hard to test). Refactor it by separating: (1) validation logic into a standalone `validate_order(order_dict)` function that raises `ValueError` on failure; (2) discount logic into `apply_discount(price, discount_pct)`; (3) the class `Order` that uses them.\n\nSmelly code:\n```python\nclass Order:\n    def __init__(self, product, price, qty, discount=0):\n        if not product: raise ValueError\n        if price < 0: raise ValueError\n        if qty < 1: raise ValueError\n        if not 0 <= discount <= 100: raise ValueError\n        self.product = product\n        self.price = price * qty\n        self.price = self.price * (1 - discount / 100)\n        self.qty = qty\n```\n\nRefactored API:\n- `validate_order({'product':..., 'price':..., 'qty':..., 'discount':...})` \u2014 raises `ValueError` on invalid.\n- `apply_discount(price, discount_pct)` \u2014 returns discounted price (float).\n- `Order(product, price, qty, discount=0)` \u2014 uses the two functions, exposes `total` property (after discount), `product`, `qty`.","starter":"def validate_order(order_dict):\n    pass\n\ndef apply_discount(price, discount_pct):\n    pass\n\nclass Order:\n    def __init__(self, product, price, qty, discount=0):\n        pass\n\n    @property\n    def total(self):\n        pass\n","hint":"`validate_order` checks the dict fields. `Order.__init__` calls `validate_order` then computes `self._total = apply_discount(price * qty, discount)`.","tests":["o = Order('book', 10.0, 3)\nassert o.total == 30.0 and o.product == 'book' and o.qty == 3","o = Order('pen', 5.0, 2, discount=10)\nassert abs(o.total - 9.0) < 1e-9","try:\n    Order('', 10, 1)\n    assert False\nexcept ValueError:\n    pass\ntry:\n    Order('x', -1, 1)\n    assert False\nexcept ValueError:\n    pass\ntry:\n    Order('x', 10, 0)\n    assert False\nexcept ValueError:\n    pass","assert apply_discount(100.0, 25) == 75.0\nassert apply_discount(200.0, 0) == 200.0","validate_order({'product':'x','price':1,'qty':1,'discount':0})\ntry:\n    validate_order({'product':'','price':1,'qty':1,'discount':0})\n    assert False\nexcept ValueError:\n    pass"],"solution":"def validate_order(order_dict):\n    if not order_dict.get('product'):\n        raise ValueError('product cannot be empty')\n    if order_dict.get('price', -1) < 0:\n        raise ValueError('price must be non-negative')\n    if order_dict.get('qty', 0) < 1:\n        raise ValueError('qty must be at least 1')\n    discount = order_dict.get('discount', 0)\n    if not 0 <= discount <= 100:\n        raise ValueError('discount must be 0-100')\n\ndef apply_discount(price, discount_pct):\n    return price * (1 - discount_pct / 100)\n\nclass Order:\n    def __init__(self, product, price, qty, discount=0):\n        validate_order({'product': product, 'price': price, 'qty': qty, 'discount': discount})\n        self.product = product\n        self.qty = qty\n        self._total = apply_discount(price * qty, discount)\n\n    @property\n    def total(self):\n        return self._total\n","expert":"def validate_order(order_dict):\n    errors = []\n    if not order_dict.get('product'):\n        errors.append('product cannot be empty')\n    price = order_dict.get('price')\n    if price is None or price < 0:\n        errors.append('price must be non-negative')\n    qty = order_dict.get('qty')\n    if qty is None or qty < 1:\n        errors.append('qty must be at least 1')\n    discount = order_dict.get('discount', 0)\n    if not 0 <= discount <= 100:\n        errors.append('discount must be between 0 and 100')\n    if errors:\n        raise ValueError('; '.join(errors))\n\ndef apply_discount(price, discount_pct):\n    return round(price * (1 - discount_pct / 100), 10)\n\nclass Order:\n    __slots__ = ('product', 'qty', '_total')\n\n    def __init__(self, product, price, qty, discount=0):\n        validate_order({'product': product, 'price': price, 'qty': qty, 'discount': discount})\n        self.product = product\n        self.qty = qty\n        self._total = apply_discount(price * qty, discount)\n\n    @property\n    def total(self):\n        return self._total\n\n    def __repr__(self):\n        return f'Order({self.product!r}, qty={self.qty}, total={self.total})'\n","explanation":"The refactored version makes each function independently testable \u2014 you can test `validate_order` without constructing an `Order`, and `apply_discount` without any context. The expert's `validate_order` collects all errors before raising (rather than failing on the first), which gives users a complete picture of what's wrong. Using `__slots__` reduces memory footprint for classes that create many instances."},{"day":341,"title":"Advanced Descriptor: Typed Slot","topic":"descriptors","difficulty":5,"minutes":15,"prompt":"Implement a descriptor `TypedSlot` that acts like `__slots__` but with type enforcement and optional default values.\n\n`TypedSlot(type_, default=MISSING)` where `MISSING` is a sentinel.\n\nBehavior:\n- On `__get__`: return the stored value, or the `default` if set, or raise `AttributeError` if no default and not yet set.\n- On `__set__`: enforce `isinstance(value, type_)` \u2014 raise `TypeError` on failure. Store on instance.\n- On `__delete__`: clear the stored value (next get returns default or raises).\n- Must work correctly with multiple instances.\n\nExample:\n```python\nclass Config:\n    host = TypedSlot(str, default='localhost')\n    port = TypedSlot(int)\n\nc = Config()\nassert c.host == 'localhost'\nc.port = 8080\nassert c.port == 8080\n```","starter":"MISSING = object()\n\nclass TypedSlot:\n    def __init__(self, type_, default=MISSING):\n        self.type_ = type_\n        self.default = default\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_typedslot_{name}'\n\n    def __get__(self, obj, objtype=None):\n        pass\n\n    def __set__(self, obj, value):\n        pass\n\n    def __delete__(self, obj):\n        pass\n","hint":"Use a mangled private name like `_typedslot_<attrname>` to store data on the instance. Check `obj.__dict__` for the key to distinguish 'not set' from 'set to a falsy value'.","tests":["class Cfg:\n    host = TypedSlot(str, default='localhost')\n    port = TypedSlot(int)\nc = Cfg()\nassert c.host == 'localhost'\nc.port = 9000\nassert c.port == 9000","class Cfg:\n    port = TypedSlot(int)\nc = Cfg()\ntry:\n    _ = c.port\n    assert False\nexcept AttributeError:\n    pass","class Cfg:\n    val = TypedSlot(int)\nc = Cfg()\nc.val = 5\ntry:\n    c.val = 'bad'\n    assert False\nexcept TypeError:\n    pass","class Cfg:\n    x = TypedSlot(int, default=0)\nc = Cfg()\nc.x = 42\ndel c.x\nassert c.x == 0","class Cfg:\n    n = TypedSlot(int, default=1)\nc1 = Cfg()\nc2 = Cfg()\nc1.n = 10\nassert c2.n == 1"],"solution":"MISSING = object()\n\nclass TypedSlot:\n    def __init__(self, type_, default=MISSING):\n        self.type_ = type_\n        self.default = default\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_typedslot_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        try:\n            return obj.__dict__[self.attr]\n        except KeyError:\n            if self.default is not MISSING:\n                return self.default\n            raise AttributeError(f'{self.attr!r} has not been set and has no default')\n\n    def __set__(self, obj, value):\n        if not isinstance(value, self.type_):\n            raise TypeError(f'Expected {self.type_.__name__}, got {type(value).__name__}')\n        obj.__dict__[self.attr] = value\n\n    def __delete__(self, obj):\n        obj.__dict__.pop(self.attr, None)\n","expert":"MISSING = object()\n\nclass TypedSlot:\n    def __init__(self, type_, default=MISSING, coerce=False):\n        self.type_ = type_\n        self.default = default\n        self.coerce = coerce\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_ts_{owner.__name__}_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        sentinel = obj.__dict__.get(self.attr, MISSING)\n        if sentinel is not MISSING:\n            return sentinel\n        if self.default is not MISSING:\n            return self.default\n        raise AttributeError(f'Attribute not set and no default provided')\n\n    def __set__(self, obj, value):\n        if self.coerce and not isinstance(value, self.type_):\n            try:\n                value = self.type_(value)\n            except (ValueError, TypeError) as e:\n                raise TypeError(f'Cannot coerce {value!r} to {self.type_.__name__}: {e}') from None\n        if not isinstance(value, self.type_):\n            raise TypeError(f'Expected {self.type_.__name__}, got {type(value).__name__}')\n        obj.__dict__[self.attr] = value\n\n    def __delete__(self, obj):\n        obj.__dict__.pop(self.attr, None)\n","explanation":"A descriptor that stores per-instance data in `obj.__dict__` under a private key is a **non-data descriptor with a storage slot** \u2014 it overrides `__get__`, `__set__`, and `__delete__` to become a data descriptor (one with `__set__`), which takes priority over instance `__dict__` in Python's lookup order. Including the owner class name in the storage key (expert version) prevents collisions when the same descriptor instance is accidentally shared across classes."},{"day":342,"title":"Combining Caching and Descriptors","topic":"caching","difficulty":5,"minutes":15,"prompt":"Implement a `memoized_method` descriptor that caches the result of a method call per instance, per set of arguments. Unlike `cached_property`, this handles methods that take arguments.\n\nUsage:\n```python\nclass Calc:\n    @memoized_method\n    def fib(self, n):\n        if n < 2: return n\n        return self.fib(n-1) + self.fib(n-2)\n\nc = Calc()\nassert c.fib(10) == 55\n```\n\nThe cache must be per-instance (two `Calc` instances have independent caches). The descriptor must also expose a `cache_clear(instance)` method to clear the cache for a specific instance.\n\nAdditionally write `call_count(instance)` method on the descriptor that returns how many unique cache entries exist for that instance.","starter":"class memoized_method:\n    def __init__(self, func):\n        self.func = func\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_memo_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        # TODO: return a wrapper that caches per-instance\n        pass\n\n    def cache_clear(self, instance):\n        pass\n\n    def call_count(self, instance):\n        pass\n","hint":"Store the cache dict in `obj.__dict__[self.attr]`. The wrapper returned by `__get__` should be a closure over `obj` and `self.func` that checks and updates this dict.","tests":["class Calc:\n    @memoized_method\n    def fib(self, n):\n        if n < 2: return n\n        return self.fib(n-1) + self.fib(n-2)\nc = Calc()\nassert c.fib(10) == 55","class Sq:\n    @memoized_method\n    def sq(self, x):\n        return x * x\ns1 = Sq()\ns2 = Sq()\nassert s1.sq(5) == 25\nassert s2.sq(5) == 25","calls = [0]\nclass C:\n    @memoized_method\n    def work(self, x):\n        calls[0] += 1\n        return x + 1\nc = C()\nc.work(1)\nc.work(1)\nc.work(2)\nassert calls[0] == 2","class C:\n    @memoized_method\n    def f(self, x):\n        return x\nc = C()\nc.f(1)\nc.f(2)\nassert C.f.call_count(c) == 2\nC.f.cache_clear(c)\nassert C.f.call_count(c) == 0","class C:\n    @memoized_method\n    def g(self, a, b):\n        return a + b\nc = C()\nassert c.g(1,2) == 3\nassert c.g(1,2) == 3"],"solution":"import functools\n\nclass memoized_method:\n    def __init__(self, func):\n        self.func = func\n        self.attr = None\n        functools.update_wrapper(self, func)\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_memo_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        cache = obj.__dict__.setdefault(self.attr, {})\n        func = self.func\n\n        def wrapper(*args):\n            if args not in cache:\n                cache[args] = func(obj, *args)\n            return cache[args]\n\n        return wrapper\n\n    def cache_clear(self, instance):\n        instance.__dict__.pop(self.attr, None)\n\n    def call_count(self, instance):\n        return len(instance.__dict__.get(self.attr, {}))\n","expert":"import functools\nfrom weakref import WeakKeyDictionary\n\nclass memoized_method:\n    def __init__(self, func):\n        self.func = func\n        self.attr = None\n        self._caches = WeakKeyDictionary()\n        functools.update_wrapper(self, func)\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_memo_{name}'\n\n    def _get_cache(self, obj):\n        if obj not in self._caches:\n            self._caches[obj] = {}\n        return self._caches[obj]\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        cache = self._get_cache(obj)\n        func = self.func\n\n        @functools.wraps(func)\n        def wrapper(*args):\n            if args not in cache:\n                cache[args] = func(obj, *args)\n            return cache[args]\n\n        return wrapper\n\n    def cache_clear(self, instance):\n        self._caches.pop(instance, None)\n\n    def call_count(self, instance):\n        return len(self._caches.get(instance, {}))\n","explanation":"Storing per-instance cache in `obj.__dict__` (solution) is simple but means the cache lives inside the instance and can be inspected externally. The expert stores caches in a `WeakKeyDictionary` on the descriptor itself \u2014 when the instance is garbage-collected, the cache is automatically cleaned up too, preventing memory leaks in long-running applications. This is the same technique used by `functools.cached_property` internally."},{"day":343,"title":"Context Manager Protocol","topic":"metaprogramming","difficulty":4,"minutes":15,"prompt":"Implement two context managers:\n\n1. `timer()` \u2014 a context manager (class-based) that measures elapsed time. After exiting, the instance has an `elapsed` attribute with the duration in seconds (float). Suppresses no exceptions.\n\n2. `suppress_errors(*exc_types)` \u2014 a context manager (using `contextlib.contextmanager`) that suppresses only the given exception types and lets all others propagate. Yields a status dict `{'suppressed': False}` that is updated to `True` if an error was suppressed.\n\nExample:\n```python\nwith timer() as t:\n    sum(range(10**6))\nprint(t.elapsed)  # e.g. 0.05\n\nwith suppress_errors(ValueError) as ctx:\n    int('bad')\n```","starter":"import time\nfrom contextlib import contextmanager\n\nclass timer:\n    def __enter__(self):\n        pass\n\n    def __exit__(self, exc_type, exc_val, exc_tb):\n        pass\n\n@contextmanager\ndef suppress_errors(*exc_types):\n    pass\n","hint":"In `timer.__enter__`, record `time.perf_counter()`. In `__exit__`, compute the difference. For `suppress_errors`, wrap the `yield` in a try/except.","tests":["import time\nwith timer() as t:\n    time.sleep(0.01)\nassert t.elapsed >= 0.005","with timer() as t:\n    pass\nassert isinstance(t.elapsed, float) and t.elapsed >= 0","ctx_info = {}\nwith suppress_errors(ValueError) as info:\n    ctx_info = info\n    int('bad')\nassert ctx_info.get('suppressed') == True","raised = False\ntry:\n    with suppress_errors(ValueError):\n        raise TypeError('oops')\nexcept TypeError:\n    raised = True\nassert raised","with suppress_errors(KeyError, IndexError) as info:\n    [][0]\nassert info['suppressed'] == True"],"solution":"import time\nfrom contextlib import contextmanager\n\nclass timer:\n    def __enter__(self):\n        self._start = time.perf_counter()\n        return self\n\n    def __exit__(self, exc_type, exc_val, exc_tb):\n        self.elapsed = time.perf_counter() - self._start\n        return False\n\n@contextmanager\ndef suppress_errors(*exc_types):\n    info = {'suppressed': False}\n    try:\n        yield info\n    except exc_types:\n        info['suppressed'] = True\n","expert":"import time\nfrom contextlib import contextmanager\n\nclass timer:\n    elapsed: float = 0.0\n\n    def __enter__(self):\n        self._start = time.perf_counter()\n        return self\n\n    def __exit__(self, *args):\n        self.elapsed = time.perf_counter() - self._start\n        return False\n\n    def __repr__(self):\n        return f'timer(elapsed={self.elapsed:.6f}s)'\n\n@contextmanager\ndef suppress_errors(*exc_types):\n    info = {'suppressed': False, 'exception': None}\n    try:\n        yield info\n    except exc_types as e:\n        info['suppressed'] = True\n        info['exception'] = e\n","explanation":"`__exit__` always receives `(exc_type, exc_val, exc_tb)` \u2014 returning a truthy value suppresses the exception. `time.perf_counter()` is the right choice for elapsed time (monotonic, high-resolution). The `@contextmanager` decorator converts a generator with a single `yield` into a context manager \u2014 cleaner than writing a class when no meaningful state accumulates. The expert stores the actual exception object in `info`, giving callers access to it for logging or inspection."},{"day":344,"title":"Combining Decorators","topic":"metaprogramming","difficulty":5,"minutes":15,"prompt":"Write a `retry` decorator factory and a `logged` decorator that can be combined cleanly.\n\n`retry(times, exceptions=(Exception,))` \u2014 retries the wrapped function up to `times` times if one of `exceptions` is raised. After exhausting retries, re-raises the last exception.\n\n`logged(logger_list)` \u2014 appends `(func_name, args, kwargs, result_or_exception)` tuples to `logger_list` on each call (after the final result is known \u2014 including after all retries).\n\nBoth must be stackable in either order and preserve `__name__` and `__doc__`.\n\nExample:\n```python\nlog = []\n@logged(log)\n@retry(3, (ValueError,))\ndef flaky(x):\n    if x < 0: raise ValueError\n    return x * 2\n\nflaky(5)  # -> 10, log has one entry\n```","starter":"import functools\n\ndef retry(times, exceptions=(Exception,)):\n    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            pass\n        return wrapper\n    return decorator\n\ndef logged(logger_list):\n    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            pass\n        return wrapper\n    return decorator\n","hint":"In `retry`, loop up to `times`, catching `exceptions`, re-raising if no more attempts. In `logged`, call `func`, catch any exception to log it, then re-raise.","tests":["log = []\n@logged(log)\n@retry(3, (ValueError,))\ndef good(x):\n    return x * 2\nassert good(5) == 10\nassert len(log) == 1 and log[0][3] == 10","attempts = [0]\n@retry(3, (ValueError,))\ndef sometimes_fails(x):\n    attempts[0] += 1\n    if attempts[0] < 3:\n        raise ValueError('not yet')\n    return x\nassert sometimes_fails(99) == 99\nassert attempts[0] == 3","@retry(2, (ValueError,))\ndef always_fails():\n    raise ValueError('nope')\ntry:\n    always_fails()\n    assert False\nexcept ValueError:\n    pass","log = []\n@logged(log)\ndef boom():\n    raise RuntimeError('x')\ntry:\n    boom()\nexcept RuntimeError:\n    pass\nassert log[0][3].__class__ == RuntimeError","@retry(2)\ndef f(): return 42\nassert f.__name__ == 'f'"],"solution":"import functools\n\ndef retry(times, exceptions=(Exception,)):\n    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            last_exc = None\n            for _ in range(times):\n                try:\n                    return func(*args, **kwargs)\n                except exceptions as e:\n                    last_exc = e\n            raise last_exc\n        return wrapper\n    return decorator\n\ndef logged(logger_list):\n    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            try:\n                result = func(*args, **kwargs)\n                logger_list.append((func.__name__, args, kwargs, result))\n                return result\n            except Exception as e:\n                logger_list.append((func.__name__, args, kwargs, e))\n                raise\n        return wrapper\n    return decorator\n","expert":"import functools\n\ndef retry(times, exceptions=(Exception,)):\n    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            for attempt in range(times):\n                try:\n                    return func(*args, **kwargs)\n                except exceptions:\n                    if attempt == times - 1:\n                        raise\n        return wrapper\n    return decorator\n\ndef logged(logger_list):\n    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            try:\n                result = func(*args, **kwargs)\n                logger_list.append((func.__name__, args, kwargs, result))\n                return result\n            except BaseException as e:\n                logger_list.append((func.__name__, args, kwargs, e))\n                raise\n        return wrapper\n    return decorator\n","explanation":"The key to stackable decorators is `functools.wraps` \u2014 without it, the outer decorator sees the inner wrapper's name, not the original function's name. The expert's `retry` avoids storing `last_exc` by re-raising on the last attempt (`attempt == times - 1: raise`), which preserves the original traceback. Using `BaseException` in `logged` captures `KeyboardInterrupt` and `SystemExit` too \u2014 important for audit trails in production systems."},{"day":345,"title":"Observer Pattern","topic":"event systems","difficulty":4,"minutes":15,"prompt":"Implement the Observer pattern with a generic `Subject` class.\n\n`Subject` methods:\n- `attach(observer)` \u2014 add an observer (any callable).\n- `detach(observer)` \u2014 remove an observer.\n- `notify(*args, **kwargs)` \u2014 call every observer with the given args.\n- `state` property \u2014 current state value.\n- `set_state(value)` \u2014 update state and automatically call `notify(value)`.\n\nAlso create a `LoggingObserver` class whose instances are callable: when called with a value, they append it to `self.log` (a list).\n\nExample:\n```python\ns = Subject()\nobs = LoggingObserver()\ns.attach(obs)\ns.set_state('hello')\nassert obs.log == ['hello']\n```","starter":"class Subject:\n    def __init__(self):\n        self._observers = []\n        self._state = None\n\n    @property\n    def state(self):\n        return self._state\n\n    def attach(self, observer):\n        pass\n\n    def detach(self, observer):\n        pass\n\n    def notify(self, *args, **kwargs):\n        pass\n\n    def set_state(self, value):\n        pass\n\n\nclass LoggingObserver:\n    def __init__(self):\n        self.log = []\n\n    def __call__(self, value):\n        pass\n","hint":"`notify` iterates over a copy of `self._observers` and calls each one. `set_state` updates `self._state` then calls `self.notify(value)`.","tests":["s = Subject()\nobs = LoggingObserver()\ns.attach(obs)\ns.set_state(42)\nassert obs.log == [42]\nassert s.state == 42","s = Subject()\nobs1 = LoggingObserver()\nobs2 = LoggingObserver()\ns.attach(obs1)\ns.attach(obs2)\ns.set_state('x')\nassert obs1.log == ['x'] and obs2.log == ['x']","s = Subject()\nobs = LoggingObserver()\ns.attach(obs)\ns.detach(obs)\ns.set_state(99)\nassert obs.log == []","s = Subject()\nlog = []\ns.attach(lambda v: log.append(v * 2))\ns.set_state(5)\nassert log == [10]","s = Subject()\ns.set_state('initial')\nassert s.state == 'initial'"],"solution":"class Subject:\n    def __init__(self):\n        self._observers = []\n        self._state = None\n\n    @property\n    def state(self):\n        return self._state\n\n    def attach(self, observer):\n        self._observers.append(observer)\n\n    def detach(self, observer):\n        if observer in self._observers:\n            self._observers.remove(observer)\n\n    def notify(self, *args, **kwargs):\n        for observer in list(self._observers):\n            observer(*args, **kwargs)\n\n    def set_state(self, value):\n        self._state = value\n        self.notify(value)\n\n\nclass LoggingObserver:\n    def __init__(self):\n        self.log = []\n\n    def __call__(self, value):\n        self.log.append(value)\n","expert":"from weakref import WeakSet\n\nclass Subject:\n    def __init__(self):\n        self._strong_observers = []\n        self._state = None\n\n    @property\n    def state(self):\n        return self._state\n\n    def attach(self, observer):\n        if observer not in self._strong_observers:\n            self._strong_observers.append(observer)\n\n    def detach(self, observer):\n        try:\n            self._strong_observers.remove(observer)\n        except ValueError:\n            pass\n\n    def notify(self, *args, **kwargs):\n        for obs in list(self._strong_observers):\n            obs(*args, **kwargs)\n\n    def set_state(self, value):\n        old = self._state\n        self._state = value\n        if old != value:\n            self.notify(value)\n\n\nclass LoggingObserver:\n    def __init__(self):\n        self.log = []\n\n    def __call__(self, value):\n        self.log.append(value)\n","explanation":"The Observer pattern decouples the subject (data source) from observers (reactors), enabling open/closed design \u2014 new observers can be added without modifying the subject. The solution iterates over a copy of the observer list to allow safe detachment during notification. The expert adds a duplicate-check in `attach` and only notifies when state actually changes (`old != value`), which is how most reactive frameworks (like MobX or Vue's reactivity) avoid redundant work."},{"day":346,"title":"Simple Expression Evaluator","topic":"mini-parsers","difficulty":5,"minutes":15,"prompt":"Write a function `evaluate(expr)` that evaluates a simple arithmetic expression string containing non-negative integers, `+`, `-`, `*`, `/` (integer division), and parentheses. Operator precedence and parentheses must be respected.\n\nDo NOT use `eval()`. Implement a recursive descent parser.\n\nExample:\n```python\nevaluate('3 + 4 * 2')    # 11\nevaluate('(3 + 4) * 2')  # 14\nevaluate('10 / 2 - 1')   # 4\n```\n\nAssume input is always valid. Integer division truncates toward zero (use `int(a/b)`).","starter":"def evaluate(expr):\n    tokens = _tokenize(expr)\n    pos = [0]  # use list so closures can mutate\n\n    def peek():\n        if pos[0] < len(tokens):\n            return tokens[pos[0]]\n        return None\n\n    def consume():\n        tok = tokens[pos[0]]\n        pos[0] += 1\n        return tok\n\n    def parse_expr():\n        # TODO: handle + and -\n        pass\n\n    def parse_term():\n        # TODO: handle * and /\n        pass\n\n    def parse_factor():\n        # TODO: handle numbers and parentheses\n        pass\n\n    return parse_expr()\n\ndef _tokenize(expr):\n    import re\n    return re.findall(r'\\d+|[+\\-*/()]', expr)\n","hint":"Recursive descent: `parse_expr` calls `parse_term` and handles `+/-`; `parse_term` calls `parse_factor` and handles `*//`; `parse_factor` handles numbers and `(expr)`.","tests":["assert evaluate('2 + 3') == 5","assert evaluate('3 + 4 * 2') == 11","assert evaluate('(3 + 4) * 2') == 14","assert evaluate('10 / 2 - 1') == 4","assert evaluate('2 * (3 + (4 - 1))') == 12"],"solution":"def _tokenize(expr):\n    import re\n    return re.findall(r'\\d+|[+\\-*/()]', expr)\n\ndef evaluate(expr):\n    tokens = _tokenize(expr)\n    pos = [0]\n\n    def peek():\n        return tokens[pos[0]] if pos[0] < len(tokens) else None\n\n    def consume():\n        tok = tokens[pos[0]]\n        pos[0] += 1\n        return tok\n\n    def parse_expr():\n        left = parse_term()\n        while peek() in ('+', '-'):\n            op = consume()\n            right = parse_term()\n            left = left + right if op == '+' else left - right\n        return left\n\n    def parse_term():\n        left = parse_factor()\n        while peek() in ('*', '/'):\n            op = consume()\n            right = parse_factor()\n            left = left * right if op == '*' else int(left / right)\n        return left\n\n    def parse_factor():\n        tok = consume()\n        if tok == '(':\n            val = parse_expr()\n            consume()  # ')'\n            return val\n        return int(tok)\n\n    return parse_expr()\n","expert":"def _tokenize(expr):\n    import re\n    return re.findall(r'\\d+|[+\\-*/()]', expr)\n\nclass _Parser:\n    def __init__(self, tokens):\n        self.tokens = tokens\n        self.pos = 0\n\n    def peek(self):\n        return self.tokens[self.pos] if self.pos < len(self.tokens) else None\n\n    def consume(self):\n        tok = self.tokens[self.pos]\n        self.pos += 1\n        return tok\n\n    def parse_expr(self):\n        left = self.parse_term()\n        while self.peek() in ('+', '-'):\n            op = self.consume()\n            right = self.parse_term()\n            left = (left + right) if op == '+' else (left - right)\n        return left\n\n    def parse_term(self):\n        left = self.parse_factor()\n        while self.peek() in ('*', '/'):\n            op = self.consume()\n            right = self.parse_factor()\n            left = (left * right) if op == '*' else int(left / right)\n        return left\n\n    def parse_factor(self):\n        tok = self.consume()\n        if tok == '(':\n            val = self.parse_expr()\n            self.consume()  # ')'\n            return val\n        return int(tok)\n\ndef evaluate(expr):\n    return _Parser(_tokenize(expr)).parse_expr()\n","explanation":"Recursive descent parsing maps the grammar rules directly to functions: `expr -> term ((+|-) term)*`, `term -> factor ((*|/) factor)*`, `factor -> NUMBER | '(' expr ')'`. Operator precedence is naturally encoded by the call hierarchy \u2014 `*` binds tighter because `parse_term` is called before `parse_expr`. The expert wraps state in a class to avoid mutable-list closures (`pos = [0]`), making the parser cleaner and easier to extend with error reporting or new operators."},{"day":347,"title":"Immutable Record with __slots__","topic":"defensive copying","difficulty":4,"minutes":15,"prompt":"Create a factory function `make_record(*fields)` that returns an immutable record class. The returned class:\n- Has the given field names as r
