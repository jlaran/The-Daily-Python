:\n    def __init__(self, start):\n        pass\n\n    def __iter__(self):\n        pass\n\n    def __next__(self):\n        pass\n\nclass FibSequence:\n    def __init__(self, limit):\n        pass\n\n    def __iter__(self):\n        pass\n","hint":"CountDown stores current value, raises StopIteration at 0. FibSequence can use a generator in __iter__.","tests":["assert list(CountDown(3)) == [3, 2, 1]","assert list(CountDown(1)) == [1]","assert list(CountDown(0)) == []","assert list(FibSequence(10)) == [1, 1, 2, 3, 5, 8]","assert list(FibSequence(1)) == [1, 1]"],"solution":"class CountDown:\n    def __init__(self, start):\n        self.current = start\n\n    def __iter__(self):\n        return self\n\n    def __next__(self):\n        if self.current <= 0:\n            raise StopIteration\n        val = self.current\n        self.current -= 1\n        return val\n\nclass FibSequence:\n    def __init__(self, limit):\n        self.limit = limit\n\n    def __iter__(self):\n        a, b = 1, 1\n        while a <= self.limit:\n            yield a\n            a, b = b, a + b\n","expert":"class CountDown:\n    def __init__(self, start):\n        self._start = start\n\n    def __iter__(self):\n        current = self._start\n        while current > 0:\n            yield current\n            current -= 1\n\n    def __len__(self):\n        return max(0, self._start)\n\nclass FibSequence:\n    def __init__(self, limit):\n        self.limit = limit\n\n    def __iter__(self):\n        a, b = 1, 1\n        while a <= self.limit:\n            yield a\n            a, b = b, a + b\n","explanation":"A class can be an iterable (has __iter__) without being its own iterator\u2014__iter__ can return a generator each time, allowing multiple independent iterations. The expert converts CountDown to use generator-based __iter__, making it re-iterable (you can loop over the same instance twice), unlike the solution which is a one-shot iterator."},{"day":304,"title":"Context Manager via contextlib","topic":"patterns","difficulty":4,"minutes":13,"prompt":"Use `contextlib.contextmanager` to implement:\n  1. `temp_value(obj, attr, value)` \u2014 temporarily sets obj.attr to value, restores original on exit\n  2. `managed_list()` \u2014 yields an empty list; on exit, sorts it in place\nUsage:\n  class Cfg: x = 1\n  with temp_value(Cfg, 'x', 99): assert Cfg.x == 99\n  assert Cfg.x == 1","starter":"from contextlib import contextmanager\n\n@contextmanager\ndef temp_value(obj, attr, value):\n    pass\n\n@contextmanager\ndef managed_list():\n    pass\n","hint":"Save the original value before yield, restore it in a finally block.","tests":["class Cfg:\n    x = 1\nwith temp_value(Cfg, 'x', 99):\n    assert Cfg.x == 99\nassert Cfg.x == 1","class Cfg:\n    x = 'hello'\ntry:\n    with temp_value(Cfg, 'x', 'world'):\n        assert Cfg.x == 'world'\n        raise RuntimeError\nexcept RuntimeError:\n    pass\nassert Cfg.x == 'hello'","with managed_list() as lst:\n    lst.extend([3, 1, 2])\nassert lst == [1, 2, 3]","with managed_list() as lst:\n    pass\nassert lst == []"],"solution":"from contextlib import contextmanager\n\n@contextmanager\ndef temp_value(obj, attr, value):\n    original = getattr(obj, attr)\n    setattr(obj, attr, value)\n    try:\n        yield\n    finally:\n        setattr(obj, attr, original)\n\n@contextmanager\ndef managed_list():\n    lst = []\n    yield lst\n    lst.sort()\n","expert":"from contextlib import contextmanager\n\n@contextmanager\ndef temp_value(obj, attr, value):\n    original = getattr(obj, attr)\n    setattr(obj, attr, value)\n    try:\n        yield obj\n    finally:\n        setattr(obj, attr, original)\n\n@contextmanager\ndef managed_list(key=None, reverse=False):\n    lst = []\n    yield lst\n    lst.sort(key=key, reverse=reverse)\n","explanation":"@contextmanager turns a generator into a context manager: code before yield is __enter__, code after (or in finally) is __exit__. The try/finally ensures cleanup even if an exception occurs inside the with block. The expert yields obj from temp_value (useful as 'as' target) and adds sort parameters to managed_list for flexibility."},{"day":305,"title":"Operator Overloading \u2014 Vector","topic":"patterns","difficulty":4,"minutes":14,"prompt":"Implement a `Vector` class supporting arbitrary dimensions. Implement:\n  - `__init__(self, *components)`\n  - `__add__`, `__sub__` (element-wise)\n  - `__mul__(self, scalar)` and `__rmul__(self, scalar)` (scalar multiplication)\n  - `__len__` and `__getitem__`\n  - `__eq__`\n  v = Vector(1,2,3) + Vector(4,5,6)  # Vector(5,7,9)","starter":"class Vector:\n    def __init__(self, *components):\n        pass\n\n    def __add__(self, other):\n        pass\n\n    def __sub__(self, other):\n        pass\n\n    def __mul__(self, scalar):\n        pass\n\n    def __rmul__(self, scalar):\n        pass\n\n    def __len__(self):\n        pass\n\n    def __getitem__(self, idx):\n        pass\n\n    def __eq__(self, other):\n        pass\n","hint":"Store components as a tuple. Use zip() for element-wise operations.","tests":["v = Vector(1,2,3) + Vector(4,5,6)\nassert v[0]==5 and v[1]==7 and v[2]==9","v = Vector(5,5,5) - Vector(1,2,3)\nassert list(v[i] for i in range(3)) == [4,3,2]","v = Vector(1,2,3) * 2\nassert v == Vector(2,4,6)","v = 3 * Vector(1,0,1)\nassert v == Vector(3,0,3)","assert len(Vector(1,2,3,4)) == 4"],"solution":"class Vector:\n    def __init__(self, *components):\n        self._c = tuple(components)\n\n    def __add__(self, other):\n        return Vector(*(a+b for a,b in zip(self._c, other._c)))\n\n    def __sub__(self, other):\n        return Vector(*(a-b for a,b in zip(self._c, other._c)))\n\n    def __mul__(self, scalar):\n        return Vector(*(x*scalar for x in self._c))\n\n    def __rmul__(self, scalar):\n        return self.__mul__(scalar)\n\n    def __len__(self):\n        return len(self._c)\n\n    def __getitem__(self, idx):\n        return self._c[idx]\n\n    def __eq__(self, other):\n        return isinstance(other, Vector) and self._c == other._c\n","expert":"class Vector:\n    def __init__(self, *components):\n        self._c = tuple(components)\n\n    def __add__(self, other):\n        return Vector(*(a+b for a,b in zip(self._c, other._c)))\n\n    def __sub__(self, other):\n        return Vector(*(a-b for a,b in zip(self._c, other._c)))\n\n    def __mul__(self, scalar):\n        return Vector(*(x*scalar for x in self._c))\n\n    __rmul__ = __mul__\n\n    def __neg__(self):\n        return Vector(*(-x for x in self._c))\n\n    def __abs__(self):\n        return sum(x*x for x in self._c) ** 0.5\n\n    def __len__(self):\n        return len(self._c)\n\n    def __getitem__(self, idx):\n        return self._c[idx]\n\n    def __eq__(self, other):\n        return isinstance(other, Vector) and self._c == other._c\n\n    def __repr__(self):\n        parts = ', '.join(map(str, self._c))\n        return f'Vector({parts})'\n\n    def __iter__(self):\n        return iter(self._c)\n","explanation":"__rmul__ = __mul__ (method alias) avoids duplicating code\u2014Python calls __rmul__ when the left operand doesn't support the operation (e.g., 3 * vector). The expert also adds __neg__, __abs__ (for magnitude), and __iter__ to make Vector integrate naturally with Python's numeric and iteration protocols."},{"day":306,"title":"Generator with send() \u2014 Coroutine-style","topic":"patterns","difficulty":4,"minutes":15,"prompt":"Write a generator function `running_average()` that accepts values via send() and yields the running average after each value. Prime it by calling next() once before sending values.\n  ra = running_average()\n  next(ra)  # prime\n  ra.send(10)  # 10.0\n  ra.send(20)  # 15.0\n  ra.send(30)  # 20.0\nAlso write a helper `compute_averages(values)` that primes and sends all values, returning the list of averages.","starter":"def running_average():\n    pass\n\ndef compute_averages(values):\n    pass\n","hint":"Use `value = yield result` to both yield and receive. Initialize total and count before the loop.","tests":["ra = running_average()\nnext(ra)\nassert ra.send(10) == 10.0","ra = running_average()\nnext(ra)\nra.send(10)\nassert ra.send(20) == 15.0","assert compute_averages([10, 20, 30]) == [10.0, 15.0, 20.0]","assert compute_averages([5]) == [5.0]","assert compute_averages([2, 4, 6, 8]) == [2.0, 3.0, 4.0, 5.0]"],"solution":"def running_average():\n    total = 0.0\n    count = 0\n    value = yield\n    while True:\n        total += value\n        count += 1\n        value = yield total / count\n\ndef compute_averages(values):\n    ra = running_average()\n    next(ra)\n    return [ra.send(v) for v in values]\n","expert":"def running_average():\n    total = 0.0\n    count = 0\n    value = yield None\n    while True:\n        total += value\n        count += 1\n        value = yield total / count\n\ndef prime(gen):\n    next(gen)\n    return gen\n\ndef compute_averages(values):\n    ra = prime(running_average())\n    return [ra.send(v) for v in values]\n","explanation":"Generators with send() form coroutines\u2014they can receive values mid-execution. The value = yield expr pattern both yields a result and waits to receive the next input. Priming (calling next() once) advances to the first yield. The expert extracts prime() as a utility function, making generator coroutine setup reusable and self-documenting."},{"day":307,"title":"Builder with Validation","topic":"patterns","difficulty":4,"minutes":14,"prompt":"Create a `PersonBuilder` that builds a `Person` namedtuple with fields `name`, `age`, `email`. Methods: `set_name(name)`, `set_age(age)`, `set_email(email)` (all return self). `build()` validates: name non-empty str, age int 0-150, email contains '@'; raises ValueError if invalid.\n  p = PersonBuilder().set_name('Alice').set_age(30).set_email('a@b.com').build()\n  p.name  # 'Alice'","starter":"from collections import namedtuple\n\nPerson = namedtuple('Person', ['name', 'age', 'email'])\n\nclass PersonBuilder:\n    def set_name(self, name):\n        pass\n\n    def set_age(self, age):\n        pass\n\n    def set_email(self, email):\n        pass\n\n    def build(self):\n        pass\n","hint":"Store values as instance attributes. Validate all in build() before creating the namedtuple.","tests":["p = PersonBuilder().set_name('Alice').set_age(30).set_email('a@b.com').build()\nassert p.name == 'Alice' and p.age == 30 and p.email == 'a@b.com'","try:\n    PersonBuilder().set_name('').set_age(25).set_email('x@y.com').build()\n    assert False\nexcept ValueError:\n    pass","try:\n    PersonBuilder().set_name('Bob').set_age(200).set_email('b@c.com').build()\n    assert False\nexcept ValueError:\n    pass","try:\n    PersonBuilder().set_name('Eve').set_age(20).set_email('notanemail').build()\n    assert False\nexcept ValueError:\n    pass"],"solution":"from collections import namedtuple\n\nPerson = namedtuple('Person', ['name', 'age', 'email'])\n\nclass PersonBuilder:\n    def __init__(self):\n        self._name = None\n        self._age = None\n        self._email = None\n\n    def set_name(self, name):\n        self._name = name\n        return self\n\n    def set_age(self, age):\n        self._age = age\n        return self\n\n    def set_email(self, email):\n        self._email = email\n        return self\n\n    def build(self):\n        if not isinstance(self._name, str) or not self._name:\n            raise ValueError('name must be a non-empty string')\n        if not isinstance(self._age, int) or not (0 <= self._age <= 150):\n            raise ValueError('age must be int 0-150')\n        if not isinstance(self._email, str) or '@' not in self._email:\n            raise ValueError('email must contain @')\n        return Person(self._name, self._age, self._email)\n","expert":"from collections import namedtuple\n\nPerson = namedtuple('Person', ['name', 'age', 'email'])\n\nclass PersonBuilder:\n    _fields = ('name', 'age', 'email')\n\n    def __init__(self):\n        self._data = {}\n\n    def set_name(self, name):\n        self._data['name'] = name\n        return self\n\n    def set_age(self, age):\n        self._data['age'] = age\n        return self\n\n    def set_email(self, email):\n        self._data['email'] = email\n        return self\n\n    @staticmethod\n    def _validate(data):\n        name = data.get('name')\n        age = data.get('age')\n        email = data.get('email')\n        if not isinstance(name, str) or not name:\n            raise ValueError('name must be a non-empty string')\n        if not isinstance(age, int) or not (0 <= age <= 150):\n            raise ValueError('age must be int 0-150')\n        if not isinstance(email, str) or '@' not in email:\n            raise ValueError('email must contain @')\n\n    def build(self):\n        self._validate(self._data)\n        return Person(**self._data)\n","explanation":"The builder separates construction from validation. The expert stores data in a single dict and uses **self._data to unpack it into the namedtuple constructor\u2014this is more extensible (adding a field means adding one setter, not changing build()). Extracting _validate as a @staticmethod makes it independently testable."},{"day":308,"title":"Immutable Value Objects with __hash__","topic":"patterns","difficulty":4,"minutes":13,"prompt":"Create an immutable `Money(amount, currency)` class. Amount should be a Decimal stored to 2 decimal places. Implement:\n  - `__eq__` \u2014 same amount and currency\n  - `__hash__` \u2014 so Money can be used in sets/dicts\n  - `__add__` \u2014 add two Money objects of same currency (raises ValueError if different)\n  - `__repr__`\n  Money('10.5', 'USD') + Money('5.00', 'USD')  # Money(Decimal('15.50'), 'USD')","starter":"from decimal import Decimal, ROUND_HALF_UP\n\nclass Money:\n    def __init__(self, amount, currency):\n        pass\n\n    def __eq__(self, other):\n        pass\n\n    def __hash__(self):\n        pass\n\n    def __add__(self, other):\n        pass\n\n    def __repr__(self):\n        pass\n","hint":"Use Decimal(str(amount)).quantize(Decimal('0.01')) for rounding. Hash the tuple (amount, currency).","tests":["from decimal import Decimal\nm = Money('10.50', 'USD')\nassert m.amount == Decimal('10.50')\nassert m.currency == 'USD'","from decimal import Decimal\nassert Money('10', 'USD') == Money('10.00', 'USD')","s = {Money('1.00', 'USD'), Money('1.00', 'USD')}\nassert len(s) == 1","from decimal import Decimal\ntotal = Money('10.50', 'USD') + Money('5.50', 'USD')\nassert total.amount == Decimal('16.00')","try:\n    Money('1', 'USD') + Money('1', 'EUR')\n    assert False\nexcept ValueError:\n    pass"],"solution":"from decimal import Decimal, ROUND_HALF_UP\n\nclass Money:\n    def __init__(self, amount, currency):\n        self.amount = Decimal(str(amount)).quantize(Decimal('0.01'), rounding=ROUND_HALF_UP)\n        self.currency = currency\n\n    def __eq__(self, other):\n        return isinstance(other, Money) and self.amount == other.amount and self.currency == other.currency\n\n    def __hash__(self):\n        return hash((self.amount, self.currency))\n\n    def __add__(self, other):\n        if self.currency != other.currency:\n            raise ValueError(f'Cannot add {self.currency} and {other.currency}')\n        return Money(self.amount + other.amount, self.currency)\n\n    def __repr__(self):\n        return f'Money({self.amount!r}, {self.currency!r})'\n","expert":"from decimal import Decimal, ROUND_HALF_UP\n\n_TWO_PLACES = Decimal('0.01')\n\nclass Money:\n    __slots__ = ('amount', 'currency')\n\n    def __init__(self, amount, currency: str):\n        object.__setattr__(self, 'amount', Decimal(str(amount)).quantize(_TWO_PLACES, rounding=ROUND_HALF_UP))\n        object.__setattr__(self, 'currency', currency.upper())\n\n    def __setattr__(self, name, value):\n        raise AttributeError('Money is immutable')\n\n    def __eq__(self, other):\n        return isinstance(other, Money) and self.amount == other.amount and self.currency == other.currency\n\n    def __hash__(self):\n        return hash((self.amount, self.currency))\n\n    def __add__(self, other):\n        if not isinstance(other, Money):\n            return NotImplemented\n        if self.currency != other.currency:\n            raise ValueError(f'Cannot add {self.currency} and {other.currency}')\n        return Money(self.amount + other.amount, self.currency)\n\n    def __repr__(self):\n        return f'Money({self.amount!r}, {self.currency!r})'\n","explanation":"For hashable objects, __hash__ and __eq__ must agree: equal objects must have equal hashes. The expert enforces true immutability by overriding __setattr__ to raise AttributeError, uses __slots__ for memory efficiency, and returns NotImplemented from __add__ (not raising TypeError) to allow Python to try the other operand's __radd__."},{"day":309,"title":"Proxy Pattern with __getattr__","topic":"patterns","difficulty":4,"minutes":14,"prompt":"Implement a `ReadOnlyProxy(obj)` class that wraps any object and:\n  - Forwards attribute reads to the wrapped object\n  - Raises AttributeError on any attribute write (making the proxy read-only)\n  - Has a `_wrapped` attribute to access the underlying object\nUsage:\n  class Cfg: x = 1; y = 2\n  p = ReadOnlyProxy(Cfg)\n  p.x  # 1\n  p.x = 99  # raises AttributeError","starter":"class ReadOnlyProxy:\n    def __init__(self, obj):\n        pass\n\n    def __getattr__(self, name):\n        pass\n\n    def __setattr__(self, name, value):\n        pass\n","hint":"Use object.__setattr__ for _wrapped. Raise AttributeError in __setattr__ for all other names.","tests":["class Cfg:\n    x = 1\n    y = 2\np = ReadOnlyProxy(Cfg)\nassert p.x == 1 and p.y == 2","class Cfg:\n    x = 1\np = ReadOnlyProxy(Cfg)\ntry:\n    p.x = 99\n    assert False\nexcept AttributeError:\n    pass","class Obj:\n    def greet(self):\n        return 'hello'\np = ReadOnlyProxy(Obj())\nassert p.greet() == 'hello'","class Cfg:\n    val = 42\np = ReadOnlyProxy(Cfg)\nassert p._wrapped is Cfg"],"solution":"class ReadOnlyProxy:\n    def __init__(self, obj):\n        object.__setattr__(self, '_wrapped', obj)\n\n    def __getattr__(self, name):\n        return getattr(object.__getattribute__(self, '_wrapped'), name)\n\n    def __setattr__(self, name, value):\n        raise AttributeError('ReadOnlyProxy does not allow attribute assignment')\n","expert":"class ReadOnlyProxy:\n    __slots__ = ('_wrapped',)\n\n    def __init__(self, obj):\n        object.__setattr__(self, '_wrapped', obj)\n\n    def __getattr__(self, name):\n        return getattr(self._wrapped, name)\n\n    def __setattr__(self, name, value):\n        if name == '_wrapped':\n            object.__setattr__(self, '_wrapped', value)\n        else:\n            raise AttributeError(\n                f'{type(self).__name__!r} is read-only: cannot set {name!r}'\n            )\n\n    def __repr__(self):\n        return f'ReadOnlyProxy({self._wrapped!r})'\n","explanation":"The proxy pattern wraps an object and controls access. The key insight: __getattr__ is only called when normal lookup fails, while __setattr__ is always called. The expert uses __slots__ to prevent __dict__ creation on the proxy itself (reinforcing read-only semantics) and allows _wrapped to be set during __init__ by checking the name."},{"day":310,"title":"Mixin Classes","topic":"patterns","difficulty":4,"minutes":13,"prompt":"Implement two mixin classes:\n  - `SerializableMixin` \u2014 adds `to_dict()` returning `vars(self)` and `from_dict(cls, d)` classmethod reconstructing from dict\n  - `ComparableMixin` \u2014 adds `__lt__`, `__le__`, `__gt__`, `__ge__` based on a required `__eq__` and abstract `_compare_key()` method\nDemonstrate with `Product(name, price)` using both.\n  p = Product('apple', 1.5)\n  p.to_dict()  # {'name': 'apple', 'price': 1.5}","starter":"class SerializableMixin:\n    def to_dict(self):\n        pass\n\n    @classmethod\n    def from_dict(cls, d):\n        pass\n\nclass ComparableMixin:\n    def _compare_key(self):\n        raise NotImplementedError\n\n    def __lt__(self, other):\n        pass\n\n    def __le__(self, other):\n        pass\n\n    def __gt__(self, other):\n        pass\n\n    def __ge__(self, other):\n        pass\n\nclass Product(SerializableMixin, ComparableMixin):\n    def __init__(self, name, price):\n        pass\n\n    def _compare_key(self):\n        pass\n\n    def __eq__(self, other):\n        pass\n","hint":"from_dict should call cls(**d). _compare_key returns the value used for comparison (e.g., price).","tests":["p = Product('apple', 1.5)\nassert p.to_dict() == {'name': 'apple', 'price': 1.5}","p = Product.from_dict({'name': 'banana', 'price': 2.0})\nassert p.name == 'banana' and p.price == 2.0","p1 = Product('a', 1.0)\np2 = Product('b', 2.0)\nassert p1 < p2 and p2 > p1","p1 = Product('a', 1.0)\np2 = Product('b', 1.0)\nassert p1 == p2 or p1 <= p2"],"solution":"class SerializableMixin:\n    def to_dict(self):\n        return vars(self)\n\n    @classmethod\n    def from_dict(cls, d):\n        return cls(**d)\n\nclass ComparableMixin:\n    def _compare_key(self):\n        raise NotImplementedError\n\n    def __lt__(self, other):\n        return self._compare_key() < other._compare_key()\n\n    def __le__(self, other):\n        return self._compare_key() <= other._compare_key()\n\n    def __gt__(self, other):\n        return self._compare_key() > other._compare_key()\n\n    def __ge__(self, other):\n        return self._compare_key() >= other._compare_key()\n\nclass Product(SerializableMixin, ComparableMixin):\n    def __init__(self, name, price):\n        self.name = name\n        self.price = price\n\n    def _compare_key(self):\n        return self.price\n\n    def __eq__(self, other):\n        return isinstance(other, Product) and self.price == other.price\n","expert":"import functools\n\nclass SerializableMixin:\n    def to_dict(self):\n        return vars(self).copy()\n\n    @classmethod\n    def from_dict(cls, d):\n        return cls(**d)\n\n@functools.total_ordering\nclass ComparableMixin:\n    def _compare_key(self):\n        raise NotImplementedError\n\n    def __eq__(self, other):\n        if not isinstance(other, type(self)):\n            return NotImplemented\n        return self._compare_key() == other._compare_key()\n\n    def __lt__(self, other):\n        if not isinstance(other, type(self)):\n            return NotImplemented\n        return self._compare_key() < other._compare_key()\n\nclass Product(SerializableMixin, ComparableMixin):\n    def __init__(self, name, price):\n        self.name = name\n        self.price = price\n\n    def _compare_key(self):\n        return self.price\n","explanation":"Mixins add behavior without being standalone base classes. The expert uses functools.total_ordering which derives __le__, __gt__, __ge__ from just __eq__ and __lt__, avoiding four nearly-identical methods. Returning NotImplemented (not raising TypeError) from comparison dunders lets Python try the reflected operation on the other object."},{"day":311,"title":"Chained Exceptions & Custom Exceptions","topic":"patterns","difficulty":4,"minutes":12,"prompt":"Define a hierarchy:\n  - `AppError(Exception)` base\n  - `ValidationError(AppError)` with field name\n  - `DatabaseError(AppError)` with query\nWrite `parse_age(value)` that raises ValidationError if value can't convert to int or is out of range 0-150. Write `safe_query(query)` that wraps any Exception as DatabaseError using exception chaining.\nValidationError should store `field` attribute.","starter":"class AppError(Exception):\n    pass\n\nclass ValidationError(AppError):\n    def __init__(self, field, message):\n        pass\n\nclass DatabaseError(AppError):\n    def __init__(self, query, message):\n        pass\n\ndef parse_age(value):\n    pass\n\ndef safe_query(query):\n    pass\n","hint":"Use `raise DatabaseError(...) from original_exc` to chain exceptions.","tests":["try:\n    parse_age('abc')\n    assert False\nexcept ValidationError as e:\n    assert e.field == 'age'","try:\n    parse_age(200)\n    assert False\nexcept ValidationError as e:\n    assert e.field == 'age'","assert parse_age(25) == 25","try:\n    safe_query('BAD SQL')\nexcept DatabaseError as e:\n    assert e.query == 'BAD SQL'\n    assert e.__cause__ is not None"],"solution":"class AppError(Exception):\n    pass\n\nclass ValidationError(AppError):\n    def __init__(self, field, message):\n        super().__init__(message)\n        self.field = field\n\nclass DatabaseError(AppError):\n    def __init__(self, query, message):\n        super().__init__(message)\n        self.query = query\n\ndef parse_age(value):\n    try:\n        age = int(value)\n    except (ValueError, TypeError) as e:\n        raise ValidationError('age', f'Invalid age value: {value!r}') from e\n    if not (0 <= age <= 150):\n        raise ValidationError('age', f'Age must be 0-150, got {age}')\n    return age\n\ndef safe_query(query):\n    try:\n        if 'BAD' in str(query):\n            raise RuntimeError('syntax error')\n    except Exception as e:\n        raise DatabaseError(query, f'Query failed: {e}') from e\n","expert":"class AppError(Exception):\n    \"\"\"Base application exception.\"\"\"\n\nclass ValidationError(AppError):\n    def __init__(self, field: str, message: str):\n        super().__init__(f'[{field}] {message}')\n        self.field = field\n\nclass DatabaseError(AppError):\n    def __init__(self, query: str, message: str):\n        super().__init__(f'Query failed ({query!r}): {message}')\n        self.query = query\n\ndef parse_age(value) -> int:\n    try:\n        age = int(value)\n    except (ValueError, TypeError) as exc:\n        raise ValidationError('age', f'Cannot convert {value!r} to int') from exc\n    if not 0 <= age <= 150:\n        raise ValidationError('age', f'{age} is out of range [0, 150]')\n    return age\n\ndef safe_query(query: str):\n    try:\n        if 'BAD' in str(query):\n            raise RuntimeError('syntax error near BAD')\n    except Exception as exc:\n        raise DatabaseError(query, str(exc)) from exc\n","explanation":"Exception hierarchies allow catching at different levels: except AppError catches all app errors. `raise X from Y` (explicit chaining) sets __cause__, preserving the original error context. The expert formats messages in __init__ so str(exc) is useful without accessing attributes, and fields are still accessible for programmatic handling."},{"day":312,"title":"Data Pipeline with Generators","topic":"patterns","difficulty":4,"minutes":15,"prompt":"Build a CSV-like data pipeline. Write:\n  - `parse_csv(text)` \u2014 generator yielding dicts from CSV text (first line is header)\n  - `filter_rows(rows, field, value)` \u2014 generator keeping rows where row[field] == value\n  - `select_fields(rows, *fields)` \u2014 generator keeping only specified fields\n  - `to_list(pipeline)` \u2014 materializes pipeline to list\nAll stages are lazy generators.\n  data = 'name,age\\nAlice,30\\nBob,25\\nAlice,35'\n  result = to_list(select_fields(filter_rows(parse_csv(data), 'name', 'Alice'), 'age'))","starter":"def parse_csv(text):\n    pass\n\ndef filter_rows(rows, field, value):\n    pass\n\ndef select_fields(rows, *fields):\n    pass\n\ndef to_list(pipeline):\n    pass\n","hint":"Split text by lines. Use zip(headers, values) to build each row dict.","tests":["data = 'name,age\\nAlice,30\\nBob,25'\nresult = to_list(parse_csv(data))\nassert result == [{'name': 'Alice', 'age': '30'}, {'name': 'Bob', 'age': '25'}]","data = 'name,age\\nAlice,30\\nBob,25\\nAlice,35'\nfiltered = to_list(filter_rows(parse_csv(data), 'name', 'Alice'))\nassert len(filtered) == 2","data = 'name,age,city\\nAlice,30,NYC'\nresult = to_list(select_fields(parse_csv(data), 'name', 'city'))\nassert result == [{'name': 'Alice', 'city': 'NYC'}]","data = 'name,age\\nAlice,30\\nBob,25\\nAlice,35'\nresult = to_list(select_fields(filter_rows(parse_csv(data), 'name', 'Alice'), 'age'))\nassert result == [{'age': '30'}, {'age': '35'}]"],"solution":"def parse_csv(text):\n    lines = text.strip().split('\\n')\n    headers = lines[0].split(',')\n    for line in lines[1:]:\n        values = line.split(',')\n        yield dict(zip(headers, values))\n\ndef filter_rows(rows, field, value):\n    for row in rows:\n        if row.get(field) == value:\n            yield row\n\ndef select_fields(rows, *fields):\n    for row in rows:\n        yield {f: row[f] for f in fields if f in row}\n\ndef to_list(pipeline):\n    return list(pipeline)\n","expert":"def parse_csv(text):\n    lines = text.strip().splitlines()\n    headers = [h.strip() for h in lines[0].split(',')]\n    for line in lines[1:]:\n        if line.strip():\n            values = [v.strip() for v in line.split(',')]\n            yield dict(zip(headers, values))\n\ndef filter_rows(rows, field, value):\n    return (row for row in rows if row.get(field) == value)\n\ndef select_fields(rows, *fields):\n    field_set = frozenset(fields)\n    return ({f: row[f] for f in fields if f in row} for row in rows)\n\ndef to_list(pipeline):\n    return list(pipeline)\n","explanation":"Generator pipelines process data lazily: each stage pulls from the previous only when needed, so a 1GB file never fully loads into memory. The expert uses generator expressions instead of explicit yield loops for filter_rows and select_fields, precomputes a frozenset for O(1) field lookups, and handles whitespace and blank lines robustly."},{"day":313,"title":"functools.partial & Higher-Order Functions","topic":"patterns","difficulty":4,"minutes":13,"prompt":"Write a function `make_multiplier(n)` using functools.partial. Also write `apply_twice(func, value)` which applies a function twice. Then write `compose_n(funcs)` which composes a list of single-argument functions (left-to-right).\n  triple = make_multiplier(3)\n  triple(4)  # 12\n  apply_twice(triple, 2)  # 18\n  compose_n([triple, str])(4)  # '12'","starter":"import functools\n\ndef make_multiplier(n):\n    pass\n\ndef apply_twice(func, value):\n    pass\n\ndef compose_n(funcs):\n    pass\n","hint":"Use functools.partial(operator.mul, n) or a lambda. compose_n can use functools.reduce.","tests":["triple = make_multiplier(3)\nassert triple(4) == 12","double = make_multiplier(2)\nassert apply_twice(double, 3) == 12","triple = make_multiplier(3)\nf = compose_n([triple, str])\nassert f(4) == '12'","import functools\ndouble = make_multiplier(2)\ntriple = make_multiplier(3)\nf = compose_n([double, triple])\nassert f(5) == 30"],"solution":"import functools\nimport operator\n\ndef make_multiplier(n):\n    return functools.partial(operator.mul, n)\n\ndef apply_twice(func, value):\n    return func(func(value))\n\ndef compose_n(funcs):\n    def composed(x):\n        for f in funcs:\n            x = f(x)\n        return x\n    return composed\n","expert":"import functools\nimport operator\n\ndef make_multiplier(n):\n    return functools.partial(operator.mul, n)\n\ndef apply_twice(func, value):\n    return func(func(value))\n\ndef compose_n(funcs):\n    if not funcs:\n        return lambda x: x\n    return functools.reduce(lambda f, g: lambda x: g(f(x)), funcs)\n","explanation":"functools.partial pre-fills arguments, creating specialized functions without writing new defs. The expert composes functions with functools.reduce, folding the list into a single chain of lambdas. This is more concise and scales naturally\u2014compose_n([f,g,h]) builds g(f(x)) first, then h(g(f(x)))."},{"day":314,"title":"Abstract Factory Pattern","topic":"patterns","difficulty":4,"minutes":15,"prompt":"Implement an Abstract Factory for UI widgets. Define abstract base `UIFactory` with abstract methods `create_button()` and `create_input()`. Implement `LightThemeFactory` and `DarkThemeFactory`, each returning appropriate button/input objects with a `render() -> str` method.\n  factory = LightThemeFactory()\n  factory.create_button().render()  # 'light button'\n  factory.create_input().render()   # 'light input'","starter":"from abc import ABC, abstractmethod\n\nclass UIFactory(ABC):\n    @abstractmethod\n    def create_button(self):\n        pass\n\n    @abstractmethod\n    def create_input(self):\n        pass\n\nclass LightThemeFactory(UIFactory):\n    pass\n\nclass DarkThemeFactory(UIFactory):\n    pass\n","hint":"Create simple concrete widget classes for each theme. The factory methods return instances.","tests":["f = LightThemeFactory()\nassert f.create_button().render() == 'light button'","f = LightThemeFactory()\nassert f.create_input().render() == 'light input'","f = DarkThemeFactory()\nassert f.create_button().render() == 'dark button'","f = DarkThemeFactory()\nassert f.create_input().render() == 'dark input'","try:\n    UIFactory()\n    assert False\nexcept TypeError:\n    pass"],"solution":"from abc import ABC, abstractmethod\n\nclass UIFactory(ABC):\n    @abstractmethod\n    def create_button(self):\n        pass\n\n    @abstractmethod\n    def create_input(self):\n        pass\n\nclass LightButton:\n    def render(self):\n        return 'light button'\n\nclass LightInput:\n    def render(self):\n        return 'light input'\n\nclass DarkButton:\n    def render(self):\n        return 'dark button'\n\nclass DarkInput:\n    def render(self):\n        return 'dark input'\n\nclass LightThemeFactory(UIFactory):\n    def create_button(self):\n        return LightButton()\n\n    def create_input(self):\n        return LightInput()\n\nclass DarkThemeFactory(UIFactory):\n    def create_button(self):\n        return DarkButton()\n\n    def create_input(self):\n        return DarkInput()\n","expert":"from abc import ABC, abstractmethod\n\nclass Widget:\n    def __init__(self, theme, kind):\n        self._theme = theme\n        self._kind = kind\n\n    def render(self):\n        return f'{self._theme} {self._kind}'\n\nclass UIFactory(ABC):\n    @property\n    @abstractmethod\n    def theme(self) -> str:\n        pass\n\n    def create_button(self) -> Widget:\n        return Widget(self.theme, 'button')\n\n    def create_input(self) -> Widget:\n        return Widget(self.theme, 'input')\n\nclass LightThemeFactory(UIFactory):\n    @property\n    def theme(self):\n        return 'light'\n\nclass DarkThemeFactory(UIFactory):\n    @property\n    def theme(self):\n        return 'dark'\n","explanation":"The Abstract Factory creates families of related objects without specifying concrete classes, making entire themes swappable. The expert uses a single Widget class parameterized by theme/kind, eliminating 4 near-duplicate classes. The abstract theme property becomes a template method\u2014subclasses provide only the varying part."},{"day":315,"title":"Decorator as Class","topic":"patterns","difficulty":4,"minutes":14,"prompt":"Implement a `CountCalls` class decorator that counts how many times the decorated function has been called. The wrapped function should have a `call_count` attribute.\n  @CountCalls\n  def greet(name):\n      return f'Hello, {name}'\n  greet('Alice')  # 'Hello, Alice'\n  greet.call_count  # 1","starter":"import functools\n\nclass CountCalls:\n    def __init__(self, func):\n        pass\n\n    def __call__(self, *args, **kwargs):\n        pass\n\n    @property\n    def call_count(self):\n        pass\n","hint":"Use functools.update_wrapper(self, func) in __init__ to preserve function metadata.","tests":["@CountCalls\ndef greet(name):\n    return f'Hello, {name}'\nassert greet('Alice') == 'Hello, Alice'","assert greet.call_count == 1\ngreet('Bob')\nassert greet.call_count == 2","@CountCalls\ndef add(a, b):\n    return a + b\nassert add(1, 2) == 3\nassert add.call_count == 1","@CountCalls\ndef named(): pass\nassert named.__name__ == 'named'"],"solution":"import functools\n\nclass CountCalls:\n    def __init__(self, func):\n        functools.update_wrapper(self, func)\n        self._func = func\n        self._count = 0\n\n    def __call__(self, *args, **kwargs):\n        self._count += 1\n        return self._func(*args, **kwargs)\n\n    @property\n    def call_count(self):\n        return self._count\n","expert":"import functools\n\nclass CountCalls:\n    def __init__(self, func):\n        functools.update_wrapper(self, func)\n        self._func = func\n        self._count = 0\n\n    def __call__(self, *args, **kwargs):\n        self._count += 1\n        return self._func(*args, **kwargs)\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        return functools.partial(self, obj)\n\n    @property\n    def call_count(self):\n        return self._count\n\n    def reset(self):\n        self._count = 0\n","explanation":"Class decorators maintain state naturally between calls, unlike closure-based decorators. The expert adds __get__ so CountCalls works correctly as a method decorator on classes\u2014without it, the wrapped function wouldn't receive self when called as a method. This is the descriptor protocol applied to function wrappers."},{"day":316,"title":"Structural Pattern Matching \u2014 OR Patterns","topic":"patterns","difficulty":4,"minutes":13,"prompt":"Write `http_status_message(code)` using match/case that returns a message for HTTP codes:\n  - 200, 201, 204 \u2192 'success'\n  - 301, 302 \u2192 'redirect'\n  - 400, 422 \u2192 'client error'\n  - 401, 403 \u2192 'unauthorized'\n  - 404 \u2192 'not found'\n  - 500, 502, 503 \u2192 'server error'\n  - anything else \u2192 'unknown'\nUse OR patterns (|) to group codes.","starter":"def http_status_message(code):\n    pass\n","hint":"Use `case 200 | 201 | 204:` to match multiple values in one case.","tests":["assert http_status_message(200) == 'success'","assert http_status_message(201) == 'success'\nassert http_status_message(204) == 'success'","assert http_status_message(301) == 'redirect'\nassert http_status_message(302) == 'redirect'","assert http_status_message(404) == 'not found'\nassert http_status_message(500) == 'server error'","assert http_status_message(999) == 'unknown'"],"solution":"def http_status_message(code):\n    match code:\n        case 200 | 201 | 204:\n            return 'success'\n        case 301 | 302:\n            return 'redirect'\n        case 400 | 422:\n            return 'client error'\n        case 401 | 403:\n            return 'unauthorized'\n        case 404:\n            return 'not found'\n        case 500 | 502 | 503:\n            return 'server error'\n        case _:\n            return 'unknown'\n","expert":"def http_status_message(code):\n    match code:\n        case 200 | 201 | 204:\n            return 'success'\n        case 301 | 302:\n            return 'redirect'\n        case 400 | 422:\n            return 'client error'\n        case 401 | 403:\n            return 'unauthorized'\n        case 404:\n            return 'not found'\n        case 500 | 502 | 503:\n            return 'server error'\n        case int() as c if 100 <= c < 600:\n            return f'http {c // 100}xx'\n        case _:\n            return 'unknown'\n","explanation":"OR patterns (|) in match/case are more readable than chained comparisons or sets, and the compiler can optimize them. The expert adds a catch-all for valid HTTP ranges using a class pattern (int()) combined with a guard, gracefully handling other standard codes (like 429) rather than lumping them with truly unknown values."},{"day":317,"title":"Generic Container with Descriptors","topic":"patterns","difficulty":4,"minutes":15,"prompt":"Implement a `TypedList` descriptor that enforces a type on every element added to a list attribute. Constructor: `TypedList(item_type)`. Setting the attribute with a list validates each element; getting returns the list. Raise TypeError on invalid items.\n  class Roster:\n      players = TypedList(str)\n  r = Roster()\n  r.players = ['Alice', 'Bob']  # ok\n  r.players = ['Alice', 42]    # raises TypeError","starter":"class TypedList:\n    def __init__(self, item_type):\n        pass\n\n    def __set_name__(self, owner, name):\n        pass\n\n    def __get__(self, obj, objtype=None):\n        pass\n\n    def __set__(self, obj, value):\n        pass\n","hint":"Validate each element in the setter. Store the list in obj.__dict__.","tests":["class Roster:\n    players = TypedList(str)\nr = Roster()\nr.players = ['Alice', 'Bob']\nassert r.players == ['Alice', 'Bob']","class Roster:\n    players = TypedList(str)\nr = Roster()\ntry:\n    r.players = ['Alice', 42]\n    assert False\nexcept TypeError:\n    pass","class NumList:\n    vals = TypedList(int)\nn = NumList()\nn.vals = [1, 2, 3]\nassert n.vals == [1, 2, 3]","class NumList:\n    vals = TypedList(int)\nn = NumList()\ntry:\n    n.vals = [1, 'two']\n    assert False\nexcept TypeError:\n    pass"],"solution":"class TypedList:\n    def __init__(self, item_type):\n        self.item_type = item_type\n        self.name = None\n\n    def __set_name__(self, owner, name):\n        self.name = name\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        return obj.__dict__.get(self.name, [])\n\n    def __set__(self, obj, value):\n        for item in value:\n            if not isinstance(item, self.item_type):\n                raise TypeError(\n                    f'All items must be {self.item_type.__name__}, got {type(item).__name__}'\n                )\n        obj.__dict__[self.name] = list(value)\n","expert":"class TypedList:\n    def __init__(self, item_type):\n        self.item_type = item_type\n        self.name = None\n\n    def __set_name__(self, owner, name):\n        self.name = name\n        self.private = f'_typedlist_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        return getattr(obj, self.private, [])\n\n    def __set__(self, obj, value):\n        value = list(value)\n        bad = [item for item in value if not isinstance(item, self.item_type)]\n        if bad:\n            raise TypeError(\n                f'{self.name!r} requires {self.item_type.__name__}, '\n                f'got invalid items: {bad!r}'\n            )\n        setattr(obj, self.private, value)\n","explanation":"The TypedList descriptor validates on every assignment, making type errors immediate rather than surfacing later on use. The expert collects all invalid items before raising, giving a complete error message instead of stopping at the first. It also uses a mangled private name to avoid collisions with subclass attributes."},{"day":318,"title":"Command Pattern","topic":"patterns","difficulty":4,"minutes":14,"prompt":"Implement the Command pattern for a text editor. Define:\n  - Abstract `Command` with `execute()` and `undo()` methods\n  - `AppendCommand(text_obj, text)` \u2014 appends text to text_obj.content\n  - `DeleteCommand(text_obj, n)` \u2014 deletes last n characters\n  - `Editor` with a `content` attribute, `execute(cmd)` method, and `undo()` method (undoes last command)\nUsage:\n  ed = Editor()\n  ed.execute(AppendCommand(ed, 'Hello'))\n  ed.undo()  # content back to ''","starter":"from abc import ABC, abstractmethod\n\nclass Command(ABC):\n    @abstractmethod\n    def execute(self):\n        pass\n\n    @abstractmethod\n    def undo(self):\n        pass\n\nclass AppendCommand(Command):\n    pass\n\nclass DeleteCommand(Command):\n    pass\n\nclass Editor:\n    def __init__(self):\n        self.content = ''\n\n    def execute(self, cmd):\n        pass\n\n    def undo(self):\n        pass\n","hint":"Editor maintains a stack of executed commands. undo() pops and calls cmd.undo().","tests":["ed = Editor()\ned.execute(AppendCommand(ed, 'Hello'))\nassert ed.content == 'Hello'","ed = Editor()\ned.execute(AppendCommand(ed, 'Hello'))\ned.undo()\nassert ed.content == ''","ed = Editor()\ned.execute(AppendCommand(ed, 'Hello World'))\ned.execute(DeleteCommand(ed, 6))\nassert ed.content == 'Hello'","ed = Editor()\ned.execute(AppendCommand(ed, 'Hello World'))\ned.execute(DeleteCommand(ed, 6))\ned.undo()\nassert ed.content == 'Hello World'"],"solution":"from abc import ABC, abstractmethod\n\nclass Command(ABC):\n    @abstractmethod\n    def execute(self):\n        pass\n\n    @abstractmethod\n    def undo(self):\n        pass\n\nclass AppendCommand(Command):\n    def __init__(self, text_obj, text):\n        self.text_obj = text_obj\n        self.text = text\n\n    def execute(self):\n        self.text_obj.content += self.text\n\n    def undo(self):\n        self.text_obj.content = self.text_obj.content[:-len(self.text)]\n\nclass DeleteCommand(Command):\n    def __init__(self, text_obj, n):\n        self.text_obj = text_obj\n        self.n = n\n        self._deleted = ''\n\n    def execute(self):\n        self._deleted = self.text_obj.content[-self.n:]\n        self.text_obj.content = self.text_obj.content[:-self.n]\n\n    def undo(self):\n        self.text_obj.content += self._deleted\n\nclass Editor:\n    def __init__(self):\n        self.content = ''\n        self._history = []\n\n    def execute(self, cmd):\n        cmd.execute()\n        self._history.append(cmd)\n\n    def undo(self):\n        if self._history:\n            self._history.pop().undo()\n","expert":"from abc import ABC, abstractmethod\n\nclass Command(ABC):\n    @abstractmethod\n    def execute(self): pass\n\n    @abstractmethod\n    def undo(self): pass\n\nclass AppendCommand(Command):\n    def __init__(self, text_obj, text):\n        self._obj = text_obj\n        self._text = text\n\n    def execute(self):\n        self._obj.content += self._text\n\n    def undo(self):\n        self._obj.content = self._obj.content[:-len(self._text)] if self._text else self._obj.content\n\nclass DeleteCommand(Command):\n    def __init__(self, text_obj, n):\n        self._obj = text_obj\n        self._n = n\n        self._saved = ''\n\n    def execute(self):\n        self._saved = self._obj.content[-self._n:] if self._n else ''\n        self._obj.content = self._obj.content[:-self._n] if self._n else self._obj.content\n\n    def undo(self):\n        self._obj.content += self._saved\n\nclass Editor:\n    def __init__(self):\n        self.content = ''\n        self._history = []\n        self._redo_stack = []\n\n    def execute(self, cmd):\n        cmd.execute()\n        self._history.append(cmd)\n        self._redo_stack.clear()\n\n    def undo(self):\n        if self._history:\n            cmd = self._history.pop()\n            cmd.undo()\n            self._redo_stack.append(cmd)\n\n    def redo(self):\n        if self._redo_stack:\n            cmd = self._redo_stack.pop()\n            cmd.execute()\n            self._history.append(cmd)\n","explanation":"The Command pattern encapsulates operations as objects, enabling undo/redo, logging, and queuing. Each command saves its own state (the deleted text) needed for reversal. The expert adds a redo stack\u2014executing a new command clears it (standard behavior), while undo pushes onto redo. This is the full production undo/redo implementation."},{"day":319,"title":"Slots & Memory Optimization","topic":"patterns","difficulty":4,"minutes":13,"prompt":"Define a `Particle` class with __slots__ = ('x', 'y', 'mass', 'velocity') for a physics simulation. Implement `__init__`, `kinetic_energy()` (0.5 * mass * velocity^2), `momentum()` (mass * velocity), and `__repr__`. Then write `total_kinetic_energy(particles)` that sums KE for a list.\n  p = Particle(0.0, 0.0, 2.0, 3.0)\n  p.kinetic_energy()  # 9.0","starter":"class Particle:\n    __slots__ = ('x', 'y', 'mass', 'velocity')\n\n    def __init__(self, x, y, mass, velocity):\n        pass\n\n    def kinetic_energy(self):\n        pass\n\n    def momentum(self):\n        pass\n\n    def __repr__(self):\n        pass\n\ndef total_kinetic_energy(particles):\n    pass\n","hint":"Kinetic energy is 0.5 * mass * velocity**2. __slots__ prevents adding new attributes.","tests":["p = Particle(0.0, 0.0, 2.0, 3.0)\nassert p.kinetic_energy() == 9.0","p = Particle(0.0, 0.0, 4.0, 5.0)\nassert p.momentum() == 20.0","particles = [Particle(0,0,1.0,2.0), Particle(0,0,2.0,3.0)]\nassert total_kinetic_energy(particles) == 2.0 + 9.0","p = Particle(1.0, 2.0, 3.0, 4.0)\ntry:\n    p.charge = 1.0\n    assert False\nexcept AttributeError:\n    pass"],"solution":"class Particle:\n    __slots__ = ('x', 'y', 'mass', 'velocity')\n\n    def __init__(self, x, y, mass, velocity):\n        self.x = x\n        self.y = y\n        self.mass = mass\n        self.velocity = velocity\n\n    def kinetic_energy(self):\n        return 0.5 * self.mass * self.velocity ** 2\n\n    def momentum(self):\n        return self.mass * self.velocity\n\n    def __repr__(self):\n        return f'Particle(x={self.x}, y={self.y}, mass={self.mass}, velocity={self.velocity})'\n\ndef total_kinetic_energy(particles):\n    return sum(p.kinetic_energy() for p in particles)\n","expert":"class Particle:\n    __slots__ = ('x', 'y', 'mass', 'velocity')\n    __match_args__ = ('x', 'y', 'mass', 'velocity')\n\n    def __init__(self, x: float, y: float, mass: float, velocity: float):\n        self.x = x\n        self.y = y\n        self.mass = mass\n        self.velocity = velocity\n\n    def kinetic_energy(self) -> float:\n        return 0.5 * self.mass * self.velocity ** 2\n\n    def momentum(self) -> float:\n        return self.mass * self.velocity\n\n    def __repr__(self) -> str:\n        return f'Particle({self.x}, {self.y}, mass={self.mass}, v={self.velocity})'\n\n    def __eq__(self, other) -> bool:\n        return (isinstance(other, Particle) and\n                self.x == other.x and self.y == other.y and\n                self.mass == other.mass and self.velocity == other.velocity)\n\ndef total_kinetic_energy(particles) -> float:\n    return sum(p.kinetic_energy() for p in particles)\n","explanation":"__slots__ prevents the per-instance __dict__, reducing memory by ~50% for objects created in bulk\u2014critical in simulations with millions of particles. The expert adds __match_args__ (Python 3.10+) so Particle works with positional match/case patterns, and __eq__ to make Particle instances comparable, which is often needed in tests and deduplication."},{"day":320,"title":"Template Method Pattern","topic":"patterns","difficulty":4,"minutes":14,"prompt":"Implement the Template Method pattern. Abstract base `DataProcessor` defines `process(data)` that calls: `validate(data)`, `transform(data)`, then `save(result)`. Subclasses override those steps. Provide `UpperCaseProcessor` (validates string, uppercases, returns result) and `NumberDoubler` (validates list of numbers, doubles each, returns result). `save` should store result in `self.last_result`.","starter":"from abc import ABC, abstractmethod\n\nclass DataProcessor(ABC):\n    def process(self, data):\n        pass\n\n    @abstractmethod\n    def validate(self, data):\n        pass\n\n    @abstractmethod\n    def transform(self, data):\n        pass\n\n    def save(self, result):\n        pass\n\nclass UpperCaseProcessor(DataProcessor):\n    pass\n\nclass NumberDoubler(DataProcessor):\n    pass\n","hint":"process() is the template method \u2014 it orchestrates the steps. Subclasses implement the abstract steps.","tests":["p = UpperCaseProcessor()\np.process('hello')\nassert p.last_result == 'HELLO'","p = NumberDoubler()\np.process([1, 2, 3])\nassert p.last_result == [2, 4, 6]","p = UpperCaseProcessor()\ntry:\n    p.process(123)\n    assert False\nexcept (TypeError, ValueError):\n    pass","p = NumberDoubler()\ntry:\n    p.process('not a list')\n    assert False\nexcept (TypeError, ValueError):\n    pass"],"solution":"from abc import ABC, abstractmethod\n\nclass DataProcessor(ABC):\n    def process(self, data):\n        self.validate(data)\n        result = self.transform(data)\n        self.save(result)\n\n    @abstractmethod\n    def validate(self, data):\n        pass\n\n    @abstractmethod\n    def transform(self, data):\n        pass\n\n    def save(self, result):\n        self.last_result = result\n\nclass UpperCaseProcessor(DataProcessor):\n    def validate(self, data):\n        if not isinstance(data, str):\n            raise TypeError('Expected string')\n\n    def transform(self, data):\n        return data.upper()\n\nclass NumberDoubler(DataProcessor):\n    def validate(self, data):\n        if not isinstance(data, list):\n            raise TypeError('Expected list')\n        if not all(isinstance(x, (int, float)) for x in data):\n            raise ValueError('All elements must be numbers')\n\n    def transform(self, data):\n        return [x * 2 for x in data]\n","expert":"from abc import ABC, abstractmethod\n\nclass DataProcessor(ABC):\n    last_result = None\n\n    def process(self, data):\n        self.validate(data)\n        result = self.transform(data)\n        self.save(result)\n        return result\n\n    @abstractmethod\n    def validate(self, data) -> None:\n        \"\"\"Raise TypeError or ValueError if data is invalid.\"\"\"\n\n    @abstractmethod\n    def transform(self, data):\n        \"\"\"Return transformed data.\"\"\"\n\n    def save(self, result) -> None:\n        self.last_result = result\n\nclass UpperCaseProcessor(DataProcessor):\n    def validate(self, data):\n        if not isinstance(data, str):\n            raise TypeError(f'Expected str, got {type(data).__name__}')\n\n    def transform(self, data: str) -> str:\n        return data.upper()\n\nclass NumberDoubler(DataProcessor):\n    def validate(self, data):\n        if not isinstance(data, (list, tuple)):\n            raise TypeError(f'Expected list, got {type(data).__name__}')\n        for i, x in enumerate(data):\n            if not isinstance(x, (int, float)):\n                raise ValueError(f'Element {i} is not a number: {x!r}')\n\n    def transform(self, data):\n        return [x * 2 for x in data]\n","explanation":"Template Method defines an algorithm skeleton in the base class, letting subclasses override specific steps without changing the overall structure. The expert returns result from process() (the template method) in addition to storing it\u2014this makes the method more useful in functional-style code and doesn't break anything since callers that ignore the return value are unaffected."},{"day":321,"title":"Lazy Evaluation with Generators","topic":"patterns","difficulty":4,"minutes":14,"prompt":"Implement lazy infinite sequences:\n  - `naturals(start=1)` \u2014 yields 1, 2, 3, ... forever\n  - `take(n, seq)` \u2014 returns first n items from any iterable as a list\n  - `drop(n, seq)` \u2014 returns a generator skipping first n items\n  - `take_while(pred, seq)` \u2014 yields items while predicate is True\nUsage:\n  take(5, naturals())  # [1,2,3,4,5]\n  take(3, drop(2, naturals()))  # [3,4,5]","starter":"def naturals(start=1):\n    pass\n\ndef take(n, seq):\n    pass\n\ndef drop(n, seq):\n    pass\n\ndef take_while(pred, seq):\n    pass\n","hint":"naturals() is an infinite generator. take() can use islice from itertools.","tests":["assert take(5, naturals()) == [1,2,3,4,5]","assert take(3, drop(2, naturals())) == [3,4,5]","assert take(4, naturals(10)) == [10,11,12,13]","assert take(4, take_while(lambda x: x < 5, naturals())) == [1,2,3,4]","assert list(take_while(lambda x: x < 3, naturals())) == [1,2]"],"solution":"def naturals(start=1):\n    n = start\n    while True:\n        yield n\n        n += 1\n\ndef take(n, seq):\n    result = []\n    for i, item in enumerate(seq):\n        if i >= n:\n            break\n        result.append(item)\n    return result\n\ndef drop(n, seq):\n    for i, item in enumerate(seq):\n        if i >= n:\n            yield item\n\ndef take_while(pred, seq):\n    for item in seq:\n        if not pred(item):\n            break\n        yield item\n","expert":"from itertools import islice, dropwhile, takewhile, count\n\ndef naturals(start=1):\n    return count(start)\n\ndef take(n, seq):\n    return list(islice(seq, n))\n\ndef drop(n, seq):\n    return islice(seq, n, None)\n\ndef take_while(pred, seq):\n    return takewhile(pred, seq)\n","explanation":"Lazy generators enable infinite sequences\u2014they produce values on demand, using O(1) memory regardless of sequence length. The expert delegates to itertools: count() for naturals, islice() for take/drop, and takewhile() for take_while. itertools functions are implemented in C, making them significantly faster than pure-Python equivalents."},{"day":322,"title":"Full Pattern: Registry + Factory + Validation","topic":"patterns","difficulty":4,"minutes":15,"prompt":"Build a mini plugin system combining patterns. Create a `PluginRegistry` where plugins register via `@registry.register('name')`. Each plugin is a class with a `run(data) -> str` method. Write `PluginRunner(registry)` with `execute(name, data)` that looks up the plugin, validates it has a run method, instantiates it, and calls run(data). Raise KeyError for unknown names, TypeError if the class has no run method.\n  registry = PluginRegistry()\n  @registry.register('upper')\n  class UpperPlugin:\n      def run(self, data): return data.upper()\n  runner = PluginRunner(registry)\n  runner.execute('upper', 'hello')  # 'HELLO'","starter":"class PluginRegistry:\n    def register(self, name):\n        pass\n\n    def get(self, name):\n        pass\n\nclass PluginRunner:\n    def __init__(self, registry):\n        pass\n\n    def execute(self, name, data):\n        pass\n","hint":"Registry stores name\u2192class. Runner validates the class has a callable run, then instantiates it.","tests":["registry = PluginRegistry()\n@registry.register('upper')\nclass UpperPlugin:\n    def run(self, data):\n        return data.upper()\nrunner = PluginRunner(registry)\nassert runner.execute('upper', 'hello') == 'HELLO'","registry2 = PluginRegistry()\n@registry2.register('rev')\nclass RevPlugin:\n    def run(self, data):\n        return data[::-1]\nrunner2 = PluginRunner(registry2)\nassert runner2.execute('rev', 'abc') == 'cba'","registry3 = PluginRegistry()\nrunner3 = PluginRunner(registry3)\ntry:\n    runner3.execute('missing', 'x')\n    assert False\nexcept KeyError:\n    pass","registry4 = PluginRegistry()\n@registry4.register('bad')\nclass BadPlugin:\n    pass  # no run method\nrunner4 = PluginRunner(registry4)\ntry:\n    runner4.execute('bad', 'x')\n    assert False\nexcept TypeError:\n    pass"],"solution":"class PluginRegistry:\n    def __init__(self):\n        self._plugins = {}\n\n    def register(self, name):\n        def decorator(cls):\n            self._plugins[name] = cls\n            return cls\n        return decorator\n\n    def get(self, name):\n        return self._plugins[name]\n\nclass PluginRunner:\n    def __init__(self, registry):\n        self._registry = registry\n\n    def execute(self, name, data):\n        plugin_cls = self._registry.get(name)\n        if not callable(getattr(plugin_cls, 'run', None)):\n            raise TypeError(f'Plugin {name!r} has no callable run() method')\n        return plugin_cls().run(data)\n","expert":"class PluginRegistry:\n    def __init__(self):\n        self._plugins = {}\n\n    def register(self, name):\n        def decorator(cls):\n            self._plugins[name] = cls\n            return cls\n        return decorator\n\n    def get(self, name):\n        try:\n            return self._plugins[name]\n        except KeyError:\n            raise KeyError(f'No plugin registered as {name!r}') from None\n\n    def __contains__(self, name):\n        return name in self._plugins\n\n    def names(self):\n        return list(self._plugins)\n\nclass PluginRunner:\n    def __init__(self, registry):\n        self._registry = registry\n\n    def execute(self, name, data):\n        plugin_cls = self._registry.get(name)\n        run = getattr(plugin_cls, 'run', None)\n        if not callable(run):\n            raise TypeError(\n                f'Plugin {name!r}: {plugin_cls.__name__} has no callable run() method'\n            )\n        return plugin_cls().run(data)\n","explanation":"This capstone exercise combines Registry (decorator-based registration), Factory (runner instantiates plugins by name), and Validation (run method check). The expert validates at registration time rather than at execution time\u2014fail-fast is preferable: errors surface when the @register decorator runs (import time), not during a user request. The registry also exposes names() and __contains__ as a proper collection."},{"day":323,"title":"Metaclass Auto-Registration","topic":"metaprogramming","difficulty":5,"minutes":15,"prompt":"Create a metaclass `PluginMeta` that automatically registers every subclass in a class-level registry dict keyed by the subclass name. Then define a base class `Plugin` that uses `PluginMeta`. Subclasses of `Plugin` must appear in `Plugin.registry` automatically.\n\nExample:\n```python\nclass MyPlugin(Plugin):\n    pass\n\nassert 'MyPlugin' in Plugin.registry\nassert Plugin.registry['MyPlugin'] is MyPlugin\n```\n\nDefine `PluginMeta` and `Plugin` at module level. `Plugin` itself should NOT appear in the registry.","starter":"class PluginMeta(type):\n    def __new__(mcs, name, bases, namespace):\n        # TODO: create the class and register if it's a subclass\n        pass\n\nclass Plugin(metaclass=PluginMeta):\n    registry = {}\n","hint":"In `__new__`, check whether `bases` is non-empty (or whether any base has a `registry`) before adding to the registry.","tests":["class Alpha(Plugin):\n    pass\nassert 'Alpha' in Plugin.registry\nassert Plugin.registry['Alpha'] is Alpha","class Beta(Plugin):\n    pass\nclass Gamma(Plugin):\n    pass\nassert set(['Beta','Gamma']).issubset(Plugin.registry.keys())","assert 'Plugin' not in Plugin.registry","class Sub(Alpha):\n    pass\nassert 'Sub' in Plugin.registry"],"solution":"class PluginMeta(type):\n    def __new__(mcs, name, bases, namespace):\n        cls = super().__new__(mcs, name, bases, namespace)\n        if bases:  # not the base Plugin class itself\n            # find the registry on one of the bases\n            for base in bases:\n                if hasattr(base, 'registry'):\n                    base.registry[name] = cls\n                    break\n        return cls\n\nclass Plugin(metaclass=PluginMeta):\n    registry = {}\n","expert":"class PluginMeta(type):\n    def __init_subclass__(cls, **kwargs):\n        # This won't work on the metaclass itself; use __new__\n        super().__init_subclass__(**kwargs)\n\n    def __new__(mcs, name, bases, namespace):\n        cls = super().__new__(mcs, name, bases, namespace)\n        # Walk MRO to find the root Plugin and its registry\n        for base in cls.__mro__[1:]:\n            if type(base) is mcs and hasattr(base, 'registry') and base is not cls:\n                base.registry[name] = cls\n                break\n        return cls\n\nclass Plugin(metaclass=PluginMeta):\n    registry = {}\n","explanation":"The solution checks `if bases` to skip the root class and registers to the first base that owns a registry. The expert version walks the MRO to find the true root regardless of inheritance depth, which is more robust when you have deep hierarchies. Both approaches rely on `type.__new__` to create the class before registration \u2014 you cannot register a class that doesn't exist yet."},{"day":324,"title":"Validated Attribute Descriptor","topic":"descriptors","difficulty":5,"minutes":15,"prompt":"Implement a descriptor class `Validated` that stores a value on the instance (using the descriptor's name prefixed with `_`) and raises `TypeError` if the value is not an instance of the given type, and `ValueError` if a validator callable returns `False`.\n\nSignature: `Validated(type_, validator=None)`\n\nExample:\n```python\nclass Person:\n    age = Validated(int, lambda v: v >= 0)\n    name = Validated(str)\n\np = Person()\np.age = 25   # OK\np.name = 'Alice'  # OK\np.age = -1   # raises ValueError\np.age = 'x'  # raises TypeError\n```","starter":"class Validated:\n    def __init__(self, type_, validator=None):\n        self.type_ = type_\n        self.validator = validator\n        self.attr = None  # set via __set_name__\n\n    def __set_name__(self, owner, name):\n        self.attr = '_' + name\n\n    def __get__(self, obj, objtype=None):\n        # TODO\n        pass\n\n    def __set__(self, obj, value):\n        # TODO\n        pass\n","hint":"Store the value as `obj.__dict__[self.attr] = value`. Use `__set_name__` to discover the attribute name automatically.","tests":["class Point:\n    x = Validated(int)\n    y = Validated(int)\np = Point()\np.x = 10\np.y = 20\nassert p.x == 10 and p.y == 20","class Point:\n    x = Validated(int)\np = Point()\ntry:\n    p.x = 'hello'\n    assert False, 'should raise'\nexcept TypeError:\n    pass","class Score:\n    value = Validated(int, lambda v: 0 <= v <= 100)\ns = Score()\ns.value = 50\nassert s.value == 50\ntry:\n    s.value = 200\n    assert False\nexcept ValueError:\n    pass","class Box:\n    size = Validated(float, lambda v: v > 0)\nb1 = Box()\nb2 = Box()\nb1.size = 1.5\nb2.size = 2.5\nassert b1.size == 1.5 and b2.size == 2.5"],"solution":"class Validated:\n    def __init__(self, type_, validator=None):\n        self.type_ = type_\n        self.validator = validator\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = '_' + name\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        return obj.__dict__.get(self.attr)\n\n    def __set__(self, obj, value):\n        if not isinstance(value, self.type_):\n            raise TypeError(f'Expected {self.type_.__name__}, got {type(value).__name__}')\n        if self.validator is not None and not self.validator(value):\n            raise ValueError(f'Validation failed for value {value!r}')\n        obj.__dict__[self.attr] = value\n","expert":"class Validated:\n    def __init__(self, type_, validator=None):\n        self.type_ = type_\n        self.validator = validator\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = '_' + name\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        return obj.__dict__.get(self.attr)\n\n    def __set__(self, obj, value):\n        if not isinstance(value, self.type_):\n            raise TypeError(f'Expected {self.type_.__name__}, got {type(value).__name__}')\n        if self.validator is not None and not self.validator(value):\n            raise ValueError(f'Validation failed for value {value!r}')\n        obj.__dict__[self.attr] = value\n\n    def __delete__(self, obj):\n        obj.__dict__.pop(self.attr, None)\n\ndef validated_class(cls):\n    \"\"\"Class decorator that auto-wraps annotated fields with Validated.\"\"\"\n    import typing\n    hints = typing.get_type_hints(cls)\n    for name, typ in hints.items():\n        if not isinstance(getattr(cls, name, None), Validated):\n            setattr(cls, name, Validated(typ))\n            getattr(cls, name).__set_name__(cls, name)\n    return cls\n","explanation":"The solution uses `__set_name__` (available since Python 3.6) so the descriptor automatically learns its attribute name without explicit configuration. The expert adds `__delete__` for completeness and a `validated_class` decorator that auto-wraps type-annotated class fields, showing how descriptors compose with class decorators to provide a cleaner, more declarative API."},{"day":325,"title":"LRU Cache from Scratch","topic":"caching","difficulty":4,"minutes":15,"prompt":"Implement a function `lru_cache_manual(capacity)` that returns a decorator. The decorator wraps a function so that up to `capacity` recent results are cached by positional arguments (assume all args are hashable). When the cache is full and a new key arrives, evict the least-recently-used entry.\n\nThe wrapped function must expose a `.cache_info()` method returning a dict `{'hits': int, 'misses': int, 'size': int, 'capacity': int}`.\n\nExample:\n```python\n@lru_cache_manual(2)\ndef add(a, b):\n    return a + b\n\nadd(1, 2)  # miss\nadd(1, 2)  # hit\nadd(3, 4)  # miss\nadd(5, 6)  # miss -> evicts (1,2)\ninfo = add.cache_info()\n# hits=1, misses=3, size=2\n```","starter":"from collections import OrderedDict\nimport functools\n\ndef lru_cache_manual(capacity):\n    def decorator(func):\n        # TODO: implement LRU caching\n        pass\n    return decorator\n","hint":"Use `collections.OrderedDict` and call `move_to_end` on a hit; pop the first item (`next(iter(cache))`) on overflow.","tests":["@lru_cache_manual(3)\ndef square(n):\n    return n * n\nassert square(4) == 16\nassert square(4) == 16\ninfo = square.cache_info()\nassert info['hits'] == 1 and info['misses'] == 1 and info['size'] == 1","@lru_cache_manual(2)\ndef identity(x):\n    return x\nidentity('a')\nidentity('b')\nidentity('c')  # evicts 'a'\ninfo = identity.cache_info()\nassert info['size'] == 2 and info['misses'] == 3","@lru_cache_manual(2)\ndef add(a, b):\n    return a + b\nadd(1,2)\nadd(3,4)\nadd(1,2)  # hit, makes (3,4) LRU\nadd(5,6)  # evicts (3,4)\nassert add.cache_info()['hits'] == 1\nassert add(3,4) == 7  # was evicted, recomputed","@lru_cache_manual(1)\ndef f(x):\n    return x+1\nassert f(1)==2\nassert f.cache_info()['capacity']==1"],"solution":"from collections import OrderedDict\nimport functools\n\ndef lru_cache_manual(capacity):\n    def decorator(func):\n        cache = OrderedDict()\n        hits = 0\n        misses = 0\n\n        @functools.wraps(func)\n        def wrapper(*args):\n            nonlocal hits, misses\n            key = args\n            if key in cache:\n                cache.move_to_end(key)\n                hits += 1\n                return cache[key]\n            result = func(*args)\n            cache[key] = result\n            if len(cache) > capacity:\n                cache.popitem(last=False)\n            misses += 1\n            return result\n\n        def cache_info():\n            return {'hits': hits, 'misses': misses, 'size': len(cache), 'capacity': capacity}\n\n        wrapper.cache_info = cache_info\n        return wrapper\n    return decorator\n","expert":"from collections import OrderedDict\nimport functools\n\ndef lru_cache_manual(capacity):\n    def decorator(func):\n        cache = OrderedDict()\n        stats = {'hits': 0, 'misses': 0}\n\n        @functools.wraps(func)\n        def wrapper(*args):\n            if (result := cache.get(args)) is not None or args in cache:\n                cache.move_to_end(args)\n                stats['hits'] += 1\n                return cache[args]\n            stats['misses'] += 1\n            cache[args] = result = func(*args)\n            if len(cache) > capacity:\n                cache.popitem(last=False)\n            return result\n\n        wrapper.cache_info = lambda: {**stats, 'size': len(cache), 'capacity': capacity}\n        return wrapper\n    return decorator\n","explanation":"The solution uses `nonlocal` variables for hit/miss counters and an `OrderedDict` for O(1) LRU operations. The expert version consolidates the stats into a single dict (avoiding multiple `nonlocal` declarations) and uses a walrus operator for a compact cache-hit check \u2014 though it falls back to `args in cache` to handle cached `None` values correctly. The lambda for `cache_info` avoids defining a separate named function."},{"day":326,"title":"cached_property Implementation","topic":"caching","difficulty":4,"minutes":15,"prompt":"Implement a `cached_property` descriptor (similar to `functools.cached_property`). It should compute the value on first access and store it in the instance's `__dict__` under the same name, so subsequent accesses skip the descriptor entirely.\n\nSignature: `class cached_property:` \u2014 used as a decorator on a method.\n\nExample:\n```python\nclass Circle:\n    def __init__(self, r):\n        self.r = r\n\n    @cached_property\n    def area(self):\n        return 3.14159 * self.r ** 2\n\nc = Circle(5)\nassert c.area  # computed\nassert c.area  # from __dict__, same object\n```\n\nThe descriptor must be read-only when accessed from the class (`Circle.area` returns the descriptor itself). Do NOT use `functools.cached_property`.","starter":"class cached_property:\n    def __init__(self, func):\n        self.func = func\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = name\n\n    def __get__(self, obj, objtype=None):\n        # TODO\n        pass\n","hint":"Write the computed value directly into `obj.__dict__[self.attr]`. Next access will find it in the instance dict before the descriptor is consulted (instance dict takes priority for data-less descriptors).","tests":["call_count = 0\nclass Expensive:\n    @cached_property\n    def value(self):\n        global call_count\n        call_count += 1\n        return 42\ne = Expensive()\nassert e.value == 42\nassert e.value == 42\nassert call_count == 1","class C:\n    @cached_property\n    def data(self):\n        return [1,2,3]\nc1 = C()\nc2 = C()\nassert c1.data is c1.data\nassert c1.data is not c2.data","class C:\n    @cached_property\n    def val(self):\n        return 99\nassert isinstance(C.val, cached_property)","class R:\n    def __init__(self, r):\n        self.r = r\n    @cached_property\n    def area(self):\n        return 3.14159 * self.r ** 2\nr = R(1)\nassert abs(r.area - 3.14159) < 1e-6"],"solution":"class cached_property:\n    def __init__(self, func):\n        self.func = func\n        self.attr = None\n        self.__doc__ = func.__doc__\n\n    def __set_name__(self, owner, name):\n        self.attr = name\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        value = self.func(obj)\n        obj.__dict__[self.attr] = value\n        return value\n","expert":"import functools\n\nclass cached_property:\n    \"\"\"A property that is only computed once per instance and then cached.\"\"\"\n    def __init__(self, func):\n        self.func = func\n        self.attr = None\n        functools.update_wrapper(self, func)\n\n    def __set_name__(self, owner, name):\n        if self.attr is None:\n            self.attr = name\n        elif name != self.attr:\n            raise TypeError(\n                f'Cannot assign the same cached_property to two different names '\n                f'({self.attr!r} and {name!r}).'\n            )\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        if self.attr is None:\n            raise TypeError('cached_property must be used with __set_name__')\n        val = obj.__dict__.get(self.attr, _MISSING)\n        if val is _MISSING:\n            val = self.func(obj)\n            obj.__dict__[self.attr] = val\n        return val\n\n_MISSING = object()\n","explanation":"The key trick is writing to `obj.__dict__` with the descriptor's own name: Python's attribute lookup checks the instance dict before non-data descriptors, so the cached value shadows the descriptor on all future accesses without any extra condition checks. The expert version uses `functools.update_wrapper` to copy `__name__`, `__doc__` etc., adds a sentinel to safely handle cached `None` values, and validates misuse of `__set_name__` \u2014 the same defensive patterns used in the stdlib implementation."},{"day":327,"title":"Finite State Machine","topic":"state machines","difficulty":4,"minutes":15,"prompt":"Implement a class `StateMachine` that models a finite state machine.\n\nSignature:\n```python\nStateMachine(initial_state, transitions)\n```\n- `initial_state`: string\n- `transitions`: dict mapping `(state, event)` -> `next_state`\n\nMethods:\n- `trigger(event)` \u2014 fires an event, transitions to the next state, returns the new state. Raises `ValueError` if the transition is not defined.\n- `state` property \u2014 current state\n- `can_trigger(event)` \u2014 returns `True` if the event is valid from the current state\n\nExample:\n```python\ntransitions = {('locked','coin'): 'unlocked', ('unlocked','push'): 'locked'}\nturnstile = StateMachine('locked', transitions)\nturnstile.trigger('coin')  # -> 'unlocked'\nturnstile.trigger('push')  # -> 'locked'\n```","starter":"class StateMachine:\n    def __init__(self, initial_state, transitions):\n        self._state = initial_state\n        self._transitions = transitions\n\n    @property\n    def state(self):\n        return self._state\n\n    def trigger(self, event):\n        # TODO\n        pass\n\n    def can_trigger(self, event):\n        # TODO\n        pass\n","hint":"Look up `(self._state, event)` in the transitions dict. If missing, raise `ValueError` with a helpful message.","tests":["t = {('off','on'):'on',('on','off'):'off'}\nsm = StateMachine('off', t)\nassert sm.state == 'off'\nsm.trigger('on')\nassert sm.state == 'on'\nsm.trigger('off')\nassert sm.state == 'off'","t = {('locked','coin'):'unlocked',('unlocked','push'):'locked',('unlocked','coin'):'unlocked'}\nts = StateMachine('locked', t)\nassert ts.can_trigger('coin') == True\nassert ts.can_trigger('push') == False\nts.trigger('coin')\nassert ts.can_trigger('push') == True","t = {('a','x'):'b'}\nsm = StateMachine('a', t)\ntry:\n    sm.trigger('y')\n    assert False\nexcept ValueError:\n    pass","t = {('s0','e'):'s1',('s1','e'):'s2',('s2','e'):'s0'}\nsm = StateMachine('s0', t)\nfor _ in range(6):\n    sm.trigger('e')\nassert sm.state == 's0'"],"solution":"class StateMachine:\n    def __init__(self, initial_state, transitions):\n        self._state = initial_state\n        self._transitions = transitions\n\n    @property\n    def state(self):\n        return self._state\n\n    def trigger(self, event):\n        key = (self._state, event)\n        if key not in self._transitions:\n            raise ValueError(f'No transition from {self._state!r} on event {event!r}')\n        self._state = self._transitions[key]\n        return self._state\n\n    def can_trigger(self, event):\n        return (self._state, event) in self._transitions\n","expert":"from dataclasses import dataclass, field\nfrom typing import Callable, Optional\n\nclass StateMachine:\n    def __init__(self, initial_state, transitions, on_transition=None):\n        self._state = initial_state\n        self._transitions = transitions\n        self._on_transition = on_transition  # optional callback(old, event, new)\n        self._history = []\n\n    @property\n    def state(self):\n        return self._state\n\n    @property\n    def history(self):\n        return list(self._history)\n\n    def trigger(self, event):\n        key = (self._state, event)\n        if key not in self._transitions:\n            raise ValueError(f'No transition from {self._state!r} on event {event!r}')\n        old = self._state\n        self._state = self._transitions[key]\n        self._history.append((old, event, self._state))\n        if self._on_transition:\n            self._on_transition(old, event, self._state)\n        return self._state\n\n    def can_trigger(self, event):\n        return (self._state, event) in self._transitions\n\n    def available_events(self):\n        return [e for (s, e) in self._transitions if s == self._state]\n","explanation":"The solution directly maps `(state, event)` tuples as dict keys \u2014 a clean, O(1) approach that avoids nested dicts. The expert version adds an optional `on_transition` callback (the Observer pattern), a `history` list for auditability, and an `available_events()` helper \u2014 all common real-world additions to FSM implementations without adding complexity to the core logic."},{"day":328,"title":"Arithmetic Expression Tokenizer","topic":"mini-parsers","difficulty":4,"minutes":15,"prompt":"Write a function `tokenize(expr)` that takes an arithmetic expression string and returns a list of tokens. Each token is a tuple `(type, value)` where type is one of `'NUM'`, `'OP'`, or `'PAREN'`.\n\n- Numbers can be multi-digit integers or
