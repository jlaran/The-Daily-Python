 + 1\n  def double(f): return lambda *a,**k: f(*a,**k) * 2\n  combined = compose_decorators(add1, double)\n  @combined\n  def val(): return 3\n  val() == 8  # double(3+1)? No: add1 wraps double(f), so add1(double(val))() = double(val)()+1 = 6+1=7","starter":"from functools import wraps, reduce\n\ndef compose_decorators(*decorators):\n    # your code here\n    pass","hint":"Use functools.reduce to apply decorators right-to-left: the last decorator is applied first (closest to the function).","tests":["from functools import wraps, reduce\ndef add1(f):\n    def w(*a, **k): return f(*a, **k) + 1\n    return w\ndef double(f):\n    def w(*a, **k): return f(*a, **k) * 2\n    return w\ncombined = compose_decorators(add1, double)\n@combined\ndef val(): return 3\nassert val() == 7","from functools import wraps, reduce\ndef add1(f):\n    def w(*a, **k): return f(*a, **k) + 1\n    return w\ncombined = compose_decorators(add1)\n@combined\ndef val(): return 10\nassert val() == 11","from functools import wraps, reduce\ncombined = compose_decorators()\n@combined\ndef val(): return 42\nassert val() == 42"],"solution":"from functools import wraps, reduce\n\ndef compose_decorators(*decorators):\n    def combined(func):\n        for dec in reversed(decorators):\n            func = dec(func)\n        return func\n    return combined","expert":"from functools import wraps, reduce\n\ndef compose_decorators(*decorators):\n    if not decorators:\n        return lambda f: f\n    return reduce(lambda f, g: lambda func: f(g(func)), decorators)","explanation":"Decorators applied in `@d1 @d2 def f` order means d1 is the outermost wrapper, equivalent to `d1(d2(f))`. The loop version reverses the list and applies each decorator to accumulate layers. The expert uses `reduce` to compose the decorator functions themselves: `reduce(lambda f,g: lambda func: f(g(func)), [add1, double])` produces `lambda func: add1(double(func))`. This is the functional-composition pattern \u2014 reducing a list of functions into a single composed function."},{"day":230,"title":"Generator-based Context Manager","topic":"generators & yield","difficulty":3,"minutes":12,"prompt":"Write a generator-based context manager `managed_list()` using `contextlib.contextmanager`. It should yield an empty list, and after the `with` block, append the string 'done' to that list.\n\nExamples:\n  with managed_list() as lst:\n      lst.append(1)\n      lst.append(2)\n  lst == [1, 2, 'done']","starter":"from contextlib import contextmanager\n\n@contextmanager\ndef managed_list():\n    # your code here\n    pass","hint":"Create the list before yield, yield it, then append 'done' after the yield in a try/finally.","tests":["from contextlib import contextmanager\nwith managed_list() as lst:\n    lst.append(1)\n    lst.append(2)\nassert lst == [1, 2, 'done']","from contextlib import contextmanager\nwith managed_list() as lst:\n    pass\nassert lst == ['done']","from contextlib import contextmanager\nwith managed_list() as lst:\n    for i in range(3):\n        lst.append(i)\nassert lst[-1] == 'done'\nassert len(lst) == 4"],"solution":"from contextlib import contextmanager\n\n@contextmanager\ndef managed_list():\n    lst = []\n    yield lst\n    lst.append('done')","expert":"from contextlib import contextmanager\n\n@contextmanager\ndef managed_list():\n    lst = []\n    try:\n        yield lst\n    finally:\n        lst.append('done')","explanation":"`@contextmanager` turns a generator function into a context manager: everything before `yield` is `__enter__`, the yielded value is bound to the `as` target, and everything after `yield` is `__exit__`. The expert wraps the yield in `try/finally` so that cleanup ('done') runs even if an exception is raised inside the `with` block \u2014 matching the behaviour of a properly implemented `__exit__`. This is the correct, production-safe pattern for generator-based context managers."},{"day":231,"title":"Recursive Sum of Digits","topic":"recursion","difficulty":3,"minutes":12,"prompt":"Write a recursive function `digit_sum(n: int) -> int` that returns the sum of digits of a non-negative integer.\n\nExamples:\n- digit_sum(123) == 6\n- digit_sum(9999) == 36\n- digit_sum(0) == 0","starter":"def digit_sum(n: int) -> int:\n    # your code here\n    pass","hint":"Base case: n < 10. Recursive case: add last digit (n % 10) to digit_sum(n // 10).","tests":["assert digit_sum(0) == 0","assert digit_sum(5) == 5","assert digit_sum(123) == 6","assert digit_sum(9999) == 36","assert digit_sum(100) == 1"],"solution":"def digit_sum(n: int) -> int:\n    if n < 10:\n        return n\n    return n % 10 + digit_sum(n // 10)","expert":"def digit_sum(n: int) -> int:\n    return sum(int(d) for d in str(n))","explanation":"The recursive solution uses the classic base-case/recursive-case pattern: when n is a single digit return it, otherwise strip and sum the last digit then recurse on the rest. The expert version leverages Python's built-in string conversion and a generator expression \u2014 more readable and avoids stack overhead for large numbers."},{"day":232,"title":"Flatten Nested List","topic":"recursion","difficulty":3,"minutes":12,"prompt":"Write a recursive function `flatten(lst: list) -> list` that takes an arbitrarily nested list of integers and returns a flat list of all integers in order.\n\nExamples:\n- flatten([1, [2, 3], [4, [5, 6]]]) == [1, 2, 3, 4, 5, 6]\n- flatten([]) == []\n- flatten([[1], [[2]]]) == [1, 2]","starter":"def flatten(lst: list) -> list:\n    # your code here\n    pass","hint":"For each element, check isinstance(elem, list). If so, recurse; otherwise append to result.","tests":["assert flatten([]) == []","assert flatten([1, 2, 3]) == [1, 2, 3]","assert flatten([1, [2, 3], [4, [5, 6]]]) == [1, 2, 3, 4, 5, 6]","assert flatten([[1], [[2]]]) == [1, 2]","assert flatten([[[3]]]) == [3]"],"solution":"def flatten(lst: list) -> list:\n    result = []\n    for elem in lst:\n        if isinstance(elem, list):\n            result.extend(flatten(elem))\n        else:\n            result.append(elem)\n    return result","expert":"def flatten(lst: list) -> list:\n    return [x for elem in lst for x in (flatten(elem) if isinstance(elem, list) else [elem])]","explanation":"The standard solution iterates elements, recursing into lists and collecting scalars. The expert version condenses this into a single list comprehension using a conditional inline expansion \u2014 same logic but more Pythonic and eliminates the mutable accumulator variable."},{"day":233,"title":"Fast Recursive Power","topic":"recursion","difficulty":3,"minutes":12,"prompt":"Write a function `fast_pow(base: int, exp: int) -> int` that computes base^exp using fast exponentiation (exponentiation by squaring). exp >= 0.\n\nExpected O(log exp) time.\n\nExamples:\n- fast_pow(2, 10) == 1024\n- fast_pow(3, 0) == 1\n- fast_pow(5, 3) == 125","starter":"def fast_pow(base: int, exp: int) -> int:\n    # your code here\n    pass","hint":"If exp is even, fast_pow(base, exp) = fast_pow(base*base, exp//2). If odd, multiply by base once.","tests":["assert fast_pow(2, 0) == 1","assert fast_pow(2, 10) == 1024","assert fast_pow(3, 3) == 27","assert fast_pow(5, 1) == 5","assert fast_pow(7, 4) == 2401"],"solution":"def fast_pow(base: int, exp: int) -> int:\n    if exp == 0:\n        return 1\n    if exp % 2 == 0:\n        half = fast_pow(base, exp // 2)\n        return half * half\n    return base * fast_pow(base, exp - 1)","expert":"def fast_pow(base: int, exp: int) -> int:\n    if exp == 0:\n        return 1\n    half = fast_pow(base, exp >> 1)\n    return half * half if exp % 2 == 0 else half * half * base","explanation":"The normal solution halves the exponent on even steps, achieving O(log n) recursions. The expert version computes the half-result once and uses a ternary expression, avoiding the redundant recursive call in the odd branch. Using `exp >> 1` (bitshift) instead of `exp // 2` is a common micro-optimisation for integer division by 2."},{"day":234,"title":"Memoized Fibonacci","topic":"recursion","difficulty":3,"minutes":12,"prompt":"Write a function `fib(n: int) -> int` that returns the nth Fibonacci number (0-indexed: fib(0)=0, fib(1)=1) using memoization so repeated subproblems are solved only once. Must handle n up to at least 50.\n\nExamples:\n- fib(0) == 0\n- fib(7) == 13\n- fib(10) == 55","starter":"def fib(n: int) -> int:\n    # your code here\n    pass","hint":"Use a dict to cache results before recursing, or use functools.lru_cache.","tests":["assert fib(0) == 0","assert fib(1) == 1","assert fib(7) == 13","assert fib(10) == 55","assert fib(20) == 6765"],"solution":"def fib(n: int) -> int:\n    memo = {}\n    def _fib(k):\n        if k <= 1:\n            return k\n        if k not in memo:\n            memo[k] = _fib(k-1) + _fib(k-2)\n        return memo[k]\n    return _fib(n)","expert":"from functools import lru_cache\n\n@lru_cache(maxsize=None)\ndef fib(n: int) -> int:\n    if n <= 1:\n        return n\n    return fib(n-1) + fib(n-2)","explanation":"The standard solution uses an explicit dict cache (memo) to avoid recomputing subproblems, bringing time complexity from O(2^n) to O(n). The expert version applies `@lru_cache`, which is the idiomatic Python tool for memoization \u2014 the decorator handles cache lookup/storage transparently, keeping the function body clean and readable."},{"day":235,"title":"Coin Change (Min Coins)","topic":"recursion","difficulty":4,"minutes":12,"prompt":"Write a function `min_coins(amount: int, coins: list[int]) -> int` that returns the minimum number of coins needed to make up the amount. Return -1 if it is impossible.\n\nExamples:\n- min_coins(11, [1, 5, 6, 9]) == 2\n- min_coins(3, [2]) == -1\n- min_coins(0, [1, 5]) == 0","starter":"def min_coins(amount: int, coins: list[int]) -> int:\n    # your code here\n    pass","hint":"Use top-down DP with memoization. For each amount, try all coins and pick min(1 + min_coins(amount - coin)).","tests":["assert min_coins(0, [1, 5]) == 0","assert min_coins(3, [2]) == -1","assert min_coins(11, [1, 5, 6, 9]) == 2","assert min_coins(6, [1, 3, 4]) == 2","assert min_coins(7, [2, 4]) == -1"],"solution":"def min_coins(amount: int, coins: list[int]) -> int:\n    from functools import lru_cache\n    @lru_cache(maxsize=None)\n    def dp(rem):\n        if rem == 0:\n            return 0\n        if rem < 0:\n            return float('inf')\n        return min((1 + dp(rem - c) for c in coins), default=float('inf'))\n    result = dp(amount)\n    return result if result != float('inf') else -1","expert":"def min_coins(amount: int, coins: list[int]) -> int:\n    INF = float('inf')\n    dp = [0] + [INF] * amount\n    for a in range(1, amount + 1):\n        dp[a] = min((dp[a - c] for c in coins if c <= a), default=INF)\n        if dp[a] != INF:\n            dp[a] += 1\n    return dp[amount] if dp[amount] != INF else -1","explanation":"The memoized recursive solution is intuitive \u2014 try all coins from each remainder and cache results to avoid re-computation, giving O(amount * len(coins)) time. The expert version uses bottom-up dynamic programming with an array, which avoids Python's recursion overhead and call stack entirely, typically faster in practice and more memory-predictable."},{"day":236,"title":"Binary Search","topic":"binary search & variants","difficulty":3,"minutes":12,"prompt":"Implement `binary_search(items: list[int], target: int) -> int` that returns the index of target in the sorted list, or -1 if not found. Use iterative binary search \u2014 O(log n).\n\nExamples:\n- binary_search([1, 3, 5, 7, 9], 5) == 2\n- binary_search([1, 3, 5], 4) == -1","starter":"def binary_search(items: list[int], target: int) -> int:\n    # your code here\n    pass","hint":"Maintain lo and hi pointers. Check the midpoint each step, narrow the range.","tests":["assert binary_search([], 1) == -1","assert binary_search([1, 3, 5, 7, 9], 5) == 2","assert binary_search([1, 3, 5, 7, 9], 1) == 0","assert binary_search([1, 3, 5, 7, 9], 9) == 4","assert binary_search([1, 3, 5], 4) == -1"],"solution":"def binary_search(items: list[int], target: int) -> int:\n    lo, hi = 0, len(items) - 1\n    while lo <= hi:\n        mid = (lo + hi) // 2\n        if items[mid] == target:\n            return mid\n        elif items[mid] < target:\n            lo = mid + 1\n        else:\n            hi = mid - 1\n    return -1","expert":"import bisect\n\ndef binary_search(items: list[int], target: int) -> int:\n    idx = bisect.bisect_left(items, target)\n    return idx if idx < len(items) and items[idx] == target else -1","explanation":"The hand-written solution implements the classic lo/hi loop, narrowing the search range by half each iteration for O(log n) time. The expert version delegates to `bisect.bisect_left` from the standard library \u2014 it finds the leftmost insertion point in O(log n) and is implemented in C, so it is faster and less error-prone than reimplementing the loop."},{"day":237,"title":"First and Last Occurrence","topic":"binary search & variants","difficulty":3,"minutes":12,"prompt":"Write a function `find_range(nums: list[int], target: int) -> tuple[int, int]` that returns (first_index, last_index) of target in the sorted list. Return (-1, -1) if not found. Must run in O(log n).\n\nExamples:\n- find_range([1, 2, 2, 2, 3], 2) == (1, 3)\n- find_range([1, 2, 3], 4) == (-1, -1)","starter":"def find_range(nums: list[int], target: int) -> tuple[int, int]:\n    # your code here\n    pass","hint":"Run two binary searches: one biased toward the left boundary, one toward the right.","tests":["assert find_range([], 1) == (-1, -1)","assert find_range([1, 2, 2, 2, 3], 2) == (1, 3)","assert find_range([1, 2, 3], 4) == (-1, -1)","assert find_range([5, 5, 5], 5) == (0, 2)","assert find_range([1, 2, 3], 2) == (1, 1)"],"solution":"def find_range(nums: list[int], target: int) -> tuple[int, int]:\n    def first(lo, hi):\n        res = -1\n        while lo <= hi:\n            mid = (lo + hi) // 2\n            if nums[mid] == target:\n                res = mid\n                hi = mid - 1\n            elif nums[mid] < target:\n                lo = mid + 1\n            else:\n                hi = mid - 1\n        return res\n    def last(lo, hi):\n        res = -1\n        while lo <= hi:\n            mid = (lo + hi) // 2\n            if nums[mid] == target:\n                res = mid\n                lo = mid + 1\n            elif nums[mid] < target:\n                lo = mid + 1\n            else:\n                hi = mid - 1\n        return res\n    if not nums:\n        return (-1, -1)\n    f = first(0, len(nums)-1)\n    if f == -1:\n        return (-1, -1)\n    return (f, last(0, len(nums)-1))","expert":"import bisect\n\ndef find_range(nums: list[int], target: int) -> tuple[int, int]:\n    lo = bisect.bisect_left(nums, target)\n    if lo >= len(nums) or nums[lo] != target:\n        return (-1, -1)\n    hi = bisect.bisect_right(nums, target) - 1\n    return (lo, hi)","explanation":"The manual solution runs two separate binary searches with different tie-breaking rules to locate left and right boundaries. The expert version uses `bisect_left` and `bisect_right` \u2014 the two boundary-finding primitives already built into Python's `bisect` module \u2014 making the intent instantly clear and reducing the code to three lines."},{"day":238,"title":"Square Root (Integer)","topic":"binary search & variants","difficulty":3,"minutes":12,"prompt":"Write a function `isqrt(n: int) -> int` that returns the integer square root of n (floor of sqrt(n)) without using math.sqrt or the ** 0.5 operator. Use binary search. n >= 0.\n\nExamples:\n- isqrt(0) == 0\n- isqrt(8) == 2\n- isqrt(9) == 3\n- isqrt(26) == 5","starter":"def isqrt(n: int) -> int:\n    # your code here\n    pass","hint":"Binary search in [0, n]. The answer is the largest k where k*k <= n.","tests":["assert isqrt(0) == 0","assert isqrt(1) == 1","assert isqrt(8) == 2","assert isqrt(9) == 3","assert isqrt(26) == 5"],"solution":"def isqrt(n: int) -> int:\n    if n == 0:\n        return 0\n    lo, hi, ans = 0, n, 0\n    while lo <= hi:\n        mid = (lo + hi) // 2\n        if mid * mid <= n:\n            ans = mid\n            lo = mid + 1\n        else:\n            hi = mid - 1\n    return ans","expert":"import math\n\ndef isqrt(n: int) -> int:\n    return math.isqrt(n)","explanation":"The binary search version treats the problem as 'find the largest k with k^2 <= n', narrowing the integer search space in O(log n) steps. The expert version uses `math.isqrt`, available since Python 3.8, which is the purpose-built standard-library function \u2014 exact, efficient, and handles arbitrary precision integers correctly."},{"day":239,"title":"Bubble Sort","topic":"classic sorting concepts","difficulty":3,"minutes":12,"prompt":"Implement `bubble_sort(items: list[int]) -> list[int]` that returns a new sorted list using the bubble sort algorithm. Do not modify the input list.\n\nExpected O(n^2) time, O(n) space.\n\nExamples:\n- bubble_sort([3, 1, 4, 1, 5]) == [1, 1, 3, 4, 5]\n- bubble_sort([]) == []","starter":"def bubble_sort(items: list[int]) -> list[int]:\n    # your code here\n    pass","hint":"Copy the list. Make repeated passes, swapping adjacent elements that are out of order. Stop early if no swaps occurred in a pass.","tests":["assert bubble_sort([]) == []","assert bubble_sort([1]) == [1]","assert bubble_sort([3, 1, 4, 1, 5]) == [1, 1, 3, 4, 5]","assert bubble_sort([5, 4, 3, 2, 1]) == [1, 2, 3, 4, 5]","assert bubble_sort([2, 2, 2]) == [2, 2, 2]"],"solution":"def bubble_sort(items: list[int]) -> list[int]:\n    arr = list(items)\n    n = len(arr)\n    for i in range(n):\n        swapped = False\n        for j in range(n - 1 - i):\n            if arr[j] > arr[j + 1]:\n                arr[j], arr[j + 1] = arr[j + 1], arr[j]\n                swapped = True\n        if not swapped:\n            break\n    return arr","expert":"def bubble_sort(items: list[int]) -> list[int]:\n    arr = list(items)\n    end = len(arr)\n    while end > 1:\n        last_swap = 0\n        for i in range(end - 1):\n            if arr[i] > arr[i + 1]:\n                arr[i], arr[i + 1] = arr[i + 1], arr[i]\n                last_swap = i + 1\n        end = last_swap\n    return arr","explanation":"The standard optimisation is the `swapped` early-exit flag to stop when already sorted. The expert version tracks `last_swap` \u2014 the index of the last swap \u2014 to skip the already-sorted tail on every pass, not just detect full-pass order. This can halve the number of comparisons on partially sorted data."},{"day":240,"title":"Merge Sort","topic":"classic sorting concepts","difficulty":4,"minutes":12,"prompt":"Implement `merge_sort(items: list[int]) -> list[int]` that returns a new sorted list using the merge sort algorithm. O(n log n) time.\n\nExamples:\n- merge_sort([5, 2, 4, 6, 1, 3]) == [1, 2, 3, 4, 5, 6]\n- merge_sort([]) == []","starter":"def merge_sort(items: list[int]) -> list[int]:\n    # your code here\n    pass","hint":"Divide the list in half, recursively sort each half, then merge the two sorted halves.","tests":["assert merge_sort([]) == []","assert merge_sort([1]) == [1]","assert merge_sort([5, 2, 4, 6, 1, 3]) == [1, 2, 3, 4, 5, 6]","assert merge_sort([3, 3, 1]) == [1, 3, 3]","assert merge_sort([9, 8, 7, 6]) == [6, 7, 8, 9]"],"solution":"def merge_sort(items: list[int]) -> list[int]:\n    if len(items) <= 1:\n        return list(items)\n    mid = len(items) // 2\n    left = merge_sort(items[:mid])\n    right = merge_sort(items[mid:])\n    result = []\n    i = j = 0\n    while i < len(left) and j < len(right):\n        if left[i] <= right[j]:\n            result.append(left[i])\n            i += 1\n        else:\n            result.append(right[j])\n            j += 1\n    result.extend(left[i:])\n    result.extend(right[j:])\n    return result","expert":"import heapq\n\ndef merge_sort(items: list[int]) -> list[int]:\n    if len(items) <= 1:\n        return list(items)\n    mid = len(items) // 2\n    left = merge_sort(items[:mid])\n    right = merge_sort(items[mid:])\n    return list(heapq.merge(left, right))","explanation":"The standard merge sort manually merges two sorted lists with two pointers, the classic O(n) merge step. The expert version delegates the merge step to `heapq.merge`, which returns a lazy iterator over the merged sorted sequences \u2014 cleaner code, and the lazy evaluation avoids building intermediate lists until needed."},{"day":241,"title":"Two Sum (Sorted Array)","topic":"two-pointer & sliding window","difficulty":3,"minutes":12,"prompt":"Write a function `two_sum_sorted(nums: list[int], target: int) -> tuple[int, int]` that finds two indices (0-based) in a sorted list whose values sum to target. Return (-1, -1) if no such pair. O(n) time.\n\nExamples:\n- two_sum_sorted([1, 2, 3, 4, 6], 6) == (1, 3)\n- two_sum_sorted([1, 2], 5) == (-1, -1)","starter":"def two_sum_sorted(nums: list[int], target: int) -> tuple[int, int]:\n    # your code here\n    pass","hint":"Use two pointers starting at opposite ends. Move the left pointer right if the sum is too small, right pointer left if too large.","tests":["assert two_sum_sorted([], 5) == (-1, -1)","assert two_sum_sorted([1, 2, 3, 4, 6], 6) == (1, 3)","assert two_sum_sorted([1, 2], 5) == (-1, -1)","assert two_sum_sorted([1, 2, 3], 3) == (0, 1)","assert two_sum_sorted([2, 7, 11, 15], 9) == (0, 1)"],"solution":"def two_sum_sorted(nums: list[int], target: int) -> tuple[int, int]:\n    lo, hi = 0, len(nums) - 1\n    while lo < hi:\n        s = nums[lo] + nums[hi]\n        if s == target:\n            return (lo, hi)\n        elif s < target:\n            lo += 1\n        else:\n            hi -= 1\n    return (-1, -1)","expert":"def two_sum_sorted(nums: list[int], target: int) -> tuple[int, int]:\n    import bisect\n    for i, v in enumerate(nums):\n        need = target - v\n        j = bisect.bisect_left(nums, need, i + 1)\n        if j < len(nums) and nums[j] == need:\n            return (i, j)\n    return (-1, -1)","explanation":"The two-pointer approach is the canonical O(n) solution for sorted arrays \u2014 converging from both ends. The expert version uses `bisect_left` for each element, achieving O(n log n) but showcasing how binary search can replace pointer tricks when the sorted property is exploited differently \u2014 useful when the array is not contiguous in memory."},{"day":242,"title":"Max Sum Subarray of Size K","topic":"two-pointer & sliding window","difficulty":3,"minutes":12,"prompt":"Write a function `max_subarray_sum(nums: list[int], k: int) -> int` that returns the maximum sum of any contiguous subarray of length exactly k. Assume k >= 1 and len(nums) >= k.\n\nExamples:\n- max_subarray_sum([2, 1, 5, 1, 3, 2], 3) == 9\n- max_subarray_sum([1, 4, 2, 10], 2) == 12","starter":"def max_subarray_sum(nums: list[int], k: int) -> int:\n    # your code here\n    pass","hint":"Compute the first window sum, then slide: add next element, subtract leftmost element, track maximum.","tests":["assert max_subarray_sum([2, 1, 5, 1, 3, 2], 3) == 9","assert max_subarray_sum([1, 4, 2, 10], 2) == 12","assert max_subarray_sum([5], 1) == 5","assert max_subarray_sum([1, 2, 3, 4, 5], 2) == 9","assert max_subarray_sum([-1, -2, -3], 2) == -3"],"solution":"def max_subarray_sum(nums: list[int], k: int) -> int:\n    window = sum(nums[:k])\n    best = window\n    for i in range(k, len(nums)):\n        window += nums[i] - nums[i - k]\n        if window > best:\n            best = window\n    return best","expert":"def max_subarray_sum(nums: list[int], k: int) -> int:\n    return max(sum(nums[i:i+k]) for i in range(len(nums)-k+1))","explanation":"The sliding window solution updates the running sum in O(1) per step for O(n) total time, avoiding recomputation. The expert version uses a generator expression with `max` \u2014 concise and readable, though it recomputes each window sum from scratch (O(nk)). This trade-off illustrates that the most idiomatic code isn't always the most efficient."},{"day":243,"title":"Longest Substring Without Repeating Characters","topic":"two-pointer & sliding window","difficulty":4,"minutes":12,"prompt":"Write a function `longest_unique(s: str) -> int` that returns the length of the longest substring without repeating characters.\n\nExamples:\n- longest_unique('abcabcbb') == 3\n- longest_unique('bbbbb') == 1\n- longest_unique('') == 0","starter":"def longest_unique(s: str) -> int:\n    # your code here\n    pass","hint":"Use a sliding window with a set. Expand right; when a duplicate appears, shrink from the left.","tests":["assert longest_unique('') == 0","assert longest_unique('abcabcbb') == 3","assert longest_unique('bbbbb') == 1","assert longest_unique('pwwkew') == 3","assert longest_unique('abcde') == 5"],"solution":"def longest_unique(s: str) -> int:\n    seen = set()\n    lo = best = 0\n    for hi, ch in enumerate(s):\n        while ch in seen:\n            seen.remove(s[lo])\n            lo += 1\n        seen.add(ch)\n        best = max(best, hi - lo + 1)\n    return best","expert":"def longest_unique(s: str) -> int:\n    last_seen = {}\n    lo = best = 0\n    for hi, ch in enumerate(s):\n        if ch in last_seen and last_seen[ch] >= lo:\n            lo = last_seen[ch] + 1\n        last_seen[ch] = hi\n        best = max(best, hi - lo + 1)\n    return best","explanation":"The set-based window removes characters one-by-one from the left until no duplicate, giving O(n) amortized time. The expert version uses a dict mapping each character to its last-seen index, allowing the left pointer to jump directly past the duplicate \u2014 no inner loop needed, strictly O(n) with better constant factors."},{"day":244,"title":"Valid Parentheses","topic":"stacks/queues via list/deque","difficulty":3,"minutes":12,"prompt":"Write a function `is_valid_parens(s: str) -> bool` that checks whether a string of brackets is valid (every opener has a matching closer in order). Supported brackets: (), [], {}.\n\nExamples:\n- is_valid_parens('()[]{}') == True\n- is_valid_parens('([)]') == False\n- is_valid_parens('{[]}') == True","starter":"def is_valid_parens(s: str) -> bool:\n    # your code here\n    pass","hint":"Use a stack. Push openers; on a closer, check that the stack top is the matching opener.","tests":["assert is_valid_parens('') == True","assert is_valid_parens('()[]{}') == True","assert is_valid_parens('([)]') == False","assert is_valid_parens('{[]}') == True","assert is_valid_parens('(') == False"],"solution":"def is_valid_parens(s: str) -> bool:\n    stack = []\n    matching = {')': '(', ']': '[', '}': '{'}\n    for ch in s:\n        if ch in '([{':\n            stack.append(ch)\n        elif ch in matching:\n            if not stack or stack[-1] != matching[ch]:\n                return False\n            stack.pop()\n    return len(stack) == 0","expert":"def is_valid_parens(s: str) -> bool:\n    pairs = {')': '(', ']': '[', '}': '{'}\n    stack = []\n    for c in s:\n        if c not in pairs:\n            stack.append(c)\n        elif not stack or stack[-1] != pairs[c]:\n            return False\n        else:\n            stack.pop()\n    return not stack","explanation":"The stack solution is the canonical O(n) approach: push openers, match closers against the top. The expert version reorganises the branches slightly \u2014 checking `c not in pairs` (is an opener) is cleaner than checking membership in a string literal. Using `not stack` instead of `len(stack) == 0` is the idiomatic Python truthiness check."},{"day":245,"title":"Evaluate Reverse Polish Notation","topic":"stacks/queues via list/deque","difficulty":3,"minutes":12,"prompt":"Write a function `eval_rpn(tokens: list[str]) -> int` that evaluates an expression in Reverse Polish Notation. Operators are '+', '-', '*', '//'. Division truncates toward zero.\n\nExamples:\n- eval_rpn(['2','1','+','3','*']) == 9\n- eval_rpn(['4','13','5','/','+']) == 6","starter":"def eval_rpn(tokens: list[str]) -> int:\n    # your code here\n    pass","hint":"Use a stack. Push numbers; on an operator, pop two operands, compute, and push the result.","tests":["assert eval_rpn(['2','1','+','3','*']) == 9","assert eval_rpn(['4','2','/']) == 2","assert eval_rpn(['3']) == 3","assert eval_rpn(['5','1','2','+','4','*','+','3','-']) == 14","assert eval_rpn(['10','3','//']) == 3"],"solution":"def eval_rpn(tokens: list[str]) -> int:\n    stack = []\n    for tok in tokens:\n        if tok in ('+', '-', '*', '/', '//'):\n            b, a = stack.pop(), stack.pop()\n            if tok == '+':\n                stack.append(a + b)\n            elif tok == '-':\n                stack.append(a - b)\n            elif tok == '*':\n                stack.append(a * b)\n            else:\n                stack.append(int(a / b))\n        else:\n            stack.append(int(tok))\n    return stack[0]","expert":"import operator\n\ndef eval_rpn(tokens: list[str]) -> int:\n    OPS = {'+': operator.add, '-': operator.sub, '*': operator.mul,\n           '/': lambda a, b: int(a / b), '//': lambda a, b: int(a / b)}\n    stack = []\n    for tok in tokens:\n        if tok in OPS:\n            b, a = stack.pop(), stack.pop()\n            stack.append(OPS[tok](a, b))\n        else:\n            stack.append(int(tok))\n    return stack[0]","explanation":"The explicit if/elif chain works but grows linearly with the number of operators. The expert version uses an operator dispatch table (dict of callables), mapping tokens to functions \u2014 adding new operators requires only a dict entry, not a new branch. This is the Open/Closed principle in action."},{"day":246,"title":"BFS Level Order (Graph)","topic":"stacks/queues via list/deque","difficulty":4,"minutes":12,"prompt":"Write a function `bfs_levels(graph: dict[int, list[int]], start: int) -> list[list[int]]` that performs BFS from `start` and returns nodes grouped by level (distance from start). Each level list is sorted.\n\nExamples:\n- bfs_levels({0:[1,2], 1:[3], 2:[3], 3:[]}, 0) == [[0], [1, 2], [3]]\n- bfs_levels({0:[]}, 0) == [[0]]","starter":"def bfs_levels(graph: dict[int, list[int]], start: int) -> list[list[int]]:\n    # your code here\n    pass","hint":"Use collections.deque. Process all nodes at the current level before moving to the next.","tests":["assert bfs_levels({0:[]}, 0) == [[0]]","assert bfs_levels({0:[1,2], 1:[3], 2:[3], 3:[]}, 0) == [[0], [1, 2], [3]]","assert bfs_levels({0:[1], 1:[2], 2:[]}, 0) == [[0], [1], [2]]","assert bfs_levels({0:[2,1], 1:[], 2:[]}, 0) == [[0], [1, 2]]","assert bfs_levels({1:[2,3], 2:[], 3:[4], 4:[]}, 1) == [[1], [2, 3], [4]]"],"solution":"def bfs_levels(graph: dict[int, list[int]], start: int) -> list[list[int]]:\n    from collections import deque\n    levels = []\n    visited = {start}\n    queue = deque([start])\n    while queue:\n        level = []\n        for _ in range(len(queue)):\n            node = queue.popleft()\n            level.append(node)\n            for nb in graph[node]:\n                if nb not in visited:\n                    visited.add(nb)\n                    queue.append(nb)\n        levels.append(sorted(level))\n    return levels","expert":"def bfs_levels(graph: dict[int, list[int]], start: int) -> list[list[int]]:\n    from collections import deque\n    levels, visited, queue = [], {start}, deque([start])\n    while queue:\n        level_size = len(queue)\n        level = []\n        for _ in range(level_size):\n            node = queue.popleft()\n            level.append(node)\n            for nb in graph[node]:\n                if nb not in visited:\n                    visited.add(nb)\n                    queue.append(nb)\n        levels.append(sorted(level))\n    return levels","explanation":"Both solutions use `deque` for O(1) popleft and process nodes level-by-level using the queue length snapshot. The expert version captures `len(queue)` into `level_size` before the inner loop \u2014 this makes it explicit that the level boundary is fixed at the start of each outer iteration, which is the key invariant of BFS level-order traversal."},{"day":247,"title":"Build a Linked List","topic":"linked list (build the class)","difficulty":3,"minutes":12,"prompt":"Implement a singly linked list with:\n- class `Node` with `val` and `next` attributes\n- class `LinkedList` with:\n  - `append(val)` \u2014 add to end\n  - `to_list() -> list` \u2014 return values as a Python list\n  - `__len__() -> int` \u2014 number of nodes\n\nExamples:\n  ll = LinkedList()\n  ll.append(1); ll.append(2); ll.append(3)\n  ll.to_list() == [1, 2, 3]\n  len(ll) == 3","starter":"class Node:\n    pass\n\nclass LinkedList:\n    pass","hint":"Keep a `head` pointer and a `_size` counter. To append, traverse to the last node (or keep a `tail` pointer).","tests":["ll = LinkedList()\nassert ll.to_list() == [] and len(ll) == 0","ll = LinkedList()\nll.append(1)\nassert ll.to_list() == [1] and len(ll) == 1","ll = LinkedList()\nfor v in [1,2,3]: ll.append(v)\nassert ll.to_list() == [1,2,3]","ll = LinkedList()\nfor v in [10,20]: ll.append(v)\nassert len(ll) == 2","ll = LinkedList()\nll.append(5)\nll.append(5)\nassert ll.to_list() == [5, 5]"],"solution":"class Node:\n    def __init__(self, val):\n        self.val = val\n        self.next = None\n\nclass LinkedList:\n    def __init__(self):\n        self.head = None\n        self._size = 0\n\n    def append(self, val):\n        node = Node(val)\n        if self.head is None:\n            self.head = node\n        else:\n            cur = self.head\n            while cur.next:\n                cur = cur.next\n            cur.next = node\n        self._size += 1\n\n    def to_list(self):\n        result, cur = [], self.head\n        while cur:\n            result.append(cur.val)\n            cur = cur.next\n        return result\n\n    def __len__(self):\n        return self._size","expert":"class Node:\n    __slots__ = ('val', 'next')\n    def __init__(self, val):\n        self.val = val\n        self.next = None\n\nclass LinkedList:\n    def __init__(self):\n        self.head = self._tail = None\n        self._size = 0\n\n    def append(self, val):\n        node = Node(val)\n        if self._tail:\n            self._tail.next = node\n        else:\n            self.head = node\n        self._tail = node\n        self._size += 1\n\n    def to_list(self):\n        result, cur = [], self.head\n        while cur:\n            result.append(cur.val)\n            cur = cur.next\n        return result\n\n    def __len__(self):\n        return self._size","explanation":"The standard solution traverses to the end on every `append` \u2014 O(n) per call. The expert version keeps a `tail` pointer, making `append` O(1). It also uses `__slots__` on `Node` to reduce per-instance memory overhead, which matters when millions of nodes are allocated."},{"day":248,"title":"Reverse a Linked List","topic":"linked list (build the class)","difficulty":3,"minutes":12,"prompt":"Using the Node class below, implement `reverse_list(head)` that reverses the linked list in-place and returns the new head.\n\nHelper functions `to_list` and `from_list` are provided in the starter.\n\nExamples:\n  1->2->3 becomes 3->2->1","starter":"class Node:\n    def __init__(self, val, next=None):\n        self.val = val\n        self.next = next\n\ndef reverse_list(head):\n    # your code here\n    pass\n\ndef to_list(head):\n    r, cur = [], head\n    while cur: r.append(cur.val); cur = cur.next\n    return r\n\ndef from_list(vals):\n    if not vals: return None\n    head = Node(vals[0])\n    cur = head\n    for v in vals[1:]: cur.next = Node(v); cur = cur.next\n    return head","hint":"Iterate with three pointers: prev, cur, next_node. Reverse each link as you go.","tests":["assert to_list(reverse_list(None)) == []","assert to_list(reverse_list(from_list([1]))) == [1]","assert to_list(reverse_list(from_list([1,2,3]))) == [3,2,1]","assert to_list(reverse_list(from_list([1,2,3,4,5]))) == [5,4,3,2,1]","assert to_list(reverse_list(from_list([1,2]))) == [2,1]"],"solution":"class Node:\n    def __init__(self, val, next=None):\n        self.val = val\n        self.next = next\n\ndef reverse_list(head):\n    prev = None\n    cur = head\n    while cur:\n        nxt = cur.next\n        cur.next = prev\n        prev = cur\n        cur = nxt\n    return prev\n\ndef to_list(head):\n    r, cur = [], head\n    while cur: r.append(cur.val); cur = cur.next\n    return r\n\ndef from_list(vals):\n    if not vals: return None\n    head = Node(vals[0])\n    cur = head\n    for v in vals[1:]: cur.next = Node(v); cur = cur.next\n    return head","expert":"class Node:\n    def __init__(self, val, next=None):\n        self.val = val\n        self.next = next\n\ndef reverse_list(head):\n    prev, cur = None, head\n    while cur:\n        cur.next, prev, cur = prev, cur, cur.next\n    return prev\n\ndef to_list(head):\n    r, cur = [], head\n    while cur: r.append(cur.val); cur = cur.next\n    return r\n\ndef from_list(vals):\n    if not vals: return None\n    head = Node(vals[0])\n    cur = head\n    for v in vals[1:]: cur.next = Node(v); cur = cur.next\n    return head","explanation":"The iterative solution with three pointers is O(n) time, O(1) space \u2014 the standard approach. The expert version uses Python's simultaneous assignment (`a, b, c = x, y, z`) to update all three pointers in one statement without a temporary variable, which is more concise. Python evaluates the right-hand side fully before assigning, so the old values of `cur.next`, `prev`, and `cur` are all captured before any assignment happens."},{"day":249,"title":"Binary Tree Inorder Traversal","topic":"simple binary trees (traversals)","difficulty":3,"minutes":12,"prompt":"Using the TreeNode class below, implement `inorder(root) -> list[int]` that returns nodes in inorder (left, root, right) traversal.\n\nExamples:\n  Tree with root=1, right=2, right.left=3 gives inorder [1, 3, 2]","starter":"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef inorder(root):\n    # your code here\n    pass","hint":"Recursively: inorder(left) + [root.val] + inorder(right). Or use an explicit stack.","tests":["assert inorder(None) == []","assert inorder(TreeNode(1)) == [1]","t = TreeNode(1, TreeNode(2), TreeNode(3))\nassert inorder(t) == [2, 1, 3]","t = TreeNode(4, TreeNode(2, TreeNode(1), TreeNode(3)), TreeNode(6))\nassert inorder(t) == [1, 2, 3, 4, 6]","t = TreeNode(1, None, TreeNode(2, TreeNode(3)))\nassert inorder(t) == [1, 3, 2]"],"solution":"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef inorder(root):\n    if root is None:\n        return []\n    return inorder(root.left) + [root.val] + inorder(root.right)","expert":"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef inorder(root):\n    result, stack, cur = [], [], root\n    while cur or stack:\n        while cur:\n            stack.append(cur)\n            cur = cur.left\n        cur = stack.pop()\n        result.append(cur.val)\n        cur = cur.right\n    return result","explanation":"The recursive solution is clean and matches the mathematical definition of inorder traversal. The iterative version using an explicit stack avoids Python's call-stack limit for very deep trees and runs in O(n) time and O(h) space (h = height) \u2014 the same as recursive but stack-overflow-safe, which matters in production code."},{"day":250,"title":"Binary Tree Level Order Traversal","topic":"simple binary trees (traversals)","difficulty":3,"minutes":12,"prompt":"Using the TreeNode class below, implement `level_order(root) -> list[list[int]]` that returns node values grouped by level (BFS order).\n\nExamples:\n  Tree with root=3, left=9, right=20, right.left=15 returns [[3],[9,20],[15]]","starter":"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef level_order(root):\n    # your code here\n    pass","hint":"Use a deque. Process all nodes at one level before enqueuing their children.","tests":["assert level_order(None) == []","assert level_order(TreeNode(1)) == [[1]]","t = TreeNode(3, TreeNode(9), TreeNode(20, TreeNode(15)))\nassert level_order(t) == [[3], [9, 20], [15]]","t = TreeNode(1, TreeNode(2, TreeNode(4)), TreeNode(3))\nassert level_order(t) == [[1], [2, 3], [4]]","t = TreeNode(1, TreeNode(2), TreeNode(3))\nassert level_order(t) == [[1], [2, 3]]"],"solution":"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef level_order(root):\n    from collections import deque\n    if not root:\n        return []\n    result, queue = [], deque([root])\n    while queue:\n        level = []\n        for _ in range(len(queue)):\n            node = queue.popleft()\n            level.append(node.val)\n            if node.left: queue.append(node.left)\n            if node.right: queue.append(node.right)\n        result.append(level)\n    return result","expert":"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef level_order(root):\n    if not root:\n        return []\n    result, level = [], [root]\n    while level:\n        result.append([n.val for n in level])\n        level = [child for n in level for child in (n.left, n.right) if child]\n    return result","explanation":"The deque approach is the classic BFS with O(n) time. The expert version uses plain lists as level snapshots and a list comprehension to generate the next level \u2014 no deque needed since we process all nodes in a level at once. This is slightly more Pythonic and avoids the `len(queue)` snapshot trick, making the level-by-level nature explicit."},{"day":251,"title":"Two Sum (Hash Map)","topic":"hashing-based problems","difficulty":3,"minutes":12,"prompt":"Write a function `two_sum(nums: list[int], target: int) -> tuple[int, int]` that finds two indices whose values sum to target. Assume exactly one solution exists. O(n) time.\n\nExamples:\n- two_sum([2, 7, 11, 15], 9) == (0, 1)\n- two_sum([3, 2, 4], 6) == (1, 2)","starter":"def two_sum(nums: list[int], target: int) -> tuple[int, int]:\n    # your code here\n    pass","hint":"Use a dict mapping value -> index. For each number, check if complement (target - num) is already in the dict.","tests":["assert two_sum([2, 7, 11, 15], 9) == (0, 1)","assert two_sum([3, 2, 4], 6) == (1, 2)","assert two_sum([3, 3], 6) == (0, 1)","assert set(two_sum([0, 4, 3, 0], 0)) == {0, 3}","assert two_sum([1, 5, 3, 7], 8) == (0, 3) or two_sum([1, 5, 3, 7], 8) == (1, 2)"],"solution":"def two_sum(nums: list[int], target: int) -> tuple[int, int]:\n    seen = {}\n    for i, v in enumerate(nums):\n        comp = target - v\n        if comp in seen:\n            return (seen[comp], i)\n        seen[v] = i\n    return (-1, -1)","expert":"def two_sum(nums: list[int], target: int) -> tuple[int, int]:\n    seen: dict[int, int] = {}\n    for i, v in enumerate(nums):\n        if (comp := target - v) in seen:\n            return (seen[comp], i)\n        seen[v] = i\n    return (-1, -1)","explanation":"The dict-based O(n) solution is the gold standard for this problem, avoiding the O(n^2) nested loop. The expert version uses the walrus operator (`:=`) to assign and check the complement in a single expression \u2014 a Python 3.8+ feature that reduces a two-step check-then-use to one concise condition, keeping related logic together."},{"day":252,"title":"Group Anagrams","topic":"hashing-based problems","difficulty":3,"minutes":12,"prompt":"Write a function `group_anagrams(words: list[str]) -> list[list[str]]` that groups anagrams together. Each inner group should be sorted. The outer list order does not matter.\n\nExamples:\n- group_anagrams(['eat','tea','tan','ate','nat','bat']) produces groups ['ate','eat','tea'], ['nat','tan'], ['bat']\n- group_anagrams([]) == []","starter":"def group_anagrams(words: list[str]) -> list[list[str]]:\n    # your code here\n    pass","hint":"Use sorted(word) as the hash key \u2014 anagrams produce the same sorted string.","tests":["assert group_anagrams([]) == []","assert group_anagrams(['a']) == [['a']]","result = group_anagrams(['eat','tea','tan','ate','nat','bat'])\nresult_s = sorted([sorted(g) for g in result])\nassert result_s == [['ate','eat','tea'],['bat'],['nat','tan']]","result = group_anagrams(['abc','bca','xyz'])\nresult_s = sorted([sorted(g) for g in result])\nassert result_s == [['abc','bca'],['xyz']]","result = group_anagrams(['a','b','a'])\nresult_s = sorted([sorted(g) for g in result])\nassert result_s == [['a','a'],['b']]"],"solution":"def group_anagrams(words: list[str]) -> list[list[str]]:\n    from collections import defaultdict\n    groups = defaultdict(list)\n    for word in words:\n        key = tuple(sorted(word))\n        groups[key].append(word)\n    return [sorted(g) for g in groups.values()]","expert":"def group_anagrams(words: list[str]) -> list[list[str]]:\n    from collections import defaultdict\n    groups: dict[tuple, list[str]] = defaultdict(list)\n    for word in words:\n        groups[tuple(sorted(word))].append(word)\n    return [sorted(g) for g in groups.values()]","explanation":"Sorting each word to create a canonical key is the key insight \u2014 all anagrams hash to the same key in O(k log k) per word where k is word length. `defaultdict(list)` avoids the check-and-initialise boilerplate. The expert version adds a type annotation on `groups` \u2014 `dict[tuple, list[str]]` \u2014 documenting the data structure explicitly for readability and static analysis."},{"day":253,"title":"Subarray Sum Equals K","topic":"hashing-based problems","difficulty":4,"minutes":12,"prompt":"Write a function `subarray_sum_k(nums: list[int], k: int) -> int` that returns the total number of contiguous subarrays whose sum equals k. O(n) expected.\n\nExamples:\n- subarray_sum_k([1, 1, 1], 2) == 2\n- subarray_sum_k([1, 2, 3], 3) == 2","starter":"def subarray_sum_k(nums: list[int], k: int) -> int:\n    # your code here\n    pass","hint":"Use a prefix-sum dict. For each index i, if prefix[i] - k was seen before, those subarrays sum to k.","tests":["assert subarray_sum_k([1, 1, 1], 2) == 2","assert subarray_sum_k([1, 2, 3], 3) == 2","assert subarray_sum_k([1], 1) == 1","assert subarray_sum_k([1, -1, 1], 1) == 3","assert subarray_sum_k([3, 4, 7, 2, -3, 1, 4, 2], 7) == 4"],"solution":"def subarray_sum_k(nums: list[int], k: int) -> int:\n    from collections import defaultdict\n    prefix_counts = defaultdict(int)\n    prefix_counts[0] = 1\n    total = prefix = 0\n    for n in nums:\n        prefix += n\n        total += prefix_counts[prefix - k]\n        prefix_counts[prefix] += 1\n    return total","expert":"def subarray_sum_k(nums: list[int], k: int) -> int:\n    from collections import Counter\n    counts, total, prefix = Counter({0: 1}), 0, 0\n    for n in nums:\n        prefix += n\n        total += counts[prefix - k]\n        counts[prefix] += 1\n    return total","explanation":"The prefix-sum hash map approach achieves O(n) by noting: if prefix[j] - prefix[i] == k, subarray [i+1..j] sums to k. Counting previous prefix sums lets us check all such pairs in one pass. The expert version uses `Counter` initialized with `{0: 1}` \u2014 more expressive than `defaultdict(int)` when you need a specific starting count."},{"day":254,"title":"Find Duplicate in O(n) Space","topic":"time/space complexity-aware refactors","difficulty":3,"minutes":12,"prompt":"Write a function `find_duplicate(nums: list[int]) -> int` where nums contains n+1 integers each in range [1, n]. Exactly one value is duplicated. Return it.\n\nFirst write the O(n) time/space set-based solution; the expert version shows the O(1) space Floyd approach.\n\nExamples:\n- find_duplicate([1, 3, 4, 2, 2]) == 2\n- find_duplicate([3, 1, 3, 4, 2]) == 3","starter":"def find_duplicate(nums: list[int]) -> int:\n    # your code here\n    pass","hint":"Use a set. Iterate nums; return the first value already in the set.","tests":["assert find_duplicate([1, 3, 4, 2, 2]) == 2","assert find_duplicate([3, 1, 3, 4, 2]) == 3","assert find_duplicate([1, 1]) == 1","assert find_duplicate([2, 2, 2, 2]) == 2","assert find_duplicate([1, 2, 3, 4, 5, 3]) == 3"],"solution":"def find_duplicate(nums: list[int]) -> int:\n    seen = set()\n    for n in nums:\n        if n in seen:\n            return n\n        seen.add(n)\n    return -1","expert":"def find_duplicate(nums: list[int]) -> int:\n    slow = fast = nums[0]\n    while True:\n        slow = nums[slow]\n        fast = nums[nums[fast]]\n        if slow == fast:\n            break\n    slow = nums[0]\n    while slow != fast:\n        slow = nums[slow]\n        fast = nums[fast]\n    return slow","explanation":"The set-based solution is O(n) time but O(n) space. The expert version uses Floyd's cycle detection \u2014 the values act as pointers into the array, forming a linked list with a cycle at the duplicate. Phase 1 finds the intersection; phase 2 locates the cycle entrance. This achieves O(n) time and O(1) space \u2014 a classic algorithm worth understanding."},{"day":255,"title":"Type-Annotated Safe Divide","topic":"type hints & typing module (Optional, Union, TypeVar basics)","difficulty":3,"minutes":12,"prompt":"Write two functions with proper type annotations:\n1. `safe_divide(a: float, b: float) -> float | None` \u2014 returns a/b or None if b is zero.\n2. `safe_divide_default(a: float, b: float, default: float = 0.0) -> float` \u2014 returns a/b or the default.\n\nExamples:\n- safe_divide(10, 2) == 5.0\n- safe_divide(1, 0) is None\n- safe_divide_default(1, 0, -1.0) == -1.0","starter":"def safe_divide(a: float, b: float) -> float | None:\n    # your code here\n    pass\n\ndef safe_divide_default(a: float, b: float, default: float = 0.0) -> float:\n    # your code here\n    pass","hint":"Check if b == 0 before dividing. The return type `float | None` means the function may return None.","tests":["assert safe_divide(10, 2) == 5.0","assert safe_divide(1, 0) is None","assert safe_divide_default(10, 2) == 5.0","assert safe_divide_default(1, 0) == 0.0","assert safe_divide_default(1, 0, -1.0) == -1.0"],"solution":"def safe_divide(a: float, b: float) -> float | None:\n    if b == 0:\n        return None\n    return a / b\n\ndef safe_divide_default(a: float, b: float, default: float = 0.0) -> float:\n    result = safe_divide(a, b)\n    return result if result is not None else default","expert":"from typing import Optional\n\ndef safe_divide(a: float, b: float) -> Optional[float]:\n    return a / b if b != 0 else None\n\ndef safe_divide_default(a: float, b: float, default: float = 0.0) -> float:\n    return a / b if b != 0 else default","explanation":"The solution demonstrates `float | None` (Python 3.10+ union syntax) and conditional None return. The expert version uses `Optional[float]` from `typing` (equivalent, compatible with older Python) and condenses both bodies to one-liners. The key lesson: `Optional[X]` is shorthand for `Union[X, None]`, and the new `|` syntax is preferred in modern code."},{"day":256,"title":"Generic First and Last Element","topic":"type hints & typing module (Optional, Union, TypeVar basics)","difficulty":3,"minutes":12,"prompt":"Use TypeVar to write properly typed functions:\n- `first(items: list[T]) -> T | None` \u2014 returns first element or None\n- `last(items: list[T]) -> T | None` \u2014 returns last element or None\n\nExamples:\n- first([1, 2, 3]) == 1\n- first([]) is None\n- last(['a', 'b']) == 'b'","starter":"from typing import TypeVar, Optional\n\nT = TypeVar('T')\n\ndef first(items):\n    # Add proper type hints and implement\n    pass\n\ndef last(items):\n    # Add proper type hints and implement\n    pass","hint":"Use `list[T]` as the parameter type and `Optional[T]` as the return type so the type checker knows the return matches the element type.","tests":["assert first([1, 2, 3]) == 1","assert first([]) is None","assert first(['a', 'b']) == 'a'","assert last([1, 2, 3]) == 3","assert last([]) is None"],"solution":"from typing import TypeVar, Optional\n\nT = TypeVar('T')\n\ndef first(items):\n    return items[0] if items else None\n\ndef last(items):\n    return items[-1] if items else None","expert":"from typing import TypeVar, Optional\n\nT = TypeVar('T')\n\ndef first(items: list[T]) -> Optional[T]:\n    return items[0] if items else None\n\ndef last(items: list[T]) -> Optional[T]:\n    return items[-1] if items else None","explanation":"The basic version works at runtime but loses type information \u2014 the return type is inferred as `object`. The expert version uses `TypeVar('T')` to link the list element type to the return type, so type checkers like mypy know that `first([1,2,3])` returns `int | None`, not `object | None`. This enables proper type inference downstream and is the foundation of generic programming in Python."},{"day":257,"title":"Class-Based Context Manager (Timer)","topic":"context managers (contextlib.contextmanager and class-based)","difficulty":3,"minutes":12,"prompt":"Implement a class `Timer` that works as a context manager. It should record the elapsed time in its `elapsed` attribute after the block exits. Use `time.perf_counter`.\n\nUsage:\n  with Timer() as t:\n      pass\n  t.elapsed  # float seconds >= 0","starter":"import time\n\nclass Timer:\n    # your code here\n    pass","hint":"Implement __enter__ (record start time, return self) and __exit__ (record elapsed = end - start).","tests":["import time\nt = Timer()\nwith t:\n    pass\nassert isinstance(t.elapsed, float) and t.elapsed >= 0","import time\nwith Timer() as t:\n    time.sleep(0.01)\nassert t.elapsed >= 0.005","import time\nwith Timer() as t:\n    x = sum(range(100))\nassert t.elapsed >= 0","import time\nwith Timer() as t:\n    pass\nassert t.elapsed < 1.0","import time\nt1, t2 = Timer(), Timer()\nwith t1:\n    pass\nwith t2:\n    pass\nassert t1.elapsed >= 0 and t2.elapsed >= 0"],"solution":"import time\n\nclass Timer:\n    def __init__(self):\n        self.elapsed = 0.0\n\n    def __enter__(self):\n        self._start = time.perf_counter()\n        return self\n\n    def __exit__(self, *args):\n        self.elapsed = time.perf_counter() - self._start","expert":"import time\n\nclass Timer:\n    def __init__(self) -> None:\n        self.elapsed: float = 0.0\n\n    def __enter__(self) -> 'Timer':\n        self._start = time.perf_counter()\n        return self\n\n    def __exit__(self, exc_type, exc_val, exc_tb) -> bool:\n        self.elapsed = time.perf_counter() - self._start\n        return False\n\n    def __repr__(self) -> str:\n        return f'Timer(elapsed={self.elapsed:.6f}s)'","explanation":"The class-based context manager uses `__enter__` to start timing and `__exit__` to compute elapsed time. The expert version adds explicit parameter names for `__exit__` (exc_type, exc_val, exc_tb) and `return False` to show best practice: always return False unless you intentionally want to suppress exceptions. Type annotations on dunder methods are also shown \u2014 `__enter__` returning `'Timer'` (quoted forward reference) is the correct annotation pattern."},{"day":258,"title":"Generator-Based Context Manager","topic":"context managers (contextlib.contextmanager and class-based)","difficulty":3,"minutes":12,"prompt":"Use `@contextlib.contextmanager` to write a context manager `temp_list(initial: list)` that yields a copy of the initial list. If the block exits normally, append 'DONE' to the yielded list. If an exception occurs, re-raise it.\n\nUsage:\n  with temp_list([1,2,3]) as lst:\n      lst.append(4)\n  # lst == [1,2,3,4,'DONE'], original unchanged","starter":"from contextlib import contextmanager\n\n@contextmanager\ndef temp_list(initial: list):\n    # your code here\n    pass","hint":"yield a copy of initial. Wrap the yield in try/except to detect exceptions.","tests":["with temp_list([1,2,3]) as lst:\n    pass\nassert lst[-1] == 'DONE'","original = [1, 2]\nwith temp_list(original) as lst:\n    lst.append(99)\nassert original == [1, 2]","with temp_list([]) as lst:\n    lst.extend([1,2])\nassert lst == [1, 2, 'DONE']","try:\n    with temp_list([1]) as lst:\n        raise ValueError('oops')\nexcept ValueError:\n    pass\nassert 'DONE' not in lst","with temp_list([10]) as lst:\n    lst[0] = 20\nassert lst[0] == 20 and lst[-1] == 'DONE'"],"solution":"from contextlib import contextmanager\n\n@contextmanager\ndef temp_list(initial: list):\n    copy = list(initial)\n    try:\n        yield copy\n        copy.append('DONE')\n    except Exception:\n        raise","expert":"from contextlib import contextmanager\n\n@contextmanager\ndef temp_list(initial: list):\n    copy = list(initial)\n    ok = False\n    try:\n        yield copy\n        ok = True\n    finally:\n        if ok:\n            copy.append('DONE')","explanation":"The `@contextmanager` decorator turns a generator function into a context manager \u2014 code before `yield` is `__enter__`, code after is `__exit__`. The expert version uses a `finally` block with a success flag, which is more robust than placing post-yield code before the except: `finally` always runs, and the flag distinguishes normal exit from exceptional exit. This pattern is more readable when post-exit logic is conditional on success."},{"day":259,"title":"Sorted List Insertion with bisect","topic":"bisect & heapq","difficulty":3,"minutes":12,"prompt":"Implement a class `SortedList` that maintains a sorted list of integers:\n- `add(val: int)` \u2014 insert val keeping the list sorted\n- `contains(val: int) -> bool` \u2014 O(log n) membership check\n- `to_list() -> list[int]` \u2014 return the sorted list\n\nUse the `bisect` module.","starter":"import bisect\n\nclass SortedList:\n    # your code here\n    pass","hint":"Use bisect.insort() to insert in the correct position.","tests":["sl = SortedList()\nassert sl.to_list() == []","sl = SortedList()\nsl.add(3); sl.add(1); sl.add(2)\nassert sl.to_list() == [1, 2, 3]","sl = SortedList()\nfor v in [5, 2, 8, 1]: sl.add(v)\nassert sl.to_list() == [1, 2, 5, 8]","sl = SortedList()\nsl.add(3); sl.add(3)\nassert sl.to_list() == [3, 3]","sl = SortedList()\nsl.add(1); sl.add(5)\nassert sl.contains(1) and not sl.contains(3)"],"solution":"import bisect\n\nclass SortedList:\n    def __init__(self):\n        self._data = []\n\n    def add(self, val: int):\n        bisect.insort(self._data, val)\n\n    def contains(self, val: int) -> bool:\n        idx = bisect.bisect_left(self._data, val)\n        return idx < len(self._data) and self._data[idx] == val\n\n    def to_list(self) -> list:\n        return list(self._data)","expert":"import bisect\n\nclass SortedList:\n    def __init__(self) -> None:\n        self._data: list[int] = []\n\n    def add(self, val: int) -> None:\n        bisect.insort_right(self._data, val)\n\n    def contains(self, val: int) -> bool:\n        lo = bisect.bisect_left(self._data, val)\n        return lo < len(self._data) and self._data[lo] == val\n\n    def to_list(self) -> list[int]:\n        return self._data.copy()\n\n    def __len__(self) -> int:\n        return len(self._data)\n\n    def __repr__(self) -> str:\n        return f'SortedList({self._data})'","explanation":"`bisect.insort` uses binary search to find the insertion point (O(log n)) then shifts elements (O(n)), so insertion is O(n) overall \u2014 but much faster than a linear scan for large n due to CPU cache efficiency. The expert version uses `insort_right` (explicit about placing duplicates after existing equal elements), adds full type annotations, and includes `__len__` and `__repr__` which make the class behave like a proper Python container."},{"day":260,"title":"K Largest Elements with heapq","topic":"bisect & heapq","difficulty":3,"minutes":12,"prompt":"Write a function `k_largest(nums: list[int], k: int) -> list[int]` that returns the k largest elements in descending order. O(n log k) time.\n\nExamples:\n- k_largest([3, 1, 4, 1, 5, 9, 2, 6], 3) == [9, 6, 5]\n- k_largest([1, 2], 2) == [2, 1]","starter":"def k_largest(nums: list[int], k: int) -> list[int]:\n    # your code here\n    pass","hint":"Maintain a min-heap of size k. If the new element is larger than the heap minimum, replace it.","tests":["assert k_largest([3, 1, 4, 1, 5, 9, 2, 6], 3) == [9, 6, 5]","assert k_largest([1, 2], 2) == [2, 1]","assert k_largest([7], 1) == [7]","assert k_largest([5, 4, 3, 2, 1], 3) == [5, 4, 3]","assert k_largest([1, 1, 1, 1], 2) == [1, 1]"],"solution":"import heapq\n\ndef k_largest(nums: list[int], k: int) -> list[int]:\n    heap = []\n    for n in nums:\n        heapq.heappush(heap, n)\n        if len(heap) > k:\n            heapq.heappop(heap)\n    return sorted(heap, reverse=True)","expert":"import heapq\n\ndef k_largest(nums: list[int], k: int) -> list[int]:\n    return heapq.nlargest(k, nums)","explanation":"The manual min-heap approach keeps a heap of size k, popping the smallest when the heap grows \u2014 O(n log k) time. The expert version uses `heapq.nlargest`, which is purpose-built for this exact problem, uses the same algorithm internally, and is the idiomatic one-liner. Knowing when to use `nlargest`/`nsmallest` vs. a full sort is an important Python efficiency choice."},{"day":261,"title":"Count Paths in Grid (Memoized)","topic":"recursion","difficulty":4,"minutes":12,"prompt":"Write a function `count_paths(m: int, n: int) -> int` that counts the number of unique paths in an m x n grid from top-left to bottom-right, moving only right or down. Use memoization.\n\nExamples:\n- count_paths(3, 7) == 28\n- count_paths(3, 2) == 3\n- count_paths(1, 1) == 1","starter":"def count_paths(m: int, n: int) -> int:\n    # your code here\n    pass","hint":"paths(r, c) = paths(r-1, c) + paths(r, c-1). Base case: r==0 or c==0 means 1 path.","tests":["assert count_paths(1, 1) == 1","assert count_paths(3, 2) == 3","assert count_paths(3, 7) == 28","assert count_paths(2, 2) == 2","assert count_paths(5, 5) == 70"],"solution":"def count_paths(m: int, n: int) -> int:\n    from functools import lru_cache\n    @lru_cache(maxsize=None)\n    def dp(r, c):\n        if r == 0 or c == 0:\n            return 1\n        return dp(r - 1, c) + dp(r, c - 1)\n    return dp(m - 1, n - 1)","expert":"def count_paths(m: int, n: int) -> int:\n    import math\n    return math.comb(m + n - 2, m - 1)","explanation":"The memoized DP solution is O(m*n) time and space, solving each subgrid once. The expert version recognises that counting paths on a grid is a combinatorics problem: you take (m-1) down steps and (n-1) right steps in any order, which is C(m+n-2, m-1). `math.comb` computes this in O(min(m,n)) time \u2014 a great example of reducing an algorithmic problem to a mathematical formula."},{"day":262,"title":"Search in Rotated Sorted Array","topic":"binary search & variants","difficulty":4,"minutes":12,"prompt":"Write a function `search_rotated(nums: list[int], target: int) -> int` that searches for target in a sorted array that has been rotated at an unknown pivot. Return the index or -1. O(log n).\n\nExamples:\n- search_rotated([4, 5, 6, 7, 0, 1, 2], 0) == 4\n- search_rotated([4, 5, 6, 7, 0, 1, 2], 3) == -1","starter":"def search_rotated(nums: list[int], target: int) -> int:\n    # your code here\n    pass","hint":"In each binary search step, one half is always normally sorted. Determine which half is sorted and check if target falls in it.","tests":["assert search_rotated([], 1) == -1","assert search_rotated([4, 5, 6, 7, 0, 1, 2], 0) == 4","assert search_rotated([4, 5, 6, 7, 0, 1, 2], 3) == -1","assert search_rotated([1], 0) == -1","assert search_rotated([3, 1], 1) == 1"],"solution":"def search_rotated(nums: list[int], target: int) -> int:\n    lo, hi = 0, len(nums) - 1\n    while lo <= hi:\n        mid = (lo + hi) // 2\n        if nums[mid] == target:\n            return mid\n        if nums[lo] <= nums[mid]:  # left half sorted\n            if nums[lo] <= target < nums[mid]:\n                hi = mid - 1\n            else:\n                lo = mid + 1\n        else:  # right half sorted\n            if nums[mid] < target <= nums[hi]:\n                lo = mid + 1\n            else:\n                hi = mid - 1\n    return -1","expert":"def search_rotated(nums: list[int], target: int) -> int:\n    if not nums:\n        return -1\n    lo, hi = 0, len(nums) - 1\n    while lo <= hi:\n        mid = lo + (hi - lo) // 2\n        if nums[mid] == target:\n            return mid\n        left_sorted = nums[lo] <= nums[mid]\n        in_left = left_sorted and nums[lo] <= target < nums[mid]\n        in_right = not left_sorted and nums[mid] < target <= nums[hi]\n        if in_left:\n            hi = mid - 1\n        elif in_right:\n            lo = mid + 1\n        elif left_sorted:\n            lo = mid + 1\n        else:\n            hi = mid - 1\n    return -1","explanation":"The key insight is that one half of a rotated sorted array is always fully sorted. Check which half is sorted, then determine if the target is within that sorted half. The expert version extracts the boolean conditions into named variables (`left_sorted`, `in_left`, `in_right`) \u2014 this makes the complex branching logic self-documenting and much easier to reason about."},{"day":263,"title":"Selection Sort (Stable)","topic":"classic sorting concepts","difficulty":3,"minutes":12,"prompt":"Implement `selection_sort(items: list) -> list` that returns a new sorted list using selection sort. Make it stable (preserve relative order of equal elements). O(n^2) time.\n\nExamples:\n- selection_sort([64, 25, 12, 22, 11]) == [11, 12, 22, 25, 64]\n- selection_sort([3, 1, 3, 2]) == [1, 2, 3, 3]","starter":"def selection_sort(items: list) -> list:\n    # your code here\n    pass","hint":"Find the minimum in the unsorted portion and insert it at the front (shift elements rather than swap to preserve stability).","tests":["assert selection_sort([]) == []","assert selection_sort([1]) == [1]","assert selection_sort([64, 25, 12, 22, 11]) == [11, 12, 22, 25, 64]","assert selection_sort([3, 1, 3, 2]) == [1, 2, 3, 3]","assert selection_sort([5, 4, 3, 2, 1]) == [1, 2, 3, 4, 5]"],"solution":"def selection_sort(items: list) -> list:\n    arr = list(items)\n    n = len(arr)\n    for i in range(n):\n        min_idx = i\n        for j in range(i + 1, n):\n            if arr[j] < arr[min_idx]:\n                min_idx = j\n        key = arr[min_idx]\n        while min_idx > i:\n            arr[min_idx] = arr[min_idx - 1]\n            min_idx -= 1\n        arr[i] = key\n    return arr","expert":"def selection_sort(items: list) -> list:\n    arr = list(items)\n    for i in range(len(arr)):\n        min_val = min(arr[i:])\n        min_idx = arr.index(min_val, i)\n        arr.insert(i, arr.pop(min_idx))\n    return arr","explanation":"Standard selection sort swaps the minimum into place \u2014 but swapping breaks stability. The solution fixes this by shifting elements (like insertion sort's insert step) to preserve the relative order of equals. The expert version uses `min()` and `list.insert`/`pop` which is more Pythonic and naturally stable, since `arr.index` finds the first (leftmost) occurrence of the minimum."},{"day":264,"title":"Three Sum (No Duplicates)","topic":"two-pointer & sliding window","difficulty":4,"minutes":12,"prompt":"Write a function `three_sum(nums: list[int]) -> list[tuple[int,int,int]]` that returns all unique triplets from nums that sum to zero. No duplicate triplets. Each triplet should be sorted internally.\n\nExamples:\n- three_sum([-1, 0, 1, 2, -1, -4]) == [(-1, -1, 2), (-1, 0, 1)]\n- three_sum([0, 0, 0]) == [(0, 0, 0)]","starter":"def three_sum(nums: list[int]) -> list[tuple[int,int,int]]:\n    # your code here\n    pass","hint":"Sort the array. Fix one element, then use two-pointer on the rest. Skip duplicates at each level.","tests":["assert three_sum([]) == []","assert three_sum([0, 0, 0]) == [(0, 0, 0)]","assert sorted(three_sum([-1, 0, 1, 2, -1, -4])) == [(-1, -1, 2), (-1, 0, 1)]","assert three_sum([1, 2, -2, -1]) == []","assert sorted(three_sum([0, 0, 0, 0])) == [(0, 0, 0)]"],"solution":"def three_sum(nums: list[int]) -> list[tuple[int,int,int]]:\n    nums.sort()\n    result = []\n    n = len(nums)\n    for i in range(n - 2):\n        if i > 0 and nums[i] == nums[i - 1]:\n            continue\n        lo, hi = i + 1, n - 1\n        while lo < hi:\n            s = nums[i] + nums[lo] + nums[hi]\n            if s == 0:\n                result.append((nums[i], nums[lo], nums[hi]))\n                while lo < hi and nums[lo] == nums[lo + 1]: lo += 1\n                while lo < hi and nums[hi] == nums[hi - 1]: hi -= 1\n                lo += 1; hi -= 1\n            elif s < 0:\n                lo += 1\n            else:\n                hi -= 1\n    return result","expert":"def three_sum(nums: list[int]) -> list[tuple[int,int,int]]:\n    nums.sort()\n    result: set[tuple[int,int,int]] = set()\n    n = len(nums)\n    for i in range(n - 2):\n        if nums[i] > 0:\n            break\n        lo, hi = i + 1, n - 1\n        while lo < hi:\n            s = nums[i] + nums[lo] + nums[hi]\n            if s == 0:\n                result.add((nums[i], nums[lo], nums[hi]))\n                lo += 1; hi -= 1\n            elif s < 0:\n                lo += 1\n            else:\n                hi -= 1\n    return sorted(result)","explanation":"The two-pointer approach achieves O(n^2) time after sorting. The normal solution manually skips duplicates with while loops. The expert version uses a `set` to collect triplets \u2014 since the array is sorted, duplicate triplets produce identical tuples, so the set deduplicates automatically. Adding `if nums[i] > 0: break` provides an early exit since no triplet can sum to zero if the smallest remaining element is positive."},{"day":265,"title":"Detect Cycle in Linked List","topic":"linked list (build the class)","difficulty":4,"minutes":12,"prompt":"Given the Node class below, implement `has_cycle(head) -> bool` that returns True if the linked list has a cycle, False otherwise. O(n) time, O(1) space.\n\nUse Floyd's cycle detection algorithm (tortoise and hare).","starter":"class Node:\n    def __init__(self, val, next=None):\n        self.val = val\n        self.next = next\n\ndef has_cycle(head) -> bool:\n    # your code here\n    pass","hint":"Move slow one step, fast two steps. If they meet, there is a cycle.","tests":["assert has_cycle(None) == False","n = Node(1)\nassert has_cycle(n) == False","n1 = Node(1)\nn2 = Node(2)\nn1.next = n2\nassert has_cycle(n1) == False","n1 = Node(1); n2 = Node(2); n3 = Node(3)\nn1.next = n2; n2.next = n3; n3.next = n1\nassert has_cycle(n1) == True","n1 = Node(1); n2 = Node(2); n3 = Node(3)\nn1.next = n2; n2.next = n3; n3.next = n2\nassert has_cycle(n1) == True"],"solution":"class Node:\n    def __init__(self, val, next=None):\n        self.val = val\n        self.next = next\n\ndef has_cycle(head) -> bool:\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow is fast:\n            return True\n    return False","expert":"class Node:\n    def __init__(self, val, next=None):\n        self.val = val\n        self.next = next\n\ndef has_cycle(head) -> bool:\n    seen: set[int] = set()\n    cur = head\n    while cur:\n        if id(cur) in seen:\n            return True\n        seen.add(id(cur))\n        cur = cur.next\n    return False","explanation":"Floyd's tortoise-and-hare algorithm is O(n) time, O(1) space \u2014 the fast pointer laps the slow one inside any cycle. The expert version uses a set of node ids for O(n) time, O(n) space \u2014 simpler to understand but uses extra memory. This pair illustrates the classic time-space trade-off: the O(1) space solution requires a non-obvious mathematical insight."},{"day":266,"title":"Maximum Depth of Binary Tree","topic":"simple binary trees (traversals)","difficulty":3,"minutes":12,"prompt":"Using the TreeNode class below, implement `max_depth(root) -> int` that returns the maximum depth (number of nodes along the longest root-to-leaf path) of the binary tree.\n\nExamples:\n  Tree [3,9,20,null,null,15,7] has depth 3.","starter":"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef max_depth(root) -> int:\n    # your code here\n    pass","hint":"max_depth = 1 + max(depth of left subtree, depth of right subtree). Base case: None has depth 0.","tests":["assert max_depth(None) == 0","assert max_depth(TreeNode(1)) == 1","t = TreeNode(3, TreeNode(9), TreeNode(20, TreeNode(15), TreeNode(7)))\nassert max_depth(t) == 3","t = TreeNode(1, None, TreeNode(2))\nassert max_depth(t) == 2","t = TreeNode(1, TreeNode(2, TreeNode(3, TreeNode(4))))\nassert max_depth(t) == 4"],"solution":"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef max_depth(root) -> int:\n    if root is None:\n        return 0\n    return 1 + max(max_depth(root.left), max_depth(root.right))","expert":"class TreeNode:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\ndef max_depth(root) -> int:\n    from collections import deque\n    if not root:\n        return 0\n    depth, queue = 0, deque([root])\n    while queue:\n        depth += 1\n        for _ in range(len(queue)):\n            node = queue.popleft()\n            if node.left: queue.append(node.left)\n            if node.right: queue.append(node.right)\n    return depth","explanation":"The recursive solution is a clean one-liner that mirrors the mathematical definition of depth. The iterative BFS solution counts levels by processing the queue level by level \u2014 it avoids recursion depth issues for very unbalanced trees and is useful when you need to track level information (e.g., minimum depth only reaches leaves)."},{"day":267,"title":"Top-K Frequent Words","topic":"hashing-based problems","difficulty":3,"minutes":12,"prompt":"Write a function `top_k_words(text: str, k: int) -> list[str]` that returns the k most frequent words in text (lowercase, split on spaces). Break ties alphabetically.\n\nExamples:\n- top_k_words('the cat sat on the mat the cat', 2) == ['the', 'cat']\n- top_k_words('a b c a b a', 2) == ['a', 'b']","starter":"def top_k_words(text: str, k: int) -> list[str]:\n    # your code here\n    pass","hint":"Build a Counter, then sort by (-count, word) and take the first k items.","tests":["assert top_k_words('the cat sat on the mat the cat', 2) == ['the', 'cat']","assert top_k_words('a b c a b a', 2) == ['a', 'b']","assert top_k_words('x', 1) == ['x']","assert top_k_words('a b c', 3) == ['a', 'b', 'c']","assert top_k_words('z z y y x', 2) == ['y', 'z']"],"solution":"def top_k_words(text: str, k: int) -> list[str]:\n    from collections import Counter\n    counts = Counter(text.lower().split())\n    sorted_words = sorted(counts, key=lambda w: (-counts[w], w))\n    return sorted_words[:k]","expert":"def top_k_words(text: str, k: int) -> list[str]:\n    from collections import Counter\n    import heapq\n    counts = Counter(text.lower().split())\n    return heapq.nsmallest(k, counts, key=lambda w: (-counts[w], w))","explanation":"The sorting approach is O(n log n) where n is the vocabulary size. The expert version uses `heapq.nsmallest` with a custom key \u2014 this is O(n log k) since it maintains a heap of size k. The key `(-count, word)` sorts by descending frequency and ascending alphabetical order simultaneously. `nsmallest` with a negated count is the standard trick for finding top-k with a min-heap."},{"day":268,"title":"Sliding Window Maximum","topic":"time/space complexity-aware refactors","difficulty":4,"minutes":12,"prompt":"Write a function `sliding_window_max(nums: list[int], k: int) -> list[int]` that returns the maximum of each window of size k as it slides across nums. O(n) time.\n\nExamples:\n- sliding_window_max([1,3,-1,-3,5,3,6,7], 3) == [3,3,5,5,6,7]\n- sliding_window_max([1], 1) == [1]","starter":"def sliding_window_max(nums: list[int], k: int) -> list[int]:\n    # your code here\n    pass","hint":"Use a deque of indices. Maintain it as a decreasing monotonic deque \u2014 pop the back when the new element is larger.","tests":["assert sliding_window_max([1, 3, -1, -3, 5, 3, 6, 7], 3) == [3, 3, 5, 5, 6, 7]","assert sliding_window_max([1], 1) == [1]","assert sliding_window_max([4, 3, 2, 1], 2) == [4, 3, 2]","assert sliding_window_max([1, 2, 3, 4], 2) == [2, 3, 4]","assert sliding_window_max([9, 11, 8, 5, 7], 3) == [11, 11, 8]"],"solution":"def sliding_window_max(nums: list[int], k: int) -> list[int]:\n    from collections import deque\n    dq = deque()\n    result = []\n    for i, v in enumerate(nums):\n        while dq and dq[0] < i - k + 1:\n            dq.popleft()\n        while dq and nums[dq[-1]] < v:\n            dq.pop()\n        dq.append(i)\n        if i >= k - 1:\n            result.append(nums[dq[0]])\n    return result","expert":"def sliding_window_max(nums: list[int], k: int) -> list[int]:\n    from collections import deque\n    if not nums or k == 0:\n        return []\n    dq: deque[int] = deque()\n    result: list[int] = []\n    for i in range(len(nums)):\n        if dq and dq[0] <= i - k:\n            dq.popleft()\n        while dq and nums[dq[-1]] <= nums[i]:\n            dq.pop()\n        dq.append(i)\n        if i >= k - 1:\n            result.append(nums[dq[0]])\n    return result","explanation":"The naive approach computes max of each window in O(k) giving O(nk) total. The monotonic deque solution maintains a window of candidate maximum indices: the front is always the index of the current window's maximum. Pops from the back discard elements that can never be a future maximum (smaller and to the left). This achieves O(n) time. The expert version adds type annotations and uses `<= i - k` for cleaner boundary expression."},{"day":269,"title":"Type-Safe Generic Stack","topic":"type hints & typing module (Optional, Union, TypeVar basics)","difficulty":3,"minutes":12,"prompt":"Implement a generic `Stack` class with full type hints using TypeVar and Generic:\n- `push(item: T) -> None`\n- `pop() -> T` \u2014 raises IndexError if empty\n- `peek() -> T | None` \u2014 top without removing, or None if empty\n- `is_empty() -> bool`","starter":"from typing import TypeVar, Generic, Optional\n\nT = TypeVar('T')\n\nclass Stack(Generic[T]):\n    # your code here\n    pass","hint":"Store items in a list. Use Generic[T] to make the class generic. peek() returns self._items[-1] if non-empty.","tests":["s = Stack()\nassert s.is_empty() == True","s = Stack()\ns.push(1); s.push(2)\nassert s.peek() == 2 and not s.is_empty()","s = Stack()\ns.push('a'); s.push('b')\nassert s.pop() == 'b' and s.pop() == 'a'","s = Stack()\nassert s.peek() is None","s = Stack()\ns.push(10)\ntry:\n    s.pop(); s.pop()\n    assert False\nexcept IndexError:\n    pass"],"solution":"from typing import TypeVar, Generic, Optional\n\nT = TypeVar('T')\n\nclass Stack(Generic[T]):\n    def __init__(self):\n        self._items = []\n\n    def push(self, item) -> None:\n        self._items.append(item)\n\n    def pop(self):\n        if not self._items:\n            raise IndexError('pop from empty stack')\n        return self._items.pop()\n\n    def peek(self):\n        return self._items[-1] if self._items else No
