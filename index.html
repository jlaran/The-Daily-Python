       pass\n\n    @classmethod\n    def from_json(cls, json_str):\n        pass\n","hint":"Use `cls.__annotations__` to get declared fields. For `to_json`, check if a field value is a `SerializableBase` instance and call its `_to_dict()`. For `from_json`, check if the annotated type is a subclass of `SerializableBase` and reconstruct.","tests":["class Dog(SerializableBase):\n    name: str\n    age: int\nd = Dog(name='Rex', age=3)\nj = d.to_json()\nimport json\ndata = json.loads(j)\nassert data['name'] == 'Rex' and data['age'] == 3","class Cat(SerializableBase):\n    name: str\nc = Cat(name='Whiskers')\nc2 = Cat.from_json(c.to_json())\nassert c2.name == 'Whiskers'","class City(SerializableBase):\n    name: str\nclass Country(SerializableBase):\n    capital: City\ncountry = Country(capital=City(name='Paris'))\nc2 = Country.from_json(country.to_json())\nassert c2.capital.name == 'Paris'","class Item(SerializableBase):\n    label: str\ntry:\n    Item(label='ok', unknown='bad')\n    assert False\nexcept TypeError:\n    pass","class Point(SerializableBase):\n    x: float\n    y: float\np = Point(x=1.5, y=2.5)\np2 = Point.from_json(p.to_json())\nassert p2.x == 1.5 and p2.y == 2.5"],"solution":"import json\n\nclass SerializableBase:\n    _fields = {}\n\n    def __init_subclass__(cls, **kwargs):\n        super().__init_subclass__(**kwargs)\n        # Collect own annotations (not inherited)\n        own_annotations = vars(cls).get('__annotations__', {})\n        # Inherit parent fields\n        parent_fields = {}\n        for base in cls.__mro__[1:]:\n            if hasattr(base, '_fields') and base is not SerializableBase:\n                parent_fields.update(base._fields)\n        cls._fields = {**parent_fields, **own_annotations}\n\n    def __init__(self, **kwargs):\n        unknown = set(kwargs) - set(self._fields)\n        if unknown:\n            raise TypeError(f'Unknown fields: {unknown}')\n        for name in self._fields:\n            setattr(self, name, kwargs.get(name))\n\n    def _to_dict(self):\n        result = {}\n        for name in self._fields:\n            val = getattr(self, name)\n            result[name] = val._to_dict() if isinstance(val, SerializableBase) else val\n        return result\n\n    def to_json(self):\n        return json.dumps(self._to_dict())\n\n    @classmethod\n    def from_json(cls, json_str):\n        data = json.loads(json_str)\n        kwargs = {}\n        for name, typ in cls._fields.items():\n            val = data.get(name)\n            if isinstance(typ, type) and issubclass(typ, SerializableBase) and isinstance(val, dict):\n                kwargs[name] = typ(**val)\n            else:\n                kwargs[name] = val\n        return cls(**kwargs)\n","expert":"import json\n\nclass SerializableBase:\n    _fields = {}\n\n    def __init_subclass__(cls, **kwargs):\n        super().__init_subclass__(**kwargs)\n        own = vars(cls).get('__annotations__', {})\n        inherited = {}\n        for base in reversed(cls.__mro__[1:]):\n            if hasattr(base, '_fields'):\n                inherited.update(base._fields)\n        cls._fields = {**inherited, **own}\n\n    def __init__(self, **kwargs):\n        unknown = set(kwargs) - set(self._fields)\n        if unknown:\n            raise TypeError(f'Unknown fields for {type(self).__name__}: {unknown}')\n        for name, typ in self._fields.items():\n            val = kwargs.get(name)\n            setattr(self, name, val)\n\n    def _to_dict(self):\n        result = {}\n        for name in self._fields:\n            val = getattr(self, name, None)\n            result[name] = val._to_dict() if isinstance(val, SerializableBase) else val\n        return result\n\n    def to_json(self):\n        return json.dumps(self._to_dict())\n\n    @classmethod\n    def _from_dict(cls, data):\n        kwargs = {}\n        for name, typ in cls._fields.items():\n            val = data.get(name)\n            if val is not None and isinstance(typ, type) and issubclass(typ, SerializableBase):\n                kwargs[name] = typ._from_dict(val)\n            else:\n                kwargs[name] = val\n        return cls(**kwargs)\n\n    @classmethod\n    def from_json(cls, json_str):\n        return cls._from_dict(json.loads(json_str))\n\n    def __eq__(self, other):\n        return type(self) is type(other) and self._to_dict() == other._to_dict()\n\n    def __repr__(self):\n        pairs = ', '.join(f'{k}={getattr(self,k)!r}' for k in self._fields)\n        return f'{type(self).__name__}({pairs})'\n","explanation":"`__init_subclass__` is the clean way to hook into subclass creation without writing a metaclass. By reading `__annotations__` from `vars(cls)` (not `cls.__annotations__`, which includes inherited ones), we correctly separate own fields from inherited ones. Recursive serialization of nested `SerializableBase` objects follows naturally from the type annotations. The expert adds `_from_dict` as a helper to enable recursive nested deserialization, and `__eq__` for easy comparison."},{"day":365,"title":"Capstone: Mini Framework","topic":"combining multiple concepts","difficulty":5,"minutes":15,"prompt":"Build a mini application framework that combines: metaclasses (auto-registration), descriptors (typed fields), event system, and a plugin-style command dispatcher.\n\nProvide:\n1. `Field(type_)` \u2014 descriptor that validates types on set.\n2. `CommandMeta` metaclass \u2014 auto-registers subclasses in `CommandMeta.registry` keyed by their `name` class attribute.\n3. `Command` base class (uses `CommandMeta`) with a `Field(str)` for `description` and an abstract `execute(**kwargs)` method.\n4. `EventBus` \u2014 an event emitter: `on(event, handler)`, `emit(event, **kwargs)`.\n5. `CommandDispatcher` \u2014 takes an `EventBus`. Method `dispatch(name, **kwargs)` looks up the command in the registry, creates an instance, calls `execute(**kwargs)`, then emits an `'after_command'` event with `{'name': name, 'result': result}`. Returns the result.\n\nDemonstrate with a `GreetCommand(Command)` that has `name = 'greet'` and `execute(who='world')` returning `f'Hello, {who}!'`.\n\nExample:\n```python\nbus = EventBus()\ndispatcher = CommandDispatcher(bus)\nresult = dispatcher.dispatch('greet', who='Alice')\nassert result == 'Hello, Alice!'\n```","starter":"class Field:\n    def __init__(self, type_):\n        self.type_ = type_\n        self.attr = None\n    def __set_name__(self, owner, name):\n        self.attr = f'_f_{name}'\n    def __get__(self, obj, objtype=None):\n        if obj is None: return self\n        return obj.__dict__.get(self.attr)\n    def __set__(self, obj, value):\n        if not isinstance(value, self.type_):\n            raise TypeError(f'Expected {self.type_.__name__}')\n        obj.__dict__[self.attr] = value\n\nclass CommandMeta(type):\n    registry = {}\n    def __new__(mcs, name, bases, namespace):\n        # TODO: register subclasses by their 'name' attribute\n        pass\n\nclass Command(metaclass=CommandMeta):\n    description = Field(str)\n    def execute(self, **kwargs):\n        raise NotImplementedError\n\nclass EventBus:\n    def __init__(self):\n        self._handlers = {}\n    def on(self, event, handler):\n        self._handlers.setdefault(event, []).append(handler)\n    def emit(self, event, **kwargs):\n        for h in self._handlers.get(event, []):\n            h(**kwargs)\n\nclass CommandDispatcher:\n    def __init__(self, bus):\n        self.bus = bus\n    def dispatch(self, name, **kwargs):\n        # TODO: look up, instantiate, execute, emit\n        pass\n\nclass GreetCommand(Command):\n    name = 'greet'\n    def execute(self, who='world'):\n        return f'Hello, {who}!'\n","hint":"In `CommandMeta.__new__`, check `if 'name' in namespace and bases` then `cls.registry[namespace['name']] = cls`. In `dispatch`, do `CommandMeta.registry[name]()` to instantiate.","tests":["bus = EventBus()\nd = CommandDispatcher(bus)\nresult = d.dispatch('greet', who='Alice')\nassert result == 'Hello, Alice!'","bus = EventBus()\nd = CommandDispatcher(bus)\nevents = []\nbus.on('after_command', lambda **kw: events.append(kw))\nd.dispatch('greet', who='Bob')\nassert len(events) == 1\nassert events[0]['name'] == 'greet'\nassert events[0]['result'] == 'Hello, Bob!'","assert 'greet' in CommandMeta.registry\nassert CommandMeta.registry['greet'] is GreetCommand","class EchoCommand(Command):\n    name = 'echo'\n    def execute(self, msg=''):\n        return msg\nbus = EventBus()\nd = CommandDispatcher(bus)\nassert d.dispatch('echo', msg='hi') == 'hi'","g = GreetCommand()\ng.description = 'Says hello'\nassert g.description == 'Says hello'\ntry:\n    g.description = 123\n    assert False\nexcept TypeError:\n    pass"],"solution":"class Field:\n    def __init__(self, type_):\n        self.type_ = type_\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_f_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        return obj.__dict__.get(self.attr)\n\n    def __set__(self, obj, value):\n        if not isinstance(value, self.type_):\n            raise TypeError(f'Expected {self.type_.__name__}, got {type(value).__name__}')\n        obj.__dict__[self.attr] = value\n\n\nclass CommandMeta(type):\n    registry = {}\n\n    def __new__(mcs, name, bases, namespace):\n        cls = super().__new__(mcs, name, bases, namespace)\n        if bases and 'name' in namespace:\n            mcs.registry[namespace['name']] = cls\n        return cls\n\n\nclass Command(metaclass=CommandMeta):\n    description = Field(str)\n\n    def execute(self, **kwargs):\n        raise NotImplementedError\n\n\nclass EventBus:\n    def __init__(self):\n        self._handlers = {}\n\n    def on(self, event, handler):\n        self._handlers.setdefault(event, []).append(handler)\n\n    def emit(self, event, **kwargs):\n        for handler in list(self._handlers.get(event, [])):\n            handler(**kwargs)\n\n\nclass CommandDispatcher:\n    def __init__(self, bus):\n        self.bus = bus\n\n    def dispatch(self, name, **kwargs):\n        cmd_cls = CommandMeta.registry[name]\n        cmd = cmd_cls()\n        result = cmd.execute(**kwargs)\n        self.bus.emit('after_command', name=name, result=result)\n        return result\n\n\nclass GreetCommand(Command):\n    name = 'greet'\n\n    def execute(self, who='world'):\n        return f'Hello, {who}!'\n","expert":"class Field:\n    def __init__(self, type_):\n        self.type_ = type_\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_f_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        return obj.__dict__.get(self.attr)\n\n    def __set__(self, obj, value):\n        if not isinstance(value, self.type_):\n            raise TypeError(f'Expected {self.type_.__name__}, got {type(value).__name__}')\n        obj.__dict__[self.attr] = value\n\n\nclass CommandMeta(type):\n    registry = {}\n\n    def __new__(mcs, name, bases, namespace):\n        cls = super().__new__(mcs, name, bases, namespace)\n        cmd_name = namespace.get('name')\n        if bases and cmd_name:\n            if cmd_name in mcs.registry:\n                raise ValueError(f'Command name {cmd_name!r} already registered')\n            mcs.registry[cmd_name] = cls\n        return cls\n\n\nclass Command(metaclass=CommandMeta):\n    description = Field(str)\n\n    def execute(self, **kwargs):\n        raise NotImplementedError\n\n    def __repr__(self):\n        return f'{type(self).__name__}()'\n\n\nclass EventBus:\n    def __init__(self):\n        self._handlers = {}\n\n    def on(self, event, handler):\n        self._handlers.setdefault(event, []).append(handler)\n        return self\n\n    def off(self, event, handler):\n        handlers = self._handlers.get(event, [])\n        if handler in handlers:\n            handlers.remove(handler)\n\n    def emit(self, event, **kwargs):\n        for handler in list(self._handlers.get(event, [])):\n            handler(**kwargs)\n\n\nclass CommandDispatcher:\n    def __init__(self, bus):\n        self.bus = bus\n\n    def dispatch(self, name, **kwargs):\n        try:\n            cmd_cls = CommandMeta.registry[name]\n        except KeyError:\n            raise KeyError(f'No command registered as {name!r}. Available: {list(CommandMeta.registry)}') from None\n        cmd = cmd_cls()\n        try:\n            result = cmd.execute(**kwargs)\n        except Exception as e:\n            self.bus.emit('command_error', name=name, error=e)\n            raise\n        self.bus.emit('after_command', name=name, result=result)\n        return result\n\n\nclass GreetCommand(Command):\n    name = 'greet'\n\n    def execute(self, who='world'):\n        return f'Hello, {who}!'\n","explanation":"This capstone combines four senior-level patterns: (1) a metaclass for auto-registration, eliminating boilerplate; (2) a validated descriptor for type-safe fields; (3) an event bus for decoupled side effects; (4) a command dispatcher that acts as the application's entry point. Together they implement the Command + Observer patterns, which underpin frameworks like Django's signals, SQLAlchemy's events, and Vue's reactivity. The expert adds duplicate-name detection, error event emission, and clear KeyError messages \u2014 production-quality defensive programming."}];

<script>
"use strict";
/* ---------- state ---------- */
const LS_KEY = "pydaily_v1";
function loadState(){
  try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if(s && s.startDate) return s; }catch(e){}
  const s = { startDate: todayStr(), completed: {}, hints: {} };
  localStorage.setItem(LS_KEY, JSON.stringify(s));
  return s;
}
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function daysBetween(a,b){ return Math.round((new Date(b+"T00:00:00") - new Date(a+"T00:00:00"))/86400000); }
let state = loadState();
function currentDay(){ return Math.min(365, daysBetween(state.startDate, todayStr()) + 1); }
function streak(){
  let s=0, cd=currentDay();
  for(let d=cd; d>=1; d--){
    if(state.completed[d]) s++;
    else { if(d===cd) continue; break; }
  }
  return s;
}

/* ---------- helpers ---------- */
function esc(t){ return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function el(id){ return document.getElementById(id); }
const PHASES = [
  [1,46,"Phase 1 · Fundamentals"],
  [47,92,"Phase 2 · Collections & Functions"],
  [93,138,"Phase 3 · Errors, Regex & Data"],
  [139,184,"Phase 4 · Object-Oriented Python"],
  [185,230,"Phase 5 · Iterators, functools & Decorators"],
  [231,276,"Phase 6 · Algorithms & Robust Code"],
  [277,322,"Phase 7 · Senior Idioms & Patterns"],
  [323,365,"Phase 8 · Capstone — Think Like a Senior"]
];

/* ---------- header stats ---------- */
function renderStats(){
  const done = Object.keys(state.completed).length;
  el("stats").innerHTML = `
    <div class="stat"><b>${currentDay()}<span style="font-size:12px;color:var(--muted)">/365</span></b>day</div>
    <div class="stat"><b>${done}</b>solved</div>
    <div class="stat"><b>${streak()}</b>streak</div>`;
}

/* ---------- home ---------- */
function showHome(){
  stopTimer();
  renderStats();
  const cd = currentDay();
  const ex = EXERCISES[cd-1];
  const doneToday = !!state.completed[cd];
  let html = `
  <div class="banner">
    <div>
      <h2>${doneToday ? "Day "+cd+" — complete ✓" : "Today's assignment — "+esc(ex.title)}</h2>
      <p>${doneToday ? "Come back tomorrow for the next one, or review any past day." :
        esc(ex.topic)+" · difficulty "+"★".repeat(ex.difficulty)+"☆".repeat(5-ex.difficulty)+" · "+ex.minutes+" min"}</p>
    </div>
    <button class="btn" onclick="openDay(${cd})">${doneToday ? "Review today" : "Start today's exercise →"}</button>
  </div>
  <div class="legend">
    <span><span class="dot" style="background:var(--accent)"></span>Solved</span>
    <span><span class="dot" style="background:var(--ink)"></span>Today</span>
    <span><span class="dot" style="background:var(--paper)"></span>Open (past)</span>
    <span><span class="dot" style="background:var(--paper);border-style:dashed;opacity:.45"></span>Locked (future)</span>
  </div>`;
  for(const [a,b,name] of PHASES){
    html += `<div class="phase"><h3>${name}</h3><div class="grid">`;
    for(let d=a; d<=b; d++){
      const cls = state.completed[d] ? "done" : d===cd ? "today" : d>cd ? "locked" : "";
      const t = EXERCISES[d-1];
      html += `<div class="cell ${cls}" title="Day ${d}: ${esc(t.title)}${d>cd?" (locked)":""}" ${d<=cd?`onclick="openDay(${d})"`:""}>${d}</div>`;
    }
    html += `</div></div>`;
  }
  el("main").innerHTML = html;
  window.scrollTo(0,0);
}

/* ---------- exercise ---------- */
let timerInt = null, timeLeft = 0, view = {};
function stopTimer(){ if(timerInt){ clearInterval(timerInt); timerInt = null; } }

function openDay(d){
  if(d > currentDay()) return;
  stopTimer();
  const ex = EXERCISES[d-1];
  const done = !!state.completed[d];
  view = { day: d, started: done, solutionsOpen: done, hintOpen: !!state.hints[d], timeUp: false, solved: done };
  renderStats();
  el("main").innerHTML = `
    <div class="crumb" onclick="showHome()">← All days</div>
    <div class="ex-head">
      <div>
        <div class="ex-title">Day ${d} — ${esc(ex.title)}</div>
        <div class="tags">
          <span class="tag">${esc(ex.topic)}</span>
          <span class="tag diff">${"★".repeat(ex.difficulty)}${"☆".repeat(5-ex.difficulty)}</span>
          <span class="tag">${ex.minutes} min</span>
          ${done ? '<span class="tag" style="color:var(--paper);background:var(--green)">✓ solved</span>' : ""}
        </div>
      </div>
      <div class="timer" id="timer"><small>TIME LEFT</small>${done ? "—" : fmt(ex.minutes*60)}</div>
    </div>
    <div id="exbody"></div>`;
  if(done) renderWork(ex);
  else {
    el("exbody").innerHTML = `
      <div class="card start-overlay">
        <h3>Ready?</h3>
        <p>You'll have <b>${ex.minutes} minutes</b>. When time is up the two solutions unlock — but you can keep coding.<br>
        One hint is available if you get stuck.</p>
        <button class="btn" onclick="startExercise()">Start the timer ▶</button>
      </div>`;
  }
  window.scrollTo(0,0);
}

function fmt(s){ return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`; }

function startExercise(){
  const ex = EXERCISES[view.day-1];
  view.started = true;
  timeLeft = ex.minutes*60;
  renderWork(ex);
  timerInt = setInterval(()=>{
    timeLeft--;
    const t = el("timer");
    if(!t){ stopTimer(); return; }
    t.innerHTML = `<small>TIME LEFT</small>${fmt(Math.max(0,timeLeft))}`;
    if(timeLeft<=60) t.classList.add("low");
    if(timeLeft<=0){ stopTimer(); timeUp(); }
  },1000);
  warmPyodide();
}

function timeUp(){
  view.timeUp = true;
  const t = el("timer");
  if(t){ t.classList.remove("low"); t.classList.add("done"); t.innerHTML = `<small>TIME LEFT</small>0:00`; }
  const n = el("timesup");
  if(n) n.classList.remove("hidden");
  unlockSolutions();
}

function renderWork(ex){
  const done = view.solved;
  let testsHtml = ex.tests.map((t,i)=>`<div class="test-row idle" id="t${i}"><span class="ico">·</span><span>${esc(t)}</span></div>`).join("");
  el("exbody").innerHTML = `
    <div class="timesup ${view.timeUp?"":"hidden"}" id="timesup">Time — both solutions are now unlocked below. Keep coding if you're close.</div>
    <div class="card"><h4>The task</h4><div class="prompt">${esc(ex.prompt)}</div></div>
    <div class="card">
      <h4>Your code</h4>
      <textarea class="editor" id="editor" spellcheck="false">${esc(done && state.completed[view.day].code ? state.completed[view.day].code : ex.starter)}</textarea>
      <div class="toolbar">
        <button class="btn green" id="runbtn" onclick="runCode()">Run &amp; validate</button>
        <button class="btn warn sm" id="hintbtn" onclick="showHint()" ${view.hintOpen?"disabled":""}>Use my one hint</button>
        <span class="loading hidden" id="pyload"><span class="spin"></span>Loading Python runtime…</span>
      </div>
      <div id="hintbox">${view.hintOpen?`<div class="hintbox"><b style="font-family:var(--mono);font-size:11px;letter-spacing:.1em">HINT —</b> ${esc(ex.hint)}</div>`:""}</div>
      <div id="runout"></div>
    </div>
    <div class="card">
      <h4>Validation tests</h4>
      <p style="color:var(--muted);font-size:12.5px;margin-bottom:10px">Tests compare exact values — spelling, punctuation and spacing all matter. Failed tests show what your code gave vs. what was expected.</p>
      ${testsHtml}
    </div>
    <div class="card" id="solcard">
      <h4>Solutions</h4>
      <div id="solbody">${view.solutionsOpen ? solutionsHtml(ex) : `<div class="lockmsg">Sealed until the timer runs out — or until you crack it yourself.</div>`}</div>
    </div>`;
  const ed = el("editor");
  ed.addEventListener("keydown", e=>{
    if(e.key==="Tab"){ e.preventDefault();
      const s=ed.selectionStart, t=ed.selectionEnd;
      ed.value = ed.value.slice(0,s)+"    "+ed.value.slice(t);
      ed.selectionStart=ed.selectionEnd=s+4;
    }
    if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){ e.preventDefault(); runCode(); }
  });
}

function solutionsHtml(ex){
  return `
    <div class="sol-grid">
      <div class="sol normal"><h5>The standard solution</h5><pre class="code">${esc(ex.solution)}</pre></div>
      <div class="sol expert"><h5>The senior move</h5><pre class="code">${esc(ex.expert)}</pre></div>
    </div>
    <div class="explain"><b>Why the senior version wins:</b> ${esc(ex.explanation)}</div>`;
}

function unlockSolutions(){
  if(view.solutionsOpen) return;
  view.solutionsOpen = true;
  const sb = el("solbody");
  if(sb) sb.innerHTML = solutionsHtml(EXERCISES[view.day-1]);
}

function showHint(){
  view.hintOpen = true;
  state.hints[view.day] = true; saveState();
  const ex = EXERCISES[view.day-1];
  el("hintbox").innerHTML = `<div class="hintbox"><b style="font-family:var(--mono);font-size:11px;letter-spacing:.1em">HINT —</b> ${esc(ex.hint)}</div>`;
  el("hintbtn").disabled = true;
}

/* ---------- pyodide (in a worker, with infinite-loop watchdog) ---------- */
const PY_URL = "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/";
let pyWorker = null, pyReady = null;
function warmPyodide(){ try{ ensureWorker().catch(()=>{}); }catch(e){} }
function killWorker(){ if(pyWorker) pyWorker.terminate(); pyWorker = null; pyReady = null; }
function ensureWorker(){
  if(pyReady) return pyReady;
  const src = `
    self.onmessage = async (e) => {
      const d = e.data;
      try {
        if (d.type === "init") {
          importScripts(d.url + "pyodide.js");
          self.py = await loadPyodide({ indexURL: d.url });
          self.py.runPython(d.runner);
          self.postMessage({ type: "ready" });
        } else if (d.type === "run") {
          const f = self.py.globals.get("__run");
          const res = f(d.code, self.py.toPy(d.tests));
          f.destroy();
          self.postMessage({ type: "result", json: res });
        }
      } catch (err) {
        self.postMessage({ type: "fatal", msg: String(err) });
      }
    };`;
  pyWorker = new Worker(URL.createObjectURL(new Blob([src], {type:"application/javascript"})));
  pyReady = new Promise((resolve, reject)=>{
    pyWorker.onmessage = ev => {
      if(ev.data.type === "ready") resolve();
      else if(ev.data.type === "fatal"){ killWorker(); reject(new Error("Could not load the Python runtime — check your internet connection. ("+ev.data.msg+")")); }
    };
    pyWorker.onerror = () => { killWorker(); reject(new Error("Could not load the Python runtime — check your internet connection.")); };
  });
  pyWorker.postMessage({type:"init", url: PY_URL, runner: RUNNER});
  return pyReady;
}
const RUN_TIMEOUT_MS = 12000;
async function runInWorker(code, tests){
  const lbl = el("pyload"); if(lbl) lbl.classList.remove("hidden");
  try{ await ensureWorker(); }
  finally{ const l = el("pyload"); if(l) l.classList.add("hidden"); }
  return new Promise((resolve, reject)=>{
    const w = pyWorker;
    const watchdog = setTimeout(()=>{
      killWorker();
      reject(new Error("⏱ Your code ran for more than "+(RUN_TIMEOUT_MS/1000)+"s — probably an infinite loop (check that loop counters advance and conditions can become False). I stopped it; fix the loop and run again."));
    }, RUN_TIMEOUT_MS);
    w.onmessage = ev => {
      if(ev.data.type === "result"){ clearTimeout(watchdog); resolve(JSON.parse(ev.data.json)); }
      else if(ev.data.type === "fatal"){ clearTimeout(watchdog); killWorker(); reject(new Error(ev.data.msg)); }
    };
    w.postMessage({type:"run", code: code, tests: tests});
  });
}

const RUNNER = `
import json, traceback, io, contextlib, ast
def __diagnose(src, ns):
    """When a bare assert fails, re-evaluate both sides of the comparison
    so the user sees actual vs expected instead of a blank AssertionError."""
    try:
        tree = ast.parse(src)
    except SyntaxError:
        return ""
    for node in ast.walk(tree):
        if not isinstance(node, ast.Assert):
            continue
        try:
            ok = eval(compile(ast.Expression(node.test), "<t>", "eval"), ns)
        except Exception:
            continue
        if ok:
            continue
        t = node.test
        if isinstance(t, ast.Compare) and len(t.ops) == 1:
            try:
                left = eval(compile(ast.Expression(t.left), "<t>", "eval"), ns)
                right = eval(compile(ast.Expression(t.comparators[0]), "<t>", "eval"), ns)
                ops = {ast.Eq: "==", ast.NotEq: "!=", ast.Lt: "<", ast.LtE: "<=", ast.Gt: ">",
                       ast.GtE: ">=", ast.Is: "is", ast.IsNot: "is not", ast.In: "in", ast.NotIn: "not in"}
                if isinstance(t.ops[0], ast.Eq):
                    return "your code gave " + repr(left) + "  |  expected " + repr(right)
                return "failed: " + repr(left) + " " + ops.get(type(t.ops[0]), "?") + " " + repr(right) + " is not true"
            except Exception:
                pass
        try:
            return "failed: assert " + ast.unparse(t)
        except Exception:
            return ""
    return ""
def __run(user_code, tests):
    ns = {}
    buf = io.StringIO()
    out = {"code_ok": True, "code_err": "", "results": [], "stdout": ""}
    try:
        with contextlib.redirect_stdout(buf):
            exec(user_code, ns)
    except Exception:
        out["code_ok"] = False
        tb = traceback.format_exc().splitlines()
        out["code_err"] = "\\n".join(tb[-3:])
    if out["code_ok"]:
        for t in tests:
            try:
                with contextlib.redirect_stdout(buf):
                    exec(t, ns)
                out["results"].append({"ok": True, "msg": ""})
            except AssertionError as e:
                m = str(e) or __diagnose(t, ns) or "expected value didn't match"
                out["results"].append({"ok": False, "msg": m})
            except Exception:
                tb = traceback.format_exc().splitlines()
                out["results"].append({"ok": False, "msg": tb[-1]})
    out["stdout"] = buf.getvalue()[:1500]
    return json.dumps(out)
`;

async function runCode(){
  if(!view.started) return;
  const btn = el("runbtn"), out = el("runout");
  btn.disabled = true;
  out.innerHTML = "";
  try{
    const ex = EXERCISES[view.day-1];
    const code = el("editor").value;
    const res = await runInWorker(code, ex.tests);
    if(!res.code_ok){
      ex.tests.forEach((_,i)=>setTest(i,"idle","·",""));
      out.innerHTML = `<div class="errbox">Your code raised an error:\n${esc(res.code_err)}</div>`;
    } else {
      let allPass = true;
      res.results.forEach((r,i)=>{
        setTest(i, r.ok?"pass":"fail", r.ok?"✓":"✗", r.msg);
        if(!r.ok) allPass = false;
      });
      if(res.stdout) out.innerHTML += `<pre class="code" style="margin-top:10px;color:var(--muted)">${esc(res.stdout)}</pre>`;
      if(allPass){
        out.innerHTML += `<div class="okbox">All tests passed — day ${view.day} solved. Now study both solutions below.</div>`;
        markSolved(code);
      } else {
        const n = res.results.filter(r=>r.ok).length;
        out.innerHTML += `<div class="errbox">${n}/${res.results.length} tests passing — keep going!</div>`;
      }
    }
  }catch(err){
    out.innerHTML = `<div class="errbox">${esc(String(err))}</div>`;
  }finally{
    btn.disabled = false;
  }
}

function setTest(i, cls, ico, msg){
  const r = el("t"+i); if(!r) return;
  r.className = "test-row "+cls;
  r.querySelector(".ico").textContent = ico;
  let m = r.querySelector(".msg");
  if(msg){ if(!m){ m=document.createElement("div"); m.className="msg"; m.style.cssText="color:var(--red);flex-basis:100%;padding-left:28px"; r.appendChild(m);} m.textContent=msg; }
  else if(m) m.remove();
}

function markSolved(code){
  if(!state.completed[view.day]){
    state.completed[view.day] = { date: todayStr(), usedHint: !!view.hintOpen, code: code };
    saveState();
  } else {
    state.completed[view.day].code = code; saveState();
  }
  view.solved = true;
  stopTimer();
  const t = el("timer"); if(t){ t.classList.remove("low"); t.innerHTML = `<small>SOLVED</small>✓`; t.style.color="var(--green)"; }
  unlockSolutions();
  renderStats();
}

function resetProgress(){
  if(confirm("Reset ALL progress? Your streak, solved days and saved code will be erased.")){
    localStorage.removeItem(LS_KEY);
    state = loadState();
    showHome();
  }
}

showHome();
