ead-only properties.\n- Uses `__slots__` to save memory.\n- Raises `TypeError` on any attempt to set or delete a field after construction.\n- Supports `__repr__`, `__eq__`, and `__hash__`.\n- Is constructable with positional args in the order given.\n\nExample:\n```python\nPoint = make_record('x', 'y')\np = Point(1, 2)\nassert p.x == 1 and p.y == 2\nassert p == Point(1, 2)\nassert hash(p) == hash(Point(1, 2))\n```","starter":"def make_record(*fields):\n    # TODO: dynamically create and return an immutable record class\n    pass\n","hint":"Use `type(name, bases, namespace)` to dynamically create a class. Store values in `__slots__` with mangled names. Define `__init__` using `object.__setattr__` to bypass the blocked `__setattr__`.","tests":["Point = make_record('x', 'y')\np = Point(3, 4)\nassert p.x == 3 and p.y == 4","Point = make_record('x', 'y')\np = Point(1, 2)\ntry:\n    p.x = 10\n    assert False\nexcept (AttributeError, TypeError):\n    pass","Point = make_record('x', 'y')\nassert Point(1, 2) == Point(1, 2)\nassert Point(1, 2) != Point(1, 3)","Point = make_record('x', 'y')\nassert hash(Point(1, 2)) == hash(Point(1, 2))","Color = make_record('r', 'g', 'b')\nc = Color(255, 128, 0)\nr = repr(c)\nassert 'r=255' in r and 'g=128' in r and 'b=0' in r"],"solution":"def make_record(*fields):\n    private = [f'_{f}' for f in fields]\n\n    def __init__(self, *args):\n        if len(args) != len(fields):\n            raise TypeError(f'Expected {len(fields)} args, got {len(args)}')\n        for priv, val in zip(private, args):\n            object.__setattr__(self, priv, val)\n\n    def __setattr__(self, name, value):\n        raise AttributeError('Record is immutable')\n\n    def __eq__(self, other):\n        if type(other) is not type(self):\n            return NotImplemented\n        return all(getattr(self, p) == getattr(other, p) for p in private)\n\n    def __hash__(self):\n        return hash(tuple(getattr(self, p) for p in private))\n\n    def __repr__(self):\n        parts = ', '.join(f'{f}={getattr(self, p)!r}' for f, p in zip(fields, private))\n        return f'{type(self).__name__}({parts})'\n\n    props = {f: property(lambda self, p=p: getattr(self, p)) for f, p in zip(fields, private)}\n    namespace = {\n        '__slots__': private,\n        '__init__': __init__,\n        '__setattr__': __setattr__,\n        '__eq__': __eq__,\n        '__hash__': __hash__,\n        '__repr__': __repr__,\n        **props,\n    }\n    # Use a placeholder name; it will be set on the class\n    cls = type('Record', (), namespace)\n    return cls\n","expert":"def make_record(*fields):\n    private = tuple(f'_{f}' for f in fields)\n\n    def __init__(self, *args):\n        if len(args) != len(fields):\n            raise TypeError(f'Expected {len(fields)} positional args, got {len(args)}')\n        for attr, val in zip(private, args):\n            object.__setattr__(self, attr, val)\n\n    def __setattr__(self, name, value):\n        raise AttributeError(f'{type(self).__name__!r} object is immutable')\n\n    def __delattr__(self, name):\n        raise AttributeError(f'{type(self).__name__!r} object is immutable')\n\n    def __eq__(self, other):\n        if type(other) is not type(self):\n            return NotImplemented\n        return tuple(getattr(self, p) for p in private) == tuple(getattr(other, p) for p in private)\n\n    def __hash__(self):\n        return hash(tuple(getattr(self, p) for p in private))\n\n    def __repr__(self):\n        pairs = ', '.join(f'{f}={getattr(self, p)!r}' for f, p in zip(fields, private))\n        return f'{type(self).__name__}({pairs})'\n\n    def _replace(self, **kwargs):\n        vals = [kwargs.get(f, getattr(self, p)) for f, p in zip(fields, private)]\n        return type(self)(*vals)\n\n    props = {f: property(lambda self, p=p: object.__getattribute__(self, p))\n             for f, p in zip(fields, private)}\n\n    namespace = {\n        '__slots__': private,\n        '__init__': __init__,\n        '__setattr__': __setattr__,\n        '__delattr__': __delattr__,\n        '__eq__': __eq__,\n        '__hash__': __hash__,\n        '__repr__': __repr__,\n        '_replace': _replace,\n        **props,\n    }\n    return type('Record', (), namespace)\n","explanation":"`make_record` is a class factory: it creates a new class at runtime using `type()`. The trick for immutability is storing values under private slot names (e.g., `_x`) and overriding `__setattr__` to raise \u2014 but using `object.__setattr__` in `__init__` to bypass that override for initial setup. The expert adds `_replace(**kwargs)` (like `namedtuple._replace`) and `__delattr__` for completeness, mirroring the namedtuple API."},{"day":348,"title":"Dependency Injection Container","topic":"plugin registries","difficulty":5,"minutes":15,"prompt":"Implement a simple dependency injection container `Container`.\n\n- `container.register(name, factory)` \u2014 register a factory (callable) under a name.\n- `container.register_singleton(name, factory)` \u2014 like `register`, but the factory is called only once; subsequent resolves return the same instance.\n- `container.resolve(name)` \u2014 call the factory (passing no args) and return the result. Raises `KeyError` if not registered.\n- `container.resolve_all()` \u2014 return a dict of `{name: resolved_instance}` for all singletons that have been instantiated.\n\nExample:\n```python\nc = Container()\nc.register('db', lambda: {'connected': True})\nc.register_singleton('config', lambda: {'env': 'prod'})\nassert c.resolve('db') is not c.resolve('db')  # new each time\nassert c.resolve('config') is c.resolve('config')  # same object\n```","starter":"class Container:\n    def __init__(self):\n        self._factories = {}\n        self._singletons = {}\n        self._singleton_cache = {}\n\n    def register(self, name, factory):\n        pass\n\n    def register_singleton(self, name, factory):\n        pass\n\n    def resolve(self, name):\n        pass\n\n    def resolve_all(self):\n        pass\n","hint":"For singletons, check if `name` is already in `_singleton_cache` before calling the factory. `resolve_all` returns the cache dict (a copy is safer).","tests":["c = Container()\nc.register('obj', lambda: object())\no1 = c.resolve('obj')\no2 = c.resolve('obj')\nassert o1 is not o2","c = Container()\nc.register_singleton('cfg', lambda: {'x': 1})\nfirst = c.resolve('cfg')\nsecond = c.resolve('cfg')\nassert first is second","c = Container()\ntry:\n    c.resolve('missing')\n    assert False\nexcept KeyError:\n    pass","c = Container()\nc.register_singleton('s', lambda: [1,2,3])\nc.resolve('s')\nall_res = c.resolve_all()\nassert 's' in all_res and all_res['s'] == [1,2,3]","c = Container()\nc.register('counter', list)\nassert c.resolve('counter') == []\nassert c.resolve('counter') == []"],"solution":"class Container:\n    def __init__(self):\n        self._factories = {}\n        self._singletons = {}\n        self._singleton_cache = {}\n\n    def register(self, name, factory):\n        self._factories[name] = factory\n\n    def register_singleton(self, name, factory):\n        self._singletons[name] = factory\n\n    def resolve(self, name):\n        if name in self._singletons:\n            if name not in self._singleton_cache:\n                self._singleton_cache[name] = self._singletons[name]()\n            return self._singleton_cache[name]\n        if name in self._factories:\n            return self._factories[name]()\n        raise KeyError(f'No factory registered for {name!r}')\n\n    def resolve_all(self):\n        return dict(self._singleton_cache)\n","expert":"class Container:\n    def __init__(self):\n        self._registry = {}  # name -> (factory, is_singleton)\n        self._cache = {}\n\n    def register(self, name, factory):\n        self._registry[name] = (factory, False)\n\n    def register_singleton(self, name, factory):\n        self._registry[name] = (factory, True)\n\n    def resolve(self, name):\n        if name not in self._registry:\n            raise KeyError(f'No binding for {name!r}. Registered: {list(self._registry)}')\n        factory, is_singleton = self._registry[name]\n        if is_singleton:\n            if name not in self._cache:\n                self._cache[name] = factory()\n            return self._cache[name]\n        return factory()\n\n    def resolve_all(self):\n        # Instantiate all singletons and return\n        for name, (factory, is_singleton) in self._registry.items():\n            if is_singleton and name not in self._cache:\n                self._cache[name] = factory()\n        return dict(self._cache)\n\n    def reset(self):\n        self._cache.clear()\n\n    def __contains__(self, name):\n        return name in self._registry\n","explanation":"A DI container centralises object creation, making it easy to swap implementations (e.g., swap a real DB for a mock in tests) by changing only the factory registration. The solution uses two separate dicts for clarity. The expert merges them into one registry holding a `(factory, is_singleton)` tuple \u2014 fewer data structures to keep in sync. It also adds `reset()` (clears singleton cache for testing) and `resolve_all()` that eagerly instantiates all singletons, useful for warm-up during app startup."},{"day":349,"title":"Iterable Protocol and Custom Iterator","topic":"generator-based pipelines","difficulty":4,"minutes":15,"prompt":"Implement a class `Range2D` that iterates over a 2D grid of `(row, col)` tuples.\n\n`Range2D(rows, cols)` \u2014 iterates row by row, column by column: `(0,0), (0,1), ..., (rows-1, cols-1)`.\n\nThe class must:\n- Implement `__iter__` and `__len__`.\n- Support `in` operator (`__contains__`).\n- Be re-iterable (can loop over it twice).\n- Raise `ValueError` if `rows < 0` or `cols < 0`.\n\nAlso write a standalone generator function `grid_diagonals(n)` that yields the anti-diagonals of an `n x n` grid as lists of `(row, col)` pairs, starting from the top-left corner.\n\nExample:\n```python\nr = Range2D(2, 3)\nlist(r)  # [(0,0),(0,1),(0,2),(1,0),(1,1),(1,2)]\nlist(r)  # same, re-iterable\n(1, 2) in r  # True\n```","starter":"class Range2D:\n    def __init__(self, rows, cols):\n        pass\n\n    def __iter__(self):\n        pass\n\n    def __len__(self):\n        pass\n\n    def __contains__(self, item):\n        pass\n\n\ndef grid_diagonals(n):\n    # yields anti-diagonals as lists\n    # diagonal 0: [(0,0)]\n    # diagonal 1: [(0,1),(1,0)]\n    # ...\n    pass\n","hint":"For `Range2D.__iter__`, use a nested `for` loop (or a generator expression). For `grid_diagonals`, anti-diagonal `d` contains cells where `row + col == d`, for `d` from 0 to `2*(n-1)`.","tests":["r = Range2D(2, 3)\nassert list(r) == [(0,0),(0,1),(0,2),(1,0),(1,1),(1,2)]","r = Range2D(2, 3)\nlist(r)\nassert list(r) == [(0,0),(0,1),(0,2),(1,0),(1,1),(1,2)]","r = Range2D(2, 3)\nassert (1, 2) in r\nassert (2, 0) not in r\nassert len(r) == 6","try:\n    Range2D(-1, 3)\n    assert False\nexcept ValueError:\n    pass","diags = list(grid_diagonals(3))\nassert diags[0] == [(0,0)]\nassert diags[1] == [(0,1),(1,0)]\nassert diags[3] == [(1,2),(2,1)]"],"solution":"class Range2D:\n    def __init__(self, rows, cols):\n        if rows < 0 or cols < 0:\n            raise ValueError('rows and cols must be non-negative')\n        self.rows = rows\n        self.cols = cols\n\n    def __iter__(self):\n        for r in range(self.rows):\n            for c in range(self.cols):\n                yield (r, c)\n\n    def __len__(self):\n        return self.rows * self.cols\n\n    def __contains__(self, item):\n        if not (isinstance(item, tuple) and len(item) == 2):\n            return False\n        r, c = item\n        return 0 <= r < self.rows and 0 <= c < self.cols\n\n\ndef grid_diagonals(n):\n    for d in range(2 * n - 1):\n        diagonal = [(r, d - r) for r in range(max(0, d - n + 1), min(n, d + 1))]\n        yield diagonal\n","expert":"class Range2D:\n    def __init__(self, rows, cols):\n        if rows < 0 or cols < 0:\n            raise ValueError('rows and cols must be non-negative')\n        self.rows = rows\n        self.cols = cols\n\n    def __iter__(self):\n        return ((r, c) for r in range(self.rows) for c in range(self.cols))\n\n    def __len__(self):\n        return self.rows * self.cols\n\n    def __contains__(self, item):\n        try:\n            r, c = item\n        except (TypeError, ValueError):\n            return False\n        return 0 <= r < self.rows and 0 <= c < self.cols\n\n    def __repr__(self):\n        return f'Range2D({self.rows}, {self.cols})'\n\n    def __reversed__(self):\n        return ((r, c) for r in range(self.rows - 1, -1, -1) for c in range(self.cols - 1, -1, -1))\n\n\ndef grid_diagonals(n):\n    for d in range(2 * n - 1):\n        yield [(r, d - r) for r in range(max(0, d - n + 1), min(n, d + 1))]\n","explanation":"Using a generator expression in `__iter__` (expert version) instead of `yield` inside a method is subtly different: the generator expression creates a new iterator object each call, ensuring re-iterability \u2014 while `yield` inside `__iter__` also works but makes the object itself the iterator (not re-iterable if the class has `__next__`). Adding `__reversed__` enables `reversed()` without materializing the whole grid. The anti-diagonal formula `row + col == d` is a classic grid-traversal trick."},{"day":350,"title":"Abstract Base Class with Template Method","topic":"metaprogramming","difficulty":4,"minutes":15,"prompt":"Use `abc.ABC` and `abc.abstractmethod` to build a `DataProcessor` abstract base class implementing the Template Method pattern.\n\n`DataProcessor` has:\n- Abstract methods: `load(source)` \u2192 raw data, `transform(data)` \u2192 processed data, `save(data, dest)` \u2192 None.\n- Concrete template method `run(source, dest)` that calls `load`, then `transform`, then `save` in sequence and returns the transformed data.\n- A concrete method `validate(data)` that raises `ValueError` if `data` is `None` or empty.\n- `run` must call `validate` on the raw data before transforming.\n\nAlso implement `UpperCaseProcessor(DataProcessor)` that: loads from a list of strings, uppercases them in `transform`, and saves by storing to `self.saved`.\n\nExample:\n```python\np = UpperCaseProcessor()\nresult = p.run(['hello', 'world'], None)\nassert result == ['HELLO', 'WORLD']\n```","starter":"from abc import ABC, abstractmethod\n\nclass DataProcessor(ABC):\n    @abstractmethod\n    def load(self, source):\n        pass\n\n    @abstractmethod\n    def transform(self, data):\n        pass\n\n    @abstractmethod\n    def save(self, data, dest):\n        pass\n\n    def validate(self, data):\n        pass\n\n    def run(self, source, dest):\n        pass\n\n\nclass UpperCaseProcessor(DataProcessor):\n    def __init__(self):\n        self.saved = None\n    # TODO: implement load, transform, save\n","hint":"`load` for `UpperCaseProcessor` just returns `source` (already a list). `transform` calls `.upper()` on each string. `run` chains them.","tests":["p = UpperCaseProcessor()\nresult = p.run(['hello', 'world'], None)\nassert result == ['HELLO', 'WORLD']\nassert p.saved == ['HELLO', 'WORLD']","try:\n    from abc import ABC\n    class Bad(DataProcessor):\n        pass\n    Bad()\n    assert False\nexcept TypeError:\n    pass","p = UpperCaseProcessor()\ntry:\n    p.run([], None)\n    assert False\nexcept ValueError:\n    pass","p = UpperCaseProcessor()\ntry:\n    p.run(None, None)\n    assert False\nexcept ValueError:\n    pass","p = UpperCaseProcessor()\nassert p.run(['abc'], None) == ['ABC']"],"solution":"from abc import ABC, abstractmethod\n\nclass DataProcessor(ABC):\n    @abstractmethod\n    def load(self, source):\n        pass\n\n    @abstractmethod\n    def transform(self, data):\n        pass\n\n    @abstractmethod\n    def save(self, data, dest):\n        pass\n\n    def validate(self, data):\n        if not data:\n            raise ValueError('Data is None or empty')\n\n    def run(self, source, dest):\n        raw = self.load(source)\n        self.validate(raw)\n        processed = self.transform(raw)\n        self.save(processed, dest)\n        return processed\n\n\nclass UpperCaseProcessor(DataProcessor):\n    def __init__(self):\n        self.saved = None\n\n    def load(self, source):\n        return source\n\n    def transform(self, data):\n        return [s.upper() for s in data]\n\n    def save(self, data, dest):\n        self.saved = data\n","expert":"from abc import ABC, abstractmethod\n\nclass DataProcessor(ABC):\n    @abstractmethod\n    def load(self, source):\n        \"\"\"Load raw data from source.\"\"\"\n\n    @abstractmethod\n    def transform(self, data):\n        \"\"\"Transform raw data.\"\"\"\n\n    @abstractmethod\n    def save(self, data, dest):\n        \"\"\"Persist processed data.\"\"\"\n\n    def validate(self, data):\n        if data is None or (hasattr(data, '__len__') and len(data) == 0):\n            raise ValueError('Data must be non-None and non-empty')\n\n    def pre_transform_hook(self, data):\n        \"\"\"Override to add pre-transform logic.\"\"\"\n        return data\n\n    def run(self, source, dest):\n        raw = self.load(source)\n        self.validate(raw)\n        raw = self.pre_transform_hook(raw)\n        processed = self.transform(raw)\n        self.save(processed, dest)\n        return processed\n\n\nclass UpperCaseProcessor(DataProcessor):\n    def __init__(self):\n        self.saved = None\n\n    def load(self, source):\n        return source\n\n    def transform(self, data):\n        return [item.upper() for item in data]\n\n    def save(self, data, dest):\n        self.saved = data\n","explanation":"The Template Method pattern defines an algorithm skeleton in a base class and lets subclasses fill in specific steps \u2014 the 'Hollywood Principle': don't call us, we'll call you. `ABC` + `@abstractmethod` enforces that subclasses implement the required steps; Python raises `TypeError` at instantiation time if any abstract method is unimplemented. The expert adds a `pre_transform_hook` \u2014 an optional override point following the 'hook method' pattern, giving subclasses finer control without changing the skeleton."},{"day":351,"title":"Lazy Attribute Loading","topic":"caching","difficulty":4,"minutes":15,"prompt":"Implement a `lazy` descriptor that delays the computation of an attribute until it is first accessed, then caches the result forever on the instance. Unlike `cached_property`, `lazy` takes the computation as a callable passed at descriptor creation time (not as a decorated method).\n\nSignature: `lazy(factory)` where `factory` is a zero-arg callable.\n\nAlso implement `lazy_from(attr, factory)` \u2014 a descriptor whose factory receives the instance as argument.\n\nExample:\n```python\nclass Config:\n    data = lazy(lambda: {'key': 'value'})\n    doubled = lazy_from('data', lambda d: {k: v*2 for k, v in d.items()})\n\nc = Config()\nassert c.data == {'key': 'value'}\nassert c.doubled == {'key': 'valuevalue'}\n```","starter":"class lazy:\n    def __init__(self, factory):\n        self.factory = factory\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_lazy_{name}'\n\n    def __get__(self, obj, objtype=None):\n        pass\n\n\nclass lazy_from:\n    def __init__(self, source_attr, factory):\n        self.source_attr = source_attr\n        self.factory = factory\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_lazyfrom_{name}'\n\n    def __get__(self, obj, objtype=None):\n        pass\n","hint":"In `__get__`, check `obj.__dict__` for the cached value using a sentinel. If missing, compute and store. For `lazy_from`, pass `getattr(obj, self.source_attr)` to the factory.","tests":["count = [0]\nclass C:\n    val = lazy(lambda: count.__setitem__(0, count[0]+1) or 42)\nc = C()\nassert c.val == 42\nassert c.val == 42\nassert count[0] == 1","class C:\n    items = lazy(list)\nc1 = C()\nc2 = C()\nassert c1.items is c1.items\nassert c1.items is not c2.items","class C:\n    x = lazy(lambda: 10)\n    doubled = lazy_from('x', lambda v: v * 2)\nc = C()\nassert c.doubled == 20","class C:\n    data = lazy(lambda: {'a': 'b'})\n    upper = lazy_from('data', lambda d: {k: v.upper() for k,v in d.items()})\nc = C()\nassert c.upper == {'a': 'B'}","_MISSING = object()\nclass C:\n    v = lazy(lambda: None)  # falsy but valid\nc = C()\nassert c.v is None"],"solution":"_LAZY_MISSING = object()\n\nclass lazy:\n    def __init__(self, factory):\n        self.factory = factory\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_lazy_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        val = obj.__dict__.get(self.attr, _LAZY_MISSING)\n        if val is _LAZY_MISSING:\n            val = self.factory()\n            obj.__dict__[self.attr] = val\n        return val\n\n\nclass lazy_from:\n    def __init__(self, source_attr, factory):\n        self.source_attr = source_attr\n        self.factory = factory\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_lazyfrom_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        val = obj.__dict__.get(self.attr, _LAZY_MISSING)\n        if val is _LAZY_MISSING:\n            source = getattr(obj, self.source_attr)\n            val = self.factory(source)\n            obj.__dict__[self.attr] = val\n        return val\n","expert":"_LAZY_MISSING = object()\n\nclass lazy:\n    \"\"\"Descriptor that lazily evaluates and caches a zero-arg factory.\"\"\"\n    def __init__(self, factory):\n        self.factory = factory\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_lazy_{name}'\n        # Verify the owner doesn't use __slots__ without our attr\n        if hasattr(owner, '__slots__') and self.attr not in getattr(owner, '__slots__', ()):\n            pass  # warn in production; skip for brevity\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        cache = obj.__dict__\n        if self.attr not in cache:\n            cache[self.attr] = self.factory()\n        return cache[self.attr]\n\n    def invalidate(self, obj):\n        obj.__dict__.pop(self.attr, None)\n\n\nclass lazy_from:\n    \"\"\"Descriptor that lazily evaluates factory(instance.source_attr) and caches it.\"\"\"\n    def __init__(self, source_attr, factory):\n        self.source_attr = source_attr\n        self.factory = factory\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_lazyfrom_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        if self.attr not in obj.__dict__:\n            obj.__dict__[self.attr] = self.factory(getattr(obj, self.source_attr))\n        return obj.__dict__[self.attr]\n\n    def invalidate(self, obj):\n        obj.__dict__.pop(self.attr, None)\n","explanation":"Lazy attributes are a form of demand-driven computation \u2014 nothing is computed until it is needed, improving startup time and avoiding unnecessary work. Both descriptors write directly to `obj.__dict__` with a mangled key, so subsequent accesses bypass the descriptor entirely (the instance dict shadows non-data descriptors). The expert adds an `invalidate(obj)` method, which is essential in reactive systems where cached derived values must be recomputed when source data changes."},{"day":352,"title":"Protocol-Based Duck Typing","topic":"API design","difficulty":4,"minutes":15,"prompt":"Use `typing.Protocol` (structural subtyping) to define a `Drawable` protocol and a `Serializable` protocol. Then write a function `render_all(items)` that accepts any iterable of `Drawable` objects and returns a list of their `draw()` return values, and `serialize_all(items)` that collects `to_dict()` from `Serializable` objects.\n\n`Drawable` protocol: has `draw() -> str`.\n`Serializable` protocol: has `to_dict() -> dict`.\n\nAlso implement:\n- `Circle(radius)` \u2014 implements both protocols. `draw()` returns `f'Circle(r={self.radius})'`, `to_dict()` returns `{'shape': 'circle', 'radius': self.radius}`.\n- `Square(side)` \u2014 implements both. `draw()` returns `f'Square(s={self.side})'`, `to_dict()` returns `{'shape': 'square', 'side': self.side}`.\n\nNote: Do NOT inherit from the protocols \u2014 demonstrate structural (duck) typing.","starter":"from typing import Protocol, runtime_checkable\n\n@runtime_checkable\nclass Drawable(Protocol):\n    def draw(self) -> str:\n        ...\n\n@runtime_checkable\nclass Serializable(Protocol):\n    def to_dict(self) -> dict:\n        ...\n\ndef render_all(items):\n    pass\n\ndef serialize_all(items):\n    pass\n\nclass Circle:\n    def __init__(self, radius):\n        self.radius = radius\n    # TODO: draw and to_dict\n\nclass Square:\n    def __init__(self, side):\n        self.side = side\n    # TODO: draw and to_dict\n","hint":"Protocols with `@runtime_checkable` support `isinstance` checks. But structural typing works even without explicit inheritance \u2014 just implement the methods.","tests":["c = Circle(5)\nassert c.draw() == 'Circle(r=5)'\nassert c.to_dict() == {'shape': 'circle', 'radius': 5}","s = Square(3)\nassert s.draw() == 'Square(s=3)'\nassert s.to_dict() == {'shape': 'square', 'side': 3}","shapes = [Circle(1), Square(2)]\nassert render_all(shapes) == ['Circle(r=1)', 'Square(s=2)']","shapes = [Circle(1), Square(2)]\nassert serialize_all(shapes) == [{'shape':'circle','radius':1}, {'shape':'square','side':2}]","assert isinstance(Circle(1), Drawable)\nassert isinstance(Square(1), Serializable)"],"solution":"from typing import Protocol, runtime_checkable\n\n@runtime_checkable\nclass Drawable(Protocol):\n    def draw(self) -> str:\n        ...\n\n@runtime_checkable\nclass Serializable(Protocol):\n    def to_dict(self) -> dict:\n        ...\n\ndef render_all(items):\n    return [item.draw() for item in items]\n\ndef serialize_all(items):\n    return [item.to_dict() for item in items]\n\nclass Circle:\n    def __init__(self, radius):\n        self.radius = radius\n\n    def draw(self) -> str:\n        return f'Circle(r={self.radius})'\n\n    def to_dict(self) -> dict:\n        return {'shape': 'circle', 'radius': self.radius}\n\nclass Square:\n    def __init__(self, side):\n        self.side = side\n\n    def draw(self) -> str:\n        return f'Square(s={self.side})'\n\n    def to_dict(self) -> dict:\n        return {'shape': 'square', 'side': self.side}\n","expert":"from typing import Protocol, runtime_checkable, List\n\n@runtime_checkable\nclass Drawable(Protocol):\n    def draw(self) -> str:\n        ...\n\n@runtime_checkable\nclass Serializable(Protocol):\n    def to_dict(self) -> dict:\n        ...\n\ndef render_all(items) -> List[str]:\n    if not all(isinstance(i, Drawable) for i in items):\n        raise TypeError('All items must implement Drawable')\n    return [item.draw() for item in items]\n\ndef serialize_all(items) -> List[dict]:\n    return [item.to_dict() for item in items]\n\nclass Circle:\n    __slots__ = ('radius',)\n\n    def __init__(self, radius: float):\n        self.radius = radius\n\n    def draw(self) -> str:\n        return f'Circle(r={self.radius})'\n\n    def to_dict(self) -> dict:\n        return {'shape': 'circle', 'radius': self.radius}\n\n    def __repr__(self) -> str:\n        return f'Circle(radius={self.radius})'\n\nclass Square:\n    __slots__ = ('side',)\n\n    def __init__(self, side: float):\n        self.side = side\n\n    def draw(self) -> str:\n        return f'Square(s={self.side})'\n\n    def to_dict(self) -> dict:\n        return {'shape': 'square', 'side': self.side}\n\n    def __repr__(self) -> str:\n        return f'Square(side={self.side})'\n","explanation":"`typing.Protocol` enables structural subtyping (PEP 544): a class satisfies a protocol if it has the required methods, regardless of inheritance. This is Python's formalization of duck typing, with optional static type checking via mypy. `@runtime_checkable` adds `isinstance` support, but note it only checks method names, not signatures. The expert adds a guard in `render_all` showing how `isinstance` + Protocol can enforce contracts at runtime."},{"day":353,"title":"Pipeline with Error Handling","topic":"generator-based pipelines","difficulty":5,"minutes":15,"prompt":"Extend the generator pipeline idea with error handling. Implement:\n\n1. `safe_transform(records, func, on_error='skip')` \u2014 a generator that applies `func` to each record. If `func` raises, behavior depends on `on_error`: `'skip'` silently skips the record; `'sentinel'` yields a `TransformError(item, exc)` object; `'raise'` re-raises.\n\n2. `class TransformError` \u2014 holds `.item` (the original) and `.error` (the exception).\n\n3. `collect_results(records)` \u2014 consumes a pipeline, returning `(successes, errors)` where `successes` is a list of non-error items and `errors` is a list of `TransformError` objects.\n\nExample:\n```python\nresults = safe_transform([1, 'bad', 3], lambda x: x * 2, on_error='sentinel')\nsuccesses, errors = collect_results(results)\n# successes=[2, 6], errors=[TransformError('bad', TypeError(...))] \n```","starter":"class TransformError:\n    def __init__(self, item, error):\n        self.item = item\n        self.error = error\n\n    def __repr__(self):\n        return f'TransformError({self.item!r}, {self.error!r})'\n\n\ndef safe_transform(records, func, on_error='skip'):\n    # TODO\n    pass\n\n\ndef collect_results(records):\n    # TODO: returns (successes_list, errors_list)\n    pass\n","hint":"In `safe_transform`, wrap `func(item)` in a try/except. For `collect_results`, check `isinstance(item, TransformError)` to separate results.","tests":["results = list(safe_transform([1,2,3], lambda x: x+1, on_error='skip'))\nassert results == [2, 3, 4]","results = list(safe_transform([1,'x',3], lambda x: x+1, on_error='skip'))\nassert results == [2, 4]","results = list(safe_transform([1,'x',3], lambda x: x+1, on_error='sentinel'))\nassert len(results) == 3\nassert isinstance(results[1], TransformError)\nassert results[1].item == 'x'","try:\n    list(safe_transform([1,'x'], lambda x: x+1, on_error='raise'))\n    assert False\nexcept TypeError:\n    pass","gen = safe_transform([1,'x',3], lambda x: x+1, on_error='sentinel')\nsuccesses, errors = collect_results(gen)\nassert successes == [2, 4]\nassert len(errors) == 1 and isinstance(errors[0], TransformError)"],"solution":"class TransformError:\n    def __init__(self, item, error):\n        self.item = item\n        self.error = error\n\n    def __repr__(self):\n        return f'TransformError({self.item!r}, {self.error!r})'\n\n\ndef safe_transform(records, func, on_error='skip'):\n    for item in records:\n        try:\n            yield func(item)\n        except Exception as e:\n            if on_error == 'skip':\n                continue\n            elif on_error == 'sentinel':\n                yield TransformError(item, e)\n            elif on_error == 'raise':\n                raise\n\n\ndef collect_results(records):\n    successes = []\n    errors = []\n    for item in records:\n        if isinstance(item, TransformError):\n            errors.append(item)\n        else:\n            successes.append(item)\n    return successes, errors\n","expert":"class TransformError:\n    __slots__ = ('item', 'error')\n\n    def __init__(self, item, error):\n        self.item = item\n        self.error = error\n\n    def __repr__(self):\n        return f'TransformError(item={self.item!r}, error={self.error!r})'\n\n\ndef safe_transform(records, func, on_error='skip'):\n    if on_error not in ('skip', 'sentinel', 'raise'):\n        raise ValueError(f'Invalid on_error value: {on_error!r}')\n    for item in records:\n        try:\n            result = func(item)\n        except Exception as e:\n            if on_error == 'raise':\n                raise\n            elif on_error == 'sentinel':\n                yield TransformError(item, e)\n            # 'skip': do nothing\n        else:\n            yield result\n\n\ndef collect_results(records):\n    successes = []\n    errors = []\n    for item in records:\n        (errors if isinstance(item, TransformError) else successes).append(item)\n    return successes, errors\n","explanation":"Mixing 'success' and 'error sentinel' values in a stream is the 'Result type' pattern from functional programming \u2014 similar to Rust's `Result<T, E>` or Haskell's `Either`. The expert uses `try/except/else`: the `else` clause runs only when no exception was raised, which is cleaner than assigning to a variable inside `try` and yielding outside. The `collect_results` idiom `(errors if condition else successes).append(item)` is a compact way to dispatch to one of two lists."},{"day":354,"title":"Chainable Validation","topic":"API design","difficulty":4,"minutes":15,"prompt":"Implement a `Validator` class with a fluent (chainable) API for building validation pipelines.\n\n`Validator()` starts empty. Methods:\n- `required()` \u2014 value must not be `None` or empty string.\n- `min_length(n)` \u2014 string length must be >= n.\n- `max_length(n)` \u2014 string length must be <= n.\n- `matches(pattern)` \u2014 string must match the regex pattern.\n- `custom(func, message)` \u2014 apply a custom predicate; fail with `message` if `func(value)` is `False`.\n- `validate(value)` \u2014 run all checks, return `(True, [])` on success or `(False, [error_messages])` on failure.\n\nAll builder methods return `self` for chaining.\n\nExample:\n```python\nv = Validator().required().min_length(3).max_length(10)\nok, errs = v.validate('hi')\n# ok=False, errs=['min_length: must be at least 3 characters']\n```","starter":"import re\n\nclass Validator:\n    def __init__(self):\n        self._checks = []\n\n    def required(self):\n        pass\n\n    def min_length(self, n):\n        pass\n\n    def max_length(self, n):\n        pass\n\n    def matches(self, pattern):\n        pass\n\n    def custom(self, func, message):\n        pass\n\n    def validate(self, value):\n        pass\n","hint":"Each builder method appends a `(predicate, error_message)` pair to `self._checks` and returns `self`. `validate` runs all predicates and collects failures.","tests":["ok, errs = Validator().required().validate(None)\nassert ok == False and len(errs) == 1","ok, errs = Validator().required().validate('hello')\nassert ok == True and errs == []","ok, errs = Validator().min_length(5).validate('hi')\nassert ok == False","ok, errs = Validator().min_length(2).max_length(5).validate('hello')\nassert ok == True","import re\nok, errs = Validator().matches(r'^\\d+$').validate('abc')\nassert ok == False\nok2, _ = Validator().matches(r'^\\d+$').validate('123')\nassert ok2 == True"],"solution":"import re\n\nclass Validator:\n    def __init__(self):\n        self._checks = []\n\n    def required(self):\n        self._checks.append(\n            (lambda v: v is not None and v != '', 'required: value is required')\n        )\n        return self\n\n    def min_length(self, n):\n        self._checks.append(\n            (lambda v: v is not None and len(v) >= n, f'min_length: must be at least {n} characters')\n        )\n        return self\n\n    def max_length(self, n):\n        self._checks.append(\n            (lambda v: v is not None and len(v) <= n, f'max_length: must be at most {n} characters')\n        )\n        return self\n\n    def matches(self, pattern):\n        self._checks.append(\n            (lambda v: v is not None and bool(re.match(pattern, v)), f'matches: must match pattern {pattern!r}')\n        )\n        return self\n\n    def custom(self, func, message):\n        self._checks.append((func, message))\n        return self\n\n    def validate(self, value):\n        errors = [msg for pred, msg in self._checks if not pred(value)]\n        return len(errors) == 0, errors\n","expert":"import re\n\nclass Validator:\n    def __init__(self):\n        self._checks = []\n\n    def _add(self, predicate, message):\n        self._checks.append((predicate, message))\n        return self\n\n    def required(self):\n        return self._add(lambda v: v is not None and v != '', 'required: value is required')\n\n    def min_length(self, n):\n        return self._add(lambda v: isinstance(v, str) and len(v) >= n,\n                         f'min_length: must be at least {n} characters')\n\n    def max_length(self, n):\n        return self._add(lambda v: isinstance(v, str) and len(v) <= n,\n                         f'max_length: must be at most {n} characters')\n\n    def matches(self, pattern):\n        _re = re.compile(pattern)\n        return self._add(lambda v: isinstance(v, str) and bool(_re.match(v)),\n                         f'matches: must match pattern {pattern!r}')\n\n    def custom(self, func, message):\n        return self._add(func, message)\n\n    def validate(self, value):\n        errors = [msg for pred, msg in self._checks if not pred(value)]\n        return not errors, errors\n\n    def clone(self):\n        v = Validator()\n        v._checks = list(self._checks)\n        return v\n","explanation":"The fluent builder pattern lets you compose validation rules declaratively, and the result is an object that can be stored and re-used for validating many values. The expert pre-compiles the regex (`re.compile`) in `matches` rather than re-compiling on every `validate` call \u2014 a significant optimization when validating large datasets. It also adds `clone()` for branching: `base = Validator().required(); email_v = base.clone().matches(r'.*@.*')` without mutating the base."},{"day":355,"title":"Metaclass + Descriptor Combo","topic":"metaprogramming","difficulty":5,"minutes":15,"prompt":"Combine metaclasses and descriptors to build a mini-ORM-style `Model` base class.\n\nRules:\n1. Define a `Field(type_)` descriptor that validates type on `__set__`.\n2. Define a `ModelMeta` metaclass that, at class creation, collects all `Field` instances into `cls._fields` (a dict `{name: Field}`).\n3. `Model` (using `ModelMeta`) provides:\n   - `__init__(**kwargs)` \u2014 sets each field from kwargs; raises `TypeError` for unknown fields.\n   - `to_dict()` \u2014 returns `{name: value}` for all fields.\n   - `__repr__` \u2014 `ClassName(field=value, ...)`.\n\nExample:\n```python\nclass User(Model):\n    name = Field(str)\n    age = Field(int)\n\nu = User(name='Alice', age=30)\nassert u.to_dict() == {'name': 'Alice', 'age': 30}\n```","starter":"class Field:\n    def __init__(self, type_):\n        self.type_ = type_\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_field_{name}'\n\n    def __get__(self, obj, objtype=None):\n        pass\n\n    def __set__(self, obj, value):\n        pass\n\n\nclass ModelMeta(type):\n    def __new__(mcs, name, bases, namespace):\n        pass\n\n\nclass Model(metaclass=ModelMeta):\n    pass\n","hint":"In `ModelMeta.__new__`, scan `namespace.items()` for `Field` instances and build `cls._fields`. In `Model.__init__`, iterate `self._fields` and call `setattr(self, name, kwargs[name])`.","tests":["class Person(Model):\n    name = Field(str)\n    age = Field(int)\np = Person(name='Bob', age=25)\nassert p.name == 'Bob' and p.age == 25","class Person(Model):\n    name = Field(str)\n    age = Field(int)\np = Person(name='Alice', age=30)\nassert p.to_dict() == {'name': 'Alice', 'age': 30}","class Person(Model):\n    name = Field(str)\ntry:\n    Person(name=123)\n    assert False\nexcept TypeError:\n    pass","class Item(Model):\n    price = Field(float)\ntry:\n    Item(price=1.0, unknown=True)\n    assert False\nexcept TypeError:\n    pass","class Tag(Model):\n    label = Field(str)\nt = Tag(label='python')\nassert 'label=\\'python\\'' in repr(t)"],"solution":"class Field:\n    def __init__(self, type_):\n        self.type_ = type_\n        self.attr = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_field_{name}'\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        return obj.__dict__.get(self.attr)\n\n    def __set__(self, obj, value):\n        if not isinstance(value, self.type_):\n            raise TypeError(f'Expected {self.type_.__name__}, got {type(value).__name__}')\n        obj.__dict__[self.attr] = value\n\n\nclass ModelMeta(type):\n    def __new__(mcs, name, bases, namespace):\n        fields = {k: v for k, v in namespace.items() if isinstance(v, Field)}\n        # Also inherit fields from base models\n        for base in bases:\n            if hasattr(base, '_fields'):\n                for fname, field in base._fields.items():\n                    if fname not in fields:\n                        fields[fname] = field\n        cls = super().__new__(mcs, name, bases, namespace)\n        cls._fields = fields\n        return cls\n\n\nclass Model(metaclass=ModelMeta):\n    def __init__(self, **kwargs):\n        unknown = set(kwargs) - set(self._fields)\n        if unknown:\n            raise TypeError(f'Unknown fields: {unknown}')\n        for name in self._fields:\n            if name in kwargs:\n                setattr(self, name, kwargs[name])\n\n    def to_dict(self):\n        return {name: getattr(self, name) for name in self._fields}\n\n    def __repr__(self):\n        parts = ', '.join(f'{k}={v!r}' for k, v in self.to_dict().items())\n        return f'{type(self).__name__}({parts})'\n","expert":"class Field:\n    def __init__(self, type_, required=True, default=None):\n        self.type_ = type_\n        self.required = required\n        self.default = default\n        self.attr = None\n        self.name = None\n\n    def __set_name__(self, owner, name):\n        self.attr = f'_field_{name}'\n        self.name = name\n\n    def __get__(self, obj, objtype=None):\n        if obj is None:\n            return self\n        return obj.__dict__.get(self.attr, self.default)\n\n    def __set__(self, obj, value):\n        if not isinstance(value, self.type_):\n            raise TypeError(\n                f'Field {self.name!r}: expected {self.type_.__name__!r}, got {type(value).__name__!r}'\n            )\n        obj.__dict__[self.attr] = value\n\n\nclass ModelMeta(type):\n    def __new__(mcs, name, bases, namespace):\n        fields = {}\n        for base in reversed(bases):\n            if hasattr(base, '_fields'):\n                fields.update(base._fields)\n        fields.update({k: v for k, v in namespace.items() if isinstance(v, Field)})\n        cls = super().__new__(mcs, name, bases, namespace)\n        cls._fields = fields\n        return cls\n\n\nclass Model(metaclass=ModelMeta):\n    def __init__(self, **kwargs):\n        unknown = set(kwargs) - set(self._fields)\n        if unknown:\n            raise TypeError(f'Unknown fields: {unknown}')\n        for name, field in self._fields.items():\n            if name in kwargs:\n                setattr(self, name, kwargs[name])\n            elif field.required and field.default is None:\n                pass  # allow unset for now (lazy validation)\n\n    def to_dict(self):\n        return {name: getattr(self, name) for name in self._fields}\n\n    def __repr__(self):\n        parts = ', '.join(f'{k}={v!r}' for k, v in self.to_dict().items())\n        return f'{type(self).__name__}({parts})'\n\n    def __eq__(self, other):\n        return type(self) is type(other) and self.to_dict() == other.to_dict()\n\n    def __hash__(self):\n        return hash((type(self), tuple(sorted(self.to_dict().items()))))\n","explanation":"This pattern is the foundation of every Python ORM (Django models, SQLAlchemy). The metaclass's `__new__` runs at class definition time, collecting field descriptors into `_fields` \u2014 this is introspection at the class level. The expert handles multiple inheritance field merging by iterating `reversed(bases)` (MRO-aware), adds optional fields with defaults, and implements `__eq__`/`__hash__` so model instances can be compared and used in sets."},{"day":356,"title":"Proxy Pattern","topic":"metaprogramming","difficulty":5,"minutes":15,"prompt":"Implement a `LoggingProxy` class that wraps any object and intercepts all attribute accesses, logging each access to a list.\n\n`LoggingProxy(target, log)` \u2014 wraps `target`. On any attribute access, appends `('get', attr_name)` to `log` before returning the attribute value. On any attribute set, appends `('set', attr_name, value)` to `log`.\n\nMethod calls should be logged when the method attribute is accessed (before calling), not when called.\n\nExample:\n```python\nlog = []\nproxy = LoggingProxy([1, 2, 3], log)\nproxy.append(4)\nproxy.append(5)\n# log contains [('get','append'),('get','append')]\n```\n\nDo NOT use `__getattribute__` override for the proxy's own attributes \u2014 only proxy the target's attributes.","starter":"class LoggingProxy:\n    def __init__(self, target, log):\n        # Store without triggering __setattr__\n        object.__setattr__(self, '_target', target)\n        object.__setattr__(self, '_log', log)\n\n    def __getattr__(self, name):\n        # TODO\n        pass\n\n    def __setattr__(self, name, value):\n        # TODO\n        pass\n","hint":"`__getattr__` is called only when normal lookup fails \u2014 since `_target` and `_log` are set via `object.__setattr__`, they won't trigger `__getattr__`. Use `object.__getattribute__` to read them safely.","tests":["log = []\nfrom collections import namedtuple\nP = namedtuple('P', ['x', 'y'])\np = LoggingProxy(P(1,2), log)\nassert p.x == 1\nassert ('get','x') in log","log = []\nclass C:\n    val = 10\nproxy = LoggingProxy(C(), log)\n_ = proxy.val\nassert log == [('get','val')]","log = []\nclass C:\n    pass\nobj = C()\nproxy = LoggingProxy(obj, log)\nproxy.new_attr = 99\nassert ('set','new_attr',99) in log","log = []\nlst = []\nproxy = LoggingProxy(lst, log)\nproxy.append(1)\nassert lst == [1]\nassert any(e[0]=='get' and e[1]=='append' for e in log)","log = []\nclass C:\n    def greet(self): return 'hi'\nproxy = LoggingProxy(C(), log)\nresult = proxy.greet()\nassert result == 'hi'"],"solution":"class LoggingProxy:\n    def __init__(self, target, log):\n        object.__setattr__(self, '_target', target)\n        object.__setattr__(self, '_log', log)\n\n    def __getattr__(self, name):\n        target = object.__getattribute__(self, '_target')\n        log = object.__getattribute__(self, '_log')\n        log.append(('get', name))\n        return getattr(target, name)\n\n    def __setattr__(self, name, value):\n        target = object.__getattribute__(self, '_target')\n        log = object.__getattribute__(self, '_log')\n        log.append(('set', name, value))\n        setattr(target, name, value)\n","expert":"class LoggingProxy:\n    __slots__ = ('_target', '_log')\n\n    def __init__(self, target, log):\n        object.__setattr__(self, '_target', target)\n        object.__setattr__(self, '_log', log)\n\n    def __getattr__(self, name):\n        target = object.__getattribute__(self, '_target')\n        log = object.__getattribute__(self, '_log')\n        value = getattr(target, name)\n        log.append(('get', name))\n        return value\n\n    def __setattr__(self, name, value):\n        target = object.__getattribute__(self, '_target')\n        log = object.__getattribute__(self, '_log')\n        log.append(('set', name, value))\n        setattr(target, name, value)\n\n    def __repr__(self):\n        target = object.__getattribute__(self, '_target')\n        return f'LoggingProxy({target!r})'\n\n    def __len__(self):\n        return len(object.__getattribute__(self, '_target'))\n\n    def __iter__(self):\n        return iter(object.__getattribute__(self, '_target'))\n","explanation":"The Proxy pattern intercepts access to another object, enabling logging, access control, caching, or lazy loading. The crucial technique is using `object.__setattr__` and `object.__getattribute__` (the raw C-level accessors) to read the proxy's own `_target` and `_log` without triggering the overridden `__getattr__`/`__setattr__`. Using `__slots__` (expert) prevents `_target` and `_log` from appearing in `__dict__`, making them truly private to the proxy."},{"day":357,"title":"Configuration DSL","topic":"API design","difficulty":4,"minutes":15,"prompt":"Build a configuration DSL using Python's context manager protocol to allow nested, structured configuration.\n\nImplement:\n- `Config()` \u2014 the root config object.\n- `Config.section(name)` \u2014 context manager that adds a named subsection. Returns a `Config` child.\n- `Config.set(key, value)` \u2014 set a key-value pair in the current section.\n- `Config.to_dict()` \u2014 return the entire config as a nested dict.\n\nExample:\n```python\nc = Config()\nc.set('debug', True)\nwith c.section('database') as db:\n    db.set('host', 'localhost')\n    db.set('port', 5432)\n\nassert c.to_dict() == {\n    'debug': True,\n    'database': {'host': 'localhost', 'port': 5432}\n}\n```","starter":"class Config:\n    def __init__(self):\n        self._data = {}\n\n    def set(self, key, value):\n        pass\n\n    def section(self, name):\n        pass\n\n    def to_dict(self):\n        pass\n","hint":"`section` returns a `_SectionContext` object. On `__enter__`, create a child `Config`, store it in `self._data[name]`, and return it. On `__exit__`, do nothing (just return False).","tests":["c = Config()\nc.set('x', 1)\nassert c.to_dict() == {'x': 1}","c = Config()\nwith c.section('db') as db:\n    db.set('host', 'localhost')\nassert c.to_dict() == {'db': {'host': 'localhost'}}","c = Config()\nc.set('debug', True)\nwith c.section('server') as s:\n    s.set('port', 8080)\n    with s.section('tls') as tls:\n        tls.set('enabled', True)\nassert c.to_dict()['server']['tls']['enabled'] == True","c = Config()\nwith c.section('a') as a:\n    a.set('k', 'v')\nwith c.section('b') as b:\n    b.set('k2', 'v2')\nassert 'a' in c.to_dict() and 'b' in c.to_dict()","c = Config()\nassert c.to_dict() == {}"],"solution":"class Config:\n    def __init__(self):\n        self._data = {}\n\n    def set(self, key, value):\n        self._data[key] = value\n\n    def section(self, name):\n        return _SectionContext(self, name)\n\n    def to_dict(self):\n        result = {}\n        for k, v in self._data.items():\n            result[k] = v.to_dict() if isinstance(v, Config) else v\n        return result\n\n\nclass _SectionContext:\n    def __init__(self, parent, name):\n        self._parent = parent\n        self._name = name\n        self._child = None\n\n    def __enter__(self):\n        self._child = Config()\n        self._parent._data[self._name] = self._child\n        return self._child\n\n    def __exit__(self, *args):\n        return False\n","expert":"class Config:\n    def __init__(self):\n        self._data = {}\n\n    def set(self, key, value):\n        self._data[key] = value\n        return self  # enable chaining\n\n    def section(self, name):\n        child = self._data.get(name)\n        if not isinstance(child, Config):\n            child = Config()\n            self._data[name] = child\n        return _SectionContext(child)\n\n    def to_dict(self):\n        return {\n            k: (v.to_dict() if isinstance(v, Config) else v)\n            for k, v in self._data.items()\n        }\n\n    def get(self, *path, default=None):\n        node = self\n        for key in path:\n            if isinstance(node, Config) and key in node._data:\n                node = node._data[key]\n            else:\n                return default\n        return node.to_dict() if isinstance(node, Config) else node\n\n    def __repr__(self):\n        return f'Config({self.to_dict()!r})'\n\n\nclass _SectionContext:\n    def __init__(self, child):\n        self._child = child\n\n    def __enter__(self):\n        return self._child\n\n    def __exit__(self, *args):\n        return False\n","explanation":"The context manager protocol (`__enter__`/`__exit__`) gives Python's `with` statement a clear begin/end scope, perfect for hierarchical configuration DSLs. The child `Config` is stored in the parent before `__enter__` returns, so any `set` calls inside the `with` block are recorded on the child. The expert makes `section` idempotent (re-entering the same section name doesn't overwrite existing data) and adds a `get(*path)` helper for safe nested access \u2014 like `c.get('server', 'tls', 'enabled', default=False)`."},{"day":358,"title":"Mixin Composition","topic":"metaprogramming","difficulty":4,"minutes":15,"prompt":"Implement three mixin classes that can be combined freely:\n\n1. `ReprMixin` \u2014 provides `__repr__` that returns `ClassName(attr=value, ...)` based on the class's `_repr_fields` class variable (a list of attribute names).\n\n2. `EqMixin` \u2014 provides `__eq__` and `__hash__` based on `_eq_fields` (a list of attribute names).\n\n3. `ToDictMixin` \u2014 provides `to_dict()` returning `{field: value}` for each name in `_to_dict_fields`.\n\nAll three should work without inheriting from each other. Demonstrate with a `Product` class that uses all three.\n\nExample:\n```python\nclass Product(ReprMixin, EqMixin, ToDictMixin):\n    _repr_fields = _eq_fields = _to_dict_fields = ['name', 'price']\n    def __init__(self, name, price):\n        self.name = name\n        self.price = price\n\np = Product('Widget', 9.99)\nassert repr(p) == \"Product(name='Widget', price=9.99)\"\nassert p == Product('Widget', 9.99)\n```","starter":"class ReprMixin:\n    _repr_fields = []\n    def __repr__(self):\n        pass\n\nclass EqMixin:\n    _eq_fields = []\n    def __eq__(self, other):\n        pass\n    def __hash__(self):\n        pass\n\nclass ToDictMixin:\n    _to_dict_fields = []\n    def to_dict(self):\n        pass\n","hint":"Each mixin reads the class-level list variable. Use `getattr(self, f)` to get values. For `__hash__`, hash a tuple of the field values.","tests":["class P(ReprMixin, EqMixin, ToDictMixin):\n    _repr_fields = _eq_fields = _to_dict_fields = ['x', 'y']\n    def __init__(self, x, y):\n        self.x = x; self.y = y\np = P(1, 2)\nassert repr(p) == 'P(x=1, y=2)'","class P(EqMixin):\n    _eq_fields = ['a']\n    def __init__(self, a): self.a = a\nassert P(1) == P(1)\nassert P(1) != P(2)","class P(ToDictMixin):\n    _to_dict_fields = ['name', 'val']\n    def __init__(self, name, val): self.name=name; self.val=val\np = P('x', 10)\nassert p.to_dict() == {'name': 'x', 'val': 10}","class P(EqMixin):\n    _eq_fields = ['a']\n    def __init__(self, a): self.a = a\ns = {P(1), P(1), P(2)}\nassert len(s) == 2","class Full(ReprMixin, EqMixin, ToDictMixin):\n    _repr_fields = _eq_fields = _to_dict_fields = ['name']\n    def __init__(self, name): self.name = name\nf = Full('test')\nassert f.to_dict() == {'name': 'test'}\nassert f == Full('test')"],"solution":"class ReprMixin:\n    _repr_fields = []\n\n    def __repr__(self):\n        parts = ', '.join(f'{f}={getattr(self, f)!r}' for f in self._repr_fields)\n        return f'{type(self).__name__}({parts})'\n\n\nclass EqMixin:\n    _eq_fields = []\n\n    def __eq__(self, other):\n        if type(self) is not type(other):\n            return NotImplemented\n        return all(getattr(self, f) == getattr(other, f) for f in self._eq_fields)\n\n    def __hash__(self):\n        return hash(tuple(getattr(self, f) for f in self._eq_fields))\n\n\nclass ToDictMixin:\n    _to_dict_fields = []\n\n    def to_dict(self):\n        return {f: getattr(self, f) for f in self._to_dict_fields}\n","expert":"class ReprMixin:\n    _repr_fields = []\n\n    def __repr__(self):\n        fields = self.__class__._repr_fields\n        parts = ', '.join(f'{f}={getattr(self, f)!r}' for f in fields)\n        return f'{type(self).__name__}({parts})'\n\n\nclass EqMixin:\n    _eq_fields = []\n\n    def _key(self):\n        return tuple(getattr(self, f) for f in self.__class__._eq_fields)\n\n    def __eq__(self, other):\n        if type(self) is not type(other):\n            return NotImplemented\n        return self._key() == other._key()\n\n    def __hash__(self):\n        return hash(self._key())\n\n    def __lt__(self, other):\n        if type(self) is not type(other):\n            return NotImplemented\n        return self._key() < other._key()\n\n\nclass ToDictMixin:\n    _to_dict_fields = []\n\n    def to_dict(self):\n        return {f: getattr(self, f) for f in self.__class__._to_dict_fields}\n\n    @classmethod\n    def from_dict(cls, d):\n        return cls(**{f: d[f] for f in cls._to_dict_fields})\n","explanation":"Mixins provide reusable behavior that doesn't fit cleanly in a single inheritance hierarchy \u2014 they are 'plug-in' implementations. Crucially, they use `type(self).__name__` (or `self.__class__`) to be generic across any class that includes them. The expert extracts a `_key()` helper to avoid repeating the tuple-building logic in `__eq__` and `__hash__`, and adds `__lt__` (making instances orderable) and `from_dict()` as a class method factory \u2014 a common pattern alongside `to_dict()`."},{"day":359,"title":"Tracing Decorator Factory","topic":"metaprogramming","difficulty":5,"minutes":15,"prompt":"Write a `trace` decorator factory that records every call and its result in a call graph.\n\n`trace(call_log)` \u2014 returns a decorator. When a traced function is called, append to `call_log` a dict:\n```python\n{'name': func_name, 'args': args, 'kwargs': kwargs, 'result': return_value, 'error': None}\n```\nIf the function raises, set `'result': None` and `'error': str(exception)`, then re-raise.\n\nAlso implement `call_summary(call_log)` that returns a dict mapping function name -> `{'calls': n, 'errors': m}`.\n\nExample:\n```python\nlog = []\n@trace(log)\ndef add(a, b): return a + b\nadd(1, 2)\nadd(3, 4)\ncall_summary(log)  # {'add': {'calls': 2, 'errors': 0}}\n```","starter":"import functools\n\ndef trace(call_log):\n    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            pass\n        return wrapper\n    return decorator\n\ndef call_summary(call_log):\n    pass\n","hint":"Build the entry dict before calling `func`. Update `'result'` and `'error'` depending on success or failure. Append to `call_log` in a `finally` block to always record the call.","tests":["log = []\n@trace(log)\ndef mul(a, b): return a * b\nassert mul(3, 4) == 12\nassert len(log) == 1 and log[0]['result'] == 12 and log[0]['error'] is None","log = []\n@trace(log)\ndef boom(): raise ValueError('oops')\ntry: boom()\nexcept ValueError: pass\nassert log[0]['error'] == 'oops' and log[0]['result'] is None","log = []\n@trace(log)\ndef f(x): return x\n@trace(log)\ndef g(x): return x+1\nf(1); f(2); g(10)\nsummary = call_summary(log)\nassert summary['f']['calls'] == 2 and summary['g']['calls'] == 1","log = []\n@trace(log)\ndef safe(x):\n    if x < 0: raise ValueError\n    return x\nsafe(5)\ntry: safe(-1)\nexcept ValueError: pass\nsum = call_summary(log)\nassert sum['safe']['errors'] == 1","log = []\n@trace(log)\ndef h(a, b=2): return a+b\nassert h(1) == 3\nassert log[0]['name'] == 'h'"],"solution":"import functools\n\ndef trace(call_log):\n    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            entry = {'name': func.__name__, 'args': args, 'kwargs': kwargs,\n                     'result': None, 'error': None}\n            try:\n                result = func(*args, **kwargs)\n                entry['result'] = result\n                return result\n            except Exception as e:\n                entry['error'] = str(e)\n                raise\n            finally:\n                call_log.append(entry)\n        return wrapper\n    return decorator\n\ndef call_summary(call_log):\n    summary = {}\n    for entry in call_log:\n        name = entry['name']\n        if name not in summary:\n            summary[name] = {'calls': 0, 'errors': 0}\n        summary[name]['calls'] += 1\n        if entry['error'] is not None:\n            summary[name]['errors'] += 1\n    return summary\n","expert":"import functools\nfrom collections import defaultdict\n\ndef trace(call_log):\n    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            entry = {\n                'name': func.__name__,\n                'args': args,\n                'kwargs': kwargs,\n                'result': None,\n                'error': None,\n            }\n            try:\n                entry['result'] = func(*args, **kwargs)\n                return entry['result']\n            except Exception as e:\n                entry['error'] = str(e)\n                raise\n            finally:\n                call_log.append(entry)\n        return wrapper\n    return decorator\n\ndef call_summary(call_log):\n    summary = defaultdict(lambda: {'calls': 0, 'errors': 0})\n    for entry in call_log:\n        s = summary[entry['name']]\n        s['calls'] += 1\n        if entry['error'] is not None:\n            s['errors'] += 1\n    return dict(summary)\n","explanation":"The `finally` clause is essential here: it guarantees the entry is appended to `call_log` whether the function succeeded or raised \u2014 without it, exceptions would cause calls to go unrecorded. Mutating `entry` before and inside the `try/except` then appending in `finally` is cleaner than building separate dicts for success/failure paths. The expert uses `defaultdict` for `call_summary` to eliminate the `if name not in summary` check, making the aggregation logic a clean two-liner."},{"day":360,"title":"Coroutine-Style Generator","topic":"generator-based pipelines","difficulty":5,"minutes":15,"prompt":"Use generator-based coroutines (`send`) to implement a running statistics accumulator.\n\nWrite a generator function `running_stats()` that:\n- When started, yields `None` (awaiting first value).\n- Accepts values via `.send(value)` and after each send yields a dict `{'count': n, 'mean': float, 'min': float, 'max': float}`.\n- Handles `GeneratorExit` gracefully.\n\nAlso write a helper `feed(gen, values)` that primes the generator, sends each value, and returns a list of the stat dicts.\n\nExample:\n```python\nstats = list(feed(running_stats(), [1, 2, 3, 4, 5]))\nassert stats[-1] == {'count': 5, 'mean': 3.0, 'min': 1.0, 'max': 5.0}\n```","starter":"def running_stats():\n    # TODO: generator coroutine\n    pass\n\ndef feed(gen, values):\n    # Prime the generator, then send each value\n    # Return list of yielded stat dicts\n    pass\n","hint":"Prime the generator with `next(gen)` before sending values. Use `while True: value = yield stats_dict` to receive values via `send`.","tests":["results = list(feed(running_stats(), [10]))\nassert results == [{'count':1,'mean':10.0,'min':10.0,'max':10.0}]","results = list(feed(running_stats(), [1,2,3,4,5]))\nassert results[-1]['count'] == 5\nassert results[-1]['mean'] == 3.0\nassert results[-1]['min'] == 1.0\nassert results[-1]['max'] == 5.0","results = list(feed(running_stats(), [5, 3, 8, 1]))\nassert results[0] == {'count':1,'mean':5.0,'min':5.0,'max':5.0}\nassert results[-1]['min'] == 1.0 and results[-1]['max'] == 8.0","results = list(feed(running_stats(), []))\nassert results == []","gen = running_stats()\nnext(gen)\nr1 = gen.send(100)\nr2 = gen.send(200)\nassert r2['mean'] == 150.0 and r2['count'] == 2"],"solution":"def running_stats():\n    count = 0\n    total = 0.0\n    min_val = None\n    max_val = None\n    value = yield None  # prime\n    while True:\n        count += 1\n        total += value\n        min_val = value if min_val is None else min(min_val, value)\n        max_val = value if max_val is None else max(max_val, value)\n        value = yield {\n            'count': count,\n            'mean': total / count,\n            'min': float(min_val),\n            'max': float(max_val),\n        }\n\ndef feed(gen, values):\n    next(gen)  # prime\n    results = []\n    for v in values:\n        results.append(gen.send(v))\n    gen.close()\n    return results\n","expert":"def running_stats():\n    count = 0\n    total = 0.0\n    min_val = float('inf')\n    max_val = float('-inf')\n    value = yield\n    while True:\n        count += 1\n        total += value\n        min_val = min(min_val, value)\n        max_val = max(max_val, value)\n        value = yield {\n            'count': count,\n            'mean': total / count,\n            'min': float(min_val),\n            'max': float(max_val),\n        }\n\ndef feed(gen, values):\n    next(gen)\n    return [gen.send(v) for v in values]\n","explanation":"Generator coroutines (using `send`) are a precursor to Python's `async/await` \u2014 `value = yield result` suspends execution, sends `result` to the caller, and resumes with whatever was `send`-ed. Priming (`next(gen)`) advances the generator to the first `yield` so it's ready to receive. The expert initializes `min_val` to `+inf` and `max_val` to `-inf` (floating-point infinities), eliminating the `None`-check on first value \u2014 a cleaner pattern for running extremes."},{"day":361,"title":"Refactor: Deeply Nested Code","topic":"refactoring","difficulty":4,"minutes":15,"prompt":"The following deeply nested function is hard to read and test. Refactor it using early returns and helper functions.\n\nSmelly code:\n```python\ndef process_user(data):\n    if data:\n        if 'email' in data:\n            if '@' in data['email']:\n                if 'age' in data:\n                    if isinstance(data['age'], int):\n                        if data['age'] >= 18:\n                            return {'status': 'ok', 'email': data['email'], 'age': data['age']}\n                        else:\n                            return {'status': 'error', 'reason': 'underage'}\n                    else:\n                        return {'status': 'error', 'reason': 'invalid age type'}\n                else:\n                    return {'status': 'error', 'reason': 'missing age'}\n            else:\n                return {'status': 'error', 'reason': 'invalid email'}\n        else:\n            return {'status': 'error', 'reason': 'missing email'}\n    else:\n        return {'status': 'error', 'reason': 'no data'}\n```\n\nRefactor into: `validate_email(email)`, `validate_age(age)`, `process_user(data)` that uses early returns. All three functions must be present.","starter":"def validate_email(email):\n    # Return None if valid, error string if invalid\n    pass\n\ndef validate_age(age):\n    # Return None if valid, error string if invalid\n    pass\n\ndef process_user(data):\n    # Use early returns\n    pass\n","hint":"Validators return `None` on success or an error message string. `process_user` checks each condition and returns early with `{'status':'error','reason':...}` or `{'status':'ok',...}` at the end.","tests":["result = process_user({'email': 'a@b.com', 'age': 25})\nassert result == {'status': 'ok', 'email': 'a@b.com', 'age': 25}","result = process_user(None)\nassert result['status'] == 'error' and result['reason'] == 'no data'","result = process_user({'email': 'bad', 'age': 25})\nassert result['status'] == 'error' and result['reason'] == 'invalid email'","result = process_user({'email': 'a@b.com', 'age': 15})\nassert result['status'] == 'error' and result['reason'] == 'underage'","result = process_user({'email': 'a@b.com', 'age': 'old'})\nassert result['status'] == 'error' and result['reason'] == 'invalid age type'"],"solution":"def validate_email(email):\n    if '@' not in email:\n        return 'invalid email'\n    return None\n\ndef validate_age(age):\n    if not isinstance(age, int):\n        return 'invalid age type'\n    if age < 18:\n        return 'underage'\n    return None\n\ndef process_user(data):\n    if not data:\n        return {'status': 'error', 'reason': 'no data'}\n    if 'email' not in data:\n        return {'status': 'error', 'reason': 'missing email'}\n    email_error = validate_email(data['email'])\n    if email_error:\n        return {'status': 'error', 'reason': email_error}\n    if 'age' not in data:\n        return {'status': 'error', 'reason': 'missing age'}\n    age_error = validate_age(data['age'])\n    if age_error:\n        return {'status': 'error', 'reason': age_error}\n    return {'status': 'ok', 'email': data['email'], 'age': data['age']}\n","expert":"def validate_email(email):\n    if not isinstance(email, str) or '@' not in email:\n        return 'invalid email'\n    return None\n\ndef validate_age(age):\n    if not isinstance(age, int):\n        return 'invalid age type'\n    if age < 18:\n        return 'underage'\n    return None\n\ndef _error(reason):\n    return {'status': 'error', 'reason': reason}\n\ndef process_user(data):\n    if not data:\n        return _error('no data')\n    email = data.get('email')\n    if email is None:\n        return _error('missing email')\n    if err := validate_email(email):\n        return _error(err)\n    age = data.get('age')\n    if age is None:\n        return _error('missing age')\n    if err := validate_age(age):\n        return _error(err)\n    return {'status': 'ok', 'email': email, 'age': age}\n","explanation":"The 'arrow anti-pattern' (deep nesting with conditionals) is fixed by inverting each condition and returning early \u2014 each `if` becomes a guard clause that exits if the precondition fails. Extracting validators makes each rule independently testable. The expert uses the walrus operator (`:=`) to assign and test in one line (`if err := validate_email(email):`), and a `_error` helper to DRY up the repeated `{'status': 'error', ...}` construction."},{"day":362,"title":"Type-Safe Union with Match","topic":"API design","difficulty":5,"minutes":15,"prompt":"Use Python 3.10+ structural pattern matching (`match/case`) to implement a simple expression tree evaluator.\n\nDefine dataclasses:\n- `Num(value: float)`\n- `Add(left, right)`\n- `Mul(left, right)`\n- `Neg(operand)`\n\nWrite `evaluate(expr)` that recursively evaluates the tree using `match`.\nWrite `pretty(expr)` that returns a human-readable string representation.\n\nExample:\n```python\nexpr = Add(Mul(Num(2), Num(3)), Neg(Num(1)))\nevaluate(expr)  # 5.0\npretty(expr)    # '((2 * 3) + (-1))'\n```","starter":"from dataclasses import dataclass\n\n@dataclass\nclass Num:\n    value: float\n\n@dataclass\nclass Add:\n    left: object\n    right: object\n\n@dataclass\nclass Mul:\n    left: object\n    right: object\n\n@dataclass\nclass Neg:\n    operand: object\n\ndef evaluate(expr):\n    # TODO: use match/case\n    pass\n\ndef pretty(expr):\n    # TODO: use match/case\n    pass\n","hint":"In `match expr:`, use `case Num(value=v):`, `case Add(left=l, right=r):`, etc. For `pretty`, wrap binary ops in parentheses.","tests":["assert evaluate(Num(5)) == 5.0","assert evaluate(Add(Num(3), Num(4))) == 7.0","assert evaluate(Mul(Num(2), Add(Num(1), Num(2)))) == 6.0","assert evaluate(Neg(Num(5))) == -5.0","expr = Add(Mul(Num(2), Num(3)), Neg(Num(1)))\nassert evaluate(expr) == 5.0\nassert pretty(expr) == '((2 * 3) + (-1))'"],"solution":"from dataclasses import dataclass\n\n@dataclass\nclass Num:\n    value: float\n\n@dataclass\nclass Add:\n    left: object\n    right: object\n\n@dataclass\nclass Mul:\n    left: object\n    right: object\n\n@dataclass\nclass Neg:\n    operand: object\n\ndef evaluate(expr):\n    match expr:\n        case Num(value=v):\n            return float(v)\n        case Add(left=l, right=r):\n            return evaluate(l) + evaluate(r)\n        case Mul(left=l, right=r):\n            return evaluate(l) * evaluate(r)\n        case Neg(operand=op):\n            return -evaluate(op)\n        case _:\n            raise ValueError(f'Unknown expression: {expr!r}')\n\ndef pretty(expr):\n    match expr:\n        case Num(value=v):\n            return str(int(v) if v == int(v) else v)\n        case Add(left=l, right=r):\n            return f'({pretty(l)} + {pretty(r)})'\n        case Mul(left=l, right=r):\n            return f'({pretty(l)} * {pretty(r)})'\n        case Neg(operand=op):\n            return f'(-{pretty(op)})'\n        case _:\n            raise ValueError(f'Unknown expression: {expr!r}')\n","expert":"from dataclasses import dataclass\nfrom typing import Union\n\n@dataclass(frozen=True)\nclass Num:\n    value: float\n\n@dataclass(frozen=True)\nclass Add:\n    left: object\n    right: object\n\n@dataclass(frozen=True)\nclass Mul:\n    left: object\n    right: object\n\n@dataclass(frozen=True)\nclass Neg:\n    operand: object\n\nExpr = Union[Num, Add, Mul, Neg]\n\ndef evaluate(expr: Expr) -> float:\n    match expr:\n        case Num(value=v):\n            return float(v)\n        case Add(left=l, right=r):\n            return evaluate(l) + evaluate(r)\n        case Mul(left=l, right=r):\n            return evaluate(l) * evaluate(r)\n        case Neg(operand=op):\n            return -evaluate(op)\n        case _:\n            raise TypeError(f'Unknown expression type: {type(expr).__name__}')\n\ndef pretty(expr: Expr) -> str:\n    match expr:\n        case Num(value=v):\n            return str(int(v) if float(v) == int(v) else v)\n        case Add(left=l, right=r):\n            return f'({pretty(l)} + {pretty(r)})'\n        case Mul(left=l, right=r):\n            return f'({pretty(l)} * {pretty(r)})'\n        case Neg(operand=op):\n            return f'(-{pretty(op)})'\n        case _:\n            raise TypeError(f'Unknown expression type: {type(expr).__name__}')\n","explanation":"Structural pattern matching (`match/case`) on dataclasses is Python 3.10's answer to algebraic data types and pattern matching in Haskell or Rust. The `case Num(value=v):` syntax destructures the dataclass, binding `v` to `expr.value`. Using `frozen=True` dataclasses makes the tree nodes immutable and hashable (suitable for memoization or use as dict keys). The `Union[Num, Add, Mul, Neg]` type alias documents the expected types for static analysis tools."},{"day":363,"title":"Async-Style Task Queue (Sync)","topic":"state machines","difficulty":5,"minutes":15,"prompt":"Implement a simple synchronous task queue with priorities.\n\n`TaskQueue` methods:\n- `submit(task, priority=0)` \u2014 add a callable `task` with given priority (lower = higher priority).\n- `run_next()` \u2014 execute the highest-priority task (lowest priority number). Return the task's result. Raises `IndexError` if empty.\n- `run_all()` \u2014 run all tasks in priority order, return list of results.\n- `pending_count` property \u2014 number of tasks not yet run.\n\nTasks are callables that take no arguments. If two tasks have the same priority, maintain FIFO order among them.\n\nExample:\n```python\nq = TaskQueue()\nq.submit(lambda: 'low', priority=10)\nq.submit(lambda: 'high', priority=1)\nassert q.run_next() == 'high'\nassert q.run_next() == 'low'\n```","starter":"import heapq\n\nclass TaskQueue:\n    def __init__(self):\n        self._heap = []\n        self._counter = 0  # tiebreaker\n\n    def submit(self, task, priority=0):\n        pass\n\n    def run_next(self):\n        pass\n\n    def run_all(self):\n        pass\n\n    @property\n    def pending_count(self):\n        pass\n","hint":"Push `(priority, counter, task)` tuples to a `heapq`. The counter ensures FIFO when priorities are equal. Increment counter on each submit.","tests":["q = TaskQueue()\nq.submit(lambda: 1, priority=10)\nq.submit(lambda: 2, priority=1)\nassert q.run_next() == 2","q = TaskQueue()\nq.submit(lambda: 'a', priority=5)\nq.submit(lambda: 'b', priority=5)\nassert q.run_next() == 'a'\nassert q.run_next() == 'b'","q = TaskQueue()\nq.submit(lambda: 10)\nq.submit(lambda: 20)\nq.submit(lambda: 30)\nassert q.run_all() == [10, 20, 30]","q = TaskQueue()\nq.submit(lambda: None)\nassert q.pending_count == 1\nq.run_next()\nassert q.pending_count == 0","q = TaskQueue()\ntry:\n    q.run_next()\n    assert False\nexcept IndexError:\n    pass"],"solution":"import heapq\n\nclass TaskQueue:\n    def __init__(self):\n        self._heap = []\n        self._counter = 0\n\n    def submit(self, task, priority=0):\n        heapq.heappush(self._heap, (priority, self._counter, task))\n        self._counter += 1\n\n    def run_next(self):\n        if not self._heap:\n            raise IndexError('TaskQueue is empty')\n        _, _, task = heapq.heappop(self._heap)\n        return task()\n\n    def run_all(self):\n        results = []\n        while self._heap:\n            results.append(self.run_next())\n        return results\n\n    @property\n    def pending_count(self):\n        return len(self._heap)\n","expert":"import heapq\nfrom dataclasses import dataclass, field\nfrom typing import Callable, Any\n\n@dataclass(order=True)\nclass _Entry:\n    priority: int\n    seq: int\n    task: Callable = field(compare=False)\n\nclass TaskQueue:\n    def __init__(self):\n        self._heap = []\n        self._counter = 0\n\n    def submit(self, task, priority=0):\n        entry = _Entry(priority=priority, seq=self._counter, task=task)\n        heapq.heappush(self._heap, entry)\n        self._counter += 1\n        return self  # allow chaining\n\n    def run_next(self):\n        if not self._heap:\n            raise IndexError('TaskQueue is empty')\n        entry = heapq.heappop(self._heap)\n        return entry.task()\n\n    def run_all(self):\n        results = []\n        while self._heap:\n            results.append(self.run_next())\n        return results\n\n    @property\n    def pending_count(self):\n        return len(self._heap)\n\n    def peek_priority(self):\n        if not self._heap:\n            return None\n        return self._heap[0].priority\n","explanation":"A heap (`heapq`) gives O(log n) insert and O(log n) pop-minimum, making it ideal for a priority queue. The tiebreaker counter ensures stable (FIFO) ordering among equal-priority tasks \u2014 without it, Python would compare the task callables, which raises `TypeError`. The expert uses a `@dataclass(order=True)` to get comparison via field order automatically, and `field(compare=False)` to exclude the non-comparable task from ordering \u2014 cleaner than managing a raw tuple."},{"day":364,"title":"Serialization Framework","topic":"metaprogramming","difficulty":5,"minutes":15,"prompt":"Build a mini serialization framework using `__init_subclass__` and class-level field declarations.\n\n`SerializableBase` \u2014 base class. Subclasses declare fields as class-level annotations. The framework provides:\n- `to_json()` \u2014 returns a JSON string of the instance's field values.\n- `from_json(cls, json_str)` \u2014 classmethod that reconstructs an instance from a JSON string.\n- `__init__(**kwargs)` \u2014 sets fields from kwargs; raises `TypeError` for unknown fields.\n- `__init_subclass__` \u2014 captures field names from annotations.\n\nSupport nested objects: if a field's annotated type is itself a `SerializableBase` subclass, `to_json` serializes it recursively and `from_json` deserializes it.\n\nExample:\n```python\nclass Address(SerializableBase):\n    city: str\n    zip_code: str\n\nclass Person(SerializableBase):\n    name: str\n    age: int\n    address: Address\n\np = Person(name='Alice', age=30, address=Address(city='NY', zip_code='10001'))\njson_str = p.to_json()\np2 = Person.from_json(json_str)\nassert p2.name == 'Alice' and p2.address.city == 'NY'\n```","starter":"import json\n\nclass SerializableBase:\n    _fields = {}\n\n    def __init_subclass__(cls, **kwargs):\n        super().__init_subclass__(**kwargs)\n        # Capture annotations as fields\n        cls._fields = {}\n        pass\n\n    def __init__(self, **kwargs):\n        pass\n\n    def to_json(self):\n
