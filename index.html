ens([2,4,6]) == [4, 16, 36]","assert squares_of_evens([]) == []"],"solution":"def squares_of_evens(lst):\n    result = []\n    for x in lst:\n        if x % 2 == 0:\n            result.append(x ** 2)\n    return result","expert":"def squares_of_evens(lst):\n    return [x**2 for x in lst if x % 2 == 0]","explanation":"The normal solution uses a loop with an if-check and `.append()`. The expert version is a list comprehension: `[expression for item in iterable if condition]`. Comprehensions are more readable once you know the pattern \u2014 they keep the transformation (x**2), the source (lst), and the filter (if x%2==0) all in one line. Python core developers favor comprehensions over map/filter for clarity."},{"day":57,"title":"Flatten a Nested List","topic":"comprehensions","difficulty":2,"minutes":7,"prompt":"Write a function `flatten(nested)` that takes a list of lists and returns a single flat list with all elements.\n\nExamples:\n- `flatten([[1,2],[3],[4,5,6]])` \u2192 `[1, 2, 3, 4, 5, 6]`\n- `flatten([[], [1]])` \u2192 `[1]`","starter":"def flatten(nested):\n    # your code here\n    pass","hint":"A nested list comprehension has two `for` clauses: iterate over sublists, then over items in each sublist.","tests":["assert flatten([[1,2],[3],[4,5,6]]) == [1, 2, 3, 4, 5, 6]","assert flatten([[], [1]]) == [1]","assert flatten([]) == []","assert flatten([[1],[2],[3]]) == [1, 2, 3]"],"solution":"def flatten(nested):\n    result = []\n    for sublist in nested:\n        for item in sublist:\n            result.append(item)\n    return result","expert":"def flatten(nested):\n    return [item for sublist in nested for item in sublist]","explanation":"The normal solution uses two nested for-loops with `.append()`. The expert version uses a nested list comprehension \u2014 `[item for sublist in nested for item in sublist]` \u2014 which reads left-to-right in the same order as the nested loops. Note the order matters: outer loop first, inner loop second. This is a classic Python idiom for one-level flattening."},{"day":58,"title":"Dict Comprehension from Two Lists","topic":"comprehensions","difficulty":1,"minutes":6,"prompt":"Write a function `zip_to_dict(keys, values)` that takes two lists of equal length and returns a dictionary mapping each key to its corresponding value.\n\nExamples:\n- `zip_to_dict(['a','b','c'], [1,2,3])` \u2192 `{'a':1,'b':2,'c':3}`\n- `zip_to_dict([], [])` \u2192 `{}`","starter":"def zip_to_dict(keys, values):\n    # your code here\n    pass","hint":"Use zip() to pair up the lists, then build a dict from the pairs.","tests":["assert zip_to_dict(['a','b','c'], [1,2,3]) == {'a':1,'b':2,'c':3}","assert zip_to_dict([], []) == {}","assert zip_to_dict(['x'], [99]) == {'x': 99}","assert zip_to_dict(['p','q'], [True, False]) == {'p': True, 'q': False}"],"solution":"def zip_to_dict(keys, values):\n    result = {}\n    for k, v in zip(keys, values):\n        result[k] = v\n    return result","expert":"def zip_to_dict(keys, values):\n    return dict(zip(keys, values))","explanation":"The normal solution iterates over `zip(keys, values)` pairs and builds a dict manually. The expert version passes the zip object directly to `dict()`, which accepts any iterable of (key, value) pairs. `dict(zip(...))` is so common it's almost a single vocabulary item in Python \u2014 memorize it as the canonical way to build a dict from two parallel sequences."},{"day":59,"title":"Set Comprehension","topic":"comprehensions","difficulty":1,"minutes":6,"prompt":"Write a function `unique_lengths(words)` that returns a set of the unique lengths of the strings in `words`.\n\nExamples:\n- `unique_lengths(['hi', 'hello', 'world'])` \u2192 `{2, 5}`\n- `unique_lengths([])` \u2192 `set()`","starter":"def unique_lengths(words):\n    # your code here\n    pass","hint":"Use a set comprehension: {expression for item in iterable}.","tests":["assert unique_lengths(['hi', 'hello', 'world']) == {2, 5}","assert unique_lengths([]) == set()","assert unique_lengths(['a', 'bb', 'ccc']) == {1, 2, 3}","assert unique_lengths(['same', 'word', 'size']) == {4}"],"solution":"def unique_lengths(words):\n    result = set()\n    for w in words:\n        result.add(len(w))\n    return result","expert":"def unique_lengths(words):\n    return {len(w) for w in words}","explanation":"The normal solution uses `.add()` inside a loop. The expert version uses a set comprehension `{expr for item in iterable}` \u2014 the curly-brace syntax with no colon creates a set (unlike a dict comprehension which has `key: value`). Set comprehensions are the most concise way to build a set from a transformation, and they signal 'unique values' directly in the syntax."},{"day":60,"title":"Default Argument Greeting","topic":"functions","difficulty":1,"minutes":6,"prompt":"Write a function `greet(name, greeting='Hello')` that returns a greeting string. If no greeting is given, use 'Hello'.\n\nExamples:\n- `greet('Alice')` \u2192 `'Hello, Alice!'`\n- `greet('Bob', 'Hi')` \u2192 `'Hi, Bob!'`","starter":"def greet(name, greeting='Hello'):\n    # your code here\n    pass","hint":"Use an f-string to combine greeting and name. The default value is already in the signature.","tests":["assert greet('Alice') == 'Hello, Alice!'","assert greet('Bob', 'Hi') == 'Hi, Bob!'","assert greet('World', 'Hey') == 'Hey, World!'","assert greet('X') == 'Hello, X!'"],"solution":"def greet(name, greeting='Hello'):\n    return greeting + ', ' + name + '!'","expert":"def greet(name, greeting='Hello'):\n    return f'{greeting}, {name}!'","explanation":"The normal solution uses string concatenation with `+`. The expert version uses an f-string (formatted string literal), which embeds expressions directly inside `{}` in the string. F-strings are faster, more readable, and less error-prone than concatenation \u2014 they are the preferred Python 3 way to build strings from variables. Default arguments let callers omit parameters that have sensible defaults."},{"day":61,"title":"Function with Multiple Defaults","topic":"functions","difficulty":1,"minutes":7,"prompt":"Write a function `make_box(width, height=1, char='*')` that returns a list of strings, where each string is `char` repeated `width` times, and the list has `height` entries.\n\nExamples:\n- `make_box(3)` \u2192 `['***']`\n- `make_box(3, 2, '#')` \u2192 `['###', '###']`","starter":"def make_box(width, height=1, char='*'):\n    # your code here\n    pass","hint":"Use `char * width` to make one row, and repeat it `height` times in a list.","tests":["assert make_box(3) == ['***']","assert make_box(3, 2, '#') == ['###', '###']","assert make_box(1, 3) == ['*', '*', '*']","assert make_box(4, 1, '-') == ['----']"],"solution":"def make_box(width, height=1, char='*'):\n    row = char * width\n    result = []\n    for _ in range(height):\n        result.append(row)\n    return result","expert":"def make_box(width, height=1, char='*'):\n    return [char * width] * height","explanation":"The normal solution builds the row string then uses a loop to append it `height` times. The expert version uses list repetition: `[item] * n` creates a list with `item` repeated `n` times. This is safe here because strings are immutable \u2014 each element is the same string object, but since strings cannot be mutated, sharing references causes no problems. List repetition is O(n) and more concise than a loop for simple repeated values."},{"day":62,"title":"Sum with *args","topic":"functions","difficulty":1,"minutes":6,"prompt":"Write a function `total(*numbers)` that accepts any number of numeric arguments and returns their sum. Return 0 if no arguments are given.\n\nExamples:\n- `total(1, 2, 3)` \u2192 `6`\n- `total()` \u2192 `0`\n- `total(10)` \u2192 `10`","starter":"def total(*numbers):\n    # your code here\n    pass","hint":"`*numbers` collects all positional arguments into a tuple. You can use the built-in sum() on it.","tests":["assert total(1, 2, 3) == 6","assert total() == 0","assert total(10) == 10","assert total(1, 1, 1, 1) == 4"],"solution":"def total(*numbers):\n    result = 0\n    for n in numbers:\n        result += n\n    return result","expert":"def total(*numbers):\n    return sum(numbers)","explanation":"`*numbers` in a function signature collects all positional arguments into a tuple. The normal solution iterates and accumulates manually. The expert version passes the tuple directly to the built-in `sum()`, which handles empty sequences by returning 0 by default. `sum(iterable)` is always preferred over manual accumulation \u2014 it is faster, cleaner, and handles the empty case automatically."},{"day":63,"title":"Keyword Arguments with **kwargs","topic":"functions","difficulty":2,"minutes":7,"prompt":"Write a function `build_profile(**info)` that accepts any keyword arguments and returns a formatted string: each key-value pair on its own line as `'key: value'`, sorted alphabetically by key.\n\nExamples:\n- `build_profile(name='Alice', age=30)` \u2192 `'age: 30\\nname: Alice'`\n- `build_profile(city='NYC')` \u2192 `'city: NYC'`","starter":"def build_profile(**info):\n    # your code here\n    pass","hint":"Sort info.items() by key, then join 'key: value' strings with newlines.","tests":["assert build_profile(name='Alice', age=30) == 'age: 30\\nname: Alice'","assert build_profile(city='NYC') == 'city: NYC'","assert build_profile(z=1, a=2) == 'a: 2\\nz: 1'","assert build_profile() == ''"],"solution":"def build_profile(**info):\n    lines = []\n    for key in sorted(info):\n        lines.append(key + ': ' + str(info[key]))\n    return '\\n'.join(lines)","expert":"def build_profile(**info):\n    return '\\n'.join(f'{k}: {v}' for k, v in sorted(info.items()))","explanation":"`**kwargs` collects all keyword arguments into a dict. The normal solution builds a list of strings with a loop. The expert version uses a generator expression inside `'\\n'.join(...)`, which avoids creating an intermediate list. The f-string and the generator together make this a clean one-liner. `sorted(info.items())` sorts by key by default, since tuples compare lexicographically on the first element."},{"day":64,"title":"Lambda Basics","topic":"lambda","difficulty":1,"minutes":6,"prompt":"Write a function `apply_twice(func, value)` that applies `func` to `value` twice and returns the result.\n\nExamples:\n- `apply_twice(lambda x: x + 3, 10)` \u2192 `16`\n- `apply_twice(lambda x: x * 2, 5)` \u2192 `20`","starter":"def apply_twice(func, value):\n    # your code here\n    pass","hint":"Call func(value) to get an intermediate result, then call func on that result.","tests":["assert apply_twice(lambda x: x + 3, 10) == 16","assert apply_twice(lambda x: x * 2, 5) == 20","assert apply_twice(lambda x: x - 1, 8) == 6","assert apply_twice(lambda x: x ** 2, 2) == 16"],"solution":"def apply_twice(func, value):\n    intermediate = func(value)\n    return func(intermediate)","expert":"def apply_twice(func, value):\n    return func(func(value))","explanation":"The normal solution stores the intermediate result in a variable. The expert version composes the calls directly: `func(func(value))`. This works because the return value of the inner call is passed immediately as the argument to the outer call. Lambda functions are anonymous single-expression functions useful for short transformations passed as arguments \u2014 they shine when used with higher-order functions like this one."},{"day":65,"title":"Sort by Custom Key","topic":"lambda","difficulty":1,"minutes":6,"prompt":"Write a function `sort_by_length(words)` that returns the list of words sorted by their length (shortest first). For equal lengths, preserve original order.\n\nExamples:\n- `sort_by_length(['banana', 'fig', 'kiwi'])` \u2192 `['fig', 'kiwi', 'banana']`\n- `sort_by_length([])` \u2192 `[]`","starter":"def sort_by_length(words):\n    # your code here\n    pass","hint":"Use sorted() with key=len or key=lambda w: len(w).","tests":["assert sort_by_length(['banana', 'fig', 'kiwi']) == ['fig', 'kiwi', 'banana']","assert sort_by_length([]) == []","assert sort_by_length(['a', 'bb', 'ccc']) == ['a', 'bb', 'ccc']","assert sort_by_length(['hi', 'ok', 'yes']) == ['hi', 'ok', 'yes']"],"solution":"def sort_by_length(words):\n    return sorted(words, key=lambda w: len(w))","expert":"def sort_by_length(words):\n    return sorted(words, key=len)","explanation":"The normal solution uses `key=lambda w: len(w)`, which creates an anonymous function that calls `len`. The expert version passes `key=len` directly \u2014 since `len` is itself a callable that takes one argument, it can be passed as the key function without wrapping it in a lambda. When the key function is a named callable, pass it directly; save lambdas for when you need custom logic not captured by an existing function."},{"day":66,"title":"Sort Dicts by Value","topic":"lambda","difficulty":2,"minutes":7,"prompt":"Write a function `rank_scores(scores)` that takes a dict mapping names to integer scores and returns a list of names sorted by score in descending order.\n\nExamples:\n- `rank_scores({'Alice': 90, 'Bob': 75, 'Carol': 88})` \u2192 `['Alice', 'Carol', 'Bob']`\n- `rank_scores({'X': 5})` \u2192 `['X']`","starter":"def rank_scores(scores):\n    # your code here\n    pass","hint":"Use sorted() on scores.keys() (or just scores) with key=lambda name: scores[name] and reverse=True.","tests":["assert rank_scores({'Alice': 90, 'Bob': 75, 'Carol': 88}) == ['Alice', 'Carol', 'Bob']","assert rank_scores({'X': 5}) == ['X']","assert rank_scores({'a': 1, 'b': 2, 'c': 3}) == ['c', 'b', 'a']","assert rank_scores({}) == []"],"solution":"def rank_scores(scores):\n    names = list(scores.keys())\n    names.sort(key=lambda name: scores[name], reverse=True)\n    return names","expert":"def rank_scores(scores):\n    return sorted(scores, key=scores.get, reverse=True)","explanation":"The normal solution extracts keys into a list and sorts in-place with a lambda that looks up each name in scores. The expert version uses `sorted(scores, ...)` \u2014 iterating a dict yields its keys \u2014 and `key=scores.get`, passing the dict's `.get` method directly as the key function. `scores.get` is a bound method that accepts one argument (the key) and returns the value, which is exactly what `sorted` needs. This is both shorter and avoids the lambda."},{"day":67,"title":"Enumerate for Index-Value Pairs","topic":"enumerate","difficulty":1,"minutes":6,"prompt":"Write a function `label_items(items)` that takes a list of strings and returns a list of strings in the format `'1. item'`, `'2. item'`, etc. (1-indexed).\n\nExamples:\n- `label_items(['apple', 'banana'])` \u2192 `['1. apple', '2. banana']`\n- `label_items([])` \u2192 `[]`","starter":"def label_items(items):\n    # your code here\n    pass","hint":"Use enumerate(items, start=1) to get (index, item) pairs starting from 1.","tests":["assert label_items(['apple', 'banana']) == ['1. apple', '2. banana']","assert label_items([]) == []","assert label_items(['only']) == ['1. only']","assert label_items(['x', 'y', 'z']) == ['1. x', '2. y', '3. z']"],"solution":"def label_items(items):\n    result = []\n    for i, item in enumerate(items, start=1):\n        result.append(str(i) + '. ' + item)\n    return result","expert":"def label_items(items):\n    return [f'{i}. {item}' for i, item in enumerate(items, start=1)]","explanation":"`enumerate(iterable, start=1)` yields `(index, value)` pairs starting from 1, so you never need a manual counter variable. The normal solution uses a loop and `.append()`. The expert version puts this directly in a list comprehension with an f-string, eliminating the temporary list. This pattern \u2014 `enumerate` + comprehension \u2014 is the idiomatic way to produce indexed strings in Python."},{"day":68,"title":"Find Index of Maximum","topic":"enumerate","difficulty":2,"minutes":6,"prompt":"Write a function `index_of_max(lst)` that returns the index of the largest value in `lst`. If the list is empty, return -1.\n\nExamples:\n- `index_of_max([3, 1, 4, 1, 5, 9])` \u2192 `5`\n- `index_of_max([7])` \u2192 `0`\n- `index_of_max([])` \u2192 `-1`","starter":"def index_of_max(lst):\n    # your code here\n    pass","hint":"Loop with enumerate to track both index and value; keep track of the index where the max value was seen.","tests":["assert index_of_max([3, 1, 4, 1, 5, 9]) == 5","assert index_of_max([7]) == 0","assert index_of_max([]) == -1","assert index_of_max([1, 3, 2]) == 1"],"solution":"def index_of_max(lst):\n    if not lst:\n        return -1\n    max_idx = 0\n    for i, val in enumerate(lst):\n        if val > lst[max_idx]:\n            max_idx = i\n    return max_idx","expert":"def index_of_max(lst):\n    if not lst:\n        return -1\n    return max(range(len(lst)), key=lst.__getitem__)","explanation":"The normal solution tracks the max index with a loop. The expert version uses `max()` on `range(len(lst))` with `key=lst.__getitem__` \u2014 it finds the index `i` that maximizes `lst[i]`. `lst.__getitem__` is the underlying method called by `lst[i]`, usable as a key function without a lambda. An alternative expert form is `max(enumerate(lst), key=lambda x: x[1])[0]`, which is arguably more readable."},{"day":69,"title":"Zip Two Lists","topic":"zip","difficulty":1,"minutes":6,"prompt":"Write a function `pair_up(names, scores)` that takes two lists of the same length and returns a list of tuples pairing each name with its score.\n\nExamples:\n- `pair_up(['Alice','Bob'], [90, 75])` \u2192 `[('Alice', 90), ('Bob', 75)]`\n- `pair_up([], [])` \u2192 `[]`","starter":"def pair_up(names, scores):\n    # your code here\n    pass","hint":"Use zip() to combine the two lists into pairs.","tests":["assert pair_up(['Alice','Bob'], [90, 75]) == [('Alice', 90), ('Bob', 75)]","assert pair_up([], []) == []","assert pair_up(['X'], [1]) == [('X', 1)]","assert pair_up(['a','b','c'], [1,2,3]) == [('a',1),('b',2),('c',3)]"],"solution":"def pair_up(names, scores):\n    result = []\n    for name, score in zip(names, scores):\n        result.append((name, score))\n    return result","expert":"def pair_up(names, scores):\n    return list(zip(names, scores))","explanation":"The normal solution iterates with `zip` and appends tuples. The expert version passes the zip object directly to `list()`, which materializes all the tuples at once. `zip` returns an iterator of tuples, so `list(zip(...))` is the most direct way to get a list of paired tuples. This is a one-liner because `zip` already does exactly what the problem asks."},{"day":70,"title":"Transpose a Matrix","topic":"zip","difficulty":2,"minutes":7,"prompt":"Write a function `transpose(matrix)` that takes a list of rows (each row is a list of equal length) and returns the transposed matrix (rows become columns).\n\nExamples:\n- `transpose([[1,2,3],[4,5,6]])` \u2192 `[[1,4],[2,5],[3,6]]`\n- `transpose([[1],[2]])` \u2192 `[[1,2]]`","starter":"def transpose(matrix):\n    # your code here\n    pass","hint":"zip(*matrix) unpacks the rows and zips columns together. Convert each resulting tuple to a list.","tests":["assert transpose([[1,2,3],[4,5,6]]) == [[1,4],[2,5],[3,6]]","assert transpose([[1],[2]]) == [[1,2]]","assert transpose([[1,2],[3,4]]) == [[1,3],[2,4]]","assert transpose([[5]]) == [[5]]"],"solution":"def transpose(matrix):\n    rows = len(matrix)\n    cols = len(matrix[0])\n    result = []\n    for c in range(cols):\n        col = []\n        for r in range(rows):\n            col.append(matrix[r][c])\n        result.append(col)\n    return result","expert":"def transpose(matrix):\n    return [list(row) for row in zip(*matrix)]","explanation":"The normal solution uses nested index loops to collect each column. The expert version uses `zip(*matrix)` \u2014 the `*` operator unpacks the matrix's rows as separate arguments to `zip`, so `zip` pairs up the first elements, then the second elements, etc., effectively transposing. Each resulting tuple is converted to a list. This is the canonical Python matrix transposition idiom and is used in real numerical code."},{"day":71,"title":"Nested Loops: Multiplication Table","topic":"nested_loops","difficulty":2,"minutes":7,"prompt":"Write a function `mult_table(n)` that returns a nested list (list of lists) representing an n\u00d7n multiplication table. `result[i][j]` should equal `(i+1) * (j+1)`.\n\nExamples:\n- `mult_table(2)` \u2192 `[[1, 2], [2, 4]]`\n- `mult_table(1)` \u2192 `[[1]]`","starter":"def mult_table(n):\n    # your code here\n    pass","hint":"Use two nested loops (or a nested comprehension). The value at row i, col j is (i+1)*(j+1).","tests":["assert mult_table(2) == [[1, 2], [2, 4]]","assert mult_table(1) == [[1]]","assert mult_table(3) == [[1,2,3],[2,4,6],[3,6,9]]","assert mult_table(3)[2][2] == 9"],"solution":"def mult_table(n):\n    result = []\n    for i in range(1, n + 1):\n        row = []\n        for j in range(1, n + 1):\n            row.append(i * j)\n        result.append(row)\n    return result","expert":"def mult_table(n):\n    return [[i * j for j in range(1, n + 1)] for i in range(1, n + 1)]","explanation":"The normal solution uses two nested for-loops, building and appending each row. The expert version uses a nested list comprehension \u2014 the outer comprehension produces rows, the inner produces columns within each row. The pattern `[[expr(i,j) for j in cols] for i in rows]` is the idiomatic way to build 2D lists in Python and can be read as 'for each row i, build a list of values for each column j'."},{"day":72,"title":"Find Pairs That Sum to Target","topic":"nested_loops","difficulty":2,"minutes":7,"prompt":"Write a function `find_pairs(lst, target)` that returns a sorted list of tuples `(a, b)` where `a < b`, `a` and `b` are elements of `lst` at different positions, and `a + b == target`. Each pair should appear once.\n\nExamples:\n- `find_pairs([1,2,3,4], 5)` \u2192 `[(1, 4), (2, 3)]`\n- `find_pairs([1,1,2], 2)` \u2192 `[(1, 1)]`","starter":"def find_pairs(lst, target):\n    # your code here\n    pass","hint":"Use two nested loops with indices i and j where j > i. Collect pairs where lst[i]+lst[j]==target, then sort.","tests":["assert find_pairs([1,2,3,4], 5) == [(1, 4), (2, 3)]","assert find_pairs([1,1,2], 2) == [(1, 1)]","assert find_pairs([1,2,3], 10) == []","assert find_pairs([0,1,2,3], 3) == [(0, 3), (1, 2)]"],"solution":"def find_pairs(lst, target):\n    pairs = []\n    for i in range(len(lst)):\n        for j in range(i + 1, len(lst)):\n            if lst[i] + lst[j] == target:\n                pair = (min(lst[i], lst[j]), max(lst[i], lst[j]))\n                if pair not in pairs:\n                    pairs.append(pair)\n    return sorted(pairs)","expert":"def find_pairs(lst, target):\n    seen = set()\n    result = []\n    for i in range(len(lst)):\n        for j in range(i + 1, len(lst)):\n            if lst[i] + lst[j] == target:\n                pair = (min(lst[i], lst[j]), max(lst[i], lst[j]))\n                if pair not in seen:\n                    seen.add(pair)\n                    result.append(pair)\n    return sorted(result)","explanation":"The normal solution uses `if pair not in pairs` to check for duplicates, but list membership checks are O(n). The expert version tracks seen pairs with a `set`, reducing duplicate checks to O(1). This matters when the list is large and many duplicate pairs exist. Both return a sorted list; the `min`/`max` trick ensures the smaller number is always first, giving consistent tuple ordering regardless of the elements' positions."},{"day":73,"title":"Access Nested Dict","topic":"nested_data","difficulty":2,"minutes":7,"prompt":"Write a function `get_city(data, country, city_index)` that returns the city name at `city_index` from the list of cities for `country` in `data`. Return `None` if country or index doesn't exist.\n\nExample data: `{'France': {'cities': ['Paris', 'Lyon']}, 'Spain': {'cities': ['Madrid']}}`\n- `get_city(data, 'France', 0)` \u2192 `'Paris'`\n- `get_city(data, 'Italy', 0)` \u2192 `None`","starter":"def get_city(data, country, city_index):\n    # your code here\n    pass","hint":"Use .get() on the outer dict to safely get the country's sub-dict, then try to index the cities list inside a try/except.","tests":["assert get_city({'France': {'cities': ['Paris', 'Lyon']}}, 'France', 0) == 'Paris'","assert get_city({'France': {'cities': ['Paris', 'Lyon']}}, 'France', 1) == 'Lyon'","assert get_city({'France': {'cities': ['Paris']}}, 'Italy', 0) is None","assert get_city({'France': {'cities': ['Paris']}}, 'France', 5) is None"],"solution":"def get_city(data, country, city_index):\n    if country not in data:\n        return None\n    cities = data[country]['cities']\n    if city_index >= len(cities) or city_index < 0:\n        return None\n    return cities[city_index]","expert":"def get_city(data, country, city_index):\n    try:\n        return data[country]['cities'][city_index]\n    except (KeyError, IndexError):\n        return None","explanation":"The normal solution uses explicit checks for key existence and index bounds. The expert version uses a try/except block \u2014 it attempts the full access chain and catches `KeyError` (missing country) or `IndexError` (bad index) to return `None`. This is the EAFP (Easier to Ask Forgiveness than Permission) pattern, which is idiomatic Python. It's shorter and handles all edge cases without enumerating them explicitly."},{"day":74,"title":"Summarize Nested List of Dicts","topic":"nested_data","difficulty":2,"minutes":8,"prompt":"Write a function `average_score(students)` that takes a list of dicts, each with a 'name' key and a 'score' key, and returns the average score as a float. Return 0.0 if the list is empty.\n\nExamples:\n- `average_score([{'name':'A','score':80},{'name':'B','score':90}])` \u2192 `85.0`\n- `average_score([])` \u2192 `0.0`","starter":"def average_score(students):\n    # your code here\n    pass","hint":"Sum up all 'score' values and divide by len(students). Handle the empty case first.","tests":["assert average_score([{'name':'A','score':80},{'name':'B','score':90}]) == 85.0","assert average_score([]) == 0.0","assert average_score([{'name':'X','score':100}]) == 100.0","assert average_score([{'name':'a','score':0},{'name':'b','score':50},{'name':'c','score':100}]) == 50.0"],"solution":"def average_score(students):\n    if not students:\n        return 0.0\n    total = 0\n    for s in students:\n        total += s['score']\n    return total / len(students)","expert":"def average_score(students):\n    if not students:\n        return 0.0\n    return sum(s['score'] for s in students) / len(students)","explanation":"The normal solution accumulates a running total with a loop. The expert version uses `sum()` with a generator expression `(s['score'] for s in students)` \u2014 no intermediate list is created (generators are lazy), and the intent is clear: sum the scores. Combining `sum()` with a generator is the idiomatic Python way to aggregate a single field from a list of dicts."},{"day":75,"title":"Split and Strip Strings","topic":"string_processing","difficulty":1,"minutes":6,"prompt":"Write a function `clean_split(text, sep=',')` that splits `text` by `sep` and returns a list of stripped, non-empty strings.\n\nExamples:\n- `clean_split('  a , b ,  c  ')` \u2192 `['a', 'b', 'c']`\n- `clean_split('x,,y', ',')` \u2192 `['x', 'y']`","starter":"def clean_split(text, sep=','):\n    # your code here\n    pass","hint":"Split by sep, then strip each part, then filter out empty strings.","tests":["assert clean_split('  a , b ,  c  ') == ['a', 'b', 'c']","assert clean_split('x,,y', ',') == ['x', 'y']","assert clean_split('  ') == []","assert clean_split('one') == ['one']"],"solution":"def clean_split(text, sep=','):\n    result = []\n    for part in text.split(sep):\n        stripped = part.strip()\n        if stripped:\n            result.append(stripped)\n    return result","expert":"def clean_split(text, sep=','):\n    return [p.strip() for p in text.split(sep) if p.strip()]","explanation":"The normal solution loops, strips each part, and appends non-empty strings. The expert version uses a list comprehension with both a transformation (`p.strip()`) and a filter (`if p.strip()`). Note that `.strip()` is called twice \u2014 once in the condition and once in the expression. For clarity without double-calling you could write `parts = [p.strip() for p in text.split(sep)]; return [p for p in parts if p]`, but the one-liner is common in practice."},{"day":76,"title":"Join Words into Sentence","topic":"string_processing","difficulty":1,"minutes":6,"prompt":"Write a function `to_sentence(words)` that takes a list of words and returns them joined into a sentence: capitalized first word, each word separated by a space, ending with a period.\n\nExamples:\n- `to_sentence(['hello', 'world'])` \u2192 `'Hello world.'`\n- `to_sentence(['python'])` \u2192 `'Python.'`\n- `to_sentence([])` \u2192 `''`","starter":"def to_sentence(words):\n    # your code here\n    pass","hint":"Join words with ' '.join(), capitalize the first word, and add a period at the end. Handle the empty case.","tests":["assert to_sentence(['hello', 'world']) == 'Hello world.'","assert to_sentence(['python']) == 'Python.'","assert to_sentence([]) == ''","assert to_sentence(['a', 'b', 'c']) == 'A b c.'"],"solution":"def to_sentence(words):\n    if not words:\n        return ''\n    joined = ' '.join(words)\n    return joined[0].upper() + joined[1:] + '.'","expert":"def to_sentence(words):\n    if not words:\n        return ''\n    return ' '.join(words).capitalize() + '.'","explanation":"The normal solution manually capitalizes by uppercasing the first character and concatenating the rest. The expert version uses `.capitalize()`, which uppercases the first character and lowercases the rest \u2014 here that's fine since input words are already lowercase. The key idiom is `' '.join(words)` which is far more efficient than concatenating with `+` in a loop, as it builds the string in a single pass."},{"day":77,"title":"Count Vowels in String","topic":"string_processing","difficulty":1,"minutes":6,"prompt":"Write a function `count_vowels(text)` that returns the number of vowels (a, e, i, o, u) in `text`, case-insensitive.\n\nExamples:\n- `count_vowels('Hello World')` \u2192 `3`\n- `count_vowels('xyz')` \u2192 `0`","starter":"def count_vowels(text):\n    # your code here\n    pass","hint":"Convert text to lowercase, then count characters that are in the set of vowels.","tests":["assert count_vowels('Hello World') == 3","assert count_vowels('xyz') == 0","assert count_vowels('aeiou') == 5","assert count_vowels('') == 0","assert count_vowels('Python') == 1"],"solution":"def count_vowels(text):\n    count = 0\n    vowels = 'aeiou'\n    for ch in text.lower():\n        if ch in vowels:\n            count += 1\n    return count","expert":"def count_vowels(text):\n    return sum(1 for ch in text.lower() if ch in 'aeiou')","explanation":"The normal solution uses a counter variable and a loop. The expert version uses `sum()` with a generator that yields 1 for each vowel \u2014 `sum(1 for ...)` is a compact way to count items satisfying a condition without an intermediate list. An alternative is `sum(ch in 'aeiou' for ch in text.lower())` which exploits the fact that `True` equals 1 in Python, but `sum(1 for ...)` is more explicit."},{"day":78,"title":"Parse CSV Row","topic":"string_processing","difficulty":2,"minutes":7,"prompt":"Write a function `parse_row(row)` that takes a CSV string like `'Alice,30,Engineer'` and returns a dict with keys `'name'`, `'age'` (as int), and `'role'`.\n\nExamples:\n- `parse_row('Alice,30,Engineer')` \u2192 `{'name': 'Alice', 'age': 30, 'role': 'Engineer'}`\n- `parse_row('Bob,25,Designer')` \u2192 `{'name': 'Bob', 'age': 25, 'role': 'Designer'}`","starter":"def parse_row(row):\n    # your code here\n    pass","hint":"Split by comma, then assign parts to variables and build the dict. Convert age to int.","tests":["assert parse_row('Alice,30,Engineer') == {'name': 'Alice', 'age': 30, 'role': 'Engineer'}","assert parse_row('Bob,25,Designer') == {'name': 'Bob', 'age': 25, 'role': 'Designer'}","assert parse_row('X,1,Y')['age'] == 1","assert isinstance(parse_row('Z,99,Dev')['age'], int)"],"solution":"def parse_row(row):\n    parts = row.split(',')\n    return {'name': parts[0], 'age': int(parts[1]), 'role': parts[2]}","expert":"def parse_row(row):\n    name, age, role = row.split(',')\n    return {'name': name, 'age': int(age), 'role': role}","explanation":"The normal solution indexes into the split list by position. The expert version uses tuple unpacking: `name, age, role = row.split(',')` assigns each part directly to a named variable in one line. This makes the code more readable \u2014 the variable names document what each field represents \u2014 and will raise a `ValueError` if the row doesn't have exactly 3 fields, which is useful for early error detection."},{"day":79,"title":"Basic Unpacking","topic":"unpacking","difficulty":1,"minutes":6,"prompt":"Write a function `first_and_rest(lst)` that returns a tuple `(first, rest)` where `first` is the first element and `rest` is a list of the remaining elements.\n\nExamples:\n- `first_and_rest([1, 2, 3, 4])` \u2192 `(1, [2, 3, 4])`\n- `first_and_rest([42])` \u2192 `(42, [])`","starter":"def first_and_rest(lst):\n    # your code here\n    pass","hint":"Use starred assignment: `first, *rest = lst` unpacks the first element and the rest separately.","tests":["assert first_and_rest([1, 2, 3, 4]) == (1, [2, 3, 4])","assert first_and_rest([42]) == (42, [])","assert first_and_rest([10, 20]) == (10, [20])","assert first_and_rest(['a', 'b', 'c']) == ('a', ['b', 'c'])"],"solution":"def first_and_rest(lst):\n    first = lst[0]\n    rest = lst[1:]\n    return (first, rest)","expert":"def first_and_rest(lst):\n    first, *rest = lst\n    return first, rest","explanation":"The normal solution uses indexing and slicing. The expert version uses extended unpacking with the `*` operator: `first, *rest = lst` assigns the first element to `first` and all remaining elements (as a list) to `rest`. This is Python 3's extended iterable unpacking and is more readable than index manipulation. Note the return is `first, rest` (no parentheses needed \u2014 Python packs this into a tuple automatically)."},{"day":80,"title":"Swap Variables","topic":"unpacking","difficulty":1,"minutes":6,"prompt":"Write a function `swap_first_last(lst)` that returns a new list with the first and last elements swapped. The input list has at least 2 elements.\n\nExamples:\n- `swap_first_last([1, 2, 3])` \u2192 `[3, 2, 1]`\n- `swap_first_last([10, 20])` \u2192 `[20, 10]`","starter":"def swap_first_last(lst):\n    # your code here\n    pass","hint":"Make a copy of the list, then swap result[0] and result[-1] using tuple unpacking.","tests":["assert swap_first_last([1, 2, 3]) == [3, 2, 1]","assert swap_first_last([10, 20]) == [20, 10]","assert swap_first_last([1, 2, 3, 4]) == [4, 2, 3, 1]","assert swap_first_last([5, 5]) == [5, 5]"],"solution":"def swap_first_last(lst):\n    result = list(lst)\n    temp = result[0]\n    result[0] = result[-1]\n    result[-1] = temp\n    return result","expert":"def swap_first_last(lst):\n    result = list(lst)\n    result[0], result[-1] = result[-1], result[0]\n    return result","explanation":"The normal solution uses a temporary variable for the swap. The expert version uses Python's tuple unpacking swap: `a, b = b, a` \u2014 Python evaluates the right side first (creating a temporary tuple), then unpacks into the left side. This eliminates the temporary variable and is the idiomatic Pythonic way to swap values. The `list(lst)` copy ensures the original is not modified."},{"day":81,"title":"Unpack Nested Tuple","topic":"unpacking","difficulty":2,"minutes":7,"prompt":"Write a function `format_point(point)` that takes a nested tuple like `('A', (3, 4))` and returns the string `'Point A at (3, 4)'`.\n\nExamples:\n- `format_point(('A', (3, 4)))` \u2192 `'Point A at (3, 4)'`\n- `format_point(('Z', (0, 0)))` \u2192 `'Point Z at (0, 0)'`","starter":"def format_point(point):\n    # your code here\n    pass","hint":"Unpack the outer tuple into label and coords, then unpack coords into x and y.","tests":["assert format_point(('A', (3, 4))) == 'Point A at (3, 4)'","assert format_point(('Z', (0, 0))) == 'Point Z at (0, 0)'","assert format_point(('P', (10, -5))) == 'Point P at (10, -5)'","assert format_point(('Q', (1, 2))) == 'Point Q at (1, 2)'"],"solution":"def format_point(point):\n    label = point[0]\n    coords = point[1]\n    x = coords[0]\n    y = coords[1]\n    return 'Point ' + label + ' at (' + str(x) + ', ' + str(y) + ')'","expert":"def format_point(point):\n    label, (x, y) = point\n    return f'Point {label} at ({x}, {y})'","explanation":"The normal solution accesses each element by index. The expert version uses nested tuple unpacking in a single assignment: `label, (x, y) = point` unpacks the outer tuple and simultaneously unpacks the inner tuple into `x` and `y`. Python supports arbitrarily nested unpacking \u2014 the pattern on the left mirrors the structure on the right. This makes the code self-documenting and avoids index chains."},{"day":82,"title":"Word Frequency from Text","topic":"dicts","difficulty":2,"minutes":7,"prompt":"Write a function `top_words(text, n)` that returns the `n` most common words in `text` (case-insensitive, words split by whitespace) as a list of `(word, count)` tuples sorted by count descending.\n\nExamples:\n- `top_words('the cat sat on the mat the', 2)` \u2192 `[('the', 3), ('cat', 1)]` (second item varies by tie-breaking)","starter":"def top_words(text, n):\n    # your code here\n    pass","hint":"Count words in a dict, then sort items by count descending and return the first n.","tests":["assert top_words('the cat sat on the mat the', 1) == [('the', 3)]","assert top_words('a a b b c', 2)[0] in [('a', 2), ('b', 2)]","assert top_words('hello', 1) == [('hello', 1)]","assert len(top_words('x y z', 2)) == 2"],"solution":"def top_words(text, n):\n    counts = {}\n    for word in text.lower().split():\n        counts[word] = counts.get(word, 0) + 1\n    sorted_items = sorted(counts.items(), key=lambda x: x[1], reverse=True)\n    return sorted_items[:n]","expert":"from collections import Counter\ndef top_words(text, n):\n    return Counter(text.lower().split()).most_common(n)","explanation":"The normal solution manually counts words and sorts. The expert version uses `Counter.most_common(n)`, which returns the n most common elements as `(element, count)` pairs, already sorted descending \u2014 it uses `heapq.nlargest` internally for efficiency. `Counter` is the right tool for any frequency-counting task; `.most_common()` is its killer feature that eliminates the sort step entirely."},{"day":83,"title":"Build Dict from Comprehension with Condition","topic":"comprehensions","difficulty":2,"minutes":7,"prompt":"Write a function `long_word_lengths(words, min_len)` that returns a dict mapping each word to its length, but only for words at least `min_len` characters long.\n\nExamples:\n- `long_word_lengths(['hi','hello','hey','world'], 4)` \u2192 `{'hello': 5, 'world': 5}`\n- `long_word_lengths(['a','b'], 5)` \u2192 `{}`","starter":"def long_word_lengths(words, min_len):\n    # your code here\n    pass","hint":"Use a dict comprehension with an if condition: {word: len(word) for word in words if ...}.","tests":["assert long_word_lengths(['hi','hello','hey','world'], 4) == {'hello': 5, 'world': 5}","assert long_word_lengths(['a','b'], 5) == {}","assert long_word_lengths(['cat','elephant','rat'], 3) == {'cat': 3, 'elephant': 8, 'rat': 3}","assert long_word_lengths([], 1) == {}"],"solution":"def long_word_lengths(words, min_len):\n    result = {}\n    for word in words:\n        if len(word) >= min_len:\n            result[word] = len(word)\n    return result","expert":"def long_word_lengths(words, min_len):\n    return {w: len(w) for w in words if len(w) >= min_len}","explanation":"The normal solution uses a loop with an if-check and manual dict assignment. The expert version is a dict comprehension with an inline condition: `{key: value for item in iterable if condition}`. The `if` clause filters before the key-value pair is evaluated, making the intent clear in a single readable expression. Dict comprehensions are one of Python's most expressive features for building filtered/transformed mappings."},{"day":84,"title":"Combine enumerate and zip","topic":"enumerate","difficulty":2,"minutes":7,"prompt":"Write a function `ranked_pairs(names, scores)` that takes two lists of equal length and returns a list of strings like `'#1 Alice: 90'`, ranked by score descending (highest score gets rank 1).\n\nExamples:\n- `ranked_pairs(['Bob','Alice'], [75, 90])` \u2192 `['#1 Alice: 90', '#2 Bob: 75']`\n- `ranked_pairs(['X'], [100])` \u2192 `['#1 X: 100']`","starter":"def ranked_pairs(names, scores):\n    # your code here\n    pass","hint":"Zip names and scores, sort by score descending, then use enumerate(start=1) to assign ranks.","tests":["assert ranked_pairs(['Bob','Alice'], [75, 90]) == ['#1 Alice: 90', '#2 Bob: 75']","assert ranked_pairs(['X'], [100]) == ['#1 X: 100']","assert ranked_pairs(['a','b','c'], [3,1,2]) == ['#1 a: 3', '#2 c: 2', '#3 b: 1']","assert ranked_pairs([], []) == []"],"solution":"def ranked_pairs(names, scores):\n    pairs = list(zip(names, scores))\n    pairs.sort(key=lambda x: x[1], reverse=True)\n    result = []\n    rank = 1\n    for name, score in pairs:\n        result.append('#' + str(rank) + ' ' + name + ': ' + str(score))\n        rank += 1\n    return result","expert":"def ranked_pairs(names, scores):\n    sorted_pairs = sorted(zip(names, scores), key=lambda x: x[1], reverse=True)\n    return [f'#{rank} {name}: {score}' for rank, (name, score) in enumerate(sorted_pairs, start=1)]","explanation":"The normal solution sorts a list of pairs then loops with a manual rank counter. The expert version chains `zip`, `sorted`, and `enumerate` together and uses nested unpacking in the comprehension: `rank, (name, score)` unpacks the enumerate tuple and the inner pair simultaneously. This combines three idioms \u2014 zip, sorted with key, and enumerate \u2014 into a clean pipeline that reads as a transformation."},{"day":85,"title":"String: Palindrome Check","topic":"string_processing","difficulty":1,"minutes":6,"prompt":"Write a function `is_palindrome(text)` that returns `True` if `text` is a palindrome (reads the same forwards and backwards), ignoring spaces and case.\n\nExamples:\n- `is_palindrome('racecar')` \u2192 `True`\n- `is_palindrome('A man a plan a canal Panama')` \u2192 `True`\n- `is_palindrome('hello')` \u2192 `False`","starter":"def is_palindrome(text):\n    # your code here\n    pass","hint":"Remove spaces and lowercase the text, then compare it to its reverse (text[::-1]).","tests":["assert is_palindrome('racecar') == True","assert is_palindrome('A man a plan a canal Panama') == True","assert is_palindrome('hello') == False","assert is_palindrome('Was it a car or a cat I saw') == True","assert is_palindrome('a') == True"],"solution":"def is_palindrome(text):\n    cleaned = text.replace(' ', '').lower()\n    return cleaned == cleaned[::-1]","expert":"def is_palindrome(text):\n    s = ''.join(c.lower() for c in text if c != ' ')\n    return s == s[::-1]","explanation":"The normal solution uses `.replace(' ', '')` and `.lower()`. The expert version uses a generator expression to filter and lowercase in one pass, which generalizes more easily to filtering other characters. The key trick in both is the slice `s[::-1]`, which reverses a string using Python's extended slice syntax \u2014 `[start:stop:step]` with step `-1` iterates backwards. This is the canonical Python string-reversal idiom."},{"day":86,"title":"Anagram Check","topic":"string_processing","difficulty":2,"minutes":7,"prompt":"Write a function `are_anagrams(s1, s2)` that returns `True` if `s1` and `s2` are anagrams of each other (same letters, same counts, ignoring case and spaces).\n\nExamples:\n- `are_anagrams('listen', 'silent')` \u2192 `True`\n- `are_anagrams('hello', 'world')` \u2192 `False`\n- `are_anagrams('Astronomer', 'Moon starer')` \u2192 `True`","starter":"def are_anagrams(s1, s2):\n    # your code here\n    pass","hint":"Remove spaces, lowercase both strings, then compare their sorted characters.","tests":["assert are_anagrams('listen', 'silent') == True","assert are_anagrams('hello', 'world') == False","assert are_anagrams('Astronomer', 'Moon starer') == True","assert are_anagrams('abc', 'cab') == True","assert are_anagrams('abc', 'abcd') == False"],"solution":"def are_anagrams(s1, s2):\n    clean1 = sorted(s1.replace(' ', '').lower())\n    clean2 = sorted(s2.replace(' ', '').lower())\n    return clean1 == clean2","expert":"from collections import Counter\ndef are_anagrams(s1, s2):\n    clean = lambda s: s.replace(' ', '').lower()\n    return Counter(clean(s1)) == Counter(clean(s2))","explanation":"The normal solution sorts both strings and compares \u2014 sorting is O(n log n) but simple. The expert version uses `Counter` to count character frequencies \u2014 comparing two Counters is O(n) (linear). For short strings the difference is negligible, but Counter also communicates intent more clearly: 'these two have the same character frequencies'. The lambda avoids repeating the cleaning logic."},{"day":87,"title":"Any / All with Comprehensions","topic":"comprehensions","difficulty":2,"minutes":7,"prompt":"Write a function `all_positive(lst)` that returns `True` if every number in `lst` is positive (> 0), and `False` otherwise. Return `True` for an empty list.\n\nAlso write a function `any_negative(lst)` that returns `True` if any number is negative.\n\nExamples:\n- `all_positive([1,2,3])` \u2192 `True`\n- `all_positive([1,-2,3])` \u2192 `False`\n- `any_negative([-1, 0, 1])` \u2192 `True`","starter":"def all_positive(lst):\n    # your code here\n    pass\n\ndef any_negative(lst):\n    # your code here\n    pass","hint":"Use the built-in all() and any() with generator expressions.","tests":["assert all_positive([1,2,3]) == True","assert all_positive([1,-2,3]) == False","assert all_positive([]) == True","assert any_negative([-1, 0, 1]) == True","assert any_negative([1, 2, 3]) == False"],"solution":"def all_positive(lst):\n    for x in lst:\n        if x <= 0:\n            return False\n    return True\n\ndef any_negative(lst):\n    for x in lst:\n        if x < 0:\n            return True\n    return False","expert":"def all_positive(lst):\n    return all(x > 0 for x in lst)\n\ndef any_negative(lst):\n    return any(x < 0 for x in lst)","explanation":"The normal solution uses early-return loops. The expert version uses `all()` and `any()` with generator expressions \u2014 these built-ins short-circuit: `all()` stops at the first False, `any()` stops at the first True. This matches the loop behavior but reads as a direct English statement. `all(condition for x in lst)` is idiomatic Python for 'do all elements satisfy condition?' \u2014 memorize this pattern."},{"day":88,"title":"Map with Lambda","topic":"lambda","difficulty":2,"minutes":6,"prompt":"Write a function `normalize(numbers)` that takes a list of numbers and returns a new list where each value is divided by the maximum value in the list (so the max becomes 1.0). Return an empty list if input is empty.\n\nExamples:\n- `normalize([10, 5, 2])` \u2192 `[1.0, 0.5, 0.2]`\n- `normalize([4, 4])` \u2192 `[1.0, 1.0]`","starter":"def normalize(numbers):\n    # your code here\n    pass","hint":"Find the max, then divide each element by it. Use a list comprehension or map with lambda.","tests":["assert normalize([10, 5, 2]) == [1.0, 0.5, 0.2]","assert normalize([4, 4]) == [1.0, 1.0]","assert normalize([]) == []","assert normalize([3]) == [1.0]","assert round(normalize([1, 2, 4])[0], 4) == 0.25"],"solution":"def normalize(numbers):\n    if not numbers:\n        return []\n    m = max(numbers)\n    result = []\n    for n in numbers:\n        result.append(n / m)\n    return result","expert":"def normalize(numbers):\n    if not numbers:\n        return []\n    m = max(numbers)\n    return list(map(lambda x: x / m, numbers))","explanation":"The normal solution uses a loop and `.append()`. The expert version uses `map(lambda x: x / m, numbers)`, which applies the lambda to every element lazily and `list()` materializes the result. `map` with a lambda is the traditional functional approach \u2014 it's concise when the transformation is simple. A list comprehension `[x / m for x in numbers]` is arguably more readable and equally Pythonic; knowing both is valuable."},{"day":89,"title":"Nested Dict Update","topic":"nested_data","difficulty":2,"minutes":8,"prompt":"Write a function `add_score(records, name, score)` that takes a dict `records` (mapping names to lists of scores), and adds `score` to the list for `name`. If `name` isn't in records, create a new entry. Returns the updated `records` dict.\n\nExamples:\n- `add_score({'Alice': [80]}, 'Alice', 90)` \u2192 `{'Alice': [80, 90]}`\n- `add_score({}, 'Bob', 70)` \u2192 `{'Bob': [70]}`","starter":"def add_score(records, name, score):\n    # your code here\n    pass","hint":"Use setdefault to get or create the list for name, then append the score.","tests":["assert add_score({'Alice': [80]}, 'Alice', 90) == {'Alice': [80, 90]}","assert add_score({}, 'Bob', 70) == {'Bob': [70]}","assert add_score({'A': [1, 2]}, 'B', 5) == {'A': [1, 2], 'B': [5]}","assert add_score({'A': []}, 'A', 3) == {'A': [3]}"],"solution":"def add_score(records, name, score):\n    if name not in records:\n        records[name] = []\n    records[name].append(score)\n    return records","expert":"def add_score(records, name, score):\n    records.setdefault(name, []).append(score)\n    return records","explanation":"The normal solution checks if the key exists and creates an empty list if not. The expert version uses `setdefault(key, default)`, which returns the existing value if the key exists, or inserts `default` and returns it. Chaining `.append()` directly on the return value works because `setdefault` always returns the list (whether existing or newly created). This is the cleanest way to maintain a dict-of-lists pattern."},{"day":90,"title":"Pipeline with Multiple Functions","topic":"functions","difficulty":2,"minutes":8,"prompt":"Write a function `pipeline(value, *funcs)` that applies a sequence of functions to `value` in order, passing each result to the next function, and returns the final result.\n\nExamples:\n- `pipeline(5, lambda x: x*2, lambda x: x+3)` \u2192 `13`\n- `pipeline('hello', str.upper, str.strip)` \u2192 `'HELLO'`\n- `pipeline(10)` \u2192 `10`","starter":"def pipeline(value, *funcs):\n    # your code here\n    pass","hint":"Loop through funcs and apply each one to the current value, updating value each time.","tests":["assert pipeline(5, lambda x: x*2, lambda x: x+3) == 13","assert pipeline('hello', str.upper, str.strip) == 'HELLO'","assert pipeline(10) == 10","assert pipeline(2, lambda x: x**3, lambda x: x-1) == 7"],"solution":"def pipeline(value, *funcs):\n    result = value\n    for func in funcs:\n        result = func(result)\n    return result","expert":"from functools import reduce\ndef pipeline(value, *funcs):\n    return reduce(lambda v, f: f(v), funcs, value)","explanation":"The normal solution uses an explicit loop to thread `value` through each function. The expert version uses `functools.reduce(function, iterable, initializer)` \u2014 it starts with `value` as the initial accumulator and applies `lambda v, f: f(v)` for each function, which calls the function with the current value. This is the functional programming pattern for function composition and shows how `reduce` generalizes the 'accumulate through a sequence' pattern."},{"day":91,"title":"Zip for Parallel Iteration","topic":"zip","difficulty":2,"minutes":7,"prompt":"Write a function `dot_product(v1, v2)` that computes the dot product of two numeric lists of equal length (sum of element-wise products).\n\nExamples:\n- `dot_product([1,2,3], [4,5,6])` \u2192 `32`\n- `dot_product([1,0], [0,1])` \u2192 `0`","starter":"def dot_product(v1, v2):\n    # your code here\n    pass","hint":"Use zip to pair up corresponding elements, multiply each pair, and sum the results.","tests":["assert dot_product([1,2,3], [4,5,6]) == 32","assert dot_product([1,0], [0,1]) == 0","assert dot_product([2,2], [3,3]) == 12","assert dot_product([1], [5]) == 5"],"solution":"def dot_product(v1, v2):\n    total = 0\n    for a, b in zip(v1, v2):\n        total += a * b\n    return total","expert":"def dot_product(v1, v2):\n    return sum(a * b for a, b in zip(v1, v2))","explanation":"The normal solution uses a loop to accumulate the product of each pair. The expert version combines `zip`, a generator expression, and `sum` into one line: `sum(a * b for a, b in zip(v1, v2))`. This reads almost like the mathematical definition of dot product and is a textbook example of Python's expressive combination of built-ins. The generator avoids creating an intermediate list."},{"day":92,"title":"Comprehension Over Nested Data","topic":"comprehensions","difficulty":2,"minutes":8,"prompt":"Write a function `passing_students(classes)` that takes a list of dicts, each with a 'class' key and a 'students' key (list of dicts with 'name' and 'grade'). Return a sorted list of names of all students with grade >= 60.\n\nExample: `[{'class':'A','students':[{'name':'Alice','grade':85},{'name':'Bob','grade':50}]}]` \u2192 `['Alice']`","starter":"def passing_students(classes):\n    # your code here\n    pass","hint":"Use nested loops (or a nested comprehension) to iterate over classes and then students within each class.","tests":["assert passing_students([{'class':'A','students':[{'name':'Alice','grade':85},{'name':'Bob','grade':50}]}]) == ['Alice']","assert passing_students([]) == []","assert passing_students([{'class':'B','students':[]}]) == []","assert passing_students([{'class':'A','students':[{'name':'X','grade':60}]},{'class':'B','students':[{'name':'Y','grade':59},{'name':'Z','grade':100}]}]) == ['X','Z']"],"solution":"def passing_students(classes):\n    result = []\n    for cls in classes:\n        for student in cls['students']:\n            if student['grade'] >= 60:\n                result.append(student['name'])\n    result.sort()\n    return result","expert":"def passing_students(classes):\n    return sorted(\n        s['name']\n        for cls in classes\n        for s in cls['students']\n        if s['grade'] >= 60\n    )","explanation":"The normal solution uses two nested loops, appending qualifying names and sorting at the end. The expert version uses a generator expression with two `for` clauses and an `if` clause passed to `sorted()`. Multi-clause generator expressions follow the same left-to-right order as nested loops: the first `for` is the outer loop, the second is inner. This flattens the nested structure into a single readable expression \u2014 once mastered, this pattern is extremely powerful for querying nested data."},{"day":93,"title":"Safe Division","topic":"exceptions","difficulty":2,"minutes":8,"prompt":"Write a function `safe_divide(a, b)` that returns `a / b` as a float. If `b` is zero, return `None` instead of raising an error.\n\nExamples:\n- `safe_divide(10, 2)` \u2192 `5.0`\n- `safe_divide(7, 0)` \u2192 `None`","starter":"def safe_divide(a, b):\n    # your code here\n    pass","hint":"Use a try/except block and catch ZeroDivisionError.","tests":["assert safe_divide(10, 2) == 5.0","assert safe_divide(7, 0) is None","assert safe_divide(0, 5) == 0.0","assert safe_divide(-9, 3) == -3.0"],"solution":"def safe_divide(a, b):\n    try:\n        return a / b\n    except ZeroDivisionError:\n        return None","expert":"def safe_divide(a, b):\n    return None if b == 0 else a / b","explanation":"The solution uses try/except to catch ZeroDivisionError, which is the EAFP (Easier to Ask Forgiveness than Permission) style. The expert version uses LBYL (Look Before You Leap) with a conditional expression \u2014 for this simple numeric guard, the explicit check is actually more readable and avoids exception overhead. Both styles are valid; knowing when to use each is the key skill."},{"day":94,"title":"Safe Integer Conversion","topic":"exceptions","difficulty":2,"minutes":8,"prompt":"Write a function `to_int(value, default=0)` that tries to convert `value` to an integer and returns it. If conversion fails for any reason, return `default`.\n\nExamples:\n- `to_int('42')` \u2192 `42`\n- `to_int('abc')` \u2192 `0`\n- `to_int('abc', -1)` \u2192 `-1`","starter":"def to_int(value, default=0):\n    # your code here\n    pass","hint":"int() raises ValueError for bad strings and TypeError for types like None.","tests":["assert to_int('42') == 42","assert to_int('abc') == 0","assert to_int('abc', -1) == -1","assert to_int(None, 99) == 99","assert to_int(3.7) == 3"],"solution":"def to_int(value, default=0):\n    try:\n        return int(value)\n    except (ValueError, TypeError):\n        return default","expert":"def to_int(value, default=0):\n    try:\n        return int(value)\n    except Exception:\n        return default","explanation":"The solution catches the two most common exceptions (ValueError for bad strings, TypeError for non-convertible types like None) \u2014 this is explicit and precise. The expert version catches the base Exception class, which is shorter and handles any unexpected conversion error, but sacrifices some clarity about what can go wrong. In production code, being specific about exception types is usually preferred."},{"day":95,"title":"Try/Except/Else","topic":"exceptions","difficulty":2,"minutes":9,"prompt":"Write a function `parse_and_double(s)` that converts string `s` to a float and returns double that value. If conversion fails, return the string `'invalid'`. Use the `else` clause of try/except.\n\nExamples:\n- `parse_and_double('3.5')` \u2192 `7.0`\n- `parse_and_double('hello')` \u2192 `'invalid'`","starter":"def parse_and_double(s):\n    # your code here\n    pass","hint":"The else clause runs only when no exception was raised in the try block.","tests":["assert parse_and_double('3.5') == 7.0","assert parse_and_double('hello') == 'invalid'","assert parse_and_double('0') == 0.0","assert parse_and_double('-2') == -4.0"],"solution":"def parse_and_double(s):\n    try:\n        value = float(s)\n    except ValueError:\n        return 'invalid'\n    else:\n        return value * 2","expert":"def parse_and_double(s):\n    try:\n        return float(s) * 2\n    except ValueError:\n        return 'invalid'","explanation":"The solution demonstrates the `else` clause, which runs only when the `try` block succeeds \u2014 useful for code that should only run after a successful operation but isn't part of the risky operation itself. The expert version is more concise by combining the conversion and computation in one expression. The `else` clause shines when the success-case logic is substantial or when you want a clear visual separation between the risky code and the follow-up."},{"day":96,"title":"Finally Cleanup","topic":"exceptions","difficulty":2,"minutes":9,"prompt":"Write a function `safe_lookup(data, key)` that returns `data[key]` if it exists. If not, return `None`. Either way, append the string `'accessed'` to the list `data['log']` (which always exists). Use a `finally` block.\n\nExamples:\n- `safe_lookup({'log': [], 'x': 10}, 'x')` \u2192 `10`, and `data['log']` becomes `['accessed']`\n- `safe_lookup({'log': []}, 'missing')` \u2192 `None`, and `data['log']` becomes `['accessed']`","starter":"def safe_lookup(data, key):\n    # your code here\n    pass","hint":"The finally block runs whether or not an exception occurred.","tests":["d={'log':[],'x':10}; assert safe_lookup(d,'x')==10 and d['log']==['accessed']","d={'log':[]}; assert safe_lookup(d,'missing') is None and d['log']==['accessed']","d={'log':['prev'],'y':5}; safe_lookup(d,'y'); assert d['log']==['prev','accessed']"],"solution":"def safe_lookup(data, key):\n    try:\n        return data[key]\n    except KeyError:\n        return None\n    finally:\n        data['log'].append('accessed')","expert":"def safe_lookup(data, key):\n    result = data.get(key)\n    data['log'].append('accessed')\n    return result","explanation":"The solution uses `finally` to guarantee the log is updated regardless of whether the lookup succeeds or fails \u2014 this is the classic use case for `finally`. The expert version uses `dict.get()` which returns `None` by default, eliminating the need for exception handling entirely and making the code linear and easy to follow. When a dict method exists that handles the missing-key case cleanly, prefer it over try/except."},{"day":97,"title":"Custom Exception Class","topic":"exceptions","difficulty":2,"minutes":10,"prompt":"Define a custom exception `NegativeValueError` (subclassing `ValueError`). Then write a function `square_root(n)` that raises `NegativeValueError` with the message `'Cannot take square root of negative number'` if `n < 0`, otherwise returns the square root (use `n ** 0.5`).\n\nExamples:\n- `square_root(9)` \u2192 `3.0`\n- `square_root(-1)` \u2192 raises `NegativeValueError`","starter":"class NegativeValueError(ValueError):\n    pass\n\ndef square_root(n):\n    # your code here\n    pass","hint":"raise YourException('message') \u2014 custom exceptions are raised just like built-in ones.","tests":["assert square_root(9) == 3.0","assert square_root(0) == 0.0","try:\n    square_root(-1)\n    assert False, 'should have raised'\nexcept NegativeValueError as e:\n    assert 'negative' in str(e).lower()","assert issubclass(NegativeValueError, ValueError)"],"solution":"class NegativeValueError(ValueError):\n    pass\n\ndef square_root(n):\n    if n < 0:\n        raise NegativeValueError('Cannot take square root of negative number')\n    return n ** 0.5","expert":"class NegativeValueError(ValueError):\n    def __init__(self, msg='negative input', value=None):\n        super().__init__(msg)\n        self.value = value\n\ndef square_root(n):\n    if n < 0:\n        raise NegativeValueError(f'Cannot take square root of negative number: {n}', value=n)\n    return n ** 0.5","explanation":"The solution defines the simplest possible custom exception by subclassing ValueError and raising it with a string message. The expert version enriches the exception by storing the offending value as an attribute and customizing `__init__` \u2014 this lets callers inspect `e.value` programmatically without parsing the message string. Well-designed custom exceptions carry structured data, not just text."},{"day":98,"title":"Re-raising Exceptions","topic":"exceptions","difficulty":2,"minutes":9,"prompt":"Write a function `strict_divide(a, b)` that divides `a` by `b`. If `b` is zero, catch the ZeroDivisionError and re-raise it as a `ValueError` with the message `'Divisor cannot be zero'`. Otherwise return the result.\n\nExamples:\n- `strict_divide(10, 2)` \u2192 `5.0`\n- `strict_divide(1, 0)` \u2192 raises `ValueError('Divisor cannot be zero')`","starter":"def strict_divide(a, b):\n    # your code here\n    pass","hint":"Use 'raise ValueError(...) from e' to chain exceptions properly.","tests":["assert strict_divide(10, 2) == 5.0","try:\n    strict_divide(1, 0)\n    assert False\nexcept ValueError as e:\n    assert str(e) == 'Divisor cannot be zero'","try:\n    strict_divide(0, 0)\n    assert False\nexcept ValueError:\n    pass"],"solution":"def strict_divide(a, b):\n    try:\n        return a / b\n    except ZeroDivisionError as e:\n        raise ValueError('Divisor cannot be zero') from e","expert":"def strict_divide(a, b):\n    if b == 0:\n        raise ValueError('Divisor cannot be zero')\n    return a / b","explanation":"The solution demonstrates exception chaining with `raise ... from e`, which preserves the original ZeroDivisionError as the cause while raising a higher-level ValueError \u2014 great for API boundaries where you want to translate low-level errors into domain errors. The expert version avoids the translation entirely with an upfront guard. Exception chaining is most valuable in library code where internal exceptions should not leak to callers."},{"day":99,"title":"Parse JSON String","topic":"json","difficulty":2,"minutes":8,"prompt":"Write a function `parse_json(s)` that parses a JSON string and returns the Python object. If the string is not valid JSON, return `None`.\n\nExamples:\n- `parse_json('{\"a\": 1}')` \u2192 `{'a': 1}`\n- `parse_json('not json')` \u2192 `None`","starter":"import json\n\ndef parse_json(s):\n    # your code here\n    pass","hint":"json.loads() raises json.JSONDecodeError for invalid input.","tests":["assert parse_json('{\"a\": 1}') == {'a': 1}","assert parse_json('[1, 2, 3]') == [1, 2, 3]","assert parse_json('not json') is None","assert parse_json('42') == 42","assert parse_json('{bad}') is None"],"solution":"import json\n\ndef parse_json(s):\n    try:\n        return json.loads(s)\n    except json.JSONDecodeError:\n        return None","expert":"import json\n\ndef parse_json(s):\n    try:\n        return json.loads(s)\n    except ValueError:\n        return None","explanation":"The solution catches `json.JSONDecodeError` specifically, which is the exception `json.loads()` raises. The expert version catches `ValueError` instead \u2014 this works because `json.JSONDecodeError` is a subclass of `ValueError`, so catching the parent also handles it. Catching `ValueError` is common in older code and is slightly more concise, but `json.JSONDecodeError` is more precise and self-documenting."},{"day":100,"title":"Serialize to JSON String","topic":"json","difficulty":2,"minutes":8,"prompt":"Write a function `to_json(obj, indent=None)` that serializes `obj` to a JSON string. If the object is not JSON-serializable, return `None`.\n\nExamples:\n- `to_json({'x': 1})` \u2192 `'{\"x\": 1}'`\n- `to_json({'x': 1}, indent=2)` \u2192 formatted JSON with 2-space indent\n- `to_json(set([1,2]))` \u2192 `None`","starter":"import json\n\ndef to_json(obj, indent=None):\n    # your code here\n    pass","hint":"json.dumps() raises TypeError when it encounters non-serializable types.","tests":["import json; assert json.loads(to_json({'x': 1})) == {'x': 1}","assert to_json(set([1,2])) is None","assert to_json([1,'a',True]) is not None","result = to_json({'a':1}, indent=2); assert '\\n' in result"],"solution":"import json\n\ndef to_json(obj, indent=None):\n    try:\n        return json.dumps(obj, indent=indent)\n    except TypeError:\n        return None","expert":"import json\n\ndef to_json(obj, indent=None):\n    try:\n        return json.dumps(obj, indent=indent)\n    except (TypeError, ValueError):\n        return None","explanation":"The solution wraps `json.dumps()` in a try/except to handle TypeError for non-serializable objects like sets, custom class instances, or complex numbers. The expert version also catches ValueError (which can occur with certain circular-reference-like structures). In production, you might add `default=str` to the dumps call to auto-serialize unknown types rather than returning None \u2014 a trade-off between strictness and convenience."},{"day":101,"title":"Extract JSON Field","topic":"json","difficulty":2,"minutes":9,"prompt":"Write a function `get_json_field(json_string, field)` that parses the JSON string and returns the value at `field`. Return `None` if the string is invalid JSON or the field doesn't exist.\n\nExamples:\n- `get_json_field('{\"name\": \"Alice\"}', 'name')` \u2192 `'Alice'`\n- `get_json_field('{\"name\": \"Alice\"}', 'age')` \u2192 `None`\n- `get_json_field('bad', 'x')` \u2192 `None`","starter":"import json\n\ndef get_json_field(json_string, field):\n    # your code here\n    pass","hint":"Parse first, then use dict.get() to safely access the field.","tests":["assert get_json_field('{\"name\": \"Alice\"}', 'name') == 'Alice'","assert get_json_field('{\"name\": \"Alice\"}', 'age') is None","assert get_json_field('bad json', 'x') is None","assert get_json_field('{\"score\": 99}', 'score') == 99"],"solution":"import json\n\ndef get_json_field(json_string, field):\n    try:\n        data = json.loads(json_string)\n        return data.get(field)\n    except (json.JSONDecodeError, AttributeError):\n        return None","expert":"import json\n\ndef get_json_field(json_string, field):\n    try:\n        return json.loads(json_string).get(field)\n    except Exception:\n        return None","explanation":"The solution handles two potential errors: JSONDecodeError if the string is invalid, and AttributeError if the parsed result is not a dict (e.g., JSON is a list or number). The expert version collapses both into a single chained expression and catches any Exception \u2014 slightly less explicit but shorter. In quick data-extraction utilities, broad exception handling like this is a practical trade-off."},{"day":102,"title":"Pretty-Print JSON","topic":"json","difficulty":2,"minutes":8,"prompt":"Write a function `prettify_json(s, indent=4)` that takes a compact JSON string, parses it, and returns it re-serialized with the given indent. If the input is invalid JSON, return the original string unchanged.\n\nExamples:\n- `prettify_json('{\"a\":1,\"b\":2}')` \u2192 `'{\\n    \"a\": 1,\\n    \"b\": 2\\n}'`\n- `prettify_json('bad')` \u2192 `'bad'`","starter":"import json\n\ndef prettify_json(s, indent=4):\n    # your code here\n    pass","hint":"Parse with json.loads, then re-dump with json.dumps and indent parameter.","tests":["import json; r=prettify_json('{\"a\":1}'); assert json.loads(r)=={'a':1} and '    ' in r","assert prettify_json('bad') == 'bad'","import json; r=prettify_json('[1,2,3]',indent=2); assert '  ' in r and json.loads(r)==[1,2,3]"],"solution":"import json\n\ndef prettify_json(s, indent=4):\n    try:\n        data = json.loads(s)\n        return json.dumps(data, indent=indent)\n    except json.JSONDecodeError:\n        return s","expert":"import json\n\ndef prettify_json(s, indent=4):\n    try:\n        return json.dumps(json.loads(s), indent=indent)\n    except json.JSONDecodeError:\n        return s","explanation":"The solution parses and re-serializes with indentation, returning the original string on failure. The expert version chains `json.dumps(json.loads(s), ...)` in a single expression \u2014 since `json.loads` is called first and its result is passed directly to `json.dumps`, the variable is unnecessary. This pipeline style is idiomatic when you're transforming data through a sequence of pure functions."},{"day":103,"title":"Days Between Dates","topic":"datetime","difficulty":2,"minutes":8,"prompt":"Write a function `days_between(date1, date2)` where both arguments are strings in `'YYYY-MM-DD'` format. Return the absolute number of days between the two dates as an integer.\n\nExamples:\n- `days_between('2024-01-01', '2024-01-10')` \u2192 `9`\n- `days_between('2024-01-10', '2024-01-01')` \u2192 `9`","starter":"from datetime import date\n\ndef days_between(date1, date2):\n    # your code here\n    pass","hint":"Use date.fromisoformat() to parse, then subtract to get a timedelta. Use .days on the result.","tests":["assert days_between('2024-01-01', '2024-01-10') == 9","assert days_between('2024-01-10', '2024-01-01') == 9","assert days_between('2024-03-01', '2024-03-01') == 0","assert days_between('2023-12-25', '2024-01-01') == 7"],"solution":"from datetime import date\n\ndef days_between(date1, date2):\n    d1 = date.fromisoformat(date1)\n    d2 = date.fromisoformat(date2)\n    return abs((d2 - d1).days)","expert":"from datetime import date\n\ndef days_between(date1, date2):\n    return abs((date.fromisoformat(date2) - date.fromisoformat(date1)).days)","explanation":"The solution parses both date strings using `date.fromisoformat()`, subtracts them to get a `timedelta`, then takes `.days` and applies `abs()` for order-independence. The expert version computes the same result in one expression. Subtracting two `date` objects always yields a `timedelta`, and `.days` gives the signed integer count \u2014 `abs()` makes the function commutative."},{"day":104,"title":"Add Business Days","topic":"datetime","difficulty":2,"minutes":10,"prompt":"Write a function `add_business_days(start_date, n)` where `start_date` is a `'YYYY-MM-DD'` string and `n` is a positive integer. Return the date that is `n` business days (Mon-Fri) after `start_date`, as a `'YYYY-MM-DD'` string. Skip weekends.\n\nExamples:\n- `add_business_days('2024-01-05', 3)` \u2192 `'2024-01-10'` (Fri+3 business days = Wed)\n- `add_business_days('2024-01-05', 1)` \u2192 `'2024-01-08'` (Fri+1 = Mon)","starter":"from datetime import date, timedelta\n\ndef add_business_days(start_date, n):\n    # your code here\n    pass","hint":"Loop, adding one day at a time. Use date.weekday() \u2014 Monday is 0, Sunday is 6.","tests":["assert add_business_days('2024-01-05', 1) == '2024-01-08'","assert add_business_days('2024-01-05', 3) == '2024-01-10'","assert add_business_days('2024-01-08', 5) == '2024-01-15'","assert add_business_days('2024-01-01', 0) == '2024-01-01'"],"solution":"from datetime import date, timedelta\n\ndef add_business_days(start_date, n):\n    current = date.fromisoformat(start_date)\n    count = 0\n    while count < n:\n        current += timedelta(days=1)\n        if current.weekday() < 5:\n            count += 1\n    return current.isoformat()","expert":"from datetime import date, timedelta\n\ndef add_business_days(start_date, n):\n    d = date.fromisoformat(start_date)\n    added = 0\n    while added < n:\n        d += timedelta(1)\n        added += d.weekday() < 5\n    return d.isoformat()","explanation":"The solution increments a counter only when the new day is a weekday (weekday() < 5). The expert version uses the fact that `True` equals `1` in Python arithmetic \u2014 `added += d.weekday() < 5` adds 1 on weekdays and 0 on weekends, eliminating the `if` statement. Using boolean values as integers is an idiomatic Python pattern for compact conditional accumulation."},{"day":105,"title":"Format Date for Display","topic":"datetime","difficulty":2,"minutes":8,"prompt":"Write a function `format_date(date_str, fmt)` that takes a date string in `'YYYY-MM-DD'` format and a `strftime` format string, and returns the formatted date string.\n\nExamples:\n- `format_date('2024-07-04', '%B %d, %Y')` \u2192 `'July 04, 2024'`\n- `format_date('2024-07-04', '%d/%m/%Y')` \u2192 `'04/07/2024'`","starter":"from datetime import date\n\ndef format_date(date_str, fmt):\n    # your code here\n    pass","hint":"Parse with date.fromisoformat(), then call .strftime(fmt).","tests":["assert format_date('2024-07-04', '%B %d, %Y') == 'July 04, 2024'","assert format_date('2024-07-04', '%d/%m/%Y') == '04/07/2024'","assert format_date('2024-01-15', '%Y') == '2024'","assert format_date('2024-12-25', '%A') == 'Wednesday'"],"solution":"from datetime import date\n\ndef format_date(date_str, fmt):\n    return date.fromisoformat(date_str).strftime(fmt)","expert":"from datetime import datetime\n\ndef format_date(date_str, fmt):\n    return datetime.strptime(date_str, '%Y-%m-%d').strftime(fmt)","explanation":"The solution chains `date.fromisoformat()` and `.strftime()` \u2014 clean and direct for date-only values. The expert version uses `datetime.strptime()` with an explicit format string, which is the more general pattern: `strptime` parses any date/time format (not just ISO), and the `strptime`\u2192`strftime` round-trip is the standard date reformatting idiom in Python."},{"day":106,"title":"Age in Years","topic":"datetime","difficulty":2,"minutes":9,"prompt":"Write a function `age_in_years(birth_date, reference_date)` where both arguments are `'YYYY-MM-DD'` strings. Return the age in complete years on `reference_date`.\n\nExamples:\n- `age_in_years('1990-06-15', '2024-06-14')` \u2192 `33` (birthday not yet reached)\n- `age_in_years('1990-06-15', '2024-06-15')` \u2192 `34` (birthday today)","starter":"from datetime import date\n\ndef age_in_years(birth_date, reference_date):\n    # your code here\n    pass","hint":"Subtract years, then check if the birthday has occurred yet this year using month/day comparison.","tests":["assert age_in_years('1990-06-15', '2024-06-14') == 33","assert age_in_years('1990-06-15', '2024-06-15') == 34","assert age_in_years('2000-01-01', '2024-01-01') == 24","assert age_in_years('2000-12-31', '2024-12-30') == 23"],"solution":"from datetime import date\n\ndef age_in_years(birth_date, reference_date):\n    birth = date.fromisoformat(birth_date)\n    ref = date.fromisoformat(reference_date)\n    years = ref.year - birth.year\n    if (ref.month, ref.day) < (birth.month, birth.day):\n        years -= 1\n    return years","expert":"from datetime import date\n\ndef age_in_years(birth_date, reference_date):\n    b = date.fromisoformat(birth_date)\n    r = date.fromisoformat(reference_date)\n    return r.year - b.year - ((r.month, r.day) < (b.month, b.day))","explanation":"The solution computes the year difference and then checks whether the birthday has passed yet by comparing (month, day) tuples \u2014 Python compares tuples element-by-element, so this works naturally. The expert version subtracts the boolean `((r.month, r.day) < (b.month, b.day))` directly from the year difference (True == 1), collapsing the conditional into arithmetic. This is a classic one-liner for age calculation."},{"day":107,"title":"Math Module Basics","topic":"math","difficulty":2,"minutes":8,"prompt":"Write a function `circle_stats(radius)` that returns a tuple `(circumference, area)` for a circle with the given radius. Round both values to 4 decimal places. Use `math.pi`.\n\nExamples:\n- `circle_stats(1)` \u2192 `(6.2832, 3.1416)`\n- `circle_stats(5)` \u2192 `(31.4159, 78.5398)`","starter":"import math\n\ndef circle_stats(radius):\n    # your code here\n    pass","hint":"Circumference = 2*pi*r, area = pi*r^2. Use round().","tests":["assert circle_stats(1) == (6.2832, 3.1416)","assert circle_stats(5) == (31.4159, 78.5398)","assert circle_stats(0) == (0.0, 0.0)","c, a = circle_stats(2); assert c == round(2*3.14159265358979*2, 4)"],"solution":"import math\n\ndef circle_stats(radius):\n    circumference = round(2 * math.pi * radius, 4)\n    area = round(math.pi * radius ** 2, 4)\n    return (circumference, area)","expert":"import math\n\ndef circle_stats(radius):\n    return tuple(round(v, 4) for v in (2*math.pi*radius, math.pi*radius**2))","explanation":"The solution computes circumference and area as separate variables and returns them as a tuple. The expert version uses a generator expression inside `tuple()` to apply the same rounding logic to both values in one line \u2014 a compact pattern when you need to apply the same transformation to multiple related values."},{"day":108,"title":"Logarithm and Power","topic":"math","difficulty":2,"minutes":8,"prompt":"Write a function `log_info(x)` that returns a dict with keys `'log2'`, `'log10'`, and `'ln'` holding the respective logarithms of `x`, each rounded to 6 decimal places. Raise `ValueError` if `x <= 0`.\n\nExamples:\n- `log_info(8)` \u2192 `{'log2': 3.0, 'log10': 0.90309, 'ln': 2.079442}`","starter":"import math\n\ndef log_info(x):\n    # your code here\n    pass","hint":"Use math.log2(), math.log10(), math.log() for natural log.","tests":["assert log_info(8) == {'log2': 3.0, 'log10': round(math.log10(8),6), 'ln': round(math.log(8),6)}","import math; r=log_info(1); assert r['log2']==0.0 and r['log10']==0.0 and r['ln']==0.0","try:\n    import math; log_info(0)\n    assert False\nexcept ValueError:\n    pass","import math; assert log_info(8)['log2'] == 3.0"],"solution":"import math\n\ndef log_info(x):\n    if x <= 0:\n        raise ValueError('x must be positive')\n    return {\n
